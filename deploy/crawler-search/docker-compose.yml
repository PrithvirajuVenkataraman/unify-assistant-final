services:
  crawler-search:
    image: node:22-alpine
    container_name: jarvis-crawler-search
    restart: unless-stopped
    working_dir: /app
    command: node tools/crawler/search-server.mjs
    environment:
      CRAWLER_SEARCH_HOST: 0.0.0.0
      CRAWLER_SEARCH_PORT: 7700
      CRAWLER_SEARCH_KEY: "${CRAWLER_SEARCH_KEY}"
      CRAWLER_INDEX_FILE: /data/crawler-index.jsonl
    volumes:
      - ../../:/app:ro
      - crawler_data:/data

  caddy:
    image: caddy:2
    container_name: jarvis-crawler-caddy
    restart: unless-stopped
    depends_on:
      - crawler-search
    ports:
      - "80:80"
      - "443:443"
    environment:
      CRAWLER_DOMAIN: "${CRAWLER_DOMAIN}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  crawler_data:
  caddy_data:
  caddy_config:

async function summarizeUniversalEntitySources(pipeline, results, controller, strictLiveRequired = false) {
    const snippets = results
        .slice(0, 6)
        .map((r, i) => `${i + 1}. ${r.title}\nSnippet: ${r.description}\nURL: ${r.url}`)
        .join('\n\n');

    const summaryResponse = await fetch('/api/chat-groq', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        signal: controller.signal,
        body: JSON.stringify({
            message: `Answer the entity question using ONLY the snippets below.

User question: "${pipeline.userText}"
Detected domain: "${pipeline.entityIntent.domain}"
Detected entity type: "${pipeline.entityIntent.entityType}"
Detected relation type: "${pipeline.entityIntent.relationType}"
Detected subject: "${pipeline.entityIntent.subject}"
Detected fact type: "${pipeline.intent.factType}"
Detected year: "${pipeline.intent.year || 'not specified'}"

Required format:
Direct answer: <answer the specific fact immediately in 1-2 sentences>
Key points:
- <point 1>
- <point 2>
- <point 3>
Confidence: <High/Medium/Low based only on source agreement>

Rules:
- Answer the exact fact first.
- Prefer current membership, party, role, office, title count, stats, standings, rankings, or winners depending on the question.
- Do not make up numbers, teams, players, parties, offices, dates, or organizations.
- If snippets disagree, say the evidence is mixed.
- Keep it concise.

Snippets:
${snippets}`
        })
    });

    const summaryData = await summaryResponse.json();
    const answer = cleanLiveAnswerText(String(summaryData?.response || summaryData?.text || '').trim());
    const sourceLines = results.slice(0, 5).map((r, i) => `${i + 1}. [${r.title}](${r.url})`).join('\n');
    const finalAnswer = answer || cleanLiveAnswerText(`Direct answer: ${results[0].title}${results[0].description ? `\n\nKey points:\n- ${results[0].description}` : ''}`);
    if (!answer && strictLiveRequired) {
        const bestEffortPublished = await publishBestEffortFromSources(pipeline, results, {
            summaryText: 'I could not fully verify a clean direct answer, so here is the best-supported answer from available sources.'
        });
        if (bestEffortPublished) return true;
        return publishStrictVerificationClarification(pipeline, {
            sources: results,
            summaryText: 'I could not verify a clean direct answer with enough independent evidence.',
            badge: 'Verification unavailable'
        });
    }
    if (isDegenerateLatestWorkAnswer(finalAnswer, pipeline.entityIntent)) {
        if (strictLiveRequired) {
            const bestEffortPublished = await publishBestEffortFromSources(pipeline, results, {
                summaryText: 'I found profile-oriented sources and this is the best-supported answer available right now.'
            });
            if (bestEffortPublished) return true;
            return publishStrictVerificationClarification(pipeline, {
                sources: results,
                summaryText: 'I found profile pages, but I need one more detail to verify the exact latest release.',
                badge: 'Verification unavailable'
            });
        }
        return publishUniversalVerificationFallback(pipeline, 'I found profile pages but could not verify the exact latest release.');
    }
    if (pipeline?.entityIntent?.relationType === 'stats' && !looksLikeStatsAnswerText(finalAnswer)) {
        const statsFallback = `I could not verify clean numeric stats for ${pipeline.entityIntent.subject || 'that player'} from the current sources.\n\nPlease specify the format you want, for example:\n1. Career totals\n2. Format-wise (Tests, ODIs, T20Is)\n3. A specific season/year\n\n${buildSourceMetaBlock(results)}\n\nSources:\n${sourceLines}`;
        addVerifiedAssistantMessage(statsFallback, 'Stats need clarification');
        await prepareApiReply('stats_clarify_needed', {
            subject: pipeline.entityIntent.subject || ''
        }, 'I need one more detail to fetch the exact stats format you want.');
        saveToHistory(pipeline.userText, statsFallback);
        return true;
    }
    const finalMsg = `${finalAnswer}\n\n${buildSourceMetaBlock(results)}\n\nSources:\n${sourceLines}`;
    addVerifiedAssistantMessage(finalMsg, 'Verified live sources');
    await prepareApiReply('verified_answer_found', {}, 'I checked verified sources and found the answer.');
    saveToHistory(pipeline.userText, finalMsg);
    return true;
}

async function handleUniversalEntityFactQuery(userText, liveIntent = null) { 
    const pipeline = buildUniversalFactPipelineContext(userText, liveIntent);
    const roleHolderQuery = isCurrentRoleHolderLiveQuery(pipeline.userText, pipeline.intent, pipeline.entityIntent);
    if (!LIVE_RETRIEVAL_ENABLED && !isPublicSourceSearchAllowedWhenLiveDisabled(pipeline.userText, pipeline.intent, pipeline.entityIntent)) {
        return publishLiveDisabledMessage(userText);
    }
    const riskLevel = getRiskTierForQuery(pipeline.userText, pipeline.intent, pipeline.entityIntent);
    logRoutingDebug('handler enter: universal_entity_fact', userText, {
        selectedHandler: 'handleUniversalEntityFactQuery',
        liveIntent: pipeline.intent,
        entityIntent: pipeline.entityIntent,
        riskLevel,
        conciseFactQuery: pipeline.conciseFactQuery,
        hasKnownFact: Boolean(pipeline.knownFact)
    });
    showThinkingIndicator('Checking verified sources...'); 
    const controller = beginAbortableRequest(); 
    const budgetTimer = setTimeout(() => {
        try { controller.abort(); } catch (_) {}
    }, TRUST_FIRST_RELIABILITY_POLICY.verificationBudgetMs);
    try { 
        if (roleHolderQuery) {
            const searchData = await fetchLiveSearchJson(pipeline.userText, {
                signal: controller.signal,
                maxResults: 8,
                answer: true,
                domain: pipeline.intent.domain || '',
                factType: pipeline.intent.factType || ''
            });
            const directAnswer = cleanLiveAnswerText(String(searchData?.answer || '').trim());
            const answerResults = Array.isArray(searchData?.results) ? searchData.results.filter(Boolean) : [];
            const structuredResults = answerResults.filter(item => item?.evidenceLevel === 'structured_claim' && item?.holderName);
            const answerEvidenceCount = Number(searchData?.answerEvidenceCount || 0);
            if (directAnswer && answerEvidenceCount > 0 && structuredResults.length) {
                const sourceLines = structuredResults
                    .slice(0, 5)
                    .map((r, i) => `${i + 1}. [${r.title}](${r.url})`)
                    .join('\n');
                const finalMsg = `${directAnswer}\n\n${buildSourceMetaBlock(structuredResults)}\n\nSources:\n${sourceLines}`;
                addVerifiedAssistantMessage(finalMsg, 'Structured current holder');
                saveToHistory(pipeline.userText, finalMsg);
                return true;
            }
            return publishStrictVerificationClarification(pipeline, {
                sources: answerResults,
                summaryText: 'I could not verify the current office holder from structured current-holder evidence.',
                badge: 'Current holder not verified'
            });
        }

        const searchSummary = await buildVerifiedSearchSummary(pipeline.userText, {
            badge: 'Search + Groq live answer',
            summary: 'I checked live search and prepared a concise answer.'
        });
        if (searchSummary?.text && !isVerificationRefusalText(searchSummary.text)) {
            logRoutingDebug('handler decision: universal_entity_fact search_answer', userText, {
                selectedHandler: 'buildVerifiedSearchSummary',
                liveIntent: pipeline.intent,
                entityIntent: pipeline.entityIntent,
                riskLevel
            });
            addVerifiedAssistantMessage(searchSummary.text, searchSummary.badge || 'Search + Groq live answer');
            saveToHistory(pipeline.userText, searchSummary.text);
            return true;
        }

        const deduped = await retrieveUniversalEntitySources(pipeline, controller);
        const isSportsRoleQuery =
            pipeline?.entityIntent?.relationType === 'role' &&
            String(pipeline?.entityIntent?.domain || '').toLowerCase() === 'sports';
        const sportsRoleCandidate = selectBestSportsRoleCandidate(deduped, pipeline.entityIntent, pipeline.intent);
        const verification = buildVerificationSnapshot(
            deduped,
            pipeline.entityIntent.domain || 'general',
            riskLevel,
            'trust_first'
        );
        logRoutingDebug('handler sources: universal_entity_fact', userText, {
            selectedHandler: 'handleUniversalEntityFactQuery',
            liveIntent: pipeline.intent,
            entityIntent: pipeline.entityIntent,
            riskLevel,
            resultCount: deduped.length,
            sourceDomains: Array.from(new Set(deduped.map(item => getDomainFromUrl(item?.url || '')).filter(Boolean))),
            verification,
            sportsRoleCandidate: sportsRoleCandidate ? {
                value: sportsRoleCandidate.value || '',
                confidence: sportsRoleCandidate.confidence || ''
            } : null
        });

        if (!deduped.length) { 
            if (!requiresStrictLiveVerification(pipeline.userText, pipeline.intent, pipeline.entityIntent)) {
                const modelFallbackPublished = await publishUniversalModelFallback(pipeline, 'Model answer');
                if (modelFallbackPublished) {
                    logRoutingDebug('handler exit: universal_entity_fact model_fallback_no_sources', userText, {
                        selectedHandler: 'publishUniversalModelFallback',
                        liveIntent: pipeline.intent,
                        entityIntent: pipeline.entityIntent,
                        riskLevel
                    });
                    return true;
                }
            }
            logRoutingDebug('handler exit: universal_entity_fact no_sources', userText, {
                selectedHandler: 'publishStrictVerificationClarification',
                liveIntent: pipeline.intent,
                entityIntent: pipeline.entityIntent,
                riskLevel
            });
            return publishStrictVerificationClarification(pipeline, {
                sources: [],
                summaryText: 'I could not verify this from independent trusted sources.',
                badge: 'Verification unavailable'
            });
        }

        if (!verification.verified) {
            logRoutingDebug('handler decision: universal_entity_fact best_effort', userText, {
                selectedHandler: sportsRoleCandidate ? 'publishSportsRoleBestEffortAnswer' : 'publishBestEffortFromSources',
                liveIntent: pipeline.intent,
                entityIntent: pipeline.entityIntent,
                riskLevel,
                verification
            });
            if (sportsRoleCandidate) {
                return publishSportsRoleBestEffortAnswer(pipeline, sportsRoleCandidate);
            }
            const bestEffortPublished = await publishBestEffortFromSources(pipeline, deduped, {
                summaryText: 'I could not fully verify this, so here is the best-supported answer from available sources.'
            });
            if (bestEffortPublished) return true;
            return publishStrictVerificationClarification(pipeline, {
                sources: deduped,
                summaryText: isSportsRoleQuery
                    ? 'I could not verify a reliable captain or coach name from independent sources.'
                    : 'I could not verify this from enough independent trusted sources.',
                badge: 'Verification unavailable'
            });
        } 

        const ambiguity = detectEntityIdentityAmbiguity(deduped, pipeline.entityIntent);
        if (ambiguity.isAmbiguous) {
            logRoutingDebug('handler exit: universal_entity_fact ambiguous', userText, {
                selectedHandler: 'publishUniversalEntityAmbiguity',
                liveIntent: pipeline.intent,
                entityIntent: pipeline.entityIntent,
                riskLevel,
                ambiguity
            });
            return publishUniversalEntityAmbiguity(pipeline, ambiguity, deduped);
        }

        const agreement = buildSourceAgreement(deduped.slice(0, 6), pipeline.entityIntent);
        logRoutingDebug('handler agreement: universal_entity_fact', userText, {
            selectedHandler: 'buildSourceAgreement',
            liveIntent: pipeline.intent,
            entityIntent: pipeline.entityIntent,
            riskLevel,
            agreement
        });
        if (isSportsRoleQuery && sportsRoleCandidate) {
            return publishSportsRoleBestEffortAnswer(pipeline, sportsRoleCandidate);
        }
        if (await publishUniversalConsensusAnswer(pipeline, agreement)) return true;
        const generalBestEffort = await publishBestEffortFromSources(pipeline, deduped, {
            summaryText: 'I could not fully verify this, so here is the best-supported answer from available sources.'
        });
        if (generalBestEffort) return true;
        if (isSportsRoleQuery) {
            return publishStrictVerificationClarification(pipeline, {
                sources: deduped,
                summaryText: 'I could not verify a reliable captain or coach name from these sources.',
                badge: 'Verification unavailable'
            });
        }

        if (pipeline.entityIntent.directFact && agreement.mixed) {
            if (sportsRoleCandidate) {
                return publishSportsRoleBestEffortAnswer(pipeline, sportsRoleCandidate);
            }
            const mixedBestEffort = await publishBestEffortFromSources(pipeline, deduped, {
                summaryText: 'Sources are mixed, so this is the best-supported answer I can provide right now.'
            });
            if (mixedBestEffort) return true;
            return publishStrictVerificationClarification(pipeline, {
                sources: deduped,
                summaryText: 'Independent sources are mixed, so I will not guess.',
                badge: 'Verification unavailable'
            });
        }

        return await summarizeUniversalEntitySources(pipeline, deduped, controller, true);
    } catch (error) { 
        if (isAbortError(error)) {
            return publishStrictVerificationClarification(pipeline, {
                sources: [],
                summaryText: 'Verification timed out before reaching confidence threshold.',
                badge: 'Verification unavailable'
            });
        }
        if (!requiresStrictLiveVerification(pipeline.userText, pipeline.intent, pipeline.entityIntent)) {
            const modelFallbackPublished = await publishUniversalModelFallback(pipeline, 'Model answer');
            if (modelFallbackPublished) {
                logRoutingDebug('handler exit: universal_entity_fact model_fallback_error', userText, {
                    selectedHandler: 'publishUniversalModelFallback',
                    liveIntent: pipeline.intent,
                    entityIntent: pipeline.entityIntent,
                    riskLevel,
                    error: String(error?.message || error || '')
                });
                return true;
            }
        }
        return publishStrictVerificationClarification(pipeline, {
            sources: [],
            summaryText: 'Verification timed out or failed before confidence threshold.',
            badge: 'Verification unavailable'
        });
    } finally { 
        clearTimeout(budgetTimer);
        clearActiveRequest(controller);
        hideThinkingIndicator();
    }
}

async function handleLiveRetrievalQuery(userText, options = {}) {

        selectedHandler: 'handleLiveRetrievalQuery',

    let failClosed = false;
    let liveRiskLevel = 'medium_risk';

        const snippets = sourcePool
            .slice(0, 6)
            .map((r, i) => `${i + 1}. ${r.title}\nSnippet: ${r.description}\nURL: ${r.url}`)
            .join('\n\n');

        let answer = '';
        try {
            const summaryResponse = await Promise.race([
                fetch('/api/chat-groq', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    signal: controller.signal,
                    body: JSON.stringify({
                        message: `Answer the user's question using ONLY the snippets below.

User question: "${query}"

Required format:
Direct answer: <answer the question in 1-3 sentences first; if the user asked who won/score/stat, say that immediately>
Key points:
- <point 1>
- <point 2>
- <point 3>
Confidence: <High/Medium/Low based only on source agreement>

Rules:
- Focus on what is current or recent.
- Do not make up numbers, dates, actors, or causes.
- Only state a fact confidently if it appears in multiple snippets or from a clearly reputable source.
- If evidence is weak, say so instead of guessing.
- If the question asks for a winner, score, or player stat, answer that specific fact first before anything else.
- If the user asks for stats, give the key stats directly instead of a generic summary.
- Keep it concise and practical.

Snippets:
${snippets}`
                    })
                }),
                new Promise((_, reject) => setTimeout(() => reject(new Error('live_summary_timeout')), summaryTimeoutMs))
            ]);
            if (!summaryResponse || !summaryResponse.ok) {
                throw new Error('live_summary_failed');
            }
            const summaryData = await summaryResponse.json();
            answer = cleanLiveAnswerText(String(summaryData?.response || summaryData?.text || '').trim());
        } catch (summaryError) {
            answer = '';
        }
        if (!answer) {
            if (!sourcePool[0]) {
                return publishStrictVerificationClarification({
                    userText: query,
                    intent,
                    entityIntent
                }, {
                    sources: sourcePool,
                    summaryText: 'I could not verify a clean answer yet. Please narrow the query.',
                    badge: 'Verification unavailable'
                });
            }
            const bestEffortPublished = await publishBestEffortFromSources({
                userText: query,
                intent,
                entityIntent
            }, sourcePool, {
                summaryText: 'I could not produce a clean fully verified summary, so here is the best-supported answer from available sources.'
            });
            if (bestEffortPublished) return true;
            return publishStrictVerificationClarification({
                userText: query,
                intent,
                entityIntent
            }, {
                sources: sourcePool,
                summaryText: 'I could not produce a clean verified answer from these sources.',
                badge: 'Verification unavailable'
            });
        }
        const sourceLines = sourcePool.slice(0, 5).map((r, i) => `${i + 1}. [${r.title}](${r.url})`).join('\n');
        const conciseAnswer = answer
            .split(/\n\s*Key points:\s*/i)[0]
            .split(/\n\s*Confidence:\s*/i)[0]
            .trim();
        const finalMsg = conciseFactQuery
            ? `${conciseAnswer}\n\n${buildSourceMetaBlock(sourcePool)}\n\nSources:\n${sourceLines}`
            : `${answer}\n\n${buildSourceMetaBlock(sourcePool)}\n\nSources:\n${sourceLines}`;
        const finalWithCoverageNote = (!directFactQuery && distinctDomains.length < 2)
            ? `${finalMsg}\n\nNote: Limited source coverage right now (single-domain result).`
            : finalMsg;

        addVerifiedAssistantMessage(finalWithCoverageNote, 'Verified live sources');
        await prepareApiReply('live_summary_ready', {}, 'I checked current sources and summarized what I found.');
        saveToHistory(userText, finalWithCoverageNote);
        return true;
    } catch (error) {
        if (isAbortError(error)) {
            return publishStrictVerificationClarification({
                userText: String(userText || '').trim(),
                intent: extractLiveQueryIntent(String(userText || '').trim()),
                entityIntent: extractUniversalEntityIntent(String(userText || '').trim(), extractLiveQueryIntent(String(userText || '').trim()))
            }, {
                sources: [],
                summaryText: 'Verification timed out before confidence threshold. Please narrow the query and I will retry.',
                badge: 'Verification unavailable'
            });
        }
        return publishStrictVerificationClarification({
            userText: String(userText || '').trim(),
            intent: extractLiveQueryIntent(String(userText || '').trim()),
            entityIntent: extractUniversalEntityIntent(String(userText || '').trim(), extractLiveQueryIntent(String(userText || '').trim()))
        }, {
            sources: [],
            summaryText: 'I hit a verification issue. Please narrow the query and I will retry.',
            badge: 'Verification unavailable'
        });
    } finally {
        clearTimeout(budgetTimer);
        clearActiveRequest(controller);
        hideThinkingIndicator();
    }
}

function isWordMeaningRequest(text) {
    const t = String(text || '').trim().toLowerCase();
    if (!t) return false;
    return /\b(meaning of|define|definition of|what does .* mean|what is the meaning of)\b/.test(t);
}

function extractWordForMeaning(text) {
    const raw = String(text || '').trim();
    const patterns = [
        /\bmeaning of\s+["']?([a-zA-Z-]{2,40})["']?/i,
        /\bdefinition of\s+["']?([a-zA-Z-]{2,40})["']?/i,
        /\bdefine\s+["']?([a-zA-Z-]{2,40})["']?/i,
        /\bwhat does\s+["']?([a-zA-Z-]{2,40})["']?\s+mean\b/i,
        /\bwhat is the meaning of\s+["']?([a-zA-Z-]{2,40})["']?/i
    ];
    for (const p of patterns) {
        const m = raw.match(p);
        if (m?.[1]) return m[1].toLowerCase();
    }
    return '';
}

async function handleWordMeaningRequest(text) {
    const word = extractWordForMeaning(text);
    if (!word) return false;
    showThinkingIndicator('Looking up meaning...');
    try {
        const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
        if (!response.ok) throw new Error('dictionary_unavailable');
        const data = await response.json();
        const first = Array.isArray(data) ? data[0] : null;
        const meaningObj = Array.isArray(first?.meanings) ? first.meanings[0] : null;
        const defObj = Array.isArray(meaningObj?.definitions) ? meaningObj.definitions[0] : null;
        const partOfSpeech = String(meaningObj?.partOfSpeech || '').trim();
        const definition = String(defObj?.definition || '').trim();
        let sentence = String(defObj?.example || '').trim();
        if (!sentence && definition) {
            sentence = `She used the word "${word}" correctly in a sentence.`;
        }
        if (!definition) throw new Error('empty_definition');
        const msg = `Word: ${word}\n${partOfSpeech ? `Part of speech: ${partOfSpeech}\n` : ''}Meaning: ${definition}\nUsage: ${sentence}`;
        addChatMessage(msg, false);
        saveToHistory(text, msg);
        return true;
    } catch (_) {
        const fallback = `I could not fetch the dictionary entry for "${word}" right now.`;
        addChatMessage(fallback, false);
        saveToHistory(text, fallback);
        return true;
    } finally {
        hideThinkingIndicator();
    }
}

async function handleDailyBriefRequest(text) {
    showThinkingIndicator('Building your daily brief...');
    try {
        const parts = [];
        const locationObj = window.userLocation || null;
        if (locationObj?.city || locationObj?.state || locationObj?.country) {
            const loc = [locationObj.city, locationObj.state, locationObj.country].filter(Boolean).join(', ');
            parts.push(`Location: ${loc}`);
        }
        const weatherLine = document.getElementById('temperature')?.textContent?.trim();
        if (weatherLine && !weatherLine.includes('--')) {
            parts.push(`Weather: ${weatherLine}`);
        }
        const fuelHandled = await buildVerifiedSearchSummary('petrol price today near me', {
            badge: 'Daily brief sources',
            summary: ''
        });
        if (fuelHandled?.text) {
            const fuelShort = String(fuelHandled.text || '').split('\n').slice(0, 2).join(' ');
            parts.push(`Fuel: ${fuelShort}`);
        }
        const newsFallback = await buildNewsSearchFallback('latest headlines today', undefined);
        if (newsFallback?.answer) {
            parts.push(`Top news: ${newsFallback.answer}`);
        }
        const brief = `Daily brief\n\n${parts.join('\n\n') || 'No fresh data available right now.'}`;
        addChatMessage(brief, false);
        saveToHistory(text, brief);
        return true;
    } finally {
        hideThinkingIndicator();
    }
}

function getLocalStorageEntriesByPrefix(prefixes = ['jarvis_', 'unify_']) {
    const entries = {};
    try {
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (!key || !prefixes.some(prefix => key.startsWith(prefix))) continue;
            const raw = localStorage.getItem(key);
            try {
                entries[key] = JSON.parse(raw);
            } catch (_) {
                entries[key] = raw;
            }
        }
    } catch (_) {}
    return entries;
}

function collectLocalDataSnapshot() {
    normalizeMemoryStoreRecords();
    const localEntries = getLocalStorageEntriesByPrefix();
    const cachedFactEntries = Object.fromEntries(
        Object.entries(localEntries).filter(([key]) => key.startsWith('jarvis_current_fact_'))
    );
    return {
        exportedAt: new Date().toISOString(),
        memory: memoryStore || {},
        chatHistory: sanitizeConversationHistoryRecords(conversationHistory),
        preferences: {
            userEmail: localEntries.jarvis_user_email || '',
            learnedPreferences: localEntries.jarvis_learned_preferences || null,
            assistantModes: localEntries.jarvis_assistant_modes || null,
            persistMemory: localEntries.jarvis_persist_memory ?? persistMemoryToDevice,
            voiceLanguage: localEntries.jarvis_voice_input_language || ''
        },
        feedbackLearning: localEntries.jarvis_feedback_learning || localEntries.jarvis_feedback || null,
        cachedFacts: cachedFactEntries,

    };
}

function detectInputLanguageHint(text) {
    const raw = String(text || '');
    const hasEnglish = /\b[a-z]{2,}\b/i.test(raw);
    const hasSpanish = /\b(hola|gracias|por favor|como|c[oó]mo|que|qu[eé]|porque|necesito|quiero|puedes|ayuda|espa[nñ]ol|amigo|buenos|buenas)\b/i.test(raw);
    const scriptedLanguages = [
        { name: 'Tamil', mixed: 'English-Tamil', pattern: /[\u0B80-\u0BFF]/ },
        { name: 'Telugu', mixed: 'English-Telugu', pattern: /[\u0C00-\u0C7F]/ },
        { name: 'Kannada', mixed: 'English-Kannada', pattern: /[\u0C80-\u0CFF]/ },
        { name: 'Malayalam', mixed: 'English-Malayalam', pattern: /[\u0D00-\u0D7F]/ },
        { name: 'Hindi', mixed: 'English-Hindi', pattern: /[\u0900-\u097F]/ }
    ];
    for (const language of scriptedLanguages) {
        if (language.pattern.test(raw)) {
            return hasEnglish
                ? `the user's mixed ${language.mixed} style, preserving code-mixed terms where natural`
                : language.name;
        }
    }
    if (hasSpanish) {
        return hasEnglish
            ? 'the user\'s mixed English-Spanish style, preserving code-mixed terms where natural'
            : 'Spanish';
    }
    return '';
}

        function syncConversationPendingState() {
            const engine = window.JarvisConversation;

            const setPending = pending => {
                engine.setPending(pending);
                window.JarvisState?.setPendingClarification(pending);
            };

            if (window.pendingLocationDisambiguation?.options?.length) {
                setPending({
                    type: 'location_disambiguation',
                    expected: 'number',
                    options: window.pendingLocationDisambiguation.options
                });
                return;
            }
            if (window.waitingForLocationChoice && window.pendingLocationChoices?.length) {
                setPending({
                    type: 'weather_location_choice',
                    expected: 'number',
                    options: window.pendingLocationChoices
                });
                return;
            }
            if (window.waitingForTransportLocation || waitingForLocation) {
                setPending({
                    type: window.waitingForTransportLocation ? 'transport_location' : 'weather_location',
                    expected: 'location'
                });
                return;
            }
            if (waitingForName) {
                setPending({ type: 'name', expected: 'name' });
                return;
            }
            if (window.pendingTransportSuggestionCity) {
                setPending({ type: 'transport_confirmation', expected: 'yes_no' });
                return;
            }
            if (translatorMode && translatorLanguage) {
                setPending({
                    type: 'translator_input',
                    expected: 'free_text'
                });
                return;
            }
            if (pendingScreenSuggestionRequest || songMoodGameState) {
                setPending({
                    type: pendingScreenSuggestionRequest ? 'screen_suggestion' : 'song_game',
                    expected: pendingScreenSuggestionRequest ? 'free_text' : 'number'
                });
                return;
            }
            engine.clearPending('legacy_state_cleared');
            window.JarvisState?.setPendingClarification(null);
        }

        function normalizePreferredAddress(value) {

            if (/^(?:ma'?am|mam|madam)$/.test(raw)) return 'mam';
            if (/^sir$/.test(raw)) return 'sir';
            return '';
        }

        function extractPreferredAddressRequest(text) {

            const match = raw.match(/^(?:please\s+)?(?:call|address)\s+me\s+(?:as\s+)?(sir|ma'?am|mam|madam)[.!?]*$/i);
            return normalizePreferredAddress(match?.[1] || '');
        }

        function buildAmbiguousShortContextReply(contextResolution) {
            const topic = String(contextResolution?.activeThread?.entity || contextResolution?.activeThread?.topic || '').trim();
            const original = String(contextResolution?.originalMessage || '').trim();
            if (topic) {
                return `Did you mean "${original}" as a new topic, or as a follow-up about ${topic}?`;
            }

        }

        async function processCommand(text) {
            syncConversationPendingState();
            const contextResolution = window.JarvisConversation?.resolve({ message: text }) || null;
            const activeTurnForResolution = getConversationTurn(activeResponseRenderContext?.turnId);
            if (activeTurnForResolution && contextResolution) {
                const contextDisplayText = String(activeTurnForResolution.displayProcessingPrompt || activeTurnForResolution.rawPrompt || text || '');
                const useDisplayForContext = activeTurnForResolution.source === 'programmatic';
                activeTurnForResolution.sourceContext = {
                    ...(activeTurnForResolution.sourceContext || {}),
                    originalUserText: String(useDisplayForContext ? contextDisplayText : (contextResolution.originalMessage || contextDisplayText || '')),
                    resolvedUserText: String(contextDisplayText || contextResolution.resolvedMessage || text || ''),
                    contextDecisionReason: String(contextResolution.decisionReason || ''),
                    primaryIntent: String(contextResolution.primaryIntent || ''),
                    contextConfidence: Number(contextResolution.confidence) || 0,
                    activeThreadTopic: String(contextResolution.activeThread?.topic || ''),
                    activeThreadEntity: String(contextResolution.activeThread?.entity || '')
                };
                updateContextCopilotBadge(activeTurnForResolution.id);
            }
            if (contextResolution?.cancelledPendingState) {
                clearSupersededConversationState();
            }
            if (contextResolution?.decisionReason === 'reset_or_cancel') {
                clearSupersededConversationState();
                window.JarvisState?.resetConversationState();
                addChatMessage('Context cleared. Start a new topic whenever you are ready.', false);
                return;
            }
            if (['ambiguous_short_context', 'ambiguous_reference_context'].includes(contextResolution?.decisionReason)) {
                const clarification = buildAmbiguousShortContextReply(contextResolution);
                addChatMessage(clarification, false);
                saveToHistory(text, clarification, { recordContext: false });
                return;
            }
            text = contextResolution?.resolvedMessage || text;
            const lower = text.toLowerCase();
            const compact = String(text || '').trim();

            if (handlePreferredAddressRequest(compact)) {
                return;
            }

            if (isWakeGreetingText(compact)) {
                const greet = buildWakeGreeting();
                addChatMessage(greet, false);
                saveToHistory(text, greet);
                return;
            }

            if (await handleSitcomMovieReference(compact)) {
                logRoutingDebug('processCommand -> sitcom_movie_reference', compact, { selectedHandler: 'handleSitcomMovieReference' });
                return;
            }

            if (isWordMeaningRequest(compact)) {
                const handledMeaning = await handleWordMeaningRequest(text);
                if (handledMeaning) return;
            }

            if (await handleUrlGroundedExtractionRequest(compact)) {
                logRoutingDebug('processCommand -> crawl4ai_url_extract', compact, { selectedHandler: 'handleUrlGroundedExtractionRequest' });
                return;
            }

            if (/\b(daily brief|my brief|today brief|morning brief)\b/i.test(compact)) {
                await handleDailyBriefRequest(text);
                return;
            }

            if (/\b(export all data|export local data|download all data|export data)\b/i.test(compact)) {
                exportAllLocalDataJson();
                return;
            }

            if (/\b(export (chat|history)|download (chat|history))\b/i.test(compact)) {
                exportChatHistoryJson();
                return;
            }

            if (/\b(delete all data|wipe local data|clear all local data|reset app data)\b/i.test(compact)) {
                deleteAllLocalDataNow();
                return;
            }

            if (isMemoryShowRequest(compact)) {
                showSavedMemoryVault(compact);
                return;
            }

            const forgetMemoryQuery = parseMemoryForgetRequest(compact);
            if (forgetMemoryQuery) {
                if (!forgetMemoryByQuery(forgetMemoryQuery)) {
                    addChatMessage(`I could not find a saved memory matching "${forgetMemoryQuery}".`, false);
                }
                return;
            }

            if (await handleOneShotTranslation(compact)) {
                return;
            }

            if (/\b(open|start|launch|enable)\s+(camera|scan)\b|\b(scan|read)\s+(this|text|document)\b/i.test(lower)) {
                addChatMessage('The camera scanner has been removed. Use Live Vision for camera-based questions.', false);
                return;
            }

            // Deterministic routing for weather and scientific calculations.
            if (isWeatherIntentText(compact)) {
                logRoutingDebug('processCommand -> weather deterministic', compact, {
                    selectedHandler: 'weather',
                    location: extractLocationFromSentence(compact) || ''
                });
                const location = extractLocationFromSentence(compact);
                if (location) {
                    await getWeatherByCity(location);
                } else {
                    await handleCurrentLocationWeatherRequest(compact);
                }
                return;
            }
            if (isStepByStepMathRequest(compact)) {
                logRoutingDebug('processCommand -> math step_by_step', compact, {
                    selectedHandler: 'handleMathStepByStepRequest'
                });
                await handleMathStepByStepRequest(compact);
                return;
            }
            if (isMathCalculationRequest(compact)) {
                logRoutingDebug('processCommand -> math calculation', compact, {
                    selectedHandler: 'handleMathCalculationRequest'
                });
                await handleMathCalculationRequest(compact);
                return;
            }
            if (isContinuousVisionQuestion(lower)) {
                if (!isContinuousVisionActive) {
                    const msg = 'Vision mode is off. Tap the vision icon first, then ask again.';
                    addChatMessage(msg, false);
                    saveToHistory(text, msg);
                    return;
                }
                await handleContinuousVisionQuery(text);
                return;

        function extractLocationFromSentence(text) {
            const lower = text.toLowerCase();
            
            const currentLocationKeywords = [
                'my location', 'current location', 'my current location', 'here', 'over here',
                'around here', 'nearby', 'outside', 'outside now', 'outside right now',
                'where i am', "where i'm at", 'where im at', 'my area', 'this location',
                'my place', 'current place', 'around me', 'near me', 'for me'
            ];
            for (const keyword of currentLocationKeywords) {
                if (lower.includes(keyword)) {
                    return null;
                }
            }

            if (/^\s*(?:what'?s|what is|how'?s|how is)?\s*(?:the\s+)?(?:weather|forecast|temperature|climate|conditions?)\b[\s?!.,]*$/i.test(text)) {
                return null;
            }

            const explicitLocation = extractExplicitWeatherLocation(text, currentLocationKeywords);
            if (explicitLocation) return explicitLocation;
            
            let cleanText = text;
            const timeWords = ['right now', 'now', 'today', 'tomorrow', 'tonight', 'currently', 'at the moment'];
            timeWords.forEach(word => {
                cleanText = cleanText.replace(new RegExp(word, 'gi'), '');
            });
            
            const patterns = [
                /(?:how'?s?|what'?s?|how is|what is)\s+(?:the\s+)?(?:weather|climate|temperature|humidity|forecast|conditions?)\s+(?:in|at|for|around|near)\s+([^?]+)/i,
                /(?:weather|climate|temperature|humidity|rain|snow|hot|cold|forecast|conditions?|wind|windy)\s+(?:in|at|for|around|near)\s+([^?]+)/i,
                /(?:in|at|around|near)\s+([^?]+?)\s*(?:weather|climate|temperature|humidity|rain|snow|hot|cold|forecast|conditions?|wind|windy)/i,
                /(?:forecast|temperature|weather)\s+(?:for)\s+([^?]+)/i,
                /(?:weather|forecast|temperature)\s+([a-zA-Z][^?.,!]+)$/i,
                /^([a-zA-Z][a-zA-Z\s.'-]{1,60})\s+(?:weather|forecast|temperature)$/i
            ];
            
            for (const pattern of patterns) {
                const match = cleanText.match(pattern);
                if (match && match[1]) {
                    let location = match[1].trim();
                    location = location.replace(/^(?:the\s+)?(?:weather|forecast|temperature)\s+(?:in|at|for)\s+/i, '').trim();
                    location = location.replace(/[?.!,;]$/g, '').trim();
                    
                    const locationLower = location.toLowerCase();
                    for (const keyword of currentLocationKeywords) {
                        if (locationLower.includes(keyword)) {
                            return null;
                        }
                    }

                    if (/^(?:the\s+)?(?:weather|forecast|temperature|climate|conditions?)$/i.test(location)) {
                        return null;
                    }
                    
                    if (location.length > 0) return location;
                }
            }
            return null;
        }

        function extractExplicitWeatherLocation(text, currentLocationKeywords = []) {
            const raw = String(text || '').trim();
            if (!raw) return '';

            const patterns = [
                /\b(?:in|at|for|around|near)\s+([A-Za-z][A-Za-z\s.'-]{1,80})(?=\s*(?:today|tomorrow|tonight|now|right now|currently|at the moment|this morning|this afternoon|this evening)?\s*[?.!,]*$)/i,
                /\b(?:in|at|for|around|near)\s+([A-Za-z][A-Za-z\s.'-]{1,80})(?=\s*,\s*(?:today|tomorrow|tonight|now|right now|currently|at the moment)\b)/i
            ];

            for (const pattern of patterns) {
                const match = raw.match(pattern);
                if (!match?.[1]) continue;
                let location = match[1]
                    .replace(/\b(?:today|tomorrow|tonight|now|right now|currently|at the moment|this morning|this afternoon|this evening)\b/gi, '')
                    .replace(/[?.!,;]$/g, '')
                    .trim();
                if (!location) continue;
                const lowerLocation = location.toLowerCase();
                if (currentLocationKeywords.some(keyword => lowerLocation.includes(keyword))) continue;
                if (/^(?:the\s+)?(?:weather|forecast|temperature|climate|conditions?)$/i.test(location)) continue;
                return location;
            }

            return '';
        }

        function isCurrentLocationWeatherQuery(text) {
            const raw = String(text || '').trim();
            if (!raw) return false;
            if (!isWeatherIntentText(raw)) return false;
            if (isCurrentLocationIntentText(raw)) return true;
            if (/\b(my\s+location|current\s+location|my\s+current\s+location|around\s+me|near\s+me|where\s+i\s+am|outside|here)\b/i.test(raw)) {
                return true;
            }
            // If no explicit city/location is provided in a weather query, treat it as current-location weather.
            return !extractLocationFromSentence(raw);
        }

        async function getWeatherByCity(cityName) {
            hideThinkingIndicator(); 
            try {
                const searchName = expandStateAbbreviation(cityName.trim());
                
                
                const nominatimResponse = await fetch(
                    `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(searchName)}&format=json&limit=5&addressdetails=1`,
                    { headers: { 'User-Agent': 'JARVISAssistant/1.0' } }
                );
                
                const nominatimData = await nominatimResponse.json();
                
                if (!nominatimData || nominatimData.length === 0) {
                    await deliverApiReply('weather_location_not_found', {
                        cityName,
                        examples: ['Boston', 'Paris, France']
                    });
                    return;
                }
                
                
                const uniqueLocations = [];
                const seenCountries = new Set();
                
                for (const loc of nominatimData) {
                    const addr = loc.address;
                    const country = addr.country;
                    const state = addr.state || '';
                    const key = `${country}-${state}`;
                    
                    
                    if (!seenCountries.has(key) && uniqueLocations.length < 3) {
                        seenCountries.add(key);
                        uniqueLocations.push(loc);
                    }
                }
                
                
                if (uniqueLocations.length > 1 && !cityName.includes(',')) {
                    const options = uniqueLocations.map((loc, index) => {
                        const addr = loc.address;
                        let name = addr.city || addr.town || addr.village || addr.hamlet || loc.display_name.split(',')[0];
                        if (addr.state) name += `, ${addr.state}`;
                        if (addr.country) name += `, ${addr.country}`;
                        return `${index + 1}. ${name}`;
                    }).join('\n');
                    
                    await deliverApiReply('location_disambiguation', {
                        rawInput: cityName,
                        options: uniqueLocations.map((loc, index) => {
                            const addr = loc.address || {};
                            let name = addr.city || addr.town || addr.village || addr.hamlet || loc.display_name.split(',')[0];
                            if (addr.state) name += `, ${addr.state}`;
                            if (addr.country) name += `, ${addr.country}`;
                            return {
                                index: index + 1,
                                label: name
                            };
                        }),
                        replyInstruction: 'You can say the full name or just the number.'
                    }, {
                        fallbackText: `I found multiple places called "${cityName}":\n\n${options}\n\nWhich one did you mean? You can say the full name or just the number.`
                    });
                    
                    
                    window.pendingLocationChoices = uniqueLocations;
                    window.waitingForLocationChoice = true;
                    return;
                }
                
                
                const location = nominatimData[0];
                const latitude = parseFloat(location.lat);
                const longitude = parseFloat(location.lon);
                
                const addr = location.address;
                // Prefer city/town over smaller localities (suburb, village, hamlet, neighbourhood)
                // This ensures "Mason, Ohio" instead of "Socialville, Ohio"
                let locationName = addr.city || addr.town || addr.municipality || addr.county || addr.village || addr.hamlet || location.display_name.split(',')[0];

                // For US locations: City, State format
                // For international: City, State, Country format (skip state if same as city)
                if (addr.country_code === 'us' && addr.state) {
                    locationName += `, ${addr.state}`;
                } else if (addr.state && addr.state !== locationName) {
                    locationName += `, ${addr.state}`;
                    if (addr.country) locationName += `, ${addr.country}`;
                } else if (addr.country) {
                    locationName += `, ${addr.country}`;
                }


                await fetchWeather(latitude, longitude, locationName, cityName.trim());
                
            } catch (error) {
                await deliverApiReply('weather_lookup_error', {
                    cityName,
                    error: String(error?.message || '')
                });
            }
        }

        async function fetchWeather(lat, lon, resolvedLocation, originalQuery = null) {
            hideThinkingIndicator(); 
            showThinkingIndicator('Checking weather...');
            try {
                const weatherResponse = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code,precipitation&daily=temperature_2m_max,temperature_2m_min,weather_code&timezone=auto`
                );
                const weather = await weatherResponse.json();
                
                const celsius = Math.round(weather.current.temperature_2m);
                const fahrenheit = Math.round((celsius * 9/5) + 32);
                const advice = await getWeatherAdvice(weather);
                const aqi = await fetchAQI(lat, lon);
                
                
                createWeatherEffect(weather.current.weather_code, celsius);
                renderAQISection(aqi);
                renderForecast(weather?.daily || null);

                document.getElementById('weather-advice').textContent = advice;

                const aqiLine = aqi && Number.isFinite(aqi.usAqi)

                    : 'Air Quality Index (US AQI): unavailable right now';
                const weatherFallback = [
                    `In ${displayLocation}, it's ${celsius}Â°C (${fahrenheit}Â°F) with ${advice}.`,
                    isCurrentLocationAsk ? aqiLine : ''
                ].filter(Boolean).join('\n');
                await deliverApiReply('weather_result', {
                    location: displayLocation,
                    fahrenheit,
                    celsius,
                    advice,
                    weatherCode: weather?.current?.weather_code,
                    aqiIndex: aqi?.usAqi ?? null,
                    aqiLabel: aqi?.label ?? null
                }, {
                    fallbackText: weatherFallback,
                    typewriter: true
                });
                
            } catch (error) {
                await deliverApiReply('weather_fetch_error', {
                    error: String(error?.message || '')
                });
            } finally {
                hideThinkingIndicator();
            }
        }

            const weatherClassMap = {

                // Rain showers
                80: 'bg-gradient-to-br from-blue-600 to-blue-800',
                81: 'bg-gradient-to-br from-blue-600 to-blue-800',
                82: 'bg-gradient-to-br from-blue-700 to-blue-900',

                // Snow showers
                85: 'bg-gradient-to-br from-gray-300 to-gray-500',

                // Thunderstorm
                95: 'bg-gradient-to-br from-gray-700 to-gray-900',
                96: 'bg-gradient-to-br from-gray-700 to-gray-900',
                99: 'bg-gradient-to-br from-gray-800 to-black'
            };

            const defaultClass = 'bg-gradient-to-br from-gray-400 to-gray-600'; // Default for unknown codes
            const weatherBgClass = weatherClassMap[code] || defaultClass;

            const container = document.getElementById('weather-card');
            if (container) {
                // Remove existing gradient/background color tokens safely.
                const gradientPrefixes = ['bg-gradient-to-', 'from-', 'via-', 'to-'];
                const retained = container.className
                    .split(/\s+/)
                    .filter(cls => cls && !gradientPrefixes.some(prefix => cls.startsWith(prefix)));
                container.className = retained.join(' ');

                // weatherBgClass is a class string with multiple tokens, so split before adding.
                safeClassListAdd(container, weatherBgClass);

                // Handle temperature-based adjustments
                if (temp > 30) { // Hot
                    container.classList.add('from-orange-400', 'to-red-600');
                } else if (temp < 5) { // Cold
                    container.classList.add('from-blue-600', 'to-blue-800');
                }
            }

            return await composeApiReply('weather_advice', {
                weatherCode: code,
                temperatureCelsius: temp
            }, {

            });
        }

        function willItRain(weatherCode) {

            return (weatherCode >= 51 && weatherCode <= 67) || 
                   (weatherCode >= 80 && weatherCode <= 82) || 
                   (weatherCode >= 95 && weatherCode <= 99);
        }

        function willItSnow(weatherCode) {
            
            return (weatherCode >= 71 && weatherCode <= 77) || 
                   (weatherCode >= 85 && weatherCode <= 86);
        }

        async function fetchAQI(lat, lon) {
            try {
                const url = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=us_aqi`;
                const response = await fetch(url);
                if (!response.ok) return null;
                const data = await response.json();
                const raw = Number(data?.current?.us_aqi);
                if (!Number.isFinite(raw)) return null;
                const usAqi = Math.round(raw);
                return {
                    usAqi,
                    ...classifyAqi(usAqi)
                };
            } catch (_) {
                return null;
            }
        }

        function classifyAqi(usAqi) {
            if (usAqi <= 50) return { label: 'Good', color: '#22c55e' };
            if (usAqi <= 100) return { label: 'Moderate', color: '#eab308' };
            if (usAqi <= 150) return { label: 'Unhealthy for Sensitive Groups', color: '#f97316' };
            if (usAqi <= 200) return { label: 'Unhealthy', color: '#ef4444' };
            if (usAqi <= 300) return { label: 'Very Unhealthy', color: '#a855f7' };
            return { label: 'Hazardous', color: '#7f1d1d' };
        }

                    <span class="text-white/90 text-sm font-medium">${escapeHtml(aqi.label)}</span>

        function mapWeatherCodeToLabel(code) {
            const c = Number(code);
            if (c === 0) return 'Clear';
            if (c === 1 || c === 2) return 'Partly cloudy';
            if (c === 3) return 'Overcast';
            if (c === 45 || c === 48) return 'Fog';
            if ([51,53,55,56,57].includes(c)) return 'Drizzle';
            if ([61,63,65,66,67].includes(c)) return 'Rain';
            if ([71,73,75,77,85,86].includes(c)) return 'Snow';
            if ([80,81,82].includes(c)) return 'Showers';
            if ([95,96,99].includes(c)) return 'Thunderstorm';
            return 'Conditions';
        }

        function renderForecast(daily) {
            const container = document.getElementById('forecast-container');
            if (!container) return;
            if (!daily || !Array.isArray(daily.time) || !daily.time.length) {
                container.innerHTML = '<p class="text-white/80 text-sm">Forecast unavailable right now.</p>';
                return;
            }

            const rows = [];
            const days = Math.min(5, daily.time.length);
            for (let i = 0; i < days; i++) {
                const date = new Date(String(daily.time[i]));
                const day = Number.isFinite(date.getTime())
                    ? date.toLocaleDateString('en-US', { weekday: 'short' })
                    : `Day ${i + 1}`;
                const max = Number(daily.temperature_2m_max?.[i]);
                const min = Number(daily.temperature_2m_min?.[i]);
                const code = daily.weather_code?.[i];
                const label = mapWeatherCodeToLabel(code);
                rows.push(`
                    <div class="flex items-center justify-between gap-3 text-white/90 text-sm py-1">
                        <span class="font-semibold">${day}</span>
                        <span class="text-white/80">${escapeHtml(label)}</span>
                        <span class="font-semibold">${Number.isFinite(max) ? Math.round(max) : '--'}Â° / ${Number.isFinite(min) ? Math.round(min) : '--'}Â°C</span>
                    </div>
                `);
            }

            container.innerHTML = `
                <p class="text-white/90 text-sm font-semibold mb-2">5-day forecast</p>
                ${rows.join('')}
            `;
        }

        function toggleForecast() {

        function expandStateAbbreviation(location) {
            const states = {
                'AL':'Alabama','AK':'Alaska','AZ':'Arizona','AR':'Arkansas','CA':'California','CO':'Colorado',
                'CT':'Connecticut','DE':'Delaware','FL':'Florida','GA':'Georgia','HI':'Hawaii','ID':'Idaho',
                'IL':'Illinois','IN':'Indiana','IA':'Iowa','KS':'Kansas','KY':'Kentucky','LA':'Louisiana',
                'ME':'Maine','MD':'Maryland','MA':'Massachusetts','MI':'Michigan','MN':'Minnesota','MS':'Mississippi',
                'MO':'Missouri','MT':'Montana','NE':'Nebraska','NV':'Nevada','NH':'New Hampshire','NJ':'New Jersey',
                'NM':'New Mexico','NY':'New York','NC':'North Carolina','ND':'North Dakota','OH':'Ohio',
                'OK':'Oklahoma','OR':'Oregon','PA':'Pennsylvania','RI':'Rhode Island','SC':'South Carolina',
                'SD':'South Dakota','TN':'Tennessee','TX':'Texas','UT':'Utah','VT':'Vermont','VA':'Virginia',
                'WA':'Washington','WV':'West Virginia','WI':'Wisconsin','WY':'Wyoming'
            };
            
            for (const [abbr, full] of Object.entries(states)) {
                const regex = new RegExp(`\\b${abbr}\\b`, 'gi');
                if (regex.test(location)) return location.replace(regex, full);
            }
            return location;
        }

        function getCurrentPositionAsync(options = {}) {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    reject(new Error('Geolocation is not supported in this browser.'));
                    return;
                }
                navigator.geolocation.getCurrentPosition(resolve, reject, {

        function isLikelyPersonalName(value) {
            const raw = String(value || '').trim();
            if (!raw) return false;
            if (!/^[A-Za-z][A-Za-z\s'-]*$/.test(raw)) return false;

            const words = raw.split(/\s+/).filter(Boolean);
            if (words.length < 1 || words.length > 3) return false;
            if (words.some(w => w.length < 2 || w.length > 24)) return false;

            const lower = raw.toLowerCase();
            const blockedTokens = [
                'working', 'work', 'from', 'home', 'shift', 'just', 'ended', 'today',
                'tomorrow', 'please', 'thanks', 'thank', 'help', 'call', 'name',
                'am', 'is', 'are', 'at', 'in', 'on', 'and', 'but', 'because'
            ];
            if (blockedTokens.some(t => new RegExp(`\\b${t}\\b`, 'i').test(lower))) return false;
            return true;
        }

        function normalizePersonalName(value) {
            let name = String(value || '')
                .replace(/^["'`]+|["'`]+$/g, '')
                .replace(/[?.!,;:]+$/g, '')
                .replace(/\s+/g, ' ')
                .trim();
            name = name.replace(/\b(?:please|thanks|thank you|bro|sir|madam)$/i, '').trim();
            if (!name) return '';
            return name
                .split(/\s+/)
                .map(part => part
                    .split(/([-'])/)
                    .map(piece => piece === '-' || piece === '\'' ? piece : (piece.charAt(0).toUpperCase() + piece.slice(1).toLowerCase()))
                    .join(''))
                .join(' ');
        }

        function extractNameFromText(text) {
            const raw = String(text || '').trim();
            const patterns = [
                /(?:no|nah|nope|actually|wrong),?\s*(?:my name is|i'm|i am|it's|it is|call me|you can call me)\s+([^,.!?;]+)/i,
                /(?:my name is|i'm|i am|it's|it is|call me|you can call me)\s+([^,.!?;]+)/i,
                /^([A-Za-z][A-Za-z\s'-]{1,70})$/i
            ];
            for (const pattern of patterns) {
                const match = raw.match(pattern);
                if (match && match[1]) {
                    const candidate = normalizePersonalName(match[1]);
                    if (candidate) return candidate;
                }
            }
            return '';
        }

                addChatMessage(response, false);

            }
            const lower = text.toLowerCase();

            let location = null;
            let preposition = null;
            
            const patterns = [
                /my\s+(.+?)\s+(?:is|are)\s+(in|on|at)\s+(.+)/i,
                /i\s+put\s+(?:my\s+)?(.+?)\s+(in|on|at)\s+(.+)/i,
                /i\s+left\s+(?:my\s+)?(.+?)\s+(in|on|at)\s+(.+)/i,
                /(?:my\s+)?(.+?)\s+(?:is|are)\s+(in|on|at)\s+(.+)/i
            ];
            
            for (const pattern of patterns) {
                const match = text.match(pattern);
                if (match) {
                    if (match.length === 4) {

                    } else {

            }
            
            if (thing && location) {
                
                thing = thing.replace(/^(the|my|a|an)\s+/i, '');
                location = location.replace(/[?.!,]$/g, '');
                
                
                const fullLocation = preposition ? `${preposition} ${location}` : location;
                
                
                const normalizedThing = normalizeThing(thing);

        function normalizeThing(thing) {
            thing = thing.toLowerCase().trim();
            
            
            const singularToPlural = {
                'key': 'keys',
                'glass': 'glasses',
                'sunglass': 'sunglasses',
                'headphone': 'headphones',
                'earbud': 'earbuds'
            };
            
            
            if (thing.endsWith('s')) {
                return thing;
            }
            
            
            if (singularToPlural[thing]) {
                return singularToPlural[thing];
            }
            
            
            const words = thing.split(' ');
            const lastWord = words[words.length - 1];
            
            if (singularToPlural[lastWord]) {
                words[words.length - 1] = singularToPlural[lastWord];
                return words.join(' ');
            }
            
            
            if (!lastWord.endsWith('s') && words.length > 0) {
                words[words.length - 1] = lastWord + 's';
                return words.join(' ');
            }
            
            return thing;
        }

        async function handleMemoryRecall(text) {
            const lower = text.toLowerCase();
            
            let thing = null;
            
            const patterns = [
                /(?:do you know )?where\s+(?:is|are)\s+(?:my\s+|the\s+)?(.+)/i,
                /(?:do you know )?where\s+did\s+i\s+(?:put|leave)\s+(?:my\s+|the\s+)?(.+)/i,
                /(?:do you know )?where'?s\s+(?:my\s+|the\s+)?(.+)/i,
                /where\s+(?:my\s+|the\s+)?(.+?)\s+(?:is|are)/i,
                /(?:my\s+|the\s+)?(.+)\s+where/i,
                /^(?:my\s+|the\s+)?(.+)\?$/i  
            ];
            
            for (const pattern of patterns) {
                const match = text.match(pattern);
                if (match) {
                    thing = match[1].trim();
                    break;
                }
            }
            
            if (thing) {
                thing = thing.replace(/[?.!,]$/g, '');
                thing = thing.replace(/^(the|my|a|an)\s+/i, '');
                
                
                normalizeMemoryStoreRecords();
                let location = getMemoryRecordValue(memoryStore[normalizeThing(thing)] || memoryStore[thing.toLowerCase()]);
                
                
                if (!location) {
                    const match = findBestMemoryMatch(thing);
                    if (match) {
                        location = match.location;
                        thing = match.thing; 
                    }
                }
                
                if (location) {
                    await deliverApiReply('memory_recall_found', {
                        thing,
                        location
                    }, { speak: true });
                } else {
                    await deliverApiReply('memory_recall_missing', {
                        thing
                    }, { speak: true });
                }
            } else {
                await deliverApiReply('memory_recall_prompt', {}, { speak: true });
            }
        }

        
        function findBestMemoryMatch(query) {
            normalizeMemoryStoreRecords();
            const best = Object.entries(memoryStore)
                .map(([key, record]) => ({
                    key,
                    record,
                    score: scoreMemoryMatch(query, key, record)
                }))
                .filter(item => item.score > 0)
                .sort((a, b) => b.score - a.score)[0];
            if (!best || best.score < 35) return null;
            return { thing: best.key, location: getMemoryRecordValue(best.record) };
        }

async function editMessage(button) {
    const currentRaw = button?.dataset?.message ? decodeURIComponent(button.dataset.message) : '';
    const currentText = currentRaw || button?.closest('.chat-bubble-user')?.querySelector('p')?.innerText || '';
    const edited = window.prompt('Edit your message:', currentText);
    if (edited === null) return;

    const nextText = edited.trim();
    if (!nextText) {
        showTemporaryMessage('Message cannot be empty.');
        return;
    }
    if (nextText === currentText.trim()) return;

    const userRow = button.closest('[data-role=\"user\"]');
    const textNode = userRow?.querySelector('.chat-bubble-user p');
    if (textNode) {
        textNode.innerHTML = escapeHtml(nextText).replace(/\n/g, '<br>');
    }
    button.dataset.message = encodeURIComponent(nextText);
    setLastVisibleUserMessage(nextText);
    const turn = createConversationTurn(nextText, nextText, 'edited');
    const previousRenderContext = beginResponseRenderContext(turn);
    if (userRow) userRow.dataset.turnId = turn.id;

    // ChatGPT-like behavior: regenerate from this edited turn by removing following turns.
    if (userRow) {
        let row = userRow.nextElementSibling;
        while (row) {
            const next = row.nextElementSibling;
            row.remove();
            row = next;
        }
    }

    try {
        await processCommand(nextText);
    } finally {
        restoreResponseRenderContext(previousRenderContext);
    }
}

function normalizeHistoryUserMessage(userMessage) {
    const raw = String(userMessage || '').trim();
    if (!raw) return '';

    // Convert internal teaching wrapper back to the real user query.
    const wrappedDouble = raw.match(/^User asked:\s*"([^"]+)"/i);
    if (wrappedDouble && wrappedDouble[1]) return wrappedDouble[1].trim();

    const wrappedSingle = raw.match(/^User asked:\s*'([^']+)'/i);
    if (wrappedSingle && wrappedSingle[1]) return wrappedSingle[1].trim();

    const wrappedPlain = raw.match(/^User asked:\s*([^\n]+)$/im);
    if (wrappedPlain && wrappedPlain[1]) {
        const line = wrappedPlain[1].replace(/[?.!,;:\s]+$/g, '').trim();
        if (line && !/^teach this clearly|^rules:/i.test(line)) return line;
    }

    const firstLine = raw.split('\n')[0].trim();
    if (/^(User asked:|Teach this clearly|Rules:)/i.test(firstLine)) {
        const quoted = raw.match(/"([^"]+)"/);
        if (quoted && quoted[1]) return quoted[1].trim();
    }

    return raw;
}

function formatAssistantTextForReadability(rawText) {
    if (typeof rawText !== 'string') return rawText;
    rawText = normalizeAssistantTextStyle(rawText);
    if (/<(iframe|div|img|table|svg|button|a)\b/i.test(rawText)) return rawText;
    rawText = normalizeItineraryTextForReadability(rawText);
    if (/^\s*[-*]\s+/m.test(rawText) || /^\s*\d+\.\s+/m.test(rawText)) return rawText;

    const proceduralText = autoBulletizeProcedureText(rawText);
    if (proceduralText !== rawText) return proceduralText;

    if (rawText.includes('\n')) return rawText;
    if (rawText.length < 300) return rawText;

    const sentences = splitReadableSentences(rawText).filter(s => /[.!?]$/.test(s));
    if (sentences.length < 5) return rawText;

    let closingQuestion = '';
    const last = sentences[sentences.length - 1] || '';
    if (/\?$/.test(last)) {
        closingQuestion = last;
        sentences.pop();
    }

    if (sentences.length < 3) return rawText;

    const bullets = sentences.map(s => `- ${s}`).join('\n');
    return closingQuestion ? `${bullets}\n\n${closingQuestion}` : bullets;
}

function splitReadableSentences(text) {
    const raw = String(text || '').replace(/\s+/g, ' ').trim();
    if (!raw) return [];

    const sentences = [];
    let start = 0;
    for (let i = 0; i < raw.length; i += 1) {
        const char = raw[i];
        if (!/[.!?]/.test(char)) continue;
        const prev = raw[i - 1] || '';
        const next = raw[i + 1] || '';
        if (char === '.' && /\d/.test(prev) && /\d/.test(next)) continue;
        if (next && !/\s/.test(next)) continue;

        const sentence = raw.slice(start, i + 1).trim();
        if (sentence) sentences.push(sentence);
        start = i + 1;
    }

    const tail = raw.slice(start).trim();
    if (tail) sentences.push(tail);
    return sentences;
}

function isLikelyItineraryText(text) {
    const raw = String(text || '');
    const dayMatches = raw.match(/\bDay\s*\d+\b/gi) || [];
    if (dayMatches.length >= 2) return true;
    return dayMatches.length >= 1 && /\b(itinerary|arrival|sightseeing|transit|quick tips|best season|getting around)\b/i.test(raw);
}

function normalizeItineraryTextForReadability(rawText) {
    if (typeof rawText !== 'string') return rawText;
    if (!isLikelyItineraryText(rawText)) return rawText;

    let text = String(rawText || '')
        .replace(/\r\n/g, '\n')
        .replace(/[\u00a0\u202f]/g, ' ')
        .replace(/[ \t]+/g, ' ')
        .trim();

    text = text.replace(/\s+\b(Day\s*\d+\s*[-:])/gi, (match, label, offset) => {
        return offset === 0 ? label : `\n\n${label}`;
    });

    text = text.replace(
        /\s+\b(Early\s+Morning|Late\s+Morning|Morning|Breakfast|Brunch|Lunch|Afternoon|Evening|Dinner|Night|Quick\s+Tips|Travel\s+Tips|Optional\s+Alternatives|Option\s+\d+)\s*[-:]\s*/gi,
        (match, label, offset, full) => {
            const previous = full.slice(Math.max(0, offset - 2), offset);
            const prefix = previous.includes('\n') ? '' : '\n\n';
            return `${prefix}${label} - `;
        }
    );

    text = text.replace(
        /\s+(\*{0,2}(?:Why visit|What not to miss|Best time|Time needed|Transit|Food|Tip)\*{0,2}\s*:)/gi,
        '\n- $1'
    );

    text = text
        .replace(/\n{3,}/g, '\n\n')
        .replace(/[ \t]+\n/g, '\n')
        .trim();

    return text;
}

function normalizeAssistantTextStyle(text) {
    return String(text || '').replace(/[â€”â€“]/g, '-');
}

function autoBulletizeProcedureText(rawText) {
    if (typeof rawText !== 'string') return rawText;
    const text = String(rawText || '').replace(/\r\n/g, '\n').trim();
    if (!text) return rawText;
    if (/^\s*[-*]\s+/.test(text) || /^\s*\d+\.\s+/.test(text)) return rawText;

    const lines = text.split('\n').map(line => line.trim()).filter(Boolean);
    if (lines.length < 4) return rawText;

    const stepHint = /\b(step by step|steps?|procedure|what you can do|what to do|do this|try this)\b/i.test(text);
    const stepLike = line =>
        /^[A-Z][^:]{1,100}:\s+.+/.test(line) ||
        /^(apply|take|keep|avoid|rest|monitor|call|seek|elevate|ice|stop|wash|clean|use|drink|move|check)\b/i.test(line);

    const firstStepIdx = lines.findIndex(stepLike);
    const stepCount = lines.filter(stepLike).length;
    if (firstStepIdx < 0 || (!stepHint && stepCount < 3)) return rawText;

    const introLines = lines.slice(0, firstStepIdx);
    const stepLines = lines.slice(firstStepIdx).filter(line => !/^sources?\s*:/i.test(line));
    if (stepLines.length < 2) return rawText;

    const intro = introLines.length ? `${introLines.join('\n\n')}\n\n` : '';
    const bullets = stepLines.map(line => `- ${line}`).join('\n');
    return `${intro}${bullets}`.trim();
}

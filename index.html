        function buildVerificationResponseInstructions(scope = 'answer') {
            return [
                'Return a clear verification report with these exact sections:',
                'Verdict: likely accurate, partly accurate, unsupported, or incorrect.',
                `Evidence used: summarize the ${scope} text, any source links already present, local review flags, and retrieved context supplied in this request.`,
                'How checked: give a concise rationale for the verdict without revealing hidden chain-of-thought.',
                'Claims needing live/source verification: list claims that cannot be verified from the supplied evidence.',
                'Corrected answer: include only if the original is wrong or incomplete.',
                'Sources: include every usable retrieved source as a markdown link in the form 1. [Title](https://example.com).'
            ].join('\n');
        }

        function isUsableVerificationSource(item) {
            const url = String(item?.url || '').trim();
            const title = String(item?.title || '').trim();
            if (!url || !/^https?:\/\//i.test(url) || !title) return false;
            const sourceType = String(item?.sourceType || '').trim();
            if (/^(reference_lookup|archive_lookup|community_discussion)$/i.test(sourceType)) return false;
            const description = String(item?.description || '').trim();
            return Boolean(description || sourceType === 'official_source' || item?.evidenceLevel === 'structured_claim');
        }

        function normalizeVerificationSource(item, extracted = null) {
            return {
                title: String(extracted?.title || item?.title || 'Source').replace(/\s+/g, ' ').trim().slice(0, 180),
                url: String(extracted?.url || item?.url || '').trim(),
                description: String(extracted?.description || item?.description || '').replace(/\s+/g, ' ').trim().slice(0, 420),
                text: String(extracted?.text || extracted?.markdown || item?.description || '').replace(/\s+/g, ' ').trim().slice(0, 3500),
                sourceType: String(extracted?.sourceType || item?.sourceType || '').trim(),
                sourceLabel: String(item?.sourceLabel || item?.source || item?.domain || '').trim(),
                date: String(item?.date || item?.publishedAt || '').trim(),
                extractor: String(extracted?.extractor || extracted?.sourceType || '').trim()
            };
        }

        async function fetchVerificationExtract(url, query) {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 3500);
            try {
                const response = await fetch('/api/extract-url', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    signal: controller.signal,
                    body: JSON.stringify({
                        url,
                        query,
                        textLimit: 5000,
                        timeoutMs: 3000,
                        respectRobots: true
                    })
                });
                const data = await parseJsonResponseSafely(response);
                if (!response.ok || data?.success === false) return null;
                return data?.result || null;
            } catch (_) {
                return null;
            } finally {
                clearTimeout(timeout);
            }
        }

        async function withVerificationTimeout(promise, timeoutMs, onTimeout) {
            let timeoutId = null;
            const timeoutPromise = new Promise(resolve => {
                timeoutId = setTimeout(() => resolve(typeof onTimeout === 'function' ? onTimeout() : null), timeoutMs);
            });
            try {
                return await Promise.race([promise, timeoutPromise]);
            } finally {
                clearTimeout(timeoutId);
            }
        }

        async function buildVerificationEvidenceBundle(originalQuestion) {
            const query = String(originalQuestion || '').replace(/\s+/g, ' ').trim();
            if (!query || query === 'the previous question') {
                return { query, sources: [], warning: 'No original user question was available for source lookup.' };
            }
            let results = [];
            const searchController = new AbortController();
            const searchTimeout = setTimeout(() => searchController.abort(), 5500);
            try {
                const searchData = await withVerificationTimeout(
                    fetchLiveSearchJson(query, {
                        maxResults: 5,
                        answer: false,
                        signal: searchController.signal
                    }),
                    6000,
                    () => ({ results: [], timeout: true })
                );
                if (searchData?.timeout) {
                    return { query, sources: [], warning: 'Source lookup timed out before usable results were returned.' };
                }
                results = (Array.isArray(searchData?.results) ? searchData.results : [])
                    .filter(isUsableVerificationSource)
                    .slice(0, 5);
            } catch (error) {
                return {
                    query,
                    sources: [],
                    warning: String(error?.message || 'Source lookup failed before usable results were returned.')
                };
            } finally {
                clearTimeout(searchTimeout);
            }

            const extractionCandidates = results.slice(0, 3);
            const extracted = await withVerificationTimeout(
                Promise.all(extractionCandidates.map(item => fetchVerificationExtract(item.url, query))),
                5000,
                () => extractionCandidates.map(() => null)
            );
            const extractedByUrl = new Map();
            extractionCandidates.forEach((item, index) => {
                const result = extracted[index];
                if (result) extractedByUrl.set(String(item.url || '').trim(), result);
            });

            const sources = results
                .map(item => normalizeVerificationSource(item, extractedByUrl.get(String(item.url || '').trim()) || null))
                .filter(item => item.url && item.title)
                .slice(0, 5);

            return {
                query,
                sources,
                warning: sources.length ? '' : 'No answer-bearing public source was found for this verification.'
            };
        }

        function formatVerificationEvidenceForPrompt(bundle) {
            const sources = Array.isArray(bundle?.sources) ? bundle.sources : [];
            if (!sources.length) {
                return `Retrieved source evidence: unavailable.\nReason: ${bundle?.warning || 'No usable source evidence was retrieved.'}`;
            }
            return sources.map((item, index) => [
                `[${index + 1}] ${item.title}`,
                item.description ? `Snippet: ${item.description}` : '',
                item.text ? `Extracted text: ${item.text}` : '',
                item.sourceLabel ? `Source label: ${item.sourceLabel}` : '',
                item.sourceType ? `Source type: ${item.sourceType}` : '',
                item.date ? `Date: ${item.date}` : '',
                `URL: ${item.url}`
            ].filter(Boolean).join('\n')).join('\n\n');
        }

        async function verifyAssistantMessage(messageId) { 
            const meta = getAssistantMessageMeta(messageId); 
            if (!meta?.text) return; 
            const verificationKey = String(messageId || '');
            if (pendingAssistantVerifications.has(verificationKey)) {
                showTemporaryMessage('Verification is already running for that answer.');
                return;
            }
            if (regenerationInProgress || activeRequestController || isProcessing || isAssistantProcessing()) {
                showTemporaryMessage('Wait for the current response to finish before verifying an answer.');
                return;
            }
            pendingAssistantVerifications.add(verificationKey);
            const visible = 'Verify this answer'; 
            const flags = Array.isArray(meta.riskFlags) && meta.riskFlags.length 
                ? meta.riskFlags.map(flag => `${flag.label}: ${flag.reason}`).join('\n') 
                : 'No local review flags were detected.'; 
            const originalQuestion = String(meta.priorUserPrompt || 'the previous question').replace(/\s+/g, ' ').trim();
            const displayPrompt = `Verify the previous answer for: ${originalQuestion.slice(0, 120)}${originalQuestion.length > 120 ? '...' : ''}`;
            closeAssistantActionMenus();
            hideSelectionHelperPopover();
            const hidden = [
                'Check whether this answer is accurate and internally consistent.', 
                'Use the retrieved source evidence supplied below. Do not ask the user for links.',
                buildVerificationResponseInstructions('answer'),
                '', 
                `Local review flags:\n${flags}`, 
                '', 
                `Original user request: ${meta.priorUserPrompt || 'unknown'}`, 
                `Answer to verify:\n${meta.text}` 
            ].join('\n'); 
            const turn = createConversationTurn(visible, hidden, 'programmatic', {
                displayProcessingPrompt: displayPrompt,
                topicLabel: 'Verify answer',
                sourceContext: {
                    programmaticAction: 'verify_answer'
                }
            });
            const previousRenderContext = beginResponseRenderContext(turn);
            addChatMessage(visible, true, null, { turnId: turn.id });
            const controller = beginAbortableRequest();
            try {
                showThinkingIndicator('Checking sources...');
                const evidenceBundle = await buildVerificationEvidenceBundle(originalQuestion);
                const evidenceBlock = formatVerificationEvidenceForPrompt(evidenceBundle);
                const verificationPrompt = [
                    hidden,
                    '',
                    evidenceBlock,
                    '',
                    'Return the Sources section using only URLs from the retrieved source evidence. If no retrieved source evidence is available, write "Sources: Source verification unavailable."'
                ].join('\n');
                showThinkingIndicator('Verifying answer...');
                const response = await window.JarvisApi.postJson('/api/chat-groq', {
                    message: verificationPrompt,
                    context: [],
                    preferences: {
                        userName,
                        responseLength: 'normal',
                        responseFormat: 'paragraph',
                        responseStyle,
                        customSystemPrompt
                    },
                    intent: 'verify_answer',
                    grounding: {
                        originalRequest: originalQuestion,
                        sourceAnswer: meta.text,
                        selectedText: meta.text,
                        localReviewFlags: flags,
                        evidenceSources: evidenceBundle.sources,
                        evidenceWarning: evidenceBundle.warning
                    }
                }, {
                    signal: controller.signal,
                    timeoutMs: 25000
                });
                if (response?.aborted) return;
                const finalText = String(response?.response || response?.text || '').trim() || 'I could not complete verification this time.';
                addChatMessage(finalText, false, true, {
                    turnId: turn.id,
                    sourceType: 'verified',
                    userMessage: originalQuestion
                });
                saveToHistory(visible, finalText);
            } catch (error) {
                console.error('verify answer failed:', error);
                hideThinkingIndicator();
                addChatMessage('I could not complete source verification right now. Please try again.', false, true, {
                    turnId: turn.id
                });
            } finally {
                pendingAssistantVerifications.delete(verificationKey);
                hideThinkingIndicator();
                restoreResponseRenderContext(previousRenderContext);
                clearActiveRequest(controller);
                resetPrimaryActionButtonWhenIdle();
            }
        }

        async function askJarvisAboutSelection(action = 'custom') {

                rewrite: 'Rewrite this selection more clearly.',

        function normalizeDuplicatePromptFingerprint(value) {
            return String(value || '').toLowerCase().replace(/\s+/g, ' ').trim();
        }

        function normalizeDuplicateAnswerFingerprint(value) {
            return String(value || '')
                .replace(/\n\s*Sources:\s*[\s\S]*$/i, '')
                .replace(/<[^>]*>/g, ' ')
                .toLowerCase()
                .replace(/\s+/g, ' ')
                .trim()
                .slice(0, 1200);

        function shouldSuppressDuplicateAssistantMessage(displayText, meta) {
            const messageMeta = meta || {};
            const promptText = String(
                messageMeta?.userMessage ||
                getConversationTurn(activeResponseRenderContext?.turnId)?.rawPrompt ||
                window.__lastUserMessage ||
                ''
            );
            const promptFingerprint = normalizeDuplicatePromptFingerprint(promptText);
            const answerFingerprint = normalizeDuplicateAnswerFingerprint(displayText);
            if (!promptFingerprint || !answerFingerprint) return false;
            const now = Date.now();
            const duplicate = promptFingerprint === lastAssistantPromptFingerprint &&
                answerFingerprint === lastAssistantAnswerFingerprint &&
                (now - lastAssistantAnswerTimestamp) < 8000;
            lastAssistantPromptFingerprint = promptFingerprint;
            lastAssistantAnswerFingerprint = answerFingerprint;
            lastAssistantAnswerTimestamp = now;
            return duplicate;
        }

        function addChatMessage(text, isUser = true, typewriter = null, meta = {}) {
            const chatContainer = document.getElementById('chat-container');
            if (!chatContainer) return;
            const shouldDelayAssistantRender = !isUser && Boolean(document.getElementById('chat-thinking-indicator'));
            if (!isUser) hideThinkingIndicator();

            if (isUser && !rawDisplayText.trim()) return;
            const displayText = isUser || /<(iframe|div|img|table)\s/i.test(rawDisplayText)
                ? rawDisplayText
                : ensureCompleteAssistantResponse(rawDisplayText);
            if (!isUser && shouldSuppressDuplicateAssistantMessage(displayText, meta)) {
                return '';
            }
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-row flex ${isUser ? 'justify-end' : 'justify-start'} items-start gap-3`;
            messageDiv.dataset.role = isUser ? 'user' : 'assistant';
            const messageTurnId = meta?.detached
                ? ''
                : String(
                    Object.prototype.hasOwnProperty.call(meta || {}, 'turnId')
                        ? meta.turnId
                        : (activeResponseRenderContext?.turnId || '')
                ).trim();
            if (messageTurnId) messageDiv.dataset.turnId = messageTurnId;

                    </div>

                    formattedText = formattedText.replace(/\n(?![^<]*>)/g, '<br>');

                const containerWidth = hasMap ? 'w-full max-w-4xl' : (hasHtmlContent ? 'w-full max-w-3xl' : 'w-full max-w-3xl');
                const sourceType = meta?.sourceType || (hasMap ? 'tool' : 'default');
                const routeBadgeHtml = buildRoutingDebugBadgeHtml(meta?.routing, sourceType);
                const avatarHtml = '';

                const messageId = createAssistantMessageId();
                const sourceTurn = getConversationTurn(messageTurnId);
                const priorUserPrompt = String(meta?.userMessage || sourceTurn?.rawPrompt || '').trim();
                const plainMessageText = hasHtmlContent ? stripAssistantHtmlForText(displayText) : String(displayText || '').trim();
                const sourceLabel = sourceType === 'verified' 
                    ? 'Verified source reply' 
                    : (sourceType === 'model' ? 'Model answer' : (sourceType === 'tool' ? 'Tool-generated reply' : 'Assistant reply')); 
                const riskFlags = analyzeAnswerRiskFlags(priorUserPrompt, plainMessageText); 
                registerAssistantMessageMeta(messageId, { 
                    text: plainMessageText, 
                    priorUserPrompt,

        function normalizeVerifiedLiveMessage(input) {

                .replace(/sources:\s*sources:/gi, 'Sources:')
                .replace(/(?:^|\n)\s*Sources:\s*(?=\n\s*Sources:\s*)/gi, '\n')
                .replace(/^\s*\[[^\]]+\]\s*/gim, '')

        function sanitizeAssistantMarkup(html) {
            const template = document.createElement('template');
            template.innerHTML = String(html || '');

            const allowedTags = new Set(['A', 'BLOCKQUOTE', 'BR', 'CODE', 'DIV', 'H1', 'H2', 'H3', 'H4', 'IFRAME', 'IMG', 'LI', 'OL', 'P', 'PRE', 'SPAN', 'STRONG', 'TABLE', 'TBODY', 'TD', 'TH', 'THEAD', 'TR', 'UL']);
            const allowedAttrs = {
                A: new Set(['href', 'target', 'rel', 'class', 'style']),
                BLOCKQUOTE: new Set(['class']),
                CODE: new Set(['class']),
                DIV: new Set(['class', 'style', 'id']),
                H1: new Set(['class']),
                H2: new Set(['class']),
                H3: new Set(['class']),
                H4: new Set(['class']),
                IFRAME: new Set(['src', 'width', 'height', 'loading', 'allowfullscreen', 'class', 'style', 'referrerpolicy', 'frameborder']),
                IMG: new Set(['src', 'alt', 'class', 'style']),
                P: new Set(['class']),
                PRE: new Set(['class']),
                SPAN: new Set(['class']),
                TABLE: new Set(['class']),
                TBODY: new Set(['class']),
                TD: new Set(['class', 'colspan', 'rowspan']),
                TH: new Set(['class', 'colspan', 'rowspan']),
                THEAD: new Set(['class']),
                TR: new Set(['class']),
                UL: new Set(['class']),
                OL: new Set(['class']),
                LI: new Set(['class']),
                STRONG: new Set(),
                BR: new Set()
            };

            const nodes = Array.from(template.content.querySelectorAll('*'));
            for (const node of nodes) {
                const tag = node.tagName;
                if (!allowedTags.has(tag)) {
                    node.replaceWith(...Array.from(node.childNodes));
                    continue;
                }

                for (const attr of Array.from(node.attributes)) {
                    const name = attr.name.toLowerCase();
                    const value = attr.value;
                    const tagAllowedAttrs = allowedAttrs[tag] || new Set();
                    const isAllowedAttr = tagAllowedAttrs.has(attr.name);
                    const isEventHandler = name.startsWith('on');
                    if (!isAllowedAttr || isEventHandler) {
                        node.removeAttribute(attr.name);
                        continue;
                    }

                    if ((name === 'href' || name === 'src') && /^(?:javascript|data|vbscript):/i.test(value)) {
                        node.removeAttribute(attr.name);
                        continue;
                    }

                    if (tag === 'A' && name === 'href') {
                        if (!isSafeAssistantUrl(value)) {
                            node.replaceWith(node.textContent || '');
                            break;
                        }
                        node.setAttribute('target', '_blank');
                        node.setAttribute('rel', 'noopener noreferrer');
                    }

                    if (tag === 'IFRAME' && name === 'src' && !isSafeAssistantIframeUrl(value)) {
                        node.remove();
                        break;
                    }

                    if (tag === 'IMG' && name === 'src' && !isSafeAssistantUrl(value)) {
                        node.remove();
                        break;
                    }
                }
            }

            return template.innerHTML;
        }

        function drawVideoFrameWithRotation(ctx, video, width, height, rotationDeg = 0, zoom = 1) {
            const rot = normalizeCameraRotation(rotationDeg);
            const z = Math.max(1, Number(zoom || 1));
            const sourceW = video.videoWidth || width;
            const sourceH = video.videoHeight || height;
            const cropW = sourceW / z;
            const cropH = sourceH / z;
            const cropX = Math.max(0, (sourceW - cropW) / 2);
            const cropY = Math.max(0, (sourceH - cropH) / 2);
            ctx.save();
            ctx.clearRect(0, 0, width, height);
            if (!rot) {
                ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, width, height);
                ctx.restore();
                return;
            }

            ctx.translate(width / 2, height / 2);
            ctx.rotate((rot * Math.PI) / 180);
            if (rot === 90 || rot === 270) {
                ctx.drawImage(video, cropX, cropY, cropW, cropH, -height / 2, -width / 2, height, width);
            } else {
                ctx.drawImage(video, cropX, cropY, cropW, cropH, -width / 2, -height / 2, width, height);
            }
            ctx.restore();
        }
        function isSplitwiseExpenseIntent(text) {

        function normalizeExpensePersonName(name) {
            const raw = String(name || '').trim();
            if (!raw) return '';
            const compact = raw.replace(/\s+/g, ' ').trim();

        function extractCurrencySymbol(text, bill) {
            const billCurrency = String(bill?.currency || '').trim();
            if (billCurrency) return billCurrency;
            const t = String(text || '');
            const m = t.match(/(â‚¹|rs\.?|inr|\$|usd|eur|â‚¬|Â£)/i);
            if (!m) return '';
            const token = m[1].toLowerCase();
            if (token === 'rs' || token === 'rs.' || token === 'inr') return 'INR';
            if (token === '$' || token === 'usd') return 'USD';
            if (token === 'â‚¬' || token === 'eur') return 'EUR';
            if (token === 'Â£') return 'GBP';
            return m[1];
        }

        function parseSplitwisePayload(text, bill) {
            const raw = String(text || '').trim();
            const lowered = raw.toLowerCase();
            const contributions = new Map();

            const addContribution = (name, amount) => {
                const person = normalizeExpensePersonName(name);
                const value = Number(amount);
                if (!person || !Number.isFinite(value) || value < 0) return;
                contributions.set(person, (contributions.get(person) || 0) + value);
            };

            // Pattern: "Alice paid 500", "I spent 300", "Bob contributed 200"
            const verbPattern = /\b([a-z][a-z\s]{0,24}|i)\s+(?:paid|pay|spent|contributed|brought)\s*(?:rs\.?|inr|â‚¹|\$|usd|eur|â‚¬|Â£)?\s*([0-9]+(?:\.[0-9]+)?)\b/gi;
            let match;
            while ((match = verbPattern.exec(raw)) !== null) {
                addContribution(match[1], match[2]);
            }

            // Pattern: "Alice 500, Bob 200"
            const simplePairPattern = /\b([a-z][a-z\s]{0,24}|i)\s*[:=-]?\s*(?:rs\.?|inr|â‚¹|\$|usd|eur|â‚¬|Â£)?\s*([0-9]+(?:\.[0-9]+)?)\b/gi;
            while ((match = simplePairPattern.exec(raw)) !== null) {
                const nearby = raw.slice(Math.max(0, match.index - 14), Math.min(raw.length, match.index + match[0].length + 14));
                if (/\b(phone|number|age|time|date)\b/i.test(nearby)) continue;
                addContribution(match[1], match[2]);
            }

            // Total amount: explicit in text, else OCR bill total, else sum contributions.
            let total = null;
            const totalMatch = raw.match(/\b(?:total|bill(?:\s+amount)?|grand total)\s*(?:is|=|:)?\s*(?:rs\.?|inr|â‚¹|\$|usd|eur|â‚¬|Â£)?\s*([0-9]+(?:\.[0-9]+)?)\b/i);
            if (totalMatch) {
                total = Number(totalMatch[1]);
            } else if (Number.isFinite(Number(bill?.total))) {
                total = Number(bill.total);
            }

            const contributionSum = Array.from(contributions.values()).reduce((a, b) => a + b, 0);
            if (!Number.isFinite(total) || total <= 0) {
                total = contributionSum;
            }
            if (!Number.isFinite(total) || total <= 0) return null;

            // Participant count: "split among 4", "between 3", etc.
            let participantCount = null;
            const countMatch = lowered.match(/\b(?:among|between|for|across)\s+([0-9]{1,2})\s+(?:people|persons|friends|members)?\b/);
            if (countMatch) participantCount = Number(countMatch[1]);

            if (!participantCount || participantCount < 1) {
                participantCount = contributions.size > 0 ? contributions.size : null;
            }
            if (!participantCount || participantCount < 1) return null;

            const knownParticipants = Array.from(contributions.keys());
            while (knownParticipants.length < participantCount) {
                knownParticipants.push(`Person ${knownParticipants.length + 1}`);
            }

            const participantContrib = knownParticipants.map(name => ({
                name,
                paid: Number(contributions.get(name) || 0)
            }));

            return {
                currency: extractCurrencySymbol(raw, bill),
                total,
                participantCount,
                people: participantContrib
            };
        }

        function buildSplitwiseResult(payload) {
            const currency = payload.currency ? `${payload.currency} ` : '';
            const share = payload.total / payload.participantCount;

            const balances = payload.people.map(p => ({
                name: p.name,
                paid: p.paid,
                balance: p.paid - share
            }));

            const creditors = balances
                .filter(p => p.balance > 0.01)
                .map(p => ({ name: p.name, amount: p.balance }))
                .sort((a, b) => b.amount - a.amount);
            const debtors = balances
                .filter(p => p.balance < -0.01)
                .map(p => ({ name: p.name, amount: Math.abs(p.balance) }))
                .sort((a, b) => b.amount - a.amount);

            const settlements = [];
            let i = 0;
            let j = 0;
            while (i < debtors.length && j < creditors.length) {
                const pay = Math.min(debtors[i].amount, creditors[j].amount);
                if (pay > 0.009) {
                    settlements.push({
                        from: debtors[i].name,
                        to: creditors[j].name,
                        amount: pay
                    });
                }
                debtors[i].amount -= pay;
                creditors[j].amount -= pay;
                if (debtors[i].amount <= 0.01) i++;
                if (creditors[j].amount <= 0.01) j++;
            }

            const lines = [];
            lines.push(`Split summary: total ${currency}${payload.total.toFixed(2)} across ${payload.participantCount} people.`);
            lines.push(`Each person share: ${currency}${share.toFixed(2)}`);
            lines.push('');
            lines.push('Paid by:');
            for (const p of payload.people) {
                lines.push(`- ${p.name}: ${currency}${p.paid.toFixed(2)}`);
            }
            lines.push('');
            if (!settlements.length) {
                lines.push('Everyone is settled. No one owes anything.');
            } else {
                lines.push('Who owes whom:');
                for (const s of settlements) {
                    lines.push(`- ${s.from} owes ${s.to}: ${currency}${s.amount.toFixed(2)}`);
                }
            }
            return lines.join('\n');
        }

            const result = buildSplitwiseResult(payload);

        }

        function isLikelyCodeInput(text) {
            const raw = String(text || '');
            if (!raw.trim()) return false;

            if (/```[\s\S]*```/.test(raw)) return true;
            if (/^\s*<(?:!doctype|html|script|style|div|span|body|head)\b/i.test(raw)) return true;
            if (/^\s*(?:function\s+\w+\s*\(|const\s+\w+\s*=|let\s+\w+\s*=|var\s+\w+\s*=|class\s+\w+|def\s+\w+\s*\(|import\s+\w+|from\s+\w+\s+import|#include\s*[<"]|public\s+class\s+\w+)/m.test(raw)) return true;

            const lines = raw.split('\n').filter(line => line.trim().length > 0);
            const hasCodeSymbols = /[{}()[\];<>:=]/.test(raw);
            const keywordHits = (raw.match(/\b(function|const|let|var|class|return|if|else|for|while|try|catch|async|await|def|import|from|public|private|void|static)\b/gi) || []).length;

            return lines.length >= 3 && hasCodeSymbols && keywordHits >= 2;
        }

        function isCodeAnalyzerRequest(text) {
            const raw = String(text || '').trim();
            if (!raw) return false;
            if (isLikelyCodeInput(raw)) return true;
            return /\b(analyze|review|explain|debug|check|inspect)\b[\s\S]*\b(code|snippet|script|program|function)\b/i.test(raw);
        }

        function extractCodeFromRequest(text) {
            const raw = String(text || '').trim();
            if (!raw) return '';

            const fenced = raw.match(/```(?:[a-zA-Z0-9#+-]*)?\n([\s\S]*?)```/);
            if (fenced && fenced[1]) return fenced[1].trim();

            const promptThenCode = raw.match(/\b(?:code|snippet|script)\b[\s:,-]*\n([\s\S]+)/i);
            if (promptThenCode && promptThenCode[1]) return promptThenCode[1].trim();

            return raw;
        }

        async function handleCodeAnalyzerRequest(text) {
            const code = extractCodeFromRequest(text);
            if (!code || code.length < 8) {
                const msg = 'Please paste the code snippet you want analyzed.';
                addChatMessage(msg, false);
                saveToHistory(text, msg);
                return;
            }

            const controller = beginAbortableRequest();
            showThinkingIndicator('Analyzing code...');
            try {
                const response = await fetch('/api/chat-groq', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    signal: controller.signal,
                    body: JSON.stringify({
                        message: `Analyze the following code.

Return in this exact structure:
1) What this code does
- 3 to 6 concise bullets

2) Possible mistakes or risks
- If issues exist: numbered list with concrete reason
- If no obvious issue: write "No obvious functional mistakes found in this snippet."

3) Suggested fixes or improvements
- Actionable bullets, include short corrected snippets only when needed

Code:
\`\`\`
${code}
\`\`\``
                    })
                });

                if (!response.ok) {
                    throw new Error(`code analysis failed: status=${response.status}`);
                }

                const data = await response.json();
                const analysis = String(data?.response || data?.text || '').trim();
                if (!analysis) {
                    throw new Error('empty analysis');
                }

                addChatMessage(analysis, false);
                saveToHistory(text, analysis);
            } catch (error) {
                if (isAbortError(error)) return;
                const msg = 'I could not analyze that code right now. Please try again.';
                addChatMessage(msg, false);
                saveToHistory(text, msg);
            } finally {
                hideThinkingIndicator();
                clearActiveRequest(controller);
            }
        }

        function handleLocalVoiceCommand(text, inputSource = 'text') {
            const source = String(inputSource || '').toLowerCase();
            if (!['vtt', 'converse'].includes(source)) return false;
            const t = String(text || '').toLowerCase().replace(/[.!?]+$/g, '').trim();
            if (!t) return false;
            if (/^(stop|stop generating|cancel|cancel response|pause)$/.test(t)) {
                stopActiveGeneration('manual');
                window.JarvisSpeechInput?.stop?.({ disableConverse: source === 'converse' });
                showTemporaryMessage('Stopped.');
                return true;
            }
            if (/^(retry|try again|regenerate)$/.test(t)) {
                retryLastRequest();
                return true;
            }
            if (/^(clear chat|clear history|new chat)$/.test(t)) {
                conversationHistory = [];
                conversationContext = [];
                window.JarvisConversation?.reset?.();
                window.JarvisState?.resetConversationState?.();
                const chatContainer = document.getElementById('chat-container');
                if (chatContainer) chatContainer.innerHTML = '';
                saveConversationHistory();
                showTemporaryMessage('Chat cleared.');
                return true;
            }
            if (/^(open|start|turn on|enable)\s+(vision|live vision|camera)$/.test(t)) {
                if (!isContinuousVisionActive) toggleContinuousVision();
                showTemporaryMessage('Opening Live Vision.');
                return true;
            }
            if (/^(show|open|list)\s+(memory|memories|memory vault|saved notes)$/.test(t)) {
                showSavedMemoryVault();
                return true;
            }
            if (/^(export data|export all data|download data)$/.test(t)) {
                exportAllLocalDataJson();
                return true;
            }
            if (/^(delete local data|delete all data|wipe local data|reset app data)$/.test(t)) {
                deleteAllLocalDataNow();
                return true;
            }
            if (/^(start|open|enable)\s+translator(?:\s+(.+))?$/.test(t)) {
                const language = resolveTranslatorLanguage(t.match(/translator\s+(.+)$/i)?.[1] || 'hindi') || 'hindi';
                activateTranslatorMode(language);
                return true;
            }
            if (/^(read this|summarize this)$/.test(t)) {
                if (isContinuousVisionActive) {
                    handleContinuousVisionQuery(t === 'read this' ? 'read the visible text' : 'summarize what you see');
                } else {
                    addChatMessage('Open Live Vision first so I can read or summarize what the camera sees.', false);
                }
                return true;
            }
            return false;
        }

async function sendTextInput(submission = {}) {
            closeComposerActionsMenu();
            const input = document.getElementById('text-input');
            if (!input) return;
            const text = input.value.trim();
            const inputSource = String(submission?.source || input.dataset.inputSource || 'text').trim() || 'text';
            if (activeRequestController || isAssistantProcessing()) {
                if (inputSource !== 'converse' || submission?.interrupt !== true || !text) {
                    stopActiveGeneration();
                    return;
                }
                const queuedSubmissionId = ++converseQueuedSubmissionSequence;
                await waitForAssistantIdle();
                if (queuedSubmissionId !== converseQueuedSubmissionSequence) return;
            }
            if (text) {
                if (handleLocalVoiceCommand(text, inputSource)) {
                    input.value = '';
                    delete input.dataset.inputSource;
                    toggleSendButton();
                    return;
                }
                const preserveTranscript = submission?.preserveTranscript === true;
                const selectionGrounding = pendingSelectionGrounding
                    ? { ...pendingSelectionGrounding }
                    : null;
                if (selectionGrounding) pendingSelectionGrounding = null;
                const fingerprint = String(text || '')
                    .toLowerCase()
                    .replace(/\s+/g, ' ')
                    .trim();
                const now = Date.now();
                if (
                    fingerprint &&
                    fingerprint === lastSubmissionFingerprint &&
                    (now - lastSubmissionTimestamp) < 1800
                ) {
                    // Ignore rapid duplicate submit (double Enter/click).
                    input.value = '';
                    delete input.dataset.inputSource;
                    toggleSendButton();
                    return;
                }
                lastSubmissionFingerprint = fingerprint;
                lastSubmissionTimestamp = now;

                const outgoingText = text;
                const normalizedOutgoingText = isLikelyCodeInput(outgoingText)
                    ? outgoingText
                    : normalizeIntentTypos(outgoingText);
                const turn = createConversationTurn(outgoingText, normalizedOutgoingText, inputSource, {
                    sourceContext: {
                        transcriptId: String(submission?.transcriptId || ''),
                        recognitionSessionId: Number(submission?.recognitionSessionId) || null,
                        preservedTranscript: preserveTranscript
                    }
                });
                const previousRenderContext = beginResponseRenderContext(turn);
                input.value = '';
                delete input.dataset.inputSource;
                input.placeholder = window.JarvisSpeechInput?.getState?.().converseEnabled
                    ? 'Converse mode is listening...'
                    : 'Ask anything...';
                toggleSendButton();
                setLastVisibleUserMessage(outgoingText);
                addVisibleInputHistory(outgoingText);
                inputHistoryIndex = -1;
                addChatMessage(outgoingText, true, null, { turnId: turn.id });

                beginAssistantProcessing();
                showThinkingIndicator('Thinking');
                try {
                    if (waitingForName) {
                        await handleNameInput(outgoingText);
                    } else if (waitingForLocation) {

                        const cleanLocation = outgoingText.trim();
                        if (cleanLocation.length < 2) {
                            await deliverApiReply('location_prompt_retry', {
                                reason: 'too_short'
                            });
                            input.value = '';
                            return;
                        }

                        const fillerWords = ['he', 'she', 'it', 'a', 'an', 'the', 'um', 'uh', 'er', 'oh'];
                        if (fillerWords.includes(cleanLocation.toLowerCase())) {
                            await deliverApiReply('location_prompt_retry', {
                                reason: 'unclear_location'
                            });
                            input.value = '';
                            return;
                        }
                        waitingForLocation = false;
                        await getWeatherByCity(cleanLocation);
                    } else if (selectionGrounding) {
                        const result = await askGeminiAI(normalizedOutgoingText, {
                            intent: 'selection_custom',
                            grounding: {
                                ...selectionGrounding,
                                customInstruction: normalizedOutgoingText
                            }
                        });
                        if (result?.aborted) return;
                        await publishResolvedModelMessage(outgoingText, result?.response || result?.text, {
                            label: 'Selection answer',
                            routing: result?.routing || null,
                            recordContext: false
                        });
                    } else {
                        await processCommand(normalizedOutgoingText);
                    }
                } catch (error) {
                    console.error('sendTextInput failed:', error);
                    const fallback = 'I hit a temporary issue while processing that. Please try again.';
                    addChatMessage(fallback, false);
                } finally {
                    clearSubmittedPromptBox(outgoingText, normalizedOutgoingText);
                    restoreResponseRenderContext(previousRenderContext);
                    endAssistantProcessing();
                    resetPrimaryActionButtonWhenIdle();
                }
            }
        }

function getStableBrowserFactAnswer(text) {
    const lower = String(text || '').toLowerCase().replace(/[?.!]+$/g, '').replace(/\s+/g, ' ').trim();
    if (/\b(latest|current|today|now|as of|with sources?|source links?)\b/.test(lower)) return '';

    }

}

function isExchangeRateQuery(text) {
    const t = String(text || '').toLowerCase();
    return /\b(exchange rate|currency|convert|conversion|usd|inr|eur|gbp|aed|cad|aud|jpy)\b/.test(t) &&
           /\b(to|in|from|today|now|current|latest)\b/.test(t);
}

function parseExchangeQuery(text) {
    const raw = String(text || '').trim().toUpperCase();
    const codes = raw.match(/\b[A-Z]{3}\b/g) || [];
    const amountMatch = raw.match(/(\d+(?:\.\d+)?)/);
    let from = '';
    let to = '';
    if (codes.length >= 2) {
        [from, to] = codes.slice(0, 2);
    } else {
        const currencyMap = {
            INR: 'INR', RUPEE: 'INR', RUPEES: 'INR',
            USD: 'USD', DOLLAR: 'USD', DOLLARS: 'USD',
            EUR: 'EUR', EURO: 'EUR', EUROS: 'EUR',
            GBP: 'GBP', POUND: 'GBP', POUNDS: 'GBP',
            AED: 'AED', DIRHAM: 'AED', DIRHAMS: 'AED',
            JPY: 'JPY', YEN: 'JPY'
        };
        const words = raw.split(/\s+/);
        const found = words.map(w => currencyMap[w]).filter(Boolean);
        if (found.length >= 2) {
            [from, to] = found.slice(0, 2);
        }
    }
    return {
        from,
        to,
        amount: amountMatch ? Number(amountMatch[1]) : 1
    };
}

function isMarketPriceQuery(text) {
    const t = String(text || '').toLowerCase();
    return /\b(stock|share|shares|ticker|crypto|bitcoin|ethereum|btc|eth|solana|dogecoin|market cap|price|gold|silver|platinum|diamond|palladium|petrol|diesel|gasoline|crude|brent|wti|commodity|fuel)\b/.test(t) &&
           /\b(price|today|now|current|latest|quote)\b/.test(t);
}

function isFuelPriceQuery(text) {
    const t = String(text || '').toLowerCase();
    return /\b(petrol|diesel|gasoline|fuel)\b/.test(t) && /\b(price|rate|today|now|current|latest)\b/.test(t);
}

function hasExplicitFuelLocation(text) {
    const t = String(text || '').toLowerCase().trim();
    if (!t) return false;
    if (/\b(my location|current location|near me|around me|where i am|here)\b/.test(t)) return true;
    if (/\b(?:in|at|for|near)\s+[a-zA-Z][a-zA-Z\s.'-]{1,50}\b/.test(t)) return true;
    return false;
}

let cachedCurrentLocationLabel = '';
let cachedCurrentLocationAt = 0;

async function resolveCurrentLocationLabel() {
    const cacheTtlMs = 5 * 60 * 1000;
    if (cachedCurrentLocationLabel && (Date.now() - cachedCurrentLocationAt) < cacheTtlMs) {
        return cachedCurrentLocationLabel;
    }
    try {
        const position = await getCurrentPositionAsync({
            enableHighAccuracy: false,
            timeout: 9000,
            maximumAge: 300000
        });
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        const reverseResponse = await fetch(
            `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`,
            { headers: { 'User-Agent': 'JARVISAssistant/1.0' } }
        );
        if (!reverseResponse.ok) return '';
        const reverseData = await reverseResponse.json();
        const addr = reverseData?.address || {};
        const city = addr.city || addr.town || addr.municipality || addr.county || addr.village || addr.hamlet || '';
        const state = addr.state || '';
        const country = addr.country || '';
        const parts = [city, state, country].filter(Boolean);
        const label = parts.join(', ').trim();
        if (label) {
            cachedCurrentLocationLabel = label;
            cachedCurrentLocationAt = Date.now();
        }
        return label;
    } catch (_) {
        return '';
    }
}

async function enrichFuelQueryWithLocation(text) {
    const raw = String(text || '').trim();
    if (!isFuelPriceQuery(raw)) return raw;
    if (hasExplicitFuelLocation(raw)) return raw;
    const detectedLocation = await resolveCurrentLocationLabel();
    if (!detectedLocation) return raw;
    return `${raw} in ${detectedLocation}`;
}

function isMarketMoversQuery(text) {

    return /\b(gainer|gainers|loser|losers|top movers|biggest movers|market movers|top performing|best performing)\b/.test(t) &&

}

function formatVerifiedSourcesList(sources) {
    return (Array.isArray(sources) ? sources : [])
        .slice(0, 5)
        .map((item, i) => `${i + 1}. [${item.title}](${item.url})`)
        .join('\n');
}

function isAnswerEvidenceSource(item) {
    const sourceType = String(item?.sourceType || '').trim();
    if (!sourceType || /^(reference_lookup|archive_lookup|community_discussion)$/.test(sourceType)) return false;
    const title = String(item?.title || '').trim().toLowerCase();
    const url = String(item?.url || '').trim().toLowerCase();
    const domain = String(item?.domain || '').trim().toLowerCase();
    if (/search:|webcache|\/search(?:[/?#]|$)|[?&]q=/.test(`${title} ${url}`)) return false;
    if (/archive\.(today|ph|is)|webcache/.test(domain || url)) return false;
    if (sourceType === 'official_source' && !item?.pageFetched) return false;
    if (item?.evidenceLevel === 'structured_claim') return true;
    const description = String(item?.description || '').trim();
    return sourceType === 'official_source' || description.length >= 20;
}

async function buildVerifiedSearchSummary(query, options = {}) {
    const userQuery = String(query || '').trim();
    if (!userQuery) return null;

    try {
        const searchData = await fetchLiveSearchJson(userQuery, {
            maxResults: 8,
            answer: true
        });
        const results = Array.isArray(searchData?.results) ? searchData.results.filter(Boolean) : [];
        if (!results.length) return null;
        const answerResults = results.filter(isAnswerEvidenceSource);
        if (!answerResults.length) {
            const sourceLines = formatVerifiedSourcesList(results);
            return {
                text: `I found only lookup or discussion links for "${userQuery}", not an answer-bearing public source with the current value.\n\n${buildSourceMetaBlock(results)}\n\nSources:\n${sourceLines}`,
                summary: 'Live sources were lookup-only for this request.',
                badge: 'Lookup-only sources',
                error: true
            };
        }

        let summaryText = cleanLiveAnswerText(String(searchData?.answer || '').trim());
        const snippets = answerResults
            .slice(0, 6)
            .map((r, i) => `${i + 1}. ${r.title}\nSnippet: ${r.description}\nURL: ${r.url}`)
            .join('\n\n');

        if (!summaryText) try {
            const summaryResponse = await fetch('/api/chat-groq', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: `Answer the user's question using ONLY the snippets below.

User question: "${userQuery}"

Rules:
- Give a direct answer first.
- If the user asks for top/best/oldest/newest/largest or a numbered list, return a numbered list using only the snippets.
- Keep it concise and practical.
- Do not provide "how to search" instructions.
- If exact figures are uncertain, say what is clearly supported.

Snippets:
${snippets}`
                })
            });
            if (summaryResponse.ok) {
                const summaryData = await summaryResponse.json();
                summaryText = cleanLiveAnswerText(String(summaryData?.response || summaryData?.text || '').trim());
            }
        } catch (error) {}

        if (!summaryText || isVerificationRefusalText(summaryText)) {
            const fallbackLines = answerResults
                .slice(0, 3)
                .map((r, i) => `${i + 1}. ${r.title}${r.description ? ` - ${r.description}` : ''}`);
            summaryText = `I checked web sources and found these relevant results:\n${fallbackLines.join('\n')}`;
        }

        const sourceLines = formatVerifiedSourcesList(answerResults);
        const finalText = `${summaryText}\n\n${buildSourceMetaBlock(answerResults)}\n\nSources:\n${sourceLines}`;
        return {
            text: finalText,
            summary: options.summary || 'I checked live sources and summarized the result.',
            badge: options.badge || 'Verified live sources'
        };
    } catch (error) {
        return {
            text: String(error?.message || 'Live search failed before usable results were returned.'),
            summary: 'Live search is not available right now.',
            badge: 'Live search unavailable',
            error: true
        };
    }
}

async function parseJsonResponseSafely(response) {
    try {
        return await response.json();
    } catch (_) {
        return {};
    }
}

function formatLiveSearchFailureMessage(data = {}, status = 0) {
    if (data?.disabled) {
        return 'Live search is temporarily disabled.';
    }

    const error = String(data?.error?.code || data?.error?.message || data?.error || '').trim();
    const providerError = Array.isArray(data?.providerErrors) && data.providerErrors.length
        ? String(data.providerErrors[0]?.error || '').trim()
        : '';
    if (/not configured/i.test(error || providerError)) {
        return 'Live search is temporarily disabled.';
    }
    if (status === 402 || /not enough credits|quota|billing|payment/i.test(error || providerError)) {
        return 'Live search is temporarily disabled.';
    }
    if (status === 404) return 'Live search failed because /api/search was not found in this deployment.';
    if (status === 403 && /origin_not_allowed/i.test(error || providerError)) {
        return 'This deployment is blocking same-origin API calls. Add the site URL to CORS_ALLOWED_ORIGINS or allow same-origin requests.';
    }
    if (status === 401 || status === 403) return 'Live search failed because the public-source route rejected the request.';
    if (status === 429) return 'Live search is temporarily rate limited. Please retry shortly.';
    if (status >= 500) return `Live search provider failed${providerError || error ? `: ${providerError || error}` : '.'}`;
    if (error || providerError) return `Live search failed: ${providerError || error}`;
    return 'Live search failed before usable results were returned.';
}

async function fetchLiveSearchJson(query, options = {}) {
    const response = await fetch('/api/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        signal: options.signal,
        body: JSON.stringify({
            query,
            maxResults: options.maxResults || 8,
            answer: Boolean(options.answer),
            domain: options.domain || '',
            factType: options.factType || '',
            mustContain: Array.isArray(options.mustContain) ? options.mustContain : []
        })
    });
    const data = await parseJsonResponseSafely(response);
    if (!response.ok || data?.success === false) {
        const error = new Error(formatLiveSearchFailureMessage(data, response.status));
        error.status = response.status;
        error.data = data;
        throw error;
    }
    return data;
}

    const response = await fetch('/api/current-facts', {
        method: 'POST',

function getCurrentFactCacheKey(query) {

function getCachedCurrentFact(query) {

        const cached = JSON.parse(raw);
        if (!cached || Date.now() - Number(cached.cachedAt || 0) > 30 * 60 * 1000) return null;
        return cached.data || null;

        return null;

}

function setCachedCurrentFact(query, data) {

        localStorage.setItem(getCurrentFactCacheKey(query), JSON.stringify({
            cachedAt: Date.now(),
            data
        }));
    } catch (_) {}
}

function formatCurrentFactAnswer(data = {}) {
    const answer = String(data?.answer || '').trim();
    if (!answer) return '';
    const sources = Array.isArray(data?.sources) ? data.sources.filter(Boolean) : [];
    const sourceLines = sources
        .slice(0, 5)
        .map((item, i) => `${i + 1}. [${item.title || getDomainFromUrl(item.url || '') || 'Source'}](${item.url})`)
        .join('\n');
    const meta = [
        `As of: ${data?.asOf ? new Date(data.asOf).toLocaleString() : formatAsOfTimestamp()}`,

function processSuggestion(text) {

function detectPrimaryLocationFromText(text) {
    if (!text) return '';
    const normalized = String(text || '').trim();
    const patterns = [
        /\b(?:in|at|near|to|for)\s+([A-Za-z][A-Za-z\s,.-]{1,80})(?=$|[?.!,])/i,
        /\b(?:trip|itinerary|visit|travel|hotels?|restaurants?|food)\s+(?:to|in|for)\s+([A-Za-z][A-Za-z\s,.-]{1,80})(?=$|[?.!,])/i
    ];
    for (const pattern of patterns) {
        const match = normalized.match(pattern);
        if (match && match[1]) {
            return match[1].trim().replace(/[?.!,]$/, '');
        }
    }
    return '';
}

function isInvalidLocationCandidate(candidate) {
    const c = String(candidate || '').trim().toLowerCase();
    if (!c) return true;
    if (c.length < 2) return true;
    const blocked = [
        'there', 'here', 'somewhere', 'anywhere',
        'about', 'good', 'best', 'restaurants', 'restaurant',
        'hotels', 'hotel', 'food', 'trip', 'travel', 'place', 'places'
    ];
    if (blocked.includes(c)) return true;
    if (/\b(about|good|best|restaurant|restaurants|hotel|hotels|food|trip|travel)\b/i.test(c) && !/,/.test(c)) {
        return true;
    }
    return false;
}

function getLocationFromRecentContext() {
    const cachedLocation = lastResolvedTravelLocation || window.lastResolvedTravelLocation;
    if (cachedLocation && !isInvalidLocationCandidate(cachedLocation)) {
        return cachedLocation;
    }

    const recent = (conversationContext || []) 
        .filter(m => m && m.role === 'user') 
        .slice(-10) 
        .map(m => m.text || '') 
        .join(' '); 
    const matches = recent.match(/\b(?:in|at|near|to)\s+([A-Za-z][A-Za-z\s,.-]{1,80})/ig) || [];
    for (let i = matches.length - 1; i >= 0; i--) {
        const m = matches[i].match(/\b(?:in|at|near|to)\s+([A-Za-z][A-Za-z\s,.-]{1,80})/i);
        const loc = m?.[1]?.trim().replace(/[?.!,]$/, '');
        if (loc && !isInvalidLocationCandidate(loc)) {
            return loc;
        }
    }
    return ''; 
} 

function setLastResolvedTravelLocation(location) {
    const normalized = String(location || '').trim();
    if (!normalized || isInvalidLocationCandidate(normalized)) return;
    lastResolvedTravelLocation = normalized;
    window.lastResolvedTravelLocation = normalized;
}

function extractTravelLocationOrFallback(text) {
    const fromText = detectPrimaryLocationFromText(text);
    if (fromText && !isInvalidLocationCandidate(fromText)) return fromText;
    const fromContext = getLocationFromRecentContext();
    if (fromContext && !isInvalidLocationCandidate(fromContext)) return fromContext;
    return '';
}

async function buildTopPlaceSuggestions(type, location, userText = '') {
    if (!LIVE_RETRIEVAL_ENABLED) return null;

    const kind = String(type || '').toLowerCase();
    if (kind !== 'hotel') return null;
    const loc = String(location || '').trim();
    if (!loc) return null;

    const queryMap = {
        hotel: `best hotels in ${loc}`
    };
    const searchQuery = queryMap[kind];
    const web = await fetch('/api/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: searchQuery, maxResults: 8 })
    });
    if (!web.ok) return null;
    const data = await web.json();
    const results = Array.isArray(data?.results) ? data.results.filter(Boolean).slice(0, 6) : [];
    if (!results.length) return null;

    const lines = [];
    const heading = `[Hotel] Top hotel suggestions in ${loc}`;
    lines.push(heading, '');

    results.slice(0, 5).forEach((item, idx) => {
        const title = String(item?.title || '').trim();
        const desc = String(item?.description || '').replace(/\s+/g, ' ').trim();
        const url = String(item?.url || '').trim();
        if (!title) return;
        const shortDesc = desc ? ` - ${desc.slice(0, 160)}${desc.length > 160 ? '...' : ''}` : '';
        const sourceLine = url ? `\n   Source: ${url}` : '';
        lines.push(`${idx + 1}. ${title}${shortDesc}${sourceLine}`);
    });

    const mapsUrl = `https://www.google.com/maps/search/${encodeURIComponent(`hotels in ${loc}`)}`;
    lines.push('', `Map view: ${mapsUrl}`);
    return lines.join('\n');
}

function formatSourceLinksWithIcons(urls) {  
    return (urls || []).map((url) => {  
        let host = '';  
        let path = '';  
        let lowerUrl = String(url || '').toLowerCase();  
        try {  
            const parsed = new URL(url);  
            host = parsed.hostname;  
            path = parsed.pathname || '';  
            lowerUrl = parsed.href.toLowerCase();  
        } catch (e) {  
            host = '';  
        }  
 
        let displayName = host || url;  
        let logoDomain = host;  
 
        if (/reddit\.com/.test(lowerUrl)) {  
            displayName = 'Reddit';  
            logoDomain = 'reddit.com';  
        } else if ((/google\./.test(host) && /\/maps\//.test(path)) || /maps\.google\./.test(host)) {  
            displayName = 'Google Maps';  
            logoDomain = 'maps.google.com';  
        } else if (/tripadvisor/.test(lowerUrl)) {  
            displayName = 'TripAdvisor';  
            logoDomain = 'tripadvisor.com';  
        } else if (/google\./.test(host) && /\/search/.test(path)) {  
            displayName = 'Google Search';  
            logoDomain = 'google.com';  
        } else if (/openstreetmap|overpass/.test(lowerUrl)) {  
            displayName = 'OpenStreetMap';  
            logoDomain = 'openstreetmap.org';  
        }  
 
        const icon = logoDomain  
            ? `https://www.google.com/s2/favicons?domain=${encodeURIComponent(logoDomain)}&sz=16`  
            : '';  
        return `- <a href="${url}" target="_blank" rel="noopener" class="inline-flex items-center gap-2 text-purple-600 dark:text-purple-400 hover:text-purple-800 dark:hover:text-purple-300 underline"><img src="${icon}" alt="" width="16" height="16" style="display:inline-block;border-radius:3px;vertical-align:middle;">${displayName}</a>`;  
    }).join('\n');  
}  

function sanitizeHallucinatedTerrain(responseText, userText, resolvedLocationName = '') {
    if (!responseText) return responseText;
    const context = `${userText || ''} ${resolvedLocationName || ''}`.toLowerCase();
    const flatTownSignals = ['chidambaram'];
    const isFlatTownContext = flatTownSignals.some(s => context.includes(s));
    if (!isFlatTownContext) return responseText;

    const terrainPattern = /\b(hill|hills|trek|trekking|mountain|mountains|hike|hiking)\b/i;
    if (!terrainPattern.test(responseText)) return responseText;

    const safeLines = responseText
        .split('\n')
        .filter(line => !terrainPattern.test(line));

    safeLines.push('[Note] Chidambaram is generally flat. Prefer temple walks, local heritage spots, local bus/auto-rickshaws, or a car for comfort.');
    return safeLines.join('\n').trim();
}

async function geocodeLocationCandidates(query, limit = 5) {
    const q = String(query || '').trim();
    if (!q) return [];
    try {
        const url = `https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=${limit}&q=${encodeURIComponent(q)}`;
        const res = await fetch(url);
        if (!res.ok) return [];
        const data = await res.json();
        if (!Array.isArray(data)) return [];
        return data.map(item => {
            const addr = item.address || {};
            return {
                displayName: item.display_name || q,
                city: addr.city || addr.town || addr.village || addr.municipality || q,
                state: addr.state || '',
                country: addr.country || '',
                countryCode: (addr.country_code || '').toUpperCase(),
                type: item.type || '',
                importance: Number(item.importance || 0),
                lat: Number(item.lat),
                lon: Number(item.lon)
            };
        }).filter(Boolean);
    } catch (e) {
        return [];
    }
}

async function resolveLocationForTravel(rawLocation) {
    const input = String(rawLocation || '').trim();
    if (!input) return null;

    const hasQualifier = /,|\b(india|usa|us|united states|uk|england|canada|australia)\b/i.test(input);
    const candidates = await geocodeLocationCandidates(input, 6);
    if (!candidates.length) {
        return {
            cityName: input,
            fullLocation: input,
            countryCode: '',
            country: '',
            isMajorCity: false,
            isSmallTown: false
        };
    }

    const deduped = [];
    const seen = new Set();
    for (const c of candidates) {
        const key = `${(c.city || '').toLowerCase()}|${(c.state || '').toLowerCase()}|${(c.countryCode || '').toLowerCase()}`;
        if (seen.has(key)) continue;
        seen.add(key);
        deduped.push(c);
    }

    const countries = new Set(deduped.map(c => c.countryCode).filter(Boolean));
    if (!hasQualifier && countries.size > 1) {
        return { needsClarification: true, options: deduped.slice(0, 5), rawInput: input };
    }

    const best = deduped[0];
    const type = (best.type || '').toLowerCase();
    const isSmallTown = ['village', 'hamlet', 'suburb', 'town'].includes(type) || best.importance < 0.45;
    const majorCityList = [
        'chennai', 'bangalore', 'bengaluru', 'delhi', 'mumbai', 'kolkata', 'hyderabad',
        'new york', 'los angeles', 'chicago', 'san francisco', 'seattle', 'boston',
        'london', 'paris', 'tokyo', 'singapore', 'dubai', 'toronto', 'sydney'
    ];
    const isMajorCity = majorCityList.some(c => (best.city || '').toLowerCase().includes(c)) || (!isSmallTown && best.importance >= 0.55);

    const parts = [best.city, best.state, best.country].filter(Boolean);
    return {
        cityName: best.city || input,
        fullLocation: parts.join(', ') || input,
        state: best.state || '',
        countryCode: best.countryCode,
        country: best.country,
        isMajorCity,
        isSmallTown
    };
}

        category = 'scientist';

    };

async function buildMotivationStoryFromWeb(userText) {
    if (!LIVE_RETRIEVAL_ENABLED) return '';

    const profile = extractMotivationStoryProfile(userText);
    const queryByCategory = {
        scientist: 'real life motivational scientist story invention impact',
        business: 'real life motivational founder story company revenue turnover',
        athlete: 'real life motivational athlete comeback story earnings',
        creative: 'real life motivational artist story success journey earnings',
        general: 'real life motivational success story verified profile net worth or company revenue'
    };
    const primaryQuery = `${queryByCategory[profile.category]} ${String(userText || '').trim()}`.trim();
    const secondaryQuery = queryByCategory[profile.category];

    const collected = [];
    async function fetchSearchResults(query) {
        const res = await fetch('/api/search', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query, maxResults: 10 })
        });
        if (!res.ok) return [];
        const data = await res.json();
        return Array.isArray(data?.results) ? data.results.filter(Boolean) : [];
    }

    const first = await fetchSearchResults(primaryQuery);
    collected.push(...first);
    if (collected.length < 5) {
        const second = await fetchSearchResults(secondaryQuery);
        collected.push(...second);
    }

    const deduped = [];
    const seen = new Set();
    for (const item of collected) {
        const key = String(item?.url || '').trim().toLowerCase();
        if (!key || seen.has(key)) continue;
        seen.add(key);
        deduped.push(item);
        if (deduped.length >= 8) break;
    }
    if (!deduped.length) return '';

    const snippetBlock = deduped
        .map((r, i) => `${i + 1}. ${r.title}\nSnippet: ${r.description}\nURL: ${r.url}`)
        .join('\n\n');

    const prompt = `Create ONE real-life motivation story from the snippets below for a user who feels down.

Output format:
Who: <person name and role>
What happened: <struggle or challenge>
What they did: <actions and turning point>
Outcome: <achievement>
Numbers now: <if alive business/founder include current earnings/net worth/company turnover or revenue if present in sources; if unavailable say "Not clearly reported in the cited snippets". If deceased/scientist, include measurable impact and key invention/discovery instead of current earnings.>
Lesson: <short motivating takeaway>

Rules:
- Use ONLY facts supported by snippets.
- Do not invent numbers, companies, dates, or titles.
- Prefer one concrete person over generic advice.
- Keep it concise and practical.

User request: "${String(userText || '').trim()}"
Requested category: ${profile.category}
Requested deceased profile: ${profile.requestedDeadPerson ? 'yes' : 'no'}
Requested financial stats: ${profile.requestedFinancials ? 'yes' : 'no'}

Snippets:
${snippetBlock}`;

    const response = await fetch('/api/chat-groq', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            message: prompt
        })
    });
    if (!response.ok) return '';
    const data = await response.json();
    const story = cleanLiveAnswerText(String(data?.response || data?.text || '').trim());
    if (!story) return '';

    const sources = formatLiveSourceLinks(deduped, 4);
    return `${story}\n\nSources:\n${sources}`;
}

function parseGenericIntentModifierSet(text) {
    const t = String(text || '').toLowerCase();
    const modifiers = new Set();
    if (/\b(latest|new|newest|recent|current|most recent|upcoming)\b/.test(t)) modifiers.add('latest');
    if (/\b(top|best|popular|hit|hits)\b/.test(t)) modifiers.add('top');
    if (/\b(recommend|suggest|suggestion|recommendation)\b/.test(t)) modifiers.add('recommend');
    if (/\b(play|youtube|spotify)\b/.test(t)) modifiers.add('play');
    if (/\b(explain|what is|who is|who was|tell me about|define|meaning of)\b/.test(t)) modifiers.add('explain');
    if (/\b(search|look up|lookup|web|internet|with sources|check online)\b/.test(t)) modifiers.add('search');
    const yearMatches = t.match(/\b(?:19|20)\d{2}\b/g) || [];
    yearMatches.forEach(year => modifiers.add(year));
    extractRequestedMusicLanguages(t).forEach(lang => modifiers.add(lang));
    return Array.from(modifiers);
}

function detectGenericIntentDomain(text) {
    const raw = String(text || '');
    const t = raw.toLowerCase();
    if (GENERIC_INTENT_DOMAIN_WORDS.weather.test(raw)) return 'weather';
    if (GENERIC_INTENT_DOMAIN_WORDS.news.test(raw)) return 'news';
    if (GENERIC_INTENT_DOMAIN_WORDS.songs.test(raw)) return 'songs';
    if (GENERIC_INTENT_DOMAIN_WORDS.movie.test(raw)) return 'movie';
    if (GENERIC_INTENT_DOMAIN_WORDS.place.test(raw)) return 'place';
    if (GENERIC_INTENT_DOMAIN_WORDS.person.test(raw) || /^(who is|who was)\b/.test(t)) return 'person';
    return 'general';
}

function detectGenericIntentAction(text, domain, modifiers) {
    const t = String(text || '').toLowerCase();
    const mods = new Set(modifiers || []);
    if (mods.has('play')) return 'play';
    if (mods.has('recommend')) return 'recommend';
    if (mods.has('search')) return 'search';
    if ((domain === 'songs' || domain === 'movie') && mods.has('latest')) return 'latest';
    if (mods.has('explain') || /^(who is|who was|what is|tell me about|define|meaning of)\b/.test(t)) return 'explain';
    if (mods.has('top')) return 'top';
    if (mods.has('latest')) return 'latest';
    if (domain === 'songs' || domain === 'movie') return 'recommend';
    return 'explain';
}

function cleanGenericIntentSubject(candidate, domain = 'general') {
    let value = normalizeGenericIntentText(candidate)
        .replace(/^(?:can|could|would)\s+you\s+/i, ' ')
        .replace(/^(?:tell|show|give|list|find|search|look\s+up|lookup|check|recommend|suggest|play)\s+(?:me\s+)?/i, ' ')
        .replace(/^(?:what\s+is|what's|who\s+is|who's|who\s+was|tell\s+me\s+about|define|meaning\s+of)\s+/i, ' ')
        .replace(/\b(?:please|pls|for me|right now|now)\b/gi, ' ')
        .replace(/\b(?:by|of|from|for|about)\s*$/gi, ' ')
        .replace(/\s+/g, ' ')
        .trim();

    const domainWords = domain === 'songs'
        ? /\b(?:latest|new|newest|recent|current|most recent|top|best|popular|song|songs|track|tracks|music|playlist|hit|hits|album|albums|single|singles|composer|singer)\b/gi
        : domain === 'movie'
            ? /\b(?:latest|new|newest|recent|current|most recent|upcoming|top|best|popular|movie|movies|film|films|release|releases|actor|actress|director|producer)\b/gi
            : /\b(?:latest|new|newest|recent|current|most recent|top|best|popular)\b/gi;

    value = value
        .replace(domainWords, ' ')
        .replace(/\b(?:of|by|from|for|about|the|a|an)\b/gi, ' ')
        .replace(/\b(?:one|two|three|four|five|six|seven|eight|nine|ten|eleven|twelve|\d{1,2})\b/gi, ' ')
        .replace(/\s+/g, ' ')
        .trim();

    const tokens = value.split(/\s+/).filter(Boolean);
    const filtered = tokens.filter(token => !GENERIC_INTENT_COMMAND_WORDS.has(token.toLowerCase()));
    const cleaned = (filtered.length ? filtered : tokens).join(' ').trim();
    if (!cleaned || cleaned.length < 2 || cleaned.length > 100) return '';
    if (/^(song|songs|movie|movies|film|films|latest|top|best|new|recent)$/i.test(cleaned)) return '';
    return cleaned;
}

function extractGenericIntentSubject(text, domain) {
    const raw = normalizeGenericIntentText(text);
    if (!raw) return '';

    const subjectPatterns = domain === 'songs' ? [
        /\b(?:latest|new|newest|recent|current|most recent|top|best|popular)?\s*(?:\d{1,2})?\s*(?:song|songs|track|tracks|music|playlist|hit|hits|album|albums|single|singles)\s+(?:of|by|from)\s+([^?.!,;]+)$/i,
        /\b(?:latest|new|newest|recent|current|most recent|top|best|popular)\s+([^?.!,;]+?)\s+(?:song|songs|track|tracks|music|playlist|hit|hits|album|albums|single|singles)\b/i,
        /\b([^?.!,;]+?)\s+(?:latest|new|newest|recent|current|most recent|top|best|popular)?\s*(?:song|songs|track|tracks|music|playlist|hit|hits|album|albums|single|singles)\b/i
    ] : domain === 'movie' ? [
        /\b(?:latest|new|newest|recent|current|most recent|upcoming|top|best|popular)?\s*(?:movie|movies|film|films|release|releases)\s+(?:of|by|from)\s+([^?.!,;]+)$/i,
        /\b(?:latest|new|newest|recent|current|most recent|upcoming)\s+([^?.!,;]+?)\s+(?:movie|movies|film|films|release|releases)\b/i,
        /\b([^?.!,;]+?)\s+(?:latest|new|newest|recent|current|most recent|upcoming)\s+(?:movie|movies|film|films|release|releases)\b/i
    ] : [
        /^(?:who is|who was|what is|tell me about|define|meaning of)\s+([^?.!,;]+)$/i,
        /\b(?:about|on)\s+([^?.!,;]+)$/i
    ];

    for (const pattern of subjectPatterns) {
        const match = raw.match(pattern);
        if (match?.[1]) {
            const cleaned = cleanGenericIntentSubject(match[1], domain);
            if (cleaned) return cleaned;
        }
    }

    return cleanGenericIntentSubject(raw, domain);
}

function parseGenericUserIntent(text) {
    const raw = String(text || '').trim();
    if (!raw) {
        return { raw, intent: 'explain', domain: 'general', subject: '', modifiers: [], count: null, confidence: 0, route: 'model' };
    }

    const normalized = normalizeGenericIntentText(raw);
    const domain = detectGenericIntentDomain(normalized);
    const modifiers = parseGenericIntentModifierSet(normalized);
    const intent = detectGenericIntentAction(normalized, domain, modifiers);
    const subject = extractGenericIntentSubject(normalized, domain);
    const count = extractRequestedQuantity(normalized, null, 1, 30);
    const hasDomain = domain !== 'general';
    const hasSubject = Boolean(subject);
    const hasActionSignal = modifiers.length > 0 || /^(who is|who was|what is|tell me about|define|meaning of)\b/i.test(normalized);
    const confidence = Math.max(0, Math.min(1, (hasDomain ? 0.35 : 0) + (hasSubject ? 0.45 : 0) + (hasActionSignal ? 0.2 : 0)));
    const route = domain === 'songs' && intent === 'latest'
        ? 'live_music'
        : domain === 'songs'
            ? 'music_catalog'
            : domain === 'movie' && intent === 'latest'
                ? 'live_entertainment'
                : domain === 'person'
                    ? 'entity_profile'
                    : intent === 'search'
                        ? 'web_search'
                        : 'model';

    return {
        raw,
        normalized,
        intent,
        domain,
        subject,
        modifiers,
        count,
        confidence,
        route
    };
}

function detectGenreFromText(text) {
    const t = String(text || '').toLowerCase();
    const knownGenres = [
        'action', 'comedy', 'romance', 'thriller', 'horror', 'crime', 'mystery',
        'sci-fi', 'science fiction', 'fantasy', 'drama', 'family', 'animation',
        'adventure', 'historical', 'biography', 'documentary', 'sports', 'war',
        'musical', 'slice of life'
    ];
    for (const genre of knownGenres) {
        const re = new RegExp(`\\b${genre.replace(/\s+/g, '\\s+')}\\b`, 'i');
        if (re.test(t)) return genre;
    }
    return '';
}

function extractScreenSuggestionIntent(text) {

    if (/\b(series|show|web series)\b/.test(t)) typeMatches.push('series');
    if (/\b(movie|film)\b/.test(t)) typeMatches.push('movie');
    const type = typeMatches.length ? typeMatches.join(', ') : 'movie/series';

    const langMatch = t.match(/\b(tamil|hindi|telugu|kannada|malayalam|english|korean|japanese|spanish|french|german|chinese)\b/i);
    if (langMatch && langMatch[1]) language = langMatch[1].toLowerCase();

    return { type, language, genre };
}

// New generic quantity extraction function
function extractRequestedQuantity(text, defaultCount = 5, min = 1, max = 20) {
    const raw = String(text || '').trim().toLowerCase();
    const wordToNum = {
        one: 1, two: 2, three: 3, four: 4, five: 5, six: 6,
        seven: 7, eight: 8, nine: 9, ten: 10, eleven: 11, twelve: 12,
        thirteen: 13, fourteen: 14, fifteen: 15, sixteen: 16, seventeen: 17,
        eighteen: 18, nineteen: 19, twenty: 20
    };

    // More flexible regex to capture numbers before or after keywords
    const quantityRegex = /(?:(?:top|best|suggest|recommend|give|show|list|tell me|how many|number of)\s+(?:a\s+|an\s+)?(?:about\s+)?(\d{1,2}|one|two|three|four|five|six|seven|eight|nine|ten|eleven|twelve|thirteen|fourteen|fifteen|sixteen|seventeen|eighteen|nineteen|twenty)\b)|(?:(\d{1,2}|one|two|three|four|five|six|seven|eight|nine|ten|eleven|twelve|thirteen|fourteen|fifteen|sixteen|seventeen|eighteen|nineteen|twenty)\s+(?:top|best|songs?|facts?|items?|things?|places?|tips?|ways?|reasons?|steps?|ideas?))/i;

    const match = raw.match(quantityRegex);
    let extractedNum = null;

    if (match) {
        // Check both capturing groups for the number
        const rawCount = match[1] || match[2];
        if (rawCount) {
            extractedNum = /^\d+$/.test(rawCount) ? Number(rawCount) : (wordToNum[rawCount] || null);
        }
    }

    if (extractedNum === null || !Number.isFinite(extractedNum)) {
        return defaultCount;
    }

    return Math.max(min, Math.min(max, extractedNum));
}

function isClassicSongDiscoveryRequest(text) {

}

function parseClassicSongDiscoveryIntent(text) {
    const t = String(text || '').toLowerCase();

    const languages = [];

    let hasAnyLanguageMention = false;

    if (/\b(tamil|tamizh)\b/.test(t)) {
        hasAnyLanguageMention = true;
        languages.push('tamil');
    }
    if (/\b(hindi|bollywood)\b/.test(t)) {

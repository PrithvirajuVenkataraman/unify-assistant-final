function getDomainSourcePolicy(domain) {
    const aliases = {
        finance: 'companies_finance',
        tech: 'companies_finance',
        science: 'space_science',
        space: 'space_science',
        entertainment: 'entertainment'
    };
    const key = aliases[String(domain || 'general').toLowerCase()] || String(domain || 'general').toLowerCase();
    return DOMAIN_SOURCE_POLICIES[key] || DOMAIN_SOURCE_POLICIES.general;
}

function domainMatchesPolicy(domain, list) {
    return Array.isArray(list) && list.some(d => domain === d || domain.endsWith(`.${d}`));
}

function isGovernmentHost(domain) {
    const host = String(domain || '').toLowerCase();
    if (!host) return false;
    return (
        /\.gov(?:\.|$)/.test(host) ||
        /\.gob(?:\.|$)/.test(host) ||
        /\.gouv(?:\.|$)/.test(host) ||
        host.endsWith('.gc.ca') ||
        host.endsWith('.canada.ca') ||
        host.endsWith('.govt.nz') ||
        host.endsWith('.bund.de') ||
        host.endsWith('.europa.eu') ||
        host.endsWith('.un.org')
    );
}

function isTrustedLiveSource(url) {
    const domain = getDomainFromUrl(url);
    if (!domain) return false;
    return Object.values(DOMAIN_SOURCE_POLICIES).some(policy => domainMatchesPolicy(domain, policy.trustedDomains));
}

function scoreSourcePolicy(url, domain) {
    const host = getDomainFromUrl(url);
    const policy = getDomainSourcePolicy(domain);
    if (!host) return 0;
    if (String(domain || '').toLowerCase() === 'politics' && isGovernmentHost(host)) return 6;
    if (domainMatchesPolicy(host, policy.preferredDomains)) return 7;
    if (domainMatchesPolicy(host, policy.trustedDomains)) return 4;
    if (domainMatchesPolicy(host, DOMAIN_SOURCE_POLICIES.general.trustedDomains)) return 2;
    return 0;
}

function extractResultPublishedDate(result) {
    const title = String(result?.title || '');
    const description = String(result?.description || '');
    const combined = `${title} ${description}`;

    const textual = combined.match(/\b(January|February|March|April|May|June|July|August|September|October|November|December)\s+\d{1,2},\s+\d{4}\b/i);
    if (textual) {
        const parsed = Date.parse(textual[0]);
        if (Number.isFinite(parsed)) return new Date(parsed);
    }

    const ymd = combined.match(/\b(20\d{2})[-\/.](0?[1-9]|1[0-2])[-\/.](0?[1-9]|[12]\d|3[01])\b/);
    if (ymd) {
        const parsed = Date.parse(`${ymd[1]}-${String(ymd[2]).padStart(2, '0')}-${String(ymd[3]).padStart(2, '0')}`);
        if (Number.isFinite(parsed)) return new Date(parsed);
    }

    const mdy = combined.match(/\b(0?[1-9]|1[0-2])[-\/.](0?[1-9]|[12]\d|3[01])[-\/.](20\d{2})\b/);
    if (mdy) {
        const parsed = Date.parse(`${mdy[3]}-${String(mdy[1]).padStart(2, '0')}-${String(mdy[2]).padStart(2, '0')}`);
        if (Number.isFinite(parsed)) return new Date(parsed);
    }

    const yearOnly = combined.match(/\b(20\d{2})\b/);
    if (yearOnly) {
        const parsed = Date.parse(`${yearOnly[1]}-01-01`);
        if (Number.isFinite(parsed)) return new Date(parsed);
    }

    return null;
}

function computeRecencyScore(result, queryText = '') {
    const lowerQuery = String(queryText || '').toLowerCase();
    const wantsFresh = /\b(latest|recent|current|today|now|upcoming|new|newest|most recent)\b/.test(lowerQuery);
    if (!wantsFresh) return 0;

    const published = extractResultPublishedDate(result);
    if (!published) return 0;
    const ageDays = Math.max(0, (Date.now() - published.getTime()) / (1000 * 60 * 60 * 24));
    if (ageDays <= 7) return 5;
    if (ageDays <= 30) return 4;
    if (ageDays <= 90) return 3;
    if (ageDays <= 180) return 2;
    if (ageDays <= 365) return 1;
    return -1;
}

function rankSourcesByPolicy(results, domain, queryText = '') {
    const tokens = String(queryText || '')
        .toLowerCase()
        .replace(/[^a-z0-9\s]/g, ' ')
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 12);

    return [...(Array.isArray(results) ? results : [])]
        .map((item, index) => {
            const title = String(item?.title || '').toLowerCase();
            const description = String(item?.description || '').toLowerCase();
            const overlap = tokens.reduce((acc, token) => acc + (title.includes(token) || description.includes(token) ? 1 : 0), 0);
            const recency = computeRecencyScore(item, queryText);
            return {
                ...item,
                __policyScore: scoreSourcePolicy(item?.url, domain) + overlap + recency - (index * 0.01),
                __recencyScore: recency
            };
        })
        .sort((a, b) => b.__policyScore - a.__policyScore)
        .map(({ __policyScore, __recencyScore, ...item }) => item);
}

function buildLiveSearchQueries(userText, intent = null) {
    const raw = String(userText || '').trim();
    const liveIntent = intent || extractLiveQueryIntent(raw);
    const cleaned = raw
        .replace(/\b(what(?:'s| is)? happening|latest|recent|current|today|right now|as of now|update(?:s)? on|status of)\b/gi, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    const topic = liveIntent.topic || cleaned || raw;
    const expandedTopic = expandKnownQueryAliases(topic);

    if (liveIntent.domain === 'sports' && liveIntent.directFact) {
        const sportSources = 'ESPN Cricbuzz ESPNcricinfo ICC FIFA UEFA NBA NFL ATP WTA Formula 1 Olympics';
        const isIplQuery = /\b(ipl|indian premier league)\b/i.test(raw);
        const explicitRoleMatch = raw.match(/\b(ceo|founder|president|prime minister|captain|coach|chairman|chairperson|governor|mayor)\b/i);
        const explicitRole = explicitRoleMatch?.[1] ? explicitRoleMatch[1].toLowerCase() : '';
        const factHintMap = {
            winner: 'winner champion final result',
            score: 'score result live score',
            stats: 'stats record numbers',
            standings: 'standings points table rankings table',
            qualification: 'qualified eliminated standings',
            role: explicitRole ? `current ${explicitRole} official squad team sheet` : 'current role official team'
        };
        const factHints = factHintMap[liveIntent.factType] || (explicitRole ? `current ${explicitRole} official team` : 'result latest');
        const seasonHint = liveIntent.year || '';
        const baseQueries = [
            raw,
            `${topic} ${seasonHint} ${factHints}`.replace(/\s+/g, ' ').trim(),
            `${topic} ${factHints}`.replace(/\s+/g, ' ').trim(),
            `${topic} ${seasonHint} ${sportSources}`.replace(/\s+/g, ' ').trim(),
            `${topic} official ${factHints}`.replace(/\s+/g, ' ').trim(),
            explicitRole ? `${topic} ${seasonHint} ${explicitRole} site:iplt20.com`.replace(/\s+/g, ' ').trim() : '',
            explicitRole ? `${topic} ${seasonHint} ${explicitRole} site:espncricinfo.com`.replace(/\s+/g, ' ').trim() : '',
            expandedTopic && expandedTopic.toLowerCase() !== topic.toLowerCase() ? `${expandedTopic} ${seasonHint} ${factHints}`.replace(/\s+/g, ' ').trim() : '',
            expandedTopic && expandedTopic.toLowerCase() !== topic.toLowerCase() ? `${expandedTopic} official ${factHints}`.replace(/\s+/g, ' ').trim() : ''
        ];
        if (isIplQuery) {
            baseQueries.unshift(
                'latest IPL match result score Cricbuzz ESPNcricinfo',
                'IPL latest match score result today iplt20',
                'Indian Premier League latest match result score',
                'site:iplt20.com IPL latest match result',
                'site:espncricinfo.com IPL latest match result',
                'site:cricbuzz.com IPL latest match result'
            );
        }
        return Array.from(new Set(baseQueries.filter(Boolean)));
    }

    if (liveIntent.domain === 'entertainment' && liveIntent.factType === 'latest_work') {
        const subject = extractLatestWorkSubject(raw) || topic;
        const medium = detectLatestWorkMedium(raw);
        const currentYear = new Date().getFullYear();
        const latestHint = medium === 'song'
            ? 'latest song latest release discography'
            : medium === 'album'
                ? 'latest album latest release discography'
                : 'latest film latest movie most recent release filmography';
        return Array.from(new Set([
            raw,
            `${subject} ${currentYear} ${latestHint}`.replace(/\s+/g, ' ').trim(),
            `${subject} ${latestHint}`.replace(/\s+/g, ' ').trim(),
            `${subject} imdb ${latestHint}`.replace(/\s+/g, ' ').trim(),
            `${subject} wikipedia ${medium === 'movie' ? 'filmography' : 'discography'}`.replace(/\s+/g, ' ').trim(),
            expandedTopic && expandedTopic.toLowerCase() !== topic.toLowerCase()
                ? `${expandedTopic} ${latestHint}`.replace(/\s+/g, ' ').trim()
                : ''
        ].filter(Boolean)));
    }

    return [
        raw,
        `latest ${topic}`,
        `${topic} Reuters OR AP OR BBC OR Al Jazeera`
    ];
}

    let timeframe = '';
    if (/\b(current|currently|now|today|latest|present)\b/.test(lower)) timeframe = 'current';
    else if (/\b(all time|overall|in total|total)\b/.test(lower)) timeframe = 'all_time';

        if (['winner', 'score', 'stats', 'standings', 'qualification', 'known_for', 'role'].includes(liveFactType)) {

    const matched = UNIVERSAL_ENTITY_RELATION_PATTERNS.find((pattern) => pattern.test(lower));

function detectNormalizedEntityDomain(text, relationType, liveIntent = null) {
    if (liveIntent?.domain === 'sports') return 'sports';
    if (liveIntent?.domain === 'finance') return 'companies_finance';
    if (liveIntent?.domain === 'tech') return 'companies_finance';
    if (liveIntent?.domain === 'politics') return 'politics';
    if (liveIntent?.domain === 'space_science') return 'space_science';
    if (liveIntent?.domain === 'entertainment') return 'entertainment';
    const lower = normalizeEntitySearchText(text);
    for (const [domainKey, pack] of Object.entries(UNIVERSAL_ENTITY_DOMAIN_PACKS)) {
        if (pack.keywords.test(lower) || pack.entityHints.test(lower)) {
            return domainKey;
        }
    }
    if (relationType === 'party_membership') return 'politics';
    if (relationType === 'team_membership' || relationType === 'title_count' || relationType === 'winner' || relationType === 'score' || relationType === 'standings' || relationType === 'qualification') return 'sports';
    if (relationType === 'price') return 'companies_finance';
    if (relationType === 'latest_work') return 'entertainment';
    if (relationType === 'known_for') {
        if (/\b(artist|poet|painter|writer|author|novelist|playwright|sculptor|composer|lyricist)\b/.test(lower)) return 'arts_literature';
        if (/\b(actor|actress|director|producer|movie|film|song|album|show|series)\b/.test(lower)) return 'entertainment';
        if (/\b(scientist|astronaut|space|nasa|isro|esa|jaxa|physics|chemistry|biology)\b/.test(lower)) return 'space_science';
    }
    if (relationType === 'role') {
        if (/\b(university|college|school|institute|campus|faculty|department|program|msis|mba|phd)\b/.test(lower)) return 'general';
        if (/\b(president|prime minister|pm|chief minister|cm|minister|governor|mayor|senator|mp|mla|party|government|parliament)\b/.test(lower)) return 'politics';
        if (/\b(ceo|founder|chairman|chairperson|company|organization|corporation|startup|firm|stock|market)\b/.test(lower)) return 'companies_finance';
        if (/\b(astronaut|scientist|agency|administrator|director general|space|nasa|isro|esa|jaxa)\b/.test(lower)) return 'space_science';

    }
    return 'general';
}

function extractLatestWorkSubject(text) {

    const patterns = [

        /\b(?:latest|recent|new|newest|most recent|current|upcoming|future)\s+([^?.!,]+?)\s+(?:movie|film|release|song|album|single|show|series|project)\b/i

    for (const pattern of patterns) {

            return match[1]

                .replace(/\s+/g, ' ')

function extractRoleQueryParts(text) {
    const raw = String(text || '').trim();
    if (!raw) {
        return { roleLabel: '', targetEntity: '' };
    }

    const normalizeRoleLabel = (value) => {
        const role = String(value || '').trim().toLowerCase();
        if (role === 'pm') return 'prime minister';
        if (role === 'cm') return 'chief minister';
        return role;
    };
    const roleAlternatives = 'ceo|founder|president|prime minister|pm|chief minister|cm|captain|coach|chairman|chairperson|governor|mayor|head|leader|administrator|director general';
    const rolePatterns = [
        new RegExp(`\\b(?:who is|who was|what is)\\s+(?:the\\s+)?(?:current\\s+)?(${roleAlternatives})\\s+of\\s+(.+?)\\s*\\??$`, 'i'),
        new RegExp(`\\b(?:current\\s+)?(${roleAlternatives})\\s+of\\s+(.+?)\\s*\\??$`, 'i'),
        new RegExp(`\\b(?:who is|who was|what is)\\s+(?:the\\s+)?(?:current\\s+)?(${roleAlternatives})\\s+([A-Za-z][A-Za-z0-9&.\\-\\s]{2,80})\\s*\\??$`, 'i'),
        new RegExp(`\\bwho is\\s+(.+?)\\s+(${roleAlternatives})\\s*\\??$`, 'i'),
        /\bwho heads?\s+(.+?)\s*\??$/i
    ];

    for (const pattern of rolePatterns) {
        const match = raw.match(pattern);
        if (match?.[1] && match?.[2]) {
            const first = String(match[1]).trim().toLowerCase();
            const second = String(match[2]).trim();
            const roleFirst = new RegExp(`^(${roleAlternatives})$`, 'i').test(first);
            const rawTarget = (roleFirst ? second : match[1]).replace(/[?.!,;]+$/g, '').trim();
            const cleanedTarget = rawTarget
                .replace(/\b(?:in|for)\s+(?:the\s+)?(ipl|psl|bbl|cpl|isl|pkl|ucl|uel|epl|nba|nfl|mlb|nhl|icc|fifa|uefa|world cup|olympics|formula 1|f1)(?:\s+\d{4})?\b.*$/i, '')
                .replace(/\b(19|20)\d{2}\b/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();
            return {
                roleLabel: normalizeRoleLabel(roleFirst ? first : second),
                targetEntity: cleanedTarget || rawTarget
            };
        }
        if (match?.[1] && /who heads?/i.test(pattern.source)) {
            return {
                roleLabel: 'head',
                targetEntity: String(match[1]).replace(/[?.!,;]+$/g, '').trim()
            };
        }
    }

    return { roleLabel: '', targetEntity: '' };
}
 
function extractEntitySubject(text, relationType, liveIntent = null) { 
    const raw = String(text || '').trim();
    const competition = extractEntityCompetition(raw, liveIntent);
    const roleParts = relationType === 'role' ? extractRoleQueryParts(raw) : { targetEntity: '' };
    if (roleParts.targetEntity) {
        return roleParts.targetEntity;
    }
    if (relationType === 'latest_work') {
        const parsedLatestSubject = extractLatestWorkSubject(raw);
        if (parsedLatestSubject) return parsedLatestSubject;
    }
    const patterns = [
        /\bhow many\b[\w\s]*?\b(?:titles|cups|trophies|championships|wins)\b\s+(?:did|do|has|have)\s+(.+?)\s+(?:win|won|have|has)\b/i,
        /\b(?:what is|which is|tell me|show me)\s+(?:the\s+)?(?:latest|recent|new|newest|most recent|current|upcoming)\s+(?:movie|film|release|song|album|single|show|series)\s+(?:of|from|by)\s+(?:actor|actress|director|producer|singer)?\s*([^?.!,]+)\??$/i,
        /\b(?:latest|recent|new|newest|most recent|current|upcoming)\s+(?:movie|film|release|song|album|single|show|series)\s+(?:of|from|by)\s+(?:actor|actress|director|producer|singer)?\s*([^?.!,]+)\??$/i,
        /\bwho is\b\s+(.+?)\s*\??$/i,
        /\bwho was\b\s+(.+?)\s*\??$/i,
        /\bwhat is\b\s+(.+?)\s*\??$/i,
        /\bwhich team does\b\s+(.+?)\s+(?:play|plays)\s+for\b/i,
        /\bwhat team does\b\s+(.+?)\s+(?:play|plays)\s+for\b/i,
        /\bwhich party does\b\s+(.+?)\s+belong to\b/i,
        /\bwhat party does\b\s+(.+?)\s+belong to\b/i,
        /\bwho is the\b\s+(.+?)\s+of\b/i,
        /\bwhat is the\b\s+(.+?)\s+of\b/i,
        /\b(.+?)\s+(?:current team|current party|role|position|profession|job)\b/i,
        /\b(?:of|for)\s+(.+?)\s*\??$/i
    ];

    for (const pattern of patterns) {
        const match = raw.match(pattern);
        if (match?.[1]) {
            return match[1].replace(/[?.!,;]+$/g, '').trim();
        }
    }

    let subject = raw
        .replace(/\b(who|what|which|how many|tell me|show me|give me|do you know|can you tell me|could you tell me|would you tell me)\b/gi, ' ')
        .replace(/\b(current|latest|recent|new|newest|most recent|upcoming|total|number of|how many|won|win|wins|titles?|cups?|troph(?:y|ies)|championships?|stats?|record|records|score|scores|standings|rankings?|table|points|party|affiliation|team|role|position|office|profession|player|players|politician|politicians|astronaut|astronauts|scientist|scientists|ceo|founder|president|prime minister|pm|chief minister|cm|movie|film|release|song|album|single|show|series|actor|actress|director|producer|singer|for|in|of|the|a|an|which|does|did|has|have|is|was)\b/gi, ' ')
        .replace(/\s+/g, ' ')
        .trim();

    if (competition) {
        const escapedCompetition = competition.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        subject = subject.replace(new RegExp(`\\b${escapedCompetition}\\b`, 'ig'), ' ').replace(/\s+/g, ' ').trim();
    }

    if (!subject && liveIntent?.topic) {
        subject = liveIntent.topic;
    }

    if (relationType === 'winner' && liveIntent?.topic) {
        subject = liveIntent.topic;
    }

    if (relationType === 'latest_work') {
        subject = String(subject || '')
            .replace(/\b(actor|actress|director|producer|singer|composer|music director)\b/gi, ' ')
            .replace(/\b(tamil|hindi|telugu|kannada|malayalam|bollywood|kollywood|tollywood)\b/gi, ' ')
            .replace(/\s+/g, ' ')
            .trim();
        const possessiveMatch = subject.match(/^([A-Za-z][A-Za-z.'-]{1,})(?:'s)\b/i);
        if (possessiveMatch?.[1]) {
            subject = possessiveMatch[1].trim();
        } else {
            subject = subject.replace(/'s\b/gi, '').trim();
        }
    }

    return subject || raw;
} 
 
function buildStructuredEntityRecord(text, liveIntent = null) { 
    const raw = String(text || '').trim(); 
    const relationType = detectEntityRelationType(raw, liveIntent); 
    const domain = detectNormalizedEntityDomain(raw, relationType, liveIntent); 
    const entityType = detectEntityType(raw, relationType, domain); 
    const roleParts = relationType === 'role' ? extractRoleQueryParts(raw) : { roleLabel: '', targetEntity: '' };
    const subject = extractEntitySubject(raw, relationType, liveIntent); 
    const competition = extractEntityCompetition(raw, liveIntent);
    const timeframe = extractEntityTimeframe(raw, liveIntent);
    return { 
        raw, 
        domain, 
        relationType, 
        entityType, 
        subject, 
        roleLabel: roleParts.roleLabel,
        targetEntity: roleParts.targetEntity,
        year: timeframe.year, 
        timeframe: timeframe.timeframe,
        factType: liveIntent?.factType || relationType, 
        competition, 
        directFact: Boolean(liveIntent?.directFact || relationType !== 'general'),
        isEntityFact: Boolean(subject && relationType !== 'general' && domain !== 'general')
    }; 
} 

function classifyUniversalEntityIntent(text, liveIntent = null) {
    const record = buildStructuredEntityRecord(text, liveIntent || extractLiveQueryIntent(text));
    const lower = normalizeEntitySearchText(text);
    const domainPack = UNIVERSAL_ENTITY_DOMAIN_PACKS[record.domain];
    const hasDomainSignal = Boolean(domainPack && (domainPack.keywords.test(lower) || domainPack.entityHints.test(lower)));
    const hasRelationSignal = record.relationType !== 'general';
    const subjectLooksReal = Boolean(record.subject && record.subject !== record.raw && record.subject.split(/\s+/).length <= 12);
    record.isEntityFact = Boolean(
        record.directFact &&
        hasRelationSignal &&
        (hasDomainSignal || subjectLooksReal || record.domain !== 'general')
    );
    return record;
}

function extractUniversalEntityIntent(text, liveIntent = null) {
    return classifyUniversalEntityIntent(text, liveIntent || extractLiveQueryIntent(text));
}

function getOfficialCompanySourceHints(subject) {
    const s = normalizeEntitySearchText(subject);
    if (!s) return [];

    const map = [
        { match: /\bgoogle|alphabet\b/, domains: ['abc.xyz', 'blog.google'] },
        { match: /\bamazon\b/, domains: ['aboutamazon.com', 'amazon.com'] },
        { match: /\bmeta|facebook\b/, domains: ['about.meta.com', 'investor.atmeta.com'] },
        { match: /\bmicrosoft\b/, domains: ['news.microsoft.com', 'microsoft.com'] },
        { match: /\bapple\b/, domains: ['apple.com', 'investor.apple.com'] },
        { match: /\bnvidia\b/, domains: ['nvidia.com', 'investor.nvidia.com'] },
        { match: /\btesla\b/, domains: ['tesla.com', 'ir.tesla.com'] }
    ];

    const hit = map.find(item => item.match.test(s));
    if (!hit) return [];
    return hit.domains.map(domain => `site:${domain}`);
}

function buildUniversalEntityQueries(userText, liveIntent = null) { 
    const entityIntent = extractUniversalEntityIntent(userText, liveIntent); 
    const subject = entityIntent.subject || userText; 
    const expandedSubject = expandKnownQueryAliases(subject); 
    const roleTarget = entityIntent.targetEntity || subject;
    const roleLabel = entityIntent.roleLabel || 'role';
    const competition = entityIntent.competition || '';
    const competitionExpanded = competition ? expandKnownQueryAliases(competition) : '';
    const subjectWithCompetition = [subject, competition, entityIntent.year].filter(Boolean).join(' ').trim();
    const expandedSubjectWithCompetition = [expandedSubject, competitionExpanded || competition, entityIntent.year].filter(Boolean).join(' ').trim();
    const relationHints = { 
        title_count: 'total titles total cups total trophies championships all time record', 
        latest_work: 'latest film latest movie most recent release filmography imdb wikipedia',
        team_membership: 'current team club franchise belongs to plays for', 
        party_membership: 'current party political party affiliation belongs to party', 
        role: 'current role position office profession designation', 
        known_for: 'known for notable works achievements biography profile',
        stats: 'latest stats record numbers official profile',
        winner: 'winner champion final result official',
        score: 'score result official live score',
        standings: 'standings rankings table points table official',
        qualification: 'qualified eliminated standings official',
        general: 'official profile current information'
    };
    const relationHint = relationHints[entityIntent.relationType] || relationHints.general; 
    const sourceBias = getDomainSourcePolicy(entityIntent.domain).preferredDomains.join(' ') || 'official Reuters AP BBC'; 
    const officialCompanyHints = entityIntent.domain === 'companies_finance'
        ? getOfficialCompanySourceHints(subject).join(' ')
        : '';
    const officialDomainHints = entityIntent.domain === 'politics'
        ? 'official government source Reuters AP BBC Wikipedia Wikidata Britannica'
        : entityIntent.domain === 'space_science'
            ? 'site:nasa.gov OR site:isro.gov.in OR site:esa.int OR site:jaxa.jp OR Reuters'
            : entityIntent.domain === 'arts_literature'
                ? 'site:britannica.com OR site:wikipedia.org OR site:moma.org OR site:tate.org.uk'
                : entityIntent.domain === 'entertainment'
                    ? 'site:imdb.com OR site:wikipedia.org OR Reuters'
                    : '';
    const politicalRole = entityIntent.relationType === 'role' && /\b(president|prime minister|pm|governor|mayor|minister|chief minister|cm)\b/.test(roleLabel);
 
    return Array.from(new Set([ 
        userText, 
        entityIntent.relationType === 'role' && entityIntent.targetEntity ? `${roleLabel} of ${roleTarget}` : '',
        entityIntent.relationType === 'role' && entityIntent.targetEntity ? `${roleTarget} ${roleLabel}` : '',
        entityIntent.relationType === 'role' && entityIntent.targetEntity ? `${roleTarget} current ${roleLabel} official` : '',
        politicalRole && entityIntent.targetEntity ? `${roleTarget} official government ${roleLabel}` : '',
        politicalRole && entityIntent.targetEntity ? `${roleTarget} ${roleLabel} official government source` : '',
        politicalRole && entityIntent.targetEntity ? `${roleTarget} ${roleLabel} Reuters OR AP OR BBC` : '',
        `${subjectWithCompetition} ${relationHint}`.replace(/\s+/g, ' ').trim(), 
        `${subjectWithCompetition} ${entityIntent.timeframe || ''} ${relationHint} ${sourceBias}`.replace(/\s+/g, ' ').trim(), 
        officialCompanyHints ? `${subjectWithCompetition} ${relationHint} ${officialCompanyHints}`.replace(/\s+/g, ' ').trim() : '',
        officialDomainHints ? `${subjectWithCompetition} ${relationHint} ${officialDomainHints}`.replace(/\s+/g, ' ').trim() : '',
        expandedSubject && expandedSubject.toLowerCase() !== subject.toLowerCase() 
            ? `${expandedSubjectWithCompetition} ${relationHint}`.replace(/\s+/g, ' ').trim() 
            : '', 
        expandedSubject && expandedSubject.toLowerCase() !== subject.toLowerCase() 
            ? `${expandedSubjectWithCompetition} ${entityIntent.timeframe || ''} ${relationHint} ${sourceBias}`.replace(/\s+/g, ' ').trim() 
            : '' 
    ].filter(Boolean))); 
} 

function normalizeAgreementValue(value) {
    return normalizeEntitySearchText(value).replace(/\b(the|a|an)\b/g, ' ').replace(/\s+/g, ' ').trim();
}

function getEntitySubjectTokens(subject) {
    return normalizeEntitySearchText(String(subject || '').replace(/'s\b/gi, ' '))
        .split(' ')
        .map(token => token.trim())
        .filter(Boolean)
        .filter(token => !/^(actor|actress|director|producer|singer|composer|movie|film|show|series|latest|recent|new|current|tamil|hindi|telugu|kannada|malayalam)$/.test(token));
}

function sourceMatchesEntitySubject(result, entityIntent) {
    const relationType = String(entityIntent?.relationType || '');
    const subjectTokens = getEntitySubjectTokens(entityIntent?.subject || '');
    if (!subjectTokens.length) return true;

    const textTokens = new Set(
        normalizeEntitySearchText(`${String(result?.title || '')} ${String(result?.description || '')}`)
            .split(' ')
            .map(token => token.trim())
            .filter(Boolean)
    );

    const isSportsRole = relationType === 'role' && String(entityIntent?.domain || '').toLowerCase() === 'sports';
    if (isSportsRole) {
        const subjectVariants = [
            entityIntent?.subject || '',
            expandKnownQueryAliases(entityIntent?.subject || ''),
            entityIntent?.targetEntity || '',
            expandKnownQueryAliases(entityIntent?.targetEntity || '')
        ]
            .map(value => normalizeEntitySearchText(value))
            .filter(Boolean)
            .filter((value, index, arr) => arr.indexOf(value) === index);
        if (!subjectVariants.length) return true;

        const textNormalized = normalizeEntitySearchText(`${String(result?.title || '')} ${String(result?.description || '')}`);
        if (subjectVariants.some(variant => variant && textNormalized.includes(variant))) {
            return true;
        }

        const variantTokens = Array.from(new Set(subjectVariants.flatMap(v => v.split(' ').filter(Boolean))));
        const acronymHit = variantTokens.some(token => token.length <= 4 && textTokens.has(token));
        if (acronymHit) return true;

        const genericTeamTerms = new Set(['team', 'club', 'league', 'super', 'kings', 'royals', 'united', 'city', 'fc']);
        const strongHits = variantTokens
            .filter(token => token.length >= 4 && !genericTeamTerms.has(token))
            .filter(token => textTokens.has(token))
            .length;
        return strongHits >= 2;
    }

    const requiresStrictPersonMatch = entityIntent?.entityType === 'profession_person' || relationType === 'latest_work' || relationType === 'role';
    if (requiresStrictPersonMatch) {
        const exactHits = subjectTokens.filter(token => textTokens.has(token));
        return exactHits.length >= Math.min(subjectTokens.length, 2) || exactHits.length >= 1;
    }

    return subjectTokens.some(token => textTokens.has(token));
}

function escapeRegexLiteral(value) {
    return String(value || '').replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function hasLatestWorkEvidence(result, entityIntent = null) {
    const medium = detectLatestWorkMedium(entityIntent?.raw || '');
    const mediumPattern = medium === 'song'
        ? /\b(song|single|track|music|release)\b/i
        : medium === 'album'
            ? /\b(album|ep|record|release)\b/i
            : medium === 'show'
                ? /\b(show|series|episode|streaming|release)\b/i
                : medium === 'project'
                    ? /\b(project|upcoming|announced|release)\b/i
                    : /\b(film|movie|cinema|release|released|upcoming)\b/i;
    const text = `${String(result?.title || '')} ${String(result?.description || '')}`;
    if (!text.trim()) return false;
    return /\b(latest|recent|new|newest|upcoming|future|release|released|announced)\b/i.test(text) || mediumPattern.test(text);
}

function extractProperNameCandidates(text) {
    const raw = String(text || '');
    if (!raw.trim()) return [];
    const matches = raw.match(/\b[A-Z][A-Za-z.'-]*(?:\s+[A-Z][A-Za-z.'-]*){0,3}\b/g) || [];
    return matches
        .map(value => String(value || '').trim())
        .filter(Boolean);
}

function pickRolePersonCandidate(combinedText, roleLabel = '') {
    const text = String(combinedText || '');
    if (!text.trim()) return '';

    const normalizedRole = String(roleLabel || '').trim().toLowerCase();
    const rolePattern = normalizedRole
        ? new RegExp(`\\b${escapeRegexLiteral(normalizedRole)}\\b`, 'i')
        : /\b(?:ceo|founder|president|prime minister|captain|coach|chairman|chairperson|governor|mayor|head|leader|administrator|director general)\b/i;
    if (!rolePattern.test(text)) return '';

    const candidates = extractProperNameCandidates(text)
        .filter(isLikelyPersonNameCandidate);
    if (!candidates.length) return '';

    const roleMatch = text.match(rolePattern);
    const roleIndex = roleMatch?.index ?? -1;
    if (roleIndex < 0) return candidates[0];

    let best = '';
    let bestScore = -1;
    for (const candidate of candidates) {
        const candidateIndex = text.indexOf(candidate);
        if (candidateIndex < 0) continue;
        const distance = Math.abs(candidateIndex - roleIndex);
        const directionalBoost = candidateIndex < roleIndex ? 6 : 5;
        const score = Math.max(0, 60 - Math.min(distance, 60)) + directionalBoost;
        if (score > bestScore) {
            best = candidate;
            bestScore = score;
        }
    }
    return best;
}

function isLikelyLatestWorkTitleCandidate(candidate, subject, sourceTitle = '') {
    const rawCandidate = String(candidate || '').trim();
    if (!rawCandidate) return false;

    const candidateNorm = normalizeAgreementValue(rawCandidate);
    const subjectNorm = normalizeAgreementValue(subject || '');
    const titleText = String(sourceTitle || '');
    if (!candidateNorm) return false;
    if (subjectNorm && (candidateNorm === subjectNorm || candidateNorm.includes(subjectNorm))) return false;
    if (/\b(imdb|wikipedia|wiki|biography|filmography|discography|official)\b/i.test(rawCandidate)) return false;
    if (/\b(latest|recent|new|upcoming|current|movie|film|song|album|show|series|project)\b/i.test(rawCandidate)) return false;
    if (titleText) {
        const headingPattern = new RegExp(`^\\s*${escapeRegexLiteral(rawCandidate)}\\s*[-|:]\\s*(wikipedia|imdb|wiki|biography|profile|official)\\b`, 'i');
        if (headingPattern.test(titleText)) return false;
    }
    if (rawCandidate.split(/\s+/).length < 1 || rawCandidate.split(/\s+/).length > 10) return false;
    return true;
}

function isDegenerateLatestWorkAnswer(answer, entityIntent) {
    if (entityIntent?.relationType !== 'latest_work') return false;
    const normalizedAnswer = normalizeAgreementValue(answer || '');
    const normalizedSubject = normalizeAgreementValue(entityIntent?.subject || '');
    if (!normalizedAnswer || !normalizedSubject) return false;
    if (!normalizedAnswer.includes(normalizedSubject)) return false;
    return /\b(latest|recent|current|upcoming)\s+(movie|film|song|album|show|series|project)\b/.test(normalizedAnswer);
}

function extractFactCandidate(result, entityIntent) { 
    const combined = `${result?.title || ''} ${result?.description || ''}`.replace(/\s+/g, ' ').trim(); 
    if (!combined) return ''; 
 
    if (entityIntent.relationType === 'title_count') { 
        const countMatch = combined.match(/\b(\d+)\b[^\n.]{0,35}\b(titles?|cups?|troph(?:y|ies)|championships?)\b/i); 
        return countMatch ? countMatch[1] : ''; 
    } 

    if (entityIntent.relationType === 'latest_work') {
        const subject = normalizeEntitySearchText(entityIntent.subject);
        const sourceTitle = String(result?.title || '');
        const titleFirstPatterns = [
            /\b(?:latest|recent|new|upcoming|current|future)\s+(?:movie|film|release|song|album|single|show|series|project)\s+(?:is|was|:)\s*([A-Z][A-Za-z0-9:&'().,\-]+(?:\s+[A-Z0-9][A-Za-z0-9:&'().,\-]+){0,6})/i,
            /\b(?:starring|stars in|release of|titled|title is)\s+([A-Z][A-Za-z0-9:&'().,\-]+(?:\s+[A-Z0-9][A-Za-z0-9:&'().,\-]+){0,6})/i,
            /["â€œ]([A-Z][A-Za-z0-9:&'().,\-]+(?:\s+[A-Z0-9][A-Za-z0-9:&'().,\-]+){0,6})["â€][^.]{0,40}\b(?:film|movie|song|album|series|project|release)\b/i
        ];
        for (const pattern of titleFirstPatterns) {
            const match = combined.match(pattern);
            if (match?.[1]) {
                const candidate = match[1].trim();
                if (isLikelyLatestWorkTitleCandidate(candidate, entityIntent.subject, sourceTitle) &&
                    (!subject || !normalizeEntitySearchText(candidate).includes(subject))) {
                    return candidate;
                }
            }
        }
        const subjectLeadPattern = new RegExp(`\\b${subject.replace(/[.*+?^${}()|[\\]\\\\]/g, '\\$&')}\\b[^.]{0,40}\\b(?:latest|recent|new|current|upcoming|future)\\s+(?:movie|film|release|song|album|single|show|series|project)\\b[^A-Za-z0-9]{0,10}([A-Z][A-Za-z0-9:&'().,\\-]+(?:\\s+[A-Z0-9][A-Za-z0-9:&'().,\\-]+){0,6})`, 'i');
        const subjectLeadMatch = combined.match(subjectLeadPattern);
        if (subjectLeadMatch?.[1]) {
            const candidate = subjectLeadMatch[1].trim();
            return isLikelyLatestWorkTitleCandidate(candidate, entityIntent.subject, sourceTitle) ? candidate : '';
        }
        return '';
    }
 
    if (entityIntent.relationType === 'winner') { 
        const winnerMatch = combined.match(/\b([A-Z][A-Za-z0-9&.\-\s]{2,60})\b\s+(?:won|wins|beat|beats|defeated|defeats|are champions|is champion|clinched|lifted)/); 
        if (winnerMatch) return winnerMatch[1].trim(); 
        const championMatch = combined.match(/\bchampions?:?\s*([A-Z][A-Za-z0-9&.\-\s]{2,60})/i); 
        return championMatch ? championMatch[1].trim() : ''; 
    } 
 
    if (entityIntent.relationType === 'score') {
        const scoreMatch = combined.match(/\b(\d{1,3}\s*[-/]\s*\d{1,3}(?:[-/]\d{1,3})?)\b/);
        return scoreMatch ? scoreMatch[1].replace(/\s+/g, '') : '';
    }

    if (entityIntent.relationType === 'stats') {
        const statMatch = combined.match(/\b(\d+(?:\.\d+)?)\b[^\n.]{0,25}\b(runs|goals|wickets|points|assists|wins|medals|average)\b/i);
        return statMatch ? `${statMatch[1]} ${statMatch[2].toLowerCase()}` : '';
    }

    if (entityIntent.relationType === 'standings' || entityIntent.relationType === 'qualification') {
        const standingMatch = combined.match(/\b(?:rank(?:ed|ing)?|position|standing|qualified|eliminated)\b[:\s-]*([A-Za-z0-9 .#\-]{1,40})/i);
        return standingMatch ? standingMatch[1].trim() : '';
    }

    if (entityIntent.relationType === 'team_membership') { 
        const match = combined.match(/\b(?:plays for|play for|joined|signs? with|signed with|current team is)\s+([A-Z][A-Za-z0-9&.\-\s]{2,60})/i); 
        return match ? match[1].trim() : ''; 
    } 
 
    if (entityIntent.relationType === 'party_membership') {
        const match = combined.match(/\b(?:belongs to|member of|party(?: affiliation)?(?: is)?|from)\s+([A-Z][A-Za-z0-9&.\-\s]{2,60})/i);
        return match ? match[1].trim() : '';
    }

    if (entityIntent.relationType === 'known_for') {
        const knownForMatch = combined.match(/\b(?:known for|famous for|best known for)\s+([A-Za-z0-9 ,&.'\-]{6,140})/i);
        if (knownForMatch?.[1]) {
            return knownForMatch[1].trim().replace(/\s+/g, ' ');
        }
        const workMatch = combined.match(/\b(?:notable works?|major works?|notable achievements?)\s*[:\-]?\s*([A-Za-z0-9 ,&.'\-]{6,140})/i);
        return workMatch?.[1] ? workMatch[1].trim().replace(/\s+/g, ' ') : '';
    }

    if (entityIntent.relationType === 'role') {
        const roleWord = entityIntent.roleLabel
            ? entityIntent.roleLabel.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')
            : '(?:ceo|founder|president|prime minister|captain|coach|chairman|chairperson|governor|mayor|head|leader|administrator|director general)';
        const personPatterns = [
            new RegExp(`\\b([A-Z][A-Za-z.'-]+(?:\\s+[A-Z][A-Za-z.'-]+){0,3})\\b\\s+(?:is|serves as|was appointed as|works as)\\s+(?:the\\s+)?(?:current\\s+)?${roleWord}\\b`, 'i'),
            new RegExp(`\\b(?:current\\s+)?${roleWord}\\b[^A-Za-z]{0,12}([A-Z][A-Za-z.'-]+(?:\\s+[A-Z][A-Za-z.'-]+){0,3})\\b`, 'i'),
            new RegExp(`\\b([A-Z][A-Za-z.'-]+(?:\\s+[A-Z][A-Za-z.'-]+){0,3})\\b[^.]{0,40}\\b${roleWord}\\s+of\\s+`, 'i'),
            new RegExp(`\\b([A-Z][A-Za-z.'-]+(?:\\s+[A-Z][A-Za-z.'-]+){0,3})\\b\\s*,\\s*(?:the\\s+)?${roleWord}\\b`, 'i'),
            new RegExp(`\\b([A-Z][A-Za-z.'-]+(?:\\s+[A-Z][A-Za-z.'-]+){0,3})\\b[^.]{0,30}\\b(?:India(?:'s|s)?|of\\s+[A-Z][A-Za-z]+)\\s+${roleWord}\\b`, 'i')
        ];
        for (const pattern of personPatterns) {
            const match = combined.match(pattern);
            if (match?.[1]) {
                const candidate = match[1].trim();
                if (isLikelyPersonNameCandidate(candidate)) return candidate;
            }
        }
        const fallbackCandidate = pickRolePersonCandidate(combined, entityIntent.roleLabel || '');
        if (fallbackCandidate) return fallbackCandidate;
        return '';
    }

    if (entityIntent.relationType === 'price') {
        const match = combined.match(/\b(?:price|rate|market cap|valuation|trading at|closed at)\b[:\s-]*([$--?]?\s?\d+(?:[.,]\d+)?(?:\s?(?:billion|million|trillion|%))?)/i);
        return match ? match[1].trim() : '';
    }

    return '';
}

function buildSourceAgreement(results, entityIntent) {
    const votes = new Map();
    for (const item of Array.isArray(results) ? results : []) {
        let candidateRaw = extractFactCandidate(item, entityIntent);
        if (!candidateRaw && isPoliticalLeadershipRoleIntent(entityIntent)) {
            const combined = `${String(item?.title || '')}. ${String(item?.description || '')}`.replace(/\s+/g, ' ').trim();
            candidateRaw = extractLeadershipRoleCandidateFromText(combined, entityIntent);
        }
        if (
            entityIntent?.relationType === 'role' &&
            String(entityIntent?.domain || '').toLowerCase() === 'sports' &&
            !isLikelyPersonNameCandidate(candidateRaw)
        ) {
            continue;
        }
        const candidate = normalizeAgreementValue(candidateRaw);
        if (!candidate) continue;
        const current = votes.get(candidate) || { value: String(candidateRaw || '').trim(), count: 0, sources: [] };
        current.count += 1;
        current.sources.push(item);
        votes.set(candidate, current);
    }

    const rankedVotes = Array.from(votes.values()).sort((a, b) => {
        const aTrusted = a.sources.reduce((acc, item) => acc + scoreSourcePolicy(item?.url, entityIntent.domain), 0);
        const bTrusted = b.sources.reduce((acc, item) => acc + scoreSourcePolicy(item?.url, entityIntent.domain), 0);
        const aRecent = Math.max(...a.sources.map(src => extractResultPublishedDate(src)?.getTime() || 0), 0);
        const bRecent = Math.max(...b.sources.map(src => extractResultPublishedDate(src)?.getTime() || 0), 0);
        if (b.count !== a.count) return b.count - a.count;
        if (entityIntent?.relationType === 'latest_work' && bRecent !== aRecent) return bRecent - aRecent;
        return bTrusted - aTrusted;
    });

    const top = rankedVotes[0] || null;
    return {
        top,
        mixed: rankedVotes.length > 1 && top && rankedVotes[1].count === top.count,
        agreed: Boolean(top && top.count >= 2 && !(rankedVotes[1] && rankedVotes[1].count === top.count))
    };
}

function isLikelyPersonNameCandidate(value) {
    const text = String(value || '').trim();
    if (!text) return false;
    if (text.length < 3 || text.length > 50) return false;
    if (/\d/.test(text)) return false;
    if (/\b(team|squad|season|players?|list|captaincy|coach|role|official|news|update|latest|current|franchise|club|league|ipl)\b/i.test(text)) return false;
    const parts = text.split(/\s+/).filter(Boolean);
    if (!parts.length || parts.length > 4) return false;
    if (!parts.every(part => /^[A-Za-z.'-]+$/.test(part))) return false;

    const lowerParts = parts.map(part => part.toLowerCase());
    const blockedNameWords = new Set([
        'he', 'she', 'they', 'them', 'his', 'her', 'their',
        'says', 'said', 'will', 'would', 'could', 'should',
        'give', 'gives', 'giving', 'gave',
        'announced', 'announce', 'unveiled', 'appointed', 'named',
        'about', 'after', 'before', 'during', 'under',
        'this', 'that', 'these', 'those',
        'from', 'with', 'without', 'into', 'onto',
        'lsg', 'csk', 'rcb', 'mi', 'kkr', 'rr', 'dc', 'pbks', 'srh', 'gt',
        'super', 'kings', 'indians', 'riders', 'royals', 'titans', 'giants',
        'warriors', 'strikers', 'thunder', 'heat', 'capitals', 'knights',
        'united', 'city', 'club', 'team', 'franchise', 'fc', 'sc', 'cf'
    ]);
    if (lowerParts.some(word => blockedNameWords.has(word))) return false;
    if (parts.length === 1 && /^[A-Z]{2,4}$/.test(parts[0])) return false;

    const allowedParticles = new Set(['de', 'da', 'del', 'della', 'di', 'van', 'von', 'bin', 'ibn', 'al']);
    const hasUppercaseToken = parts.some(part => /[A-Z]/.test(part));
    if (!hasUppercaseToken) return false;
    if (!parts.every((part, index) => {
        const lower = part.toLowerCase();
        if (allowedParticles.has(lower) && index > 0 && index < parts.length - 1) return true;
        return /^[A-Z][a-z.'-]*$/.test(part) || /^[A-Z]{2,4}$/.test(part) || /^[A-Z]\.$/.test(part);
    })) return false;

    // Keep to realistic person-name length while allowing initials.
    const longTokens = parts.filter(part => part.length >= 3).length;
    if (longTokens === 0) return false;
    return true;
}

function expandSingleTokenPersonNameFromSources(name, sources) {
    const raw = String(name || '').trim();
    const parts = raw.split(/\s+/).filter(Boolean);
    if (parts.length !== 1) return raw;

    const surname = parts[0];
    if (!/^[A-Z][a-z.'-]{2,}$/.test(surname)) return raw;

    const pattern = new RegExp(`\\b([A-Z][a-z.'-]{1,20})\\s+${escapeRegexLiteral(surname)}\\b`, 'g');
    const voteMap = new Map();
    for (const item of Array.isArray(sources) ? sources : []) {
        const text = `${String(item?.title || '')} ${String(item?.description || '')}`;
        if (!text.trim()) continue;
        const matches = text.matchAll(pattern);
        for (const match of matches) {
            const full = `${match[1]} ${surname}`.trim();
            if (!isLikelyPersonNameCandidate(full)) continue;
            voteMap.set(full, (voteMap.get(full) || 0) + 1);
        }
    }
    if (!voteMap.size) return raw;

    const ranked = Array.from(voteMap.entries()).sort((a, b) => b[1] - a[1]);
    return ranked[0]?.[0] || raw;
}

function isTemporarySportsRoleContext(result, roleLabel = '') {
    const combined = `${String(result?.title || '')} ${String(result?.description || '')}`.toLowerCase();
    if (!combined.trim()) return false;

    const normalizedRole = String(roleLabel || '').toLowerCase();
    const roleScopedRisk = /\b(captain|captaincy|coach)\b/.test(normalizedRole);
    const replacementSignals = /\b(injury|injured|injury-hit|ruled out|out injured|steps? in|stepping in|stand[-\s]?in|acting|interim|temporary|takes over|took over|replaces|replacement|fills in|cover for|deputy|vice[-\s]?captain)\b/.test(combined);
    if (!replacementSignals) return false;
    if (!roleScopedRisk) return true;
    return /\b(captain|captaincy|coach)\b/.test(combined);
}

function getSportsRoleContextScore(result, entityIntent, targetYear = 0) {
    const combined = `${String(result?.title || '')} ${String(result?.description || '')}`.toLowerCase();
    if (!combined.trim()) return -3;

    const competition = String(entityIntent?.competition || '').toLowerCase();
    const roleLabel = String(entityIntent?.roleLabel || '').toLowerCase();
    let score = 0;

    if (competition) {
        if (combined.includes(competition)) score += 3;
        if (/\bipl\b/.test(competition) && /\bipl\b/.test(combined)) score += 3;
    }

    if (roleLabel && combined.includes(roleLabel)) score += 2;
    if (/\b(current|confirmed|official|named|announced)\b/.test(combined)) score += 1;
    if (isTemporarySportsRoleContext(result, roleLabel)) score -= 4;

    if (targetYear) {
        if (new RegExp(`\\b${targetYear}\\b`).test(combined)) score += 2;
        if (new RegExp(`\\b${targetYear - 1}\\b`).test(combined)) score -= 1;
    }

    return score;
}

function selectBestSportsRoleCandidate(results, entityIntent, intent = null) {
    const relation = String(entityIntent?.relationType || '').toLowerCase();
    const domain = String(entityIntent?.domain || '').toLowerCase();
    if (relation !== 'role' || domain !== 'sports') return null;

    const voteMap = new Map();
    const targetYear = Number(intent?.year || entityIntent?.year || new Date().getFullYear() || 0);
    const sample = (Array.isArray(results) ? results : []).slice(0, 8);

    for (const item of sample) {
        if (isTemporarySportsRoleContext(item, entityIntent?.roleLabel || '')) continue;
        const candidateRaw = String(extractFactCandidate(item, entityIntent) || '').trim();
        if (!isLikelyPersonNameCandidate(candidateRaw)) continue;

        const key = normalizeAgreementValue(candidateRaw);
        if (!key) continue;

        const trusted = scoreSourcePolicy(item?.url, entityIntent.domain);
        const contextScore = getSportsRoleContextScore(item, entityIntent, targetYear);
        if (contextScore < -2) continue;
        const published = extractResultPublishedDate(item);
        const publishedYear = published?.getFullYear?.() || 0;
        const yearBoost = targetYear && publishedYear === targetYear ? 1 : 0;
        const yearPenalty = targetYear && publishedYear && publishedYear < targetYear - 1 ? -1 : 0;
        const score = 1 + trusted + contextScore + yearBoost + yearPenalty;

        const existing = voteMap.get(key) || {
            value: candidateRaw,
            count: 0,
            score: 0,
            trustedScore: 0,
            contextScore: 0,
            sources: []
        };
        existing.count += 1;
        existing.score += score;
        existing.trustedScore += trusted;
        existing.contextScore += contextScore;
        existing.sources.push(item);
        voteMap.set(key, existing);
    }

    const ranked = Array.from(voteMap.values()).sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        if (b.count !== a.count) return b.count - a.count;
        if (b.contextScore !== a.contextScore) return b.contextScore - a.contextScore;
        return b.trustedScore - a.trustedScore;
    });

    const top = ranked[0] || null;
    if (!top) return null;

    const hasTrustedEvidence = top.trustedScore >= 4;
    const hasSeasonContext = Boolean(
        intent?.year ||
        entityIntent?.year ||
        entityIntent?.competition
    );
    const topHasPreferredSource = (Array.isArray(top.sources) ? top.sources : [])
        .some(item => scoreSourcePolicy(item?.url, entityIntent.domain) >= 7);
    const topMentionsTargetYear = !targetYear || (Array.isArray(top.sources) ? top.sources : [])
        .some(item => new RegExp(`\\b${targetYear}\\b`).test(`${String(item?.title || '')} ${String(item?.description || '')}`));

    // Allow a single preferred trusted source for explicit season queries, while staying fail-closed for vague queries.
    const singleSourceSeasonOverride =
        top.count === 1 &&
        hasSeasonContext &&
        topHasPreferredSource &&
        topMentionsTargetYear;
    const enoughEvidence = hasTrustedEvidence && top.contextScore >= 0 && (top.count >= 2 || top.trustedScore >= 8 || singleSourceSeasonOverride);
    if (!enoughEvidence) return null;

    const normalizedValue = expandSingleTokenPersonNameFromSources(top.value, top.sources);
    return {
        value: normalizedValue,
        sources: top.sources.slice(0, 4),
        confidence: top.count >= 2 && top.trustedScore >= 8 ? 'high' : 'medium'
    };
}

function normalizePersonVariant(value) {
    return String(value || '')
        .toLowerCase()
        .replace(/\b(actor|actress|director|producer|singer|composer|music director|filmography|movies?|films?)\b/g, ' ')
        .replace(/[^a-z0-9\s]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
}

function extractNamedVariantsFromText(text, anchorToken) {
    const raw = String(text || '');
    const token = String(anchorToken || '').trim().toLowerCase();
    if (!raw || !token) return [];

    const matches = raw.match(/\b[A-Z][A-Za-z.'-]*(?:\s+[A-Z][A-Za-z.'-]*){0,3}\b/g) || [];
    return matches
        .map(name => String(name || '').trim())
        .filter(Boolean)
        .filter(name => {
            const norm = normalizePersonVariant(name);
            if (!norm) return false;
            const tokens = norm.split(' ').filter(Boolean);
            if (!tokens.length || tokens.length > 4) return false;
            if (!tokens.includes(token)) return false;
            if (/\b(wikipedia|imdb|rotten tomatoes|official)\b/i.test(name)) return false;
            return true;
        });
}

function detectEntityIdentityAmbiguity(results, entityIntent) {
    const relationType = String(entityIntent?.relationType || '');
    const subjectRaw = String(entityIntent?.subject || '').trim();
    const subjectNorm = normalizePersonVariant(subjectRaw);
    if (!subjectNorm) return { isAmbiguous: false, variants: [] };

    const subjectTokens = subjectNorm.split(' ').filter(Boolean);
    const singleTokenSubject = subjectTokens.length === 1;
    const anchorToken = subjectTokens[0] || '';
    const likelyPersonEntity = entityIntent?.entityType === 'profession_person' || entityIntent?.domain === 'entertainment';
    const ambiguitySensitiveRelation = relationType === 'latest_work' || relationType === 'role' || relationType === 'stats' || relationType === 'general';
    if (!likelyPersonEntity || !ambiguitySensitiveRelation || !singleTokenSubject || !anchorToken) {
        return { isAmbiguous: false, variants: [] };
    }

    const variantStats = new Map();
    for (const item of Array.isArray(results) ? results : []) {
        const text = `${String(item?.title || '')}. ${String(item?.description || '')}`;
        const variants = extractNamedVariantsFromText(text, anchorToken);
        for (const variant of variants) {
            const key = normalizePersonVariant(variant);
            if (!key) continue;
            const prev = variantStats.get(key) || { value: variant, count: 0 };
            prev.count += 1;
            if (variant.length > prev.value.length) prev.value = variant;
            variantStats.set(key, prev);
        }
    }

    const rankedVariants = Array.from(variantStats.values())
        .filter(v => v.count >= 1)
        .sort((a, b) => b.count - a.count || b.value.length - a.value.length);

    const distinct = rankedVariants
        .map(v => normalizePersonVariant(v.value))
        .filter(Boolean);
    const uniqueDistinct = Array.from(new Set(distinct));

    if (uniqueDistinct.length <= 1) return { isAmbiguous: false, variants: rankedVariants };

    const hasExactSubjectOnly = uniqueDistinct.includes(subjectNorm) && uniqueDistinct.length === 2;
    const hasDifferentFullName = uniqueDistinct.some(v => v !== subjectNorm && v.split(' ').length >= 2);
    if (!hasDifferentFullName && hasExactSubjectOnly) return { isAmbiguous: false, variants: rankedVariants };

    return {
        isAmbiguous: true,
        variants: rankedVariants.slice(0, 4).map(v => v.value)
    };
}

function looksLikeStatsAnswerText(text) {
    const value = String(text || '').trim();
    if (!value) return false;
    if (!/\d/.test(value)) return false;
    return /\b(run|runs|wicket|wickets|match|matches|innings|average|strike rate|century|centuries|fifty|fifties|highest|odi|test|t20|record|records|stat|stats)\b/i.test(value);
}

        : `I found multiple people matching "${subject}" in live sources, so I should not guess the ${relationHint}. Please reply with the exact full name.\n\n${meta}\n\nSources:\n${sourceLines}`;

function formatConsensusAnswer(entityIntent, agreement) { 
    const value = agreement?.top?.value || ''; 
    if (!value) return ''; 
    if (entityIntent.relationType === 'title_count') { 
        const noun = entityIntent.entityType === 'team' ? 'titles' : 'major titles'; 
        const verb = /\b(he|she|it|[A-Z][a-z]+)\b/.test(entityIntent.subject) && !/\b(s|x|z|sh|ch)\b/i.test(entityIntent.subject) ? 'has' : 'have';
        return `${entityIntent.subject} ${verb} won ${value} ${noun} in total.`; 
    } 
    if (entityIntent.relationType === 'latest_work') {
        if (!isLikelyLatestWorkTitleCandidate(value, entityIntent.subject)) {
            return '';
        }
        const medium = detectLatestWorkMedium(entityIntent.raw || '');
        const label = medium === 'song' ? 'latest song' : medium === 'album' ? 'latest album' : medium === 'show' ? 'latest show' : medium === 'project' ? 'upcoming project' : 'latest film';
        return `${entityIntent.subject}'s ${label} is ${value}.`;
    }
    if (entityIntent.relationType === 'winner') { 
        return `${value} won ${entityIntent.subject || entityIntent.competition || 'the event'}.`; 
    } 
    if (entityIntent.relationType === 'score') {
        return `${entityIntent.subject || entityIntent.competition || 'The result'} was ${value}.`;
    }
    if (entityIntent.relationType === 'stats') {
        return `${entityIntent.subject} recorded ${value}.`;
    }
    if (entityIntent.relationType === 'known_for') {
        return `${entityIntent.subject} is known for ${value}.`;
    }
    if (entityIntent.relationType === 'standings') {
        return `${entityIntent.subject || entityIntent.competition || 'The team'} is at ${value}.`;
    }
    if (entityIntent.relationType === 'qualification') {
        return `${entityIntent.subject || entityIntent.competition || 'The team'} is ${value}.`;
    } 
    if (entityIntent.relationType === 'team_membership') { 
        return `${entityIntent.subject} currently plays for ${value}.`; 
    } 
    if (entityIntent.relationType === 'party_membership') { 
        return `${entityIntent.subject} is associated with ${value}.`;
    }
    if (entityIntent.relationType === 'role') {
        if (entityIntent.targetEntity && entityIntent.roleLabel) {
            return `The current ${entityIntent.roleLabel} of ${entityIntent.targetEntity} is ${value}.`;
        }
        return `${entityIntent.subject} is ${value}.`;
    } 
    if (entityIntent.relationType === 'price') {
        return `${entityIntent.subject || 'The latest figure'} is ${value}.`;
    }
    return value; 
}

function isCurrentRoleHolderLiveQuery(text, liveIntent = null, entityIntent = null) {
    const raw = String(text || '').trim();
    if (!raw) return false;
    const lower = raw.toLowerCase();
    const intent = liveIntent || extractLiveQueryIntent(raw);
    const entity = entityIntent || extractUniversalEntityIntent(raw, intent);
    const roleFact = String(intent?.factType || '').toLowerCase() === 'role' || entity?.relationType === 'role';
    const officeSignal = /\b(president|prime minister|pm|chief minister|cm|governor|mayor|minister|ceo|captain|coach|chairman|chairperson|head of|leader of|secretary general|director|director general|dean|chancellor|principal|administrator)\b/.test(lower);
    const currentSignal = /\b(who is|what is|current|currently|latest|present|incumbent|as of|today|now)\b/.test(lower);
    return Boolean(roleFact && officeSignal && currentSignal);
}

function isPublicSourceSearchAllowedWhenLiveDisabled(text, liveIntent = null, entityIntent = null) {
    const raw = String(text || '').trim();
    if (!raw) return false;
    if (isCurrentRoleHolderLiveQuery(raw, liveIntent, entityIntent)) return true;
    const intent = liveIntent || extractLiveQueryIntent(raw);
    const domain = String(intent?.domain || '').toLowerCase();
    const factType = String(intent?.factType || '').toLowerCase();
    if (['politics', 'news', 'space_science'].includes(domain)) return true;
    if (['role', 'news', 'status'].includes(factType)) return true;
    if (isWeatherIntentText(raw) || isMarketPriceQuery(raw) || isSportsLiveResultQuery(raw)) return true;
    if (/\b(earthquake|wildfire|flood|storm|cyclone|hurricane|disaster|places to visit|tourist places|official update|government news)\b/i.test(raw)) return true;

}

function shouldRequireVerifiedSources(classificationOrText, liveIntent = null, entityIntent = null) {
    const classification = (classificationOrText && typeof classificationOrText === 'object' && !Array.isArray(classificationOrText))
        ? classificationOrText
        : null;
    const text = String(classification ? (classification.raw || '') : (classificationOrText || '')).trim();
    if (!text) return false;

    const lower = text.toLowerCase();
    const flags = classification?.flags || {};
    const intent = liveIntent || classification?.liveIntent || extractLiveQueryIntent(text);
    const entity = entityIntent || classification?.entityIntent || extractUniversalEntityIntent(text, intent);
    const entityFact = Boolean(entity?.isEntityFact || flags.universalEntityFact || isUniversalEntityFactQuestion(text));

    const explicitFreshness = hasExplicitFreshnessLanguage(text) ||
        /\b(latest|recent|current|today|right now|as of now|live|status|update|updates|what happened|what's happening)\b/.test(lower);
    const liveSignals = isCurrentInfoQuery(text) || isLiveRetrievalQuery(text);

    const directChangingFacts = (
        ['winner', 'score', 'standings', 'qualification', 'price', 'stats', 'team_membership', 'party_membership', 'latest_work', 'role', 'schedule', 'holiday', 'title_count'].includes(entity?.relationType) ||
        ['winner', 'score', 'standings', 'qualification', 'stats', 'latest_work', 'schedule', 'holiday'].includes(String(intent?.factType || '').toLowerCase()) ||
        Boolean(intent?.directFact) ||
        isDirectFactLiveQuery(text)
    );

    const leadershipOrOffice = entity?.relationType === 'role' &&
        /\b(president|prime minister|governor|mayor|minister|chief minister|ceo|captain|coach|chairman|chairperson|head of|secretary general|director|director general|dean|chancellor|principal|administrator)\b/.test(lower);

    const newsworthy = flags.news ||
        isNewsworthyLiveTopic(text) ||
        shouldUseNewsEndpointForCurrentQuery(text) ||
        /\b(war|conflict|attack|ceasefire|election|layoff|layoffs|firing|job cuts|restructuring|earnings|merger|acquisition|recall|bankruptcy|investigation|antitrust|strike|walkout)\b/.test(lower);

    if (isExchangeRateQuery(text) || isMarketPriceQuery(text) || isMarketMoversQuery(text) || isSportsLiveResultQuery(text)) {
        return true;
    }

    if (entityFact && leadershipOrOffice) {
        return true;
    }

    if (leadershipOrOffice && (explicitFreshness || entity?.timeframe === 'current' || intent?.year)) {
        return true;
    }

    if (entityFact && (explicitFreshness || intent?.year || liveSignals)) {
        return true;
    }

    if (directChangingFacts && (explicitFreshness || liveSignals || intent?.year)) {
        return true;
    }

    if (newsworthy && (explicitFreshness || liveSignals || directChangingFacts)) {
        return true;
    }

    return false;
}

function requiresStrictLiveVerification(userText, liveIntent = null, entityIntent = null) {

async function fetchHybridCitationSources(userText, intent, controller) {
    if (!LIVE_RETRIEVAL_ENABLED) return [];

    const query = String(userText || '').trim();
    if (!query) return [];

    const searchQueries = buildLiveSearchQueries(query, intent || extractLiveQueryIntent(query));
    const resultSets = await Promise.all(
        searchQueries.slice(0, 3).map(async (q) => {
            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    signal: controller?.signal,
                    body: JSON.stringify({ query: q, maxResults: 5 })
                });
                if (!response.ok) return [];
                const data = await response.json();
                return Array.isArray(data?.results) ? data.results.filter(Boolean) : [];
            } catch (error) {
                return [];
            }
        })
    );

    const ranked = rankSourcesByPolicy(resultSets.flat(), intent?.domain || 'general', query);
    const deduped = [];
    const seen = new Set();
    for (const item of ranked) {
        const url = String(item?.url || '').trim();
        if (!url || seen.has(url)) continue;
        seen.add(url);
        deduped.push(item);
        if (deduped.length >= 4) break;
    }
    return deduped;
}

function buildHybridAnswerWithSources(answer, sources) {
    const cleanAnswer = String(answer || '').trim();
    if (!cleanAnswer) return '';
    const sourceLines = (Array.isArray(sources) ? sources : [])
        .slice(0, 4)
        .map((item, index) => `${index + 1}. [${item.title}](${item.url})`)
        .join('\n');
    if (!sourceLines) return cleanAnswer;
    return `${cleanAnswer}\n\nSources:\n${sourceLines}`;
}

async function handleAnswerThenCiteQuery(userText, classification) {
    const query = String(userText || '').trim();
    if (!query) return false;

    const ai = await askGeminiAI(query);
    if (ai?.aborted) return true;

    const answer = String(ai?.response || ai?.text || '').trim();
    if (!answer || ai?.intent === 'soft_fallback') {
        return false;
    }

    if (!LIVE_RETRIEVAL_ENABLED) {
        await publishResolvedModelMessage(query, answer, { label: 'Model answer', routing: ai?.routing || null });
        return true;
    }

    const controller = beginAbortableRequest();
    try {
        const sources = await fetchHybridCitationSources(query, classification?.liveIntent, controller);
        const finalMsg = buildHybridAnswerWithSources(answer, sources);
        if (sources.length) {
            addVerifiedAssistantMessage(finalMsg, 'Answer with sources');
            saveToHistory(query, finalMsg || answer);
        } else {
            await publishResolvedModelMessage(query, answer, {
                label: 'Model answer',
                historyText: finalMsg || answer,
                routing: ai?.routing || null
            });
        }
        return true;
    } catch (error) {
        if (isAbortError(error)) return true;
        await publishResolvedModelMessage(query, answer, { label: 'Model answer', routing: ai?.routing || null });
        return true;
    } finally {
        clearActiveRequest(controller);
    }
}

async function handleChatFirstCurrentQuery(userText, classification) {

function extractRequestedDish(text) {
    const raw = normalizeRecipeRequestText(text);
    if (!raw) return '';
    const patterns = [
        /\brecipe\s+for\s+(.+?)\s*$/i,
        /\btell\s+me\s+how\s+to\s+make\s+(.+?)\s*$/i,
        /\bhow\s+to\s+make\s+(.+?)\s*$/i,
        /\bgive\s+me\s+a\s+recipe\s+for\s+(?:making\s+)?(.+?)\s*$/i,
        /\bmake\s+(.+?)\s*$/i
    ];
    for (const pattern of patterns) {
        const match = raw.match(pattern);
        if (match?.[1]) {
            return match[1]
                .replace(/\b(?:good|nice|great|best|proper|perfect)\b/gi, '')
                .replace(/\bin\s+Thalassery\s+style\b/gi, '')
                .replace(/\s+/g, ' ')
                .replace(/[?.!,;]+$/g, '')
                .trim();
        }
    }
    return raw.replace(/[?.!,;]+$/g, '').trim();
}

function normalizeRecipeRequestText(text) {
    return String(text || '')
        .replace(/\b(?:tallessery|tallesery|talassery|tellicherry)\b/gi, 'Thalassery')
        .replace(/\s+/g, ' ')
        .trim();
}

function extractRecipeStylePreference(text) {
    const raw = normalizeRecipeRequestText(text).toLowerCase();
    if (!raw.trim()) return '';

    const stylePatterns = [
        { key: 'traditional', pattern: /\btraditional|authentic|classic|original\b/ },
        { key: 'home-style', pattern: /\bhome[\s-]?style|homestyle|ghar[\s-]?ka\b/ },
        { key: 'quick', pattern: /\bquick|fast|easy|simple|30[\s-]?minute|15[\s-]?minute\b/ },
        { key: 'restaurant-style', pattern: /\brestaurant[\s-]?style|dhaba[\s-]?style\b/ }
    ];

    for (const style of stylePatterns) {
        if (style.pattern.test(raw)) return style.key;
    }

    const regionalMatch = raw.match(/\b(andhra|hyderabadi|tamil|chettinad|kerala|thalassery|tellicherry|tallessery|tallesery|talassery|punjabi|mughlai|bengali|goan|korean|japanese|thai|italian|mexican|french|turkish|arabic)\b/);
    if (!regionalMatch) return '';
    if (/^(tellicherry|tallessery|tallesery|talassery)$/i.test(regionalMatch[1])) return 'thalassery';
    return regionalMatch[1];
}

function normalizeRecipeOutputText(text) {
    return String(text || '')
        .replace(/\r\n/g, '\n')
        .replace(/[\u00a0\u202f]/g, ' ')
        .replace(/[\u2010-\u2015]/g, '-')
        .replace(/[\u201c\u201d]/g, '"')
        .replace(/[\u2018\u2019]/g, "'")
        .replace(/\u00bc/g, '1/4')
        .replace(/\u00bd/g, '1/2')
        .replace(/\u00be/g, '3/4')
        .replace(/[â€œâ€]/g, '"')
        .replace(/[â€˜â€™]/g, "'")
        .replace(/Â¼/g, '1/4')
        .replace(/Â½/g, '1/2')
        .replace(/Â¾/g, '3/4')
        .replace(/\s+%/g, ' percent')
        .replace(/^(\s*)\d+\.\s+/gm, '$1- ')
        .replace(/[ \t]+/g, ' ')
        .replace(/[ \t]+\n/g, '\n')
        .replace(/\n{3,}/g, '\n\n')

function isLikelyIncompleteRecipe(text) {
    const raw = String(text || '').trim();
    if (!raw) return true;
    const hasRecipeShape = /^Recipe\s*:/im.test(raw) || /\nIngredients\s*:/i.test(raw) || /\nSteps\s*:/i.test(raw);
    if (!hasRecipeShape) return false;
    if (/[(\[,;:-]\s*$/.test(raw)) return true;
    if (/\b(?:with|and|or|to|for|a|an|the|lid|cover|until|then|about|of|in|on|at|very|low|medium|high)\s*$/i.test(raw)) return true;
    if (/\b(?:for|about|around|approximately)\s+\d+\s*(?:-|to)?\s*\d*\s*$/i.test(raw)) return true;
    if (/\b\d+\s*(?:-|to)\s*\d+\s*$/i.test(raw)) return true;
    if (/\b\d+\s*$/i.test(raw) && /\b(?:cook|simmer|steam|bake|fry|boil|dum|rest|marinate)\b[\s\S]{0,180}$/i.test(raw)) return true;
    const lastStep = (raw.match(/^\s*-\s+.+$/gm) || []).pop() || '';
    if (lastStep && lastStep.length >= 80 && !/[.!?)]\s*$/.test(lastStep) && /\b(?:cook|simmer|steam|bake|fry|boil|dum|rest|marinate|cover|seal|place|add|sprinkle|drizzle)\b/i.test(lastStep)) {
        return true;
    }
    if (!/\nIngredients\s*:\s*\n\s*-/i.test(raw)) return true;
    if (!/\nSteps\s*:\s*\n\s*-/i.test(raw)) return true;
    return false;
}

async function retrieveUniversalEntitySources(pipeline, controller) {
    if (!LIVE_RETRIEVAL_ENABLED) return [];

    const queries = buildUniversalEntityQueries(pipeline.userText, pipeline.intent);
    const resultSets = await Promise.all(
        queries.map(async (q) => {
            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    signal: controller.signal,
                    body: JSON.stringify({ query: q, maxResults: 6 })
                });
                if (!response.ok) return [];
                const data = await response.json();
                return Array.isArray(data?.results) ? data.results.filter(Boolean) : [];
            } catch (e) {
                return [];
            }
        })
    );

    const deduped = [];
    const seen = new Set();
    const rankedResults = rankSourcesByPolicy(
        resultSets.flat(),
        pipeline.entityIntent.domain,
        `${pipeline.userText} ${pipeline.entityIntent.subject} ${pipeline.entityIntent.relationType}`
    );
    for (const item of rankedResults) {
        const url = String(item?.url || '').trim();
        if (!url || seen.has(url)) continue;
        seen.add(url);
        deduped.push(item);
        if (deduped.length >= 8) break;
    }

    const subjectFiltered = deduped.filter(item => sourceMatchesEntitySubject(item, pipeline.entityIntent));
    const strictPersonIntent = pipeline?.entityIntent?.entityType === 'profession_person' || pipeline?.entityIntent?.relationType === 'latest_work';
    if (strictPersonIntent && subjectFiltered.length >= 1) return subjectFiltered;
    if (subjectFiltered.length >= 2) return subjectFiltered;
    if (subjectFiltered.length === 1 && deduped.length <= 2) return subjectFiltered;
    return deduped;
}

function isPoliticalLeadershipRoleIntent(entityIntent) {
    if (String(entityIntent?.relationType || '').toLowerCase() !== 'role') return false;
    if (String(entityIntent?.domain || '').toLowerCase() !== 'politics') return false;
    const role = String(entityIntent?.roleLabel || '').toLowerCase();
    return /\b(president|prime minister|chief minister|governor|mayor|minister|head|leader|administrator|director general|secretary)\b/.test(role);
}

function extractLeadershipRoleCandidateFromText(text, entityIntent) {
    const rawText = String(text || '').trim();
    if (!rawText) return '';
    if (!isPoliticalLeadershipRoleIntent(entityIntent)) return '';

    const roleLabel = String(entityIntent?.roleLabel || '').trim();
    const targetEntity = String(entityIntent?.targetEntity || entityIntent?.subject || '').trim();
    if (!roleLabel || !targetEntity) return '';

    const roleWord = escapeRegexLiteral(roleLabel);
    const targetWord = escapeRegexLiteral(targetEntity);
    const namePattern = '([A-Z][A-Za-z.\'-]+(?:\\s+[A-Z][A-Za-z.\'-]+){0,4})';
    const patterns = [
        new RegExp(`\\b(?:current\\s+)?${roleWord}\\s+of\\s+${targetWord}\\b[^A-Za-z]{0,16}(?:is|:|-)?\\s*${namePattern}`, 'i'),
        new RegExp(`\\b${namePattern}\\b\\s+is\\s+(?:the\\s+)?(?:current\\s+)?${roleWord}\\s+of\\s+${targetWord}\\b`, 'i'),
        new RegExp(`\\b${targetWord}(?:'s|s')\\s+(?:current\\s+)?${roleWord}\\s*(?:is|:|,)\\s*${namePattern}`, 'i'),
        new RegExp(`\\b${roleWord}\\s+of\\s+${targetWord}\\s*[-:]\\s*${namePattern}`, 'i')
    ];

    for (const pattern of patterns) {
        const match = rawText.match(pattern);
        if (!match?.[1]) continue;
        const candidate = match[1].trim();
        if (isLikelyPersonNameCandidate(candidate)) return candidate;
    }

    return '';
}

function extractLeadershipRoleCandidateFromSources(entityIntent, sources) {
    if (!isPoliticalLeadershipRoleIntent(entityIntent)) return '';
    const votes = new Map();

    for (const item of Array.isArray(sources) ? sources : []) {
        const combined = `${String(item?.title || '')}. ${String(item?.description || '')}`.replace(/\s+/g, ' ').trim();
        if (!combined) continue;
        const candidate = extractLeadershipRoleCandidateFromText(combined, entityIntent);
        if (!candidate) continue;
        const key = normalizeAgreementValue(candidate);
        if (!key) continue;
        const bucket = votes.get(key) || { value: candidate, count: 0, trustedHits: 0 };
        bucket.count += 1;
        if (scoreSourcePolicy(item?.url, entityIntent.domain || 'politics') > 0) {
            bucket.trustedHits += 1;
        }
        votes.set(key, bucket);
    }

    if (!votes.size) return '';
    const best = Array.from(votes.values()).sort((a, b) => {
        if (b.trustedHits !== a.trustedHits) return b.trustedHits - a.trustedHits;
        if (b.count !== a.count) return b.count - a.count;
        return b.value.length - a.value.length;
    })[0];
    if (!best) return '';
    if (best.trustedHits >= 1 || best.count >= 2) return best.value;
    return '';
}

function buildBestEffortFactAnswerFromSources(userText, intent, entityIntent, sources) {
    const pool = Array.isArray(sources) ? sources.filter(Boolean) : [];
    if (!pool.length) return '';

    const derivedIntent = (entityIntent && typeof entityIntent === 'object' && Object.keys(entityIntent).length)
        ? entityIntent
        : extractUniversalEntityIntent(String(userText || ''), intent || extractLiveQueryIntent(String(userText || '')));

    const agreement = buildSourceAgreement(pool.slice(0, 6), derivedIntent);
    if (agreement?.top?.value) {
        const consensus = formatConsensusAnswer(derivedIntent, agreement);
        if (consensus) return consensus;

        if (derivedIntent?.relationType === 'role' && derivedIntent?.targetEntity && derivedIntent?.roleLabel) {
            return `Based on available sources, the ${derivedIntent.roleLabel} of ${derivedIntent.targetEntity} appears to be ${agreement.top.value}.`;
        }
        return `Based on available sources, the best-supported value is ${agreement.top.value}.`;
    }

    const leadershipCandidate = extractLeadershipRoleCandidateFromSources(derivedIntent, pool.slice(0, 6));
    if (leadershipCandidate && derivedIntent?.targetEntity && derivedIntent?.roleLabel) {
        return `Based on available sources, the ${derivedIntent.roleLabel} of ${derivedIntent.targetEntity} appears to be ${leadershipCandidate}.`;
    }

    const top = pool[0];
    const snippet = String(top?.description || '').trim();
    if (snippet) return `Based on available sources, ${snippet}`;

    const title = String(top?.title || '').trim();
    if (title) return `Based on available sources, ${title}`;
    return '';
}

async function publishUniversalMixedEvidence(pipeline, results) {
    if (pipeline?.entityIntent?.relationType === 'latest_work') {
        const best = (Array.isArray(results) ? results : [])
            .map(item => {
                const candidate = extractFactCandidate(item, pipeline.entityIntent);

            })
            .filter(entry =>
                isLikelyLatestWorkTitleCandidate(entry.candidate, pipeline.entityIntent.subject, entry?.item?.title || '') &&
                hasLatestWorkEvidence(entry.item, pipeline.entityIntent)
            )
            .sort((a, b) => {
                const aTime = a.published?.getTime?.() || 0;
                const bTime = b.published?.getTime?.() || 0;
                if (bTime !== aTime) return bTime - aTime;
                return scoreSourcePolicy(b.item?.url, pipeline.entityIntent.domain) - scoreSourcePolicy(a.item?.url, pipeline.entityIntent.domain);
            })[0];

        if (best?.candidate) {
            const medium = detectLatestWorkMedium(pipeline.entityIntent.raw || '');
            const label = medium === 'song' ? 'latest song' : medium === 'album' ? 'latest album' : medium === 'show' ? 'latest show' : medium === 'project' ? 'upcoming project' : 'latest film';
            const dateLabel = best.published
                ? ` (${best.published.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' })})`
                : '';
            const sourceLines = results
                .slice(0, 5)
                .map((r, i) => `${i + 1}. [${r.title}](${r.url})`)
                .join('\n');
            const msg = `${pipeline.entityIntent.subject}'s ${label} appears to be ${best.candidate}${dateLabel}.\n\n${buildSourceMetaBlock(results)}\n\nSources:\n${sourceLines}`;
            addVerifiedAssistantMessage(msg, 'Date-ranked live sources');
            await prepareApiReply('verified_answer_found', {}, 'I ranked live sources by recency and selected the latest supported result.');
            saveToHistory(pipeline.userText, msg);
            return true;
        }
    }

    const sourceLines = results
        .slice(0, 5)
        .map((r, i) => `${i + 1}. [${r.title}](${r.url})`)
        .join('\n');
    const mixedMsg = `I found sources for that, but they do not agree enough for a clean direct answer yet.\n\n${buildSourceMetaBlock(results)}\n\nSources:\n${sourceLines}`;
    addVerifiedAssistantMessage(mixedMsg, 'Mixed live sources');
    await prepareApiReply('verified_answer_mixed', {}, 'I found mixed source evidence, so I did not guess.');

        languages.push('hindi');
    }
    if (/\b(telugu|tollywood)\b/.test(t)) {
        hasAnyLanguageMention = true;
        languages.push('telugu');
    }
    if (/\b(english|western|international)\b/.test(t)) {
        hasAnyLanguageMention = true;
        languages.push('english');
    }

    const unsupportedMap = [
        { key: 'kannada', pattern: /\b(kannada)\b/ },
        { key: 'malayalam', pattern: /\b(malayalam)\b/ },
        { key: 'spanish', pattern: /\b(spanish)\b/ }
    ];
    unsupportedMap.forEach(item => {
        if (item.pattern.test(t)) {
            hasAnyLanguageMention = true;
            unsupported.push(item.key);
        }
    });

    if (!languages.length && !hasAnyLanguageMention) {
        languages.push('tamil', 'english', 'hindi', 'telugu');
    }

    return {
        requestedCount: requestedCount, // Clamping already handled by extractRequestedQuantity
        languages: Array.from(new Set(languages)),
        unsupported: Array.from(new Set(unsupported))
    };
}

function isEraLanguageHitsBlendRequest(text) {

    if (!hasMusicAsk) return false;
    const hasEra = /\b(?:[6-9]0['-]?s|00['-]?s|10['-]?s|20['-]?s|(?:19|20)\d{2}s)\b/.test(t);
    const hasLanguage = /\b(tamil|hindi|telugu|kannada|malayalam|english|spanish|french|arabic|punjabi|marathi|bengali)\b/.test(t);
    const hasBlendWord = /\b(blend|mix|era|decade)\b/.test(t);
    return (hasEra && hasLanguage) || (hasEra && hasBlendWord);
}

function normalizeEraToken(token) {
    const raw = String(token || '').toLowerCase().replace(/['-]/g, '').trim();
    if (!raw) return null;
    if (/^\d{4}s$/.test(raw)) {
        const year = Number(raw.slice(0, 4));
        if (year >= 1960 && year <= 2020) return year;
    }
    if (/^(?:[6-9]0|00|10|20)s$/.test(raw)) {
        const two = raw.slice(0, 2);
        if (two === '00') return 2000;
        if (two === '10') return 2010;
        if (two === '20') return 2020;
        return Number(`19${two}`);
    }
    return null;
}

function extractRequestedEras(text) {
    const raw = String(text || '').toLowerCase();
    const matches = raw.match(/\b(?:[6-9]0['-]?s|00['-]?s|10['-]?s|20['-]?s|(?:19|20)\d{2}s)\b/g) || [];
    const eras = [];
    for (const m of matches) {
        const normalized = normalizeEraToken(m.replace(/['-]/g, ''));
        if (normalized && !eras.includes(normalized)) eras.push(normalized);
    }
    eras.sort((a, b) => a - b);
    return eras;
}

function extractRequestedMusicLanguages(text) {
    const raw = String(text || '').toLowerCase();
    const aliases = {
        tamil: ['tamil', 'tamizh','Tamil'],
        hindi: ['hindi', 'bollywood'],
        telugu: ['telugu', 'tollywood'],
        kannada: ['kannada'],
        malayalam: ['malayalam'],
        english: ['english','English'],
        spanish: ['spanish'],
        french: ['french'],
        arabic: ['arabic'],
        punjabi: ['punjabi'],
        marathi: ['marathi'],
        bengali: ['bengali', 'bangla']
    };
    const out = [];
    for (const [lang, terms] of Object.entries(aliases)) {
        if (terms.some(term => new RegExp(`\\b${term}\\b`, 'i').test(raw))) out.push(lang);
    }
    return out;
}

function extractArtistFromSongRequest(text) {
    const genericIntent = parseGenericUserIntent(text);
    if (genericIntent.domain === 'songs' && genericIntent.subject && genericIntent.confidence >= 0.55) {
        return genericIntent.subject;
    }

    const raw = String(text || '').trim();
    if (!raw) return '';

    const cleanCandidate = (input) => {
        return String(input || '')
            .replace(/^[\s"'`]+|[\s"'`]+$/g, '')
            .replace(/^\s*(?:can|could|would)\s+you\s+/i, '')
            .replace(/^\s*(?:give|show|tell|list|suggest|recommend|play)\s+me\s+/i, '')
            .replace(/^\s*(?:i\s+(?:want|need)\s+)\b/i, '')
            .replace(/^\s*(?:latest|new|newest|recent|current|most\s+recent|upcoming)\s+/i, '')
            .replace(/^\s*(?:top|best)\s+(?:\d{1,2}|one|two|three|four|five|six|seven|eight|nine|ten|eleven|twelve)\b/i, '')
            .replace(/^\s*(?:songs?|tracks?|hits?|music|playlist)\s+(?:of|by|from)\s+/i, '')
            .replace(/^\s*(?:of|by|from)\s+/i, '')
            .replace(/\b(?:latest|new|newest|recent|current|most\s+recent|upcoming)\s+(?:songs?|tracks?|hits?|music|playlist)\b/gi, ' ')
            .replace(/\b(?:songs?|tracks?|hits?|music|playlist)\b\s*$/i, '')
            .replace(/\b(?:please|pls|for me|right now|now)\b\s*$/i, '')
            .replace(/[?.!,]+$/g, '')
            .replace(/\s+/g, ' ')
            .trim();
    };

    const patterns = [
        /(?:latest|new|newest|recent|current|most\s+recent)\s+([a-z0-9.'&\-\s]{2,100})\s+(?:songs?|tracks?|hits?|music|playlist)\b/i,
        /(?:latest|new|newest|recent|current|most\s+recent)\s+(?:songs?|tracks?|hits?|music|playlist)\s+(?:of|by|from)\s+([a-z0-9.'&\-\s]{2,100})/i,
        /(?:songs?|tracks?|hits?|music|playlist)\s+(?:of|by|from)\s+([a-z0-9.'&\-\s]{2,100})/i,
        /(?:top|best)\s+(?:\d{1,2}|one|two|three|four|five|six|seven|eight|nine|ten|eleven|twelve)?\s*(?:songs?|tracks?|hits?)?\s*(?:of|by|from)?\s+([a-z0-9.'&\-\s]{2,100})/i,
        /(?:suggest|recommend|give|show|tell|list)(?:\s+me)?(?:\s+some)?(?:\s+good|\s+best|\s+top)?(?:\s+\d{1,2}|\s+one|\s+two|\s+three|\s+four|\s+five|\s+six|\s+seven|\s+eight|\s+nine|\s+ten|\s+eleven|\s+twelve)?\s*(?:songs?|tracks?|hits?)?(?:\s+(?:of|by|from))?\s+([a-z0-9.'&\-\s]{2,100})/i,
        /\b([a-z][a-z0-9.'&\-\s]{1,100})\s+(?:songs?|tracks?|hits?)\b/i
    ];

    for (const pattern of patterns) {
        const match = raw.match(pattern);
        if (match && match[1]) {
            const cleaned = cleanCandidate(match[1]);
            if (cleaned) return cleaned;
        }
    }

    // Final heuristic: remove common song-query words and keep likely artist tokens.
    const heuristic = raw
        .toLowerCase()
        .replace(/[?.!,]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim()
        .split(' ')
        .filter(token => token && !/^(give|show|tell|list|suggest|recommend|play|me|top|best|latest|new|newest|recent|current|upcoming|song|songs|track|tracks|hit|hits|music|playlist|of|by|from|please|pls|now|right|can|could|would|you|i|want|need|some|good|one|two|three|four|five|six|seven|eight|nine|ten|eleven|twelve|\d{1,2})$/.test(token))
        .join(' ');

    return cleanCandidate(heuristic);
}

function extractJsonObject(text) {

    const slice = raw.slice(first, last + 1);

    } catch (e) {
        return null;
    }
}

        });
    }

    lines.push('');
    lines.push('Say "play song game" anytime to try again.');
    return lines.join('\n');
}

async function handleSongMoodGameAnswer(text) {
    if (!songMoodGameState) return false;
    const clean = String(text || '').trim().toLowerCase();
    if (!clean) return true;

    if (isSongMoodGameRequest(clean) || /^(restart|start over|again)$/i.test(clean)) {
        startSongMoodGame();
        return true;
    }

    if (/^(cancel|stop|exit|quit|end game|stop game)$/i.test(clean)) {
        resetSongMoodGame();
        const msg = 'Song game cancelled.';
        addChatMessage(msg, false);
        return true;
    }

    const question = SONG_MOOD_GAME_QUESTIONS[songMoodGameState.questionIndex];
    if (!question) {
        resetSongMoodGame();
        return false;
    }

    const match = clean.match(/^[1-4]$/);
    if (!match) {
        deliverApiReply('song_game_invalid_reply', {
            question: formatSongMoodGameQuestion(songMoodGameState.questionIndex),
            validOptions: [1, 2, 3, 4]
        }, { speak: true });
        return true;
    }

    const selectedIndex = Number(match[0]) - 1;
    const option = question.options[selectedIndex];
    if (!option) {
        deliverApiReply('song_game_invalid_option', {
            question: formatSongMoodGameQuestion(songMoodGameState.questionIndex),
            validOptions: [1, 2, 3, 4]
        }, { speak: true });
        return true;
    }

    songMoodGameState.answers[question.key] = option.id;
    songMoodGameState.questionIndex += 1;

    if (songMoodGameState.questionIndex >= SONG_MOOD_GAME_QUESTIONS.length) {
        await finishSongMoodGame('song mood game');
        return true;
    }

    const nextQuestion = formatSongMoodGameQuestion(songMoodGameState.questionIndex);
    addChatMessage(nextQuestion, false);
    return true;
}

function sanitizeArtistName(input) {
    const cleaned = String(input || '')
        .replace(/^[\s"'`]+|[\s"'`]+$/g, '')
        .replace(/^\s*(?:can|could|would)\s+you\s+/i, '')
        .replace(/^\s*(?:give|show|tell|list|suggest|recommend|play)\s+me\s+/i, '')
        .replace(/^\s*(?:latest|new|newest|recent|current|most\s+recent|upcoming)\s+/i, '')
        .replace(/^\s*(?:top|best)\s+(?:\d{1,2}|one|two|three|four|five|six|seven|eight|nine|ten|eleven|twelve)\b/i, '')
        .replace(/^\s*(?:songs?|tracks?|hits?|music|playlist)\s+(?:of|by|from)\s+/i, '')
        .replace(/^\s*(?:of|by|from)\s+/i, '')
        .replace(/\b(?:latest|new|newest|recent|current|most\s+recent|upcoming)\s+(?:songs?|tracks?|hits?|music|playlist)\b/gi, ' ')
        .replace(/\b(?:songs?|tracks?|hits?|music|playlist)\b\s*$/i, '')
        .replace(/\b(?:please|pls|for me|right now|now)\b\s*$/i, '')
        .replace(/[?.!,]+$/g, '')
        .replace(/[^\w\s.'&\-]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();

    if (!cleaned || cleaned.length < 2 || cleaned.length > 80) return '';
    if (!/[a-z]/i.test(cleaned)) return '';
    if (/^(song|songs|track|tracks|music|playlist|top|best|suggest|recommend|give|show|tell|list|me)$/i.test(cleaned)) return '';
    const knownArtistCorrections = {
        'sean rolden': 'Sean Roldan'
    };
    return knownArtistCorrections[cleaned.toLowerCase()] || cleaned;
}

function clampSongCount(value, fallback = 5) {

    if (!Number.isFinite(n)) return Math.max(1, Math.min(30, fallback));

}

function normalizeEraBucketsToExactCount(eraBuckets, intent) {
    const count = intent.requestedCount;
    const requestedEras = intent.eras;
    const normalized = [];

    for (const era of requestedEras) {
        const bucket = (eraBuckets || []).find(b => Number(b.era) === Number(era));
        const items = Array.isArray(bucket?.items) ? bucket.items : [];
        const seen = new Set();
        const deduped = [];
        for (const item of items) {
            const song = String(item?.song || '').trim();
            const work = String(item?.work || '').trim();
            const artist = String(item?.artist || '').trim();
            if (!song) continue;
            const key = `${song.toLowerCase()}|${work.toLowerCase()}|${artist.toLowerCase()}`;
            if (seen.has(key)) continue;
            seen.add(key);
            deduped.push({ song, work, artist });
        }
        if (deduped.length < count) return null;
        normalized.push({ era: Number(era), items: deduped.slice(0, count) });
    }
    return normalized;
}

async function buildEraLanguageHitsWithAI(intent) {
    const primaryLanguage = intent.languages[0] || 'tamil';
    const prompt = `Create a language-era music hits blend.

Return strict JSON only in this schema:
{
  "eras": [
    {
      "era": 1990,
      "items": [
        { "song": "<song>", "work": "<film/album>", "artist": "<artist>", "language": "<language>" }
      ]
    }
  ]
}

Rules:
- Language focus: ${intent.languages.join(', ')}
- Eras: ${intent.eras.map(toEraLabel).join(', ')}
- Artist filter: ${intent.artist || 'none (multi-artist allowed)'}
- Provide exactly ${intent.requestedCount} items per era
- Keep songs in requested language(s)
- No markdown, no extra keys, valid JSON only`;

    const response = await fetch('/api/chat-groq', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            message: prompt,
        })
    });
    if (!response.ok) throw new Error('language-era ai request failed');
    const data = await response.json();
    const parsed = extractJsonObject(data?.response || data?.text || '');
    const eras = Array.isArray(parsed?.eras) ? parsed.eras : [];
    const buckets = [];
    for (const eraBlock of eras) {
        const era = Number(eraBlock?.era);
        const items = Array.isArray(eraBlock?.items) ? eraBlock.items : [];
        if (!Number.isFinite(era)) continue;
        const mapped = items
            .slice(0, intent.requestedCount)
            .map(item => ({
                song: String(item?.song || '').trim(),
                work: String(item?.work || '').trim(),
                artist: String(item?.artist || '').trim(),
                language: String(item?.language || primaryLanguage).trim()
            }))
            .filter(item => item.song);
        if (!mapped.length) continue;
        buckets.push({ era, items: mapped });
    }
    if (!buckets.length) throw new Error('empty language-era ai response');
    return buckets.sort((a, b) => a.era - b.era);
}

async function buildSongListFromAIFallback(artist, requestedCount, requestType = 'top/best songs') {
    const prompt = `Return top songs for the artist/composer below as strict JSON only.

Schema:
{
  "artist": "<artist>",
  "songs": [
    {
      "song": "<song name>",
      "work": "<film or album>",
      "reason": "<short reason>"
    }
  ]
}

Rules:
- Artist: "${artist}"
- Request type: "${requestType}"
- Return up to ${requestedCount} songs
- If request type is latest/recent songs, prefer newer releases and avoid presenting the list as all-time best songs.
- No markdown
- No extra keys
- Keep reasons short`;

    const response = await fetch('/api/chat-groq', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            message: prompt,
        })
    });

    if (!response.ok) throw new Error('ai fallback request failed');
    const data = await response.json();
    const parsed = extractJsonObject(data?.response || data?.text || '');
    const songs = Array.isArray(parsed?.songs) ? parsed.songs : [];
    if (!songs.length) throw new Error('ai fallback returned empty songs');

    const items = [];
    for (const rawItem of songs.slice(0, requestedCount)) {
        const song = String(rawItem?.song || '').trim();
        const work = String(rawItem?.work || '').trim() || 'Unknown work';
        const reason = String(rawItem?.reason || '').trim();
        if (!song) continue;
        items.push({
            song,
            work,
            reason
        });
    }

    if (!items.length) throw new Error('ai fallback produced invalid songs');
    return items;
}

async function fetchSongsFromVerifiedSources(artist, requestedCount) {
    if (!LIVE_RETRIEVAL_ENABLED) return { items: [], sources: [] };

    const safeArtist = String(artist || '').trim();
    if (!safeArtist) return { items: [], sources: [] };

    const searchResponse = await fetch('/api/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            query: `${safeArtist} best songs top tracks official discography reviews`,
            maxResults: 7
        })
    });

    if (!searchResponse.ok) {
        throw new Error('verified music search failed');
    }

    const searchData = await searchResponse.json();
    const snippets = (Array.isArray(searchData?.results) ? searchData.results : [])
        .filter(r => {
            const title = String(r?.title || '').trim();
            const url = String(r?.url || '').trim();
            return !!title && /^https?:\/\//i.test(url);
        })
        .slice(0, 7);

    if (snippets.length < 4) {
        throw new Error('not enough verification sources');
    }

    const snippetsBlock = snippets
        .map((r, idx) => `${idx + 1}. TITLE: ${r.title}\nURL: ${r.url}\nSNIPPET: ${r.description}`)
        .join('\n\n');

    const verifyPrompt = `You are verifying popular songs for an artist using multiple web sources.

Artist: "${safeArtist}"

Return strict JSON only in this schema:
{
  "artist": "<artist>",
  "songs": [
    {
      "song": "<song name>",
      "work": "<album, film, or single>",
      "reason": "<short grounded reason>",
      "evidenceIds": [1,2]
    }
  ]
}

Rules:
- Give up to ${requestedCount} songs.
- Use only the sources below.
- Every song must have at least one evidence id.
- Prefer songs that are widely recognized across multiple sources.
- Do not invent titles, albums, or evidence ids.
- Output valid JSON only.

Sources:
${snippetsBlock}`;

    const verifyResponse = await fetch('/api/chat-groq', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            message: verifyPrompt,
        })
    });

    if (!verifyResponse.ok) {
        throw new Error('verified song extraction failed');
    }

    const verifyData = await verifyResponse.json();
    const parsed = extractJsonObject(verifyData?.response || verifyData?.text || '');
    const songs = Array.isArray(parsed?.songs) ? parsed.songs : [];
    if (!songs.length) {
        throw new Error('verified song extraction returned no songs');
    }

    const items = [];
    for (const rawItem of songs.slice(0, requestedCount)) {
        const song = String(rawItem?.song || '').trim();
        const work = String(rawItem?.work || '').trim();
        const reason = String(rawItem?.reason || '').trim();
        const ids = Array.isArray(rawItem?.evidenceIds) ? rawItem.evidenceIds : [];
        if (!song) continue;

        const mapped = ids
            .map(id => Number(id))
            .filter(n => Number.isFinite(n) && n >= 1 && n <= snippets.length)
            .map(n => snippets[n - 1]);

        if (!mapped.length) continue;

        items.push({
            song,
            work,
            workVerified: !!work && isWorkMentionedInEvidence(work, mapped),
            reason
        });
    }

    if (!items.length) {
        throw new Error('verified songs could not be grounded');
    }

    return { items, sources: snippets };
}

function formatMusicSongReply(artist, requestedCount, items, fallback = false, mode = 'top') {
    const safeArtist = String(artist || 'Unknown artist').trim();
    const count = clampSongCount(requestedCount, 5);
    const label = mode === 'latest' ? 'Latest' : 'Top';
    const lines = [`[Music] ${label} ${count} songs for ${safeArtist}`, ''];
    items.slice(0, count).forEach((item, index) => {
        const song = String(item?.song || '').trim();
        if (!song) return;
        lines.push(`${index + 1}. ${song}`);
    });

    if (lines.length === 2) {
        lines.push('No songs found.');
    }

    return lines.join('\n');
}

function formatBestEffortMusicSearchReply(artist, requestedCount, snippets, mode = 'latest') {
    const safeArtist = String(artist || 'the artist').trim();
    const count = clampSongCount(requestedCount, mode === 'latest' ? 5 : 8);
    const sourceItems = (Array.isArray(snippets) ? snippets : [])
        .filter(item => String(item?.title || '').trim() && String(item?.url || '').trim())
        .slice(0, Math.max(3, Math.min(count, 6)));
    const label = mode === 'latest' ? 'Recent music results' : 'Music results';
    const lines = [`[Music] ${label} for ${safeArtist}`, ''];

    if (!sourceItems.length) {
        lines.push('I could not fetch music sources right now, but I can still suggest well-known songs if you ask for top songs.');
        return lines.join('\n');
    }

    sourceItems.forEach((item, index) => {
        const title = String(item.title || '').replace(/\s+/g, ' ').trim();
        const description = String(item.description || '').replace(/\s+/g, ' ').trim();
        const url = String(item.url || '').trim();
        lines.push(`${index + 1}. ${title}`);
        if (description) lines.push(`   ${description.slice(0, 180)}`);
        lines.push(`   Source: ${url}`);
    });

    lines.push('');
    lines.push('Note: I ranked these from live music-search results, so this is a best-effort recent-release view rather than a guaranteed single official discography answer.');
    return lines.join('\n');
}

async function publishBestEffortMusicSearchReply(originalText, artist, requestedCount, snippets, wantsLatest) {
    const reply = formatBestEffortMusicSearchReply(artist, requestedCount, snippets, wantsLatest ? 'latest' : 'top');
    addVerifiedAssistantMessage(reply, wantsLatest ? 'Best-effort live music sources' : 'Music sources');
    await prepareApiReply('artist_song_grounded', {
        artist
    }, wantsLatest ? `Here are recent music results for ${artist}.` : `Here are music results for ${artist}.`);
    saveToHistory(originalText, reply);
    return true;
}

function toCompactLower(input) {
    return String(input || '')
        .toLowerCase()
        .replace(/[^a-z0-9\s]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
}

function isWorkMentionedInEvidence(work, evidenceItems) {
    const candidate = toCompactLower(work);
    if (!candidate) return false;
    const corpus = (Array.isArray(evidenceItems) ? evidenceItems : [])
        .map(item => `${item?.title || ''} ${item?.description || ''} ${item?.url || ''}`)
        .join(' ')
        .toLowerCase();
    return corpus.includes(candidate);
}

Artist: "${artist}"
Request type: "${wantsLatest ? 'latest/recent songs' : 'top/best songs'}"

function isPoliticalQuery(text) {
    const t = String(text || '').toLowerCase();
    if (!t.trim()) return false;
    return /\b(politic|political|election|vote|voting|ballot|campaign|manifesto|party|government|parliament|senate|congress|president|prime minister|pm\b|chief minister|cm\b|minister|bjp|inc\b|dmk|aiadmk|aap\b|republican|democrat|left wing|right wing|geopolitic|public policy|foreign policy|diplomacy|sanction)\b/.test(t);
}

function isStrictYesNoRequest(text) {
    const t = String(text || '').trim().toLowerCase();
    if (!t) return false;
    if (/\b(yes or no|just yes or no|answer yes or no|only yes or no|yes\/no)\b/.test(t)) return true;
    if (/^(can|could|would|will|do)\s+you\s+\b(help|give|tell|share|offer|provide|explain|advise)\b/.test(t)) return false;
    if (/\b(advice|help|guidance|suggestion|recommendation)s?\b/.test(t) && /\?$/.test(String(text || '').trim())) return false;
    const startsBinary = /^(is|are|am|was|were|do|does|did|can|could|should|would|will|has|have|had)\b/.test(t);
    if (!startsBinary) return false;
    // Keep this strict to avoid hijacking rich questions.
    return t.split(/\s+/).length <= 16;
}

function isVagueAdviceRequest(text) {
    const t = String(text || '').trim().toLowerCase();
    if (!t) return false;
    if (!/\b(advice|help|guidance|suggestion|recommendation)s?\b/.test(t)) return false;
    if (/\b(on|about|for|with)\b\s+\w+/.test(t)) return false;
    return /^(can|could|would|will|do)\s+you\b/.test(t) ||
           /\b(i need|give me|some)\s+(advice|help|guidance|suggestions?|recommendations?)\b/.test(t);
}

function extractComparisonEntities(text) {
    const normalized = String(text || '').replace(/\s+/g, ' ').trim();
    if (!normalized) return null;

    const vsMatches = [...normalized.matchAll(/([A-Za-z][A-Za-z0-9.&'\- ]{1,60})\s+(?:vs|versus|or)\s+([A-Za-z][A-Za-z0-9.&'\- ]{1,60})/gi)];
    if (!vsMatches.length) return null;

    const last = vsMatches[vsMatches.length - 1];
    const left = String(last[1] || '').replace(/\b(who is|who's|which is|best|better|between|among)\b/gi, '').trim();
    const right = String(last[2] || '').replace(/[?.!,;]+$/g, '').trim();

    if (!left || !right) return null;
    if (left.length < 2 || right.length < 2) return null;

    const genericTerms = new Set([
        'something', 'anything', 'everything', 'nothing',
        'someone', 'somebody', 'anyone', 'anybody',
        'this', 'that', 'these', 'those',
        'it', 'they', 'them', 'stuff', 'things', 'thing'
    ]);
    const leftNorm = left.toLowerCase().trim();
    const rightNorm = right.toLowerCase().trim();
    if (genericTerms.has(leftNorm) || genericTerms.has(rightNorm)) return null;

    return { left, right };
}

function isComparisonQuery(text) {
    const t = String(text || '').toLowerCase();
    const hasStrongComparisonSignal = /\b(best|better|vs|versus|compare|comparison)\b/.test(t);
    const hasOr = /\bor\b/.test(t);
    if (!hasStrongComparisonSignal && !hasOr) return false;
    if (hasOr && !hasStrongComparisonSignal && !/\b(which|who|what)\b/.test(t)) return false;
    return !!extractComparisonEntities(text);
}

function getComparisonDomainHint(text) {
    const t = String(text || '').toLowerCase();
    if (/\b(movie|film|cinema|actor|actress|director)\b/.test(t)) return 'cinema';
    if (/\b(music|song|singer|composer|album|soundtrack)\b/.test(t)) return 'music';
    if (/\b(sport|sports|player|team|cricket|football|soccer|tennis|basketball|match)\b/.test(t)) return 'sports';
    return 'general';
}

async function handleComparisonWithReliableSources(userText) {
    if (!LIVE_RETRIEVAL_ENABLED) return false;

    const entities = extractComparisonEntities(userText);
    if (!entities) return false;

    const left = entities.left;
    const right = entities.right;
    const domain = getComparisonDomainHint(userText);
    showThinkingIndicator('Checking reliable sources...');

    try {
        const queries = [
            `${left} vs ${right} ${domain}`,
            `${left} achievements awards reviews`,
            `${right} achievements awards reviews`
        ];

        const searchResults = await Promise.all(
            queries.map(async (query) => {
                try {
                    const response = await fetch('/api/search', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ query, maxResults: 4 })
                    });
                    if (!response.ok) return [];
                    const data = await response.json();
                    return Array.isArray(data?.results) ? data.results : [];
                } catch (e) {
                    return [];
                }
            })
        );

        const deduped = [];
        const seen = new Set();
        for (const item of searchResults.flat()) {
            const url = String(item?.url || '').trim();
            if (!url || seen.has(url)) continue;
            seen.add(url);
            deduped.push(item);
            if (deduped.length >= 8) break;
        }

        if (!deduped.length) {
            await deliverApiReply('comparison_fetch_error', {
                left,
                right
            }, { historyKey: userText });
            return true;
        }

        const snippets = deduped
            .map((r, i) => `${i + 1}. ${r.title}\nSnippet: ${r.description}\nURL: ${r.url}`)
            .join('\n\n');

        const compareResponse = await fetch('/api/chat-groq', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: `Compare "${left}" and "${right}" using ONLY the snippets below.

Question: "${userText}"
Domain: ${domain}

Output format:
Conclusion: <one-line verdict>
Why:
- <point 1>
- <point 2>
- <point 3>

Rules:
- If evidence is mixed, explicitly say it is close.
- No political commentary.
- No made-up claims.

Snippets:
${snippets}`
            })
        });

        const compareData = await compareResponse.json();
        const analysis = String(compareData?.response || compareData?.text || '').trim();
        const sourceLines = deduped.slice(0, 6).map((r, i) => `${i + 1}. [${r.title}](${r.url})`).join('\n');
        const finalMsg = `${analysis}\n\nSources:\n${sourceLines}`;

        addChatMessage(finalMsg, false);
        const compareSummary = await composeApiReply('comparison_ready', {
            left,
            right
        }, {
            fallbackText: `I compared ${left} and ${right} using reliable web sources.`
        });
        saveToHistory(userText, finalMsg);
        return true;
    } catch (error) {
        const fallback = `I could not complete a reliable comparison right now for ${left} and ${right}.`;
        addChatMessage(fallback, false);
        saveToHistory(userText, fallback);
        return true;
    } finally {
        hideThinkingIndicator();
    }
}

function isLiveRetrievalQuery(text) {
    const t = String(text || '').toLowerCase().trim();
    if (!t) return false;
    const explicitLiveContext = /\b(news|headlines?|breaking|live|right now|current events?|today|latest|recent|update|status|who won|winner|score|standings|fixture|schedule|market|price|rate|currency|exchange|war|conflict|election)\b/;
    const technicalConceptSignals = /\b(hld|lld|system design|design pattern|architecture|api design|database design|algorithm|data structure|o\(?n\)?|time complexity|space complexity|java|javascript|python|react|node|sql|backend|frontend|microservices?)\b/;
    if (technicalConceptSignals.test(t) && !explicitLiveContext.test(t)) return false;

    const liveSignals = [
        /\bwhat(?:'s| is)?(?:\s+\w+){0,2}\s+happening\b/,
        /\bwhat happened\b/,
        /\b(latest|recent|current|today)\b.*\b(news|events?|updates?|status|happening|result|score|standings|fixture|schedule|price|rate|market|war|conflict|election)\b/,
        /\b(news|events?|updates?|status|happening|result|score|standings|fixture|schedule|price|rate|market|war|conflict|election)\b.*\b(latest|recent|current|today)\b/,
        /\bright now\b/,
        /\bas of now\b/,
        /\bnext\b.*\b(match|game|fixture|film|movie|release|project|holiday|album|song|show|series)\b/,
        /\bupdate(?:s)? on\b/,
        /\bstatus of\b/,
        /\bnews about\b/,
        /\bexchange rate\b/,
        /\bcurrency\b.*\b(convert|rate|today|now)\b/,
        /\b(price|cost|value|market)\b.*\b(today|now|current|latest)\b/
    ];

    if (liveSignals.some(rx => rx.test(t))) return true;

    if (/\b(upcoming|future|next)\b/.test(t) &&
        /\b(movie|film|release|project|song|album|single|show|series|match|game|fixture|schedule|holiday|festival)\b/.test(t)) {
        return true;
    }

    if (/\b(upcoming|future|next)\b/.test(t) &&
        /\b(team|club|country|nation|composer|music director|singer|artist|director|actor|actress|producer)\b/.test(t)) {
        return true;
    }

    return /\b(what(?:'s| is)|tell me|give me|brief me|update me)\b/.test(t) &&
           /\b(in|about|on)\b/.test(t) &&
           /\b(middle[\s-]?east|ukraine|russia|israel|gaza|iran|syria|oil market|stock market|economy|inflation|forex|usd|inr|bitcoin|crypto|holiday calendar|release schedule|match schedule)\b/.test(t);
}

function isExplicitWebSearchRequest(text) {
    const t = String(text || '').toLowerCase().trim();
    if (!t) return false;
    return /\b(search (?:the )?(?:web|internet)|web search|browse (?:the )?(?:web|internet)|look ?up (?:on|in)? ?(?:the )?(?:web|internet)|find (?:on|in)? ?(?:the )?(?:web|internet)|google (?:for|about)|check online|online sources?|with sources?)\b/.test(t);
}

function normalizeExplicitWebSearchQuery(text) {
    const raw = String(text || '').trim();
    if (!raw) return raw;
    const normalized = raw
        .replace(/^(?:please\s+)?(?:can you|could you|would you)?\s*(?:search|find|look ?up|browse|check)\s+(?:the\s+)?(?:web|internet)\s+(?:for|about|on)?\s*/i, '')
        .replace(/^(?:please\s+)?(?:google|web search)\s+(?:for|about)?\s*/i, '')
        .replace(/\b(?:from|using)\s+(?:the\s+)?(?:web|internet)\b/gi, ' ')
        .replace(/\b(?:with|include)\s+sources?\b/gi, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    return normalized || raw;
}

function isStrictLatestQuery(text) {
    const t = String(text || '').toLowerCase().trim();
    if (!t) return false;
    const freshnessSignals = /\b(latest|current|today|now|live|as of|recent)\b/;
    if (!freshnessSignals.test(t)) return false;

    const technicalConceptSignals = /\b(hld|lld|system design|design pattern|architecture|api design|database design|algorithm|data structure|time complexity|space complexity|java|javascript|python|react|node|sql|backend|frontend|microservices?)\b/;
    if (technicalConceptSignals.test(t) && !/\b(news|headlines?|winner|score|standings|price|rate|market|president|prime minister|ceo|captain|coach|release|movie|song)\b/.test(t)) {
        return false;
    }
    const intent = extractLiveQueryIntent(t);
    const entityIntent = extractUniversalEntityIntent(t, intent);
    if (intent?.domain === 'entertainment' || entityIntent?.domain === 'entertainment') {
        return false;
    }
    return shouldRequireVerifiedSources(t, intent, entityIntent);
}

function buildCanonicalUrlClient(input) {
    try {
        const parsed = new URL(String(input || '').trim());
        const protocol = parsed.protocol.toLowerCase();
        if (protocol !== 'http:' && protocol !== 'https:') return '';
        const dropKeys = new Set([
            'utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content',
            'utm_id', 'gclid', 'fbclid', 'igshid', 'mc_cid', 'mc_eid', 'ref', 'ref_src'
        ]);
        const kept = [];
        for (const [k, v] of parsed.searchParams.entries()) {
            if (dropKeys.has(String(k || '').toLowerCase())) continue;
            kept.push([k, v]);
        }
        kept.sort((a, b) => String(a[0]).localeCompare(String(b[0])));
        const normalizedPath = parsed.pathname.replace(/\/+$/, '') || '/';
        const query = kept.map(([k, v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`).join('&');
        const host = parsed.hostname.toLowerCase().replace(/^www\./, '');
        return `${protocol}//${host}${normalizedPath}${query ? `?${query}` : ''}`;
    } catch (_) {
        return '';
    }
}

function extractStrictLatestEntityTopic(text, intent = null) {
    const raw = String(text || '').trim();
    const liveIntent = intent || extractLiveQueryIntent(raw);
    const normalized = normalizeLiveTopic(raw);
    const topic = normalized || liveIntent?.topic || raw;
    return String(topic || '')
        .replace(/\b(latest|current|today|now|live|as of|recent|update|updates|status)\b/gi, ' ')
        .replace(/\s+/g, ' ')
        .trim();
}

function getStrictLatestDomainHint(domain) {
    const d = String(domain || 'general').toLowerCase();
    if (d === 'sports') return 'official result standings score';
    if (d === 'finance') return 'official market price rate';
    if (d === 'politics' || d === 'news') return 'official statement update';
    if (d === 'space_science') return 'official mission update';
    if (d === 'entertainment') return 'official release update';
    return 'trusted update source';
}

function getStrictLatestOfficialConstraint(domain) {
    const d = String(domain || 'general').toLowerCase();
    if (d === 'sports') return 'site:espn.com OR site:espncricinfo.com OR site:icc-cricket.com';
    if (d === 'finance') return 'site:bloomberg.com OR site:reuters.com OR site:marketwatch.com';
    if (d === 'politics' || d === 'news') return 'site:reuters.com OR site:apnews.com OR site:bbc.com';
    if (d === 'space_science') return 'site:nasa.gov OR site:isro.gov.in OR site:esa.int';
    if (d === 'entertainment') return 'site:imdb.com OR site:wikipedia.org';
    return 'site:reuters.com OR site:apnews.com';
}

function buildStrictLatestQueries(userText, intent = null) {
    const raw = String(userText || '').trim();
    const liveIntent = intent || extractLiveQueryIntent(raw);
    const entityIntent = extractUniversalEntityIntent(raw, liveIntent);
    const entityTopic = extractStrictLatestEntityTopic(raw, liveIntent) || raw;
    const freshnessMatch = raw.match(/\b(latest|current|today|now|live|as of|recent)\b/i);
    const freshnessToken = freshnessMatch?.[1] ? freshnessMatch[1].toLowerCase() : 'latest';
    const domainHint = getStrictLatestDomainHint(liveIntent.domain);
    const officialConstraint = getStrictLatestOfficialConstraint(liveIntent.domain);
    const explicitYearOrDate = raw.match(/\b(?:19|20)\d{2}\b|(?:\b\d{4}-\d{2}-\d{2}\b)/)?.[0] || '';
    const isSportsRole = String(entityIntent?.domain || '').toLowerCase() === 'sports' && String(entityIntent?.relationType || '').toLowerCase() === 'role';
    const currentYear = new Date().getFullYear();

    const variants = [
        raw,
        `${entityTopic} ${freshnessToken}`.trim(),
        `${entityTopic} ${domainHint}`.trim(),
        `${entityTopic} ${officialConstraint}`.trim(),
        explicitYearOrDate ? `${entityTopic} ${explicitYearOrDate}`.trim() : '',
        isSportsRole ? `${entityTopic} ${currentYear}`.trim() : '',
        isSportsRole ? `${entityTopic} IPL ${currentYear} site:iplt20.com`.trim() : '',
        isSportsRole ? `${entityTopic} IPL ${currentYear} site:espncricinfo.com OR site:bcci.tv OR site:cricbuzz.com`.trim() : ''
    ].filter(Boolean);

    return Array.from(new Set(variants)).slice(0, 7);
}

function dedupeStrictLatestResults(results) {
    const deduped = [];
    const seen = new Set();
    for (const item of Array.isArray(results) ? results : []) {
        const canonical = String(item?.canonicalUrl || '').trim() || buildCanonicalUrlClient(item?.url || '');
        const key = canonical || String(item?.url || '').trim();
        if (!key || seen.has(key)) continue;
        seen.add(key);
        deduped.push({
            ...item,
            canonicalUrl: canonical || key
        });
    }
    return deduped;
}

function getPublishedDateStrictLatest(result) {
    const direct = String(result?.publishedAt || '').trim();
    if (direct) {
        const parsed = Date.parse(direct);
        if (Number.isFinite(parsed)) return new Date(parsed);
    }
    return extractResultPublishedDate(result);
}

function scoreStrictLatestProvider(provider) {
    const p = String(provider || '').toLowerCase();
    if (p === 'serper') return 3;
    if (p === 'google-news-rss') return 2;
    if (p === 'duckduckgo-html' || p === 'duckduckgo-api') return 1;
    return 0;
}

function scoreStrictLatestRecency(result) {
    const published = getPublishedDateStrictLatest(result);
    if (!published) return -2;
    const ageHours = Math.max(0, (Date.now() - published.getTime()) / (1000 * 60 * 60));
    if (ageHours <= 24) return 6;
    if (ageHours <= 72) return 4;
    if (ageHours <= 168) return 2;
    return -1;
}

function rankStrictLatestSources(results, domain, queryText = '') {
    const tokens = String(queryText || '')
        .toLowerCase()
        .replace(/[^a-z0-9\s]/g, ' ')
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 12);

    return [...(Array.isArray(results) ? results : [])]
        .map((item, index) => {
            const title = String(item?.title || '').toLowerCase();
            const description = String(item?.description || '').toLowerCase();
            const overlap = tokens.reduce((acc, token) => acc + (title.includes(token) || description.includes(token) ? 1 : 0), 0);
            const trust = scoreSourcePolicy(item?.url, domain);
            const recency = scoreStrictLatestRecency(item);
            const provider = scoreStrictLatestProvider(item?.provider);
            return {
                ...item,
                __strictScore: (trust * 2) + overlap + recency + provider - (index * 0.01)
            };
        })
        .sort((a, b) => b.__strictScore - a.__strictScore)
        .map(({ __strictScore, ...item }) => item);
}

function getStrictLatestStaleness(domain, queryText, sources) {
    const pool = Array.isArray(sources) ? sources : [];
    if (!pool.length) return { stale: true, reason: 'no_sources' };

    const newestTs = Math.max(...pool.map(item => getPublishedDateStrictLatest(item)?.getTime() || 0), 0);
    const newestDate = newestTs ? new Date(newestTs) : null;
    const ageHours = newestDate ? (Date.now() - newestDate.getTime()) / (1000 * 60 * 60) : Number.POSITIVE_INFINITY;
    const d = String(domain || 'general').toLowerCase();
    const lower = String(queryText || '').toLowerCase();
    const currentYear = new Date().getFullYear();
    const roleNeedsSeasonSignal =
        d === 'sports' &&
        /\b(captain|coach)\b/.test(lower) &&
        /\b(ipl|league|season|tournament|team|club|csk|mi|rcb|kkr|srh|dc|pbks|gt|rr|lsg)\b/.test(lower);
    if (roleNeedsSeasonSignal) {
        const hasCurrentSeasonEvidence = pool.some(item => {
            const text = `${String(item?.title || '')} ${String(item?.description || '')}`.toLowerCase();
            return new RegExp(`\\b${currentYear}\\b`).test(text) || /\bthis season\b/.test(text) || /\bcurrent season\b/.test(text);
        });
        if (!hasCurrentSeasonEvidence) {
            return { stale: true, reason: 'missing_current_season_signal', ageHours, newestDate };
        }
    }

    if (['news', 'politics', 'sports'].includes(d)) {
        return { stale: ageHours > 72, reason: ageHours > 72 ? 'older_than_72h' : '', ageHours, newestDate };
    }
    if (d === 'finance' || /\b(price|rate|exchange|market)\b/.test(lower)) {
        return { stale: ageHours > 24, reason: ageHours > 24 ? 'older_than_24h' : '', ageHours, newestDate };
    }
    if (d === 'entertainment') {
        const hasDateEvidence = pool.slice(0, 5).some(item => Boolean(getPublishedDateStrictLatest(item)));
        return { stale: !hasDateEvidence, reason: !hasDateEvidence ? 'missing_release_date_evidence' : '', ageHours, newestDate };
    }
    return { stale: false, reason: '', ageHours, newestDate };
}

function buildUniversalLiveRefineHint(queryText, intent = {}, entityIntent = {}, sources = []) {
    const query = String(queryText || '').trim();
    const lowerQuery = query.toLowerCase();
    const relation = String(entityIntent?.relationType || intent?.factType || '').toLowerCase();
    const subject = String(entityIntent?.subject || '').trim();
    const hasEntity = Boolean(subject || entityIntent?.targetEntity);
    const asksFresh = /\b(latest|recent|current|today|now|live|as of|right now)\b/.test(lowerQuery);
    const hasExplicitTime = Boolean(intent?.year || entityIntent?.year || hasExplicitYearReference(lowerQuery) || /\b(today|this week|this month|this year|as of)\b/.test(lowerQuery));
    const relationNeedsScope = ['role', 'winner', 'score', 'standings', 'qualification', 'stats', 'title_count', 'price', 'latest_work'].includes(relation);
    const hasOrgOrScope = /\b(of|for|at|in)\b/.test(lowerQuery);
    const missing = [];

    if (!hasEntity) {
        missing.push('include the exact person, organization, team, or topic');
    }
    if (relationNeedsScope && !hasOrgOrScope) {
        missing.push('add the exact scope (for example country, organization, institution, league, or product)');
    }
    if (asksFresh && !hasExplicitTime) {
        missing.push('add an exact time window (for example "as of today", a specific date, or a year)');
    }
    const distinctDomains = Array.from(new Set((Array.isArray(sources) ? sources : []).map(item => getDomainFromUrl(item?.url || '')).filter(Boolean)));
    if (distinctDomains.length === 1) {
        missing.push('add one tighter qualifier (for example exact scope or date) so I can improve source coverage');
    }

    if (!missing.length) {
        return 'Refine hint: add one tighter qualifier (exact date/window + exact entity scope + trusted source constraint).';
    }
    return `Refine hint: ${missing.slice(0, 3).join('; ')}.`;
}

function buildStrictLatestRefineHint(intent, queryText, entityIntent = {}, sources = []) {
    return buildUniversalLiveRefineHint(queryText, intent, entityIntent, sources);
}

function buildStrictLatestFailureMessage(intent, queryText, reason = 'verification_unavailable', entityIntent = {}, sources = []) {
    if (String(intent?.domain || '').toLowerCase() === 'finance') {
        return 'I could not reach live market/search sources for this current finance query right now. Please retry in a moment, or check a live rates source like your bank, Google Finance, XE, Wise, or RBI before using the number.';
    }
    const prefix = reason === 'stale_sources'
        ? 'I cannot verify a fresh latest update from sufficiently recent sources right now.'
        : 'I cannot verify this latest/current request confidently from enough usable independent sources right now.';
    return `${prefix}\n${buildStrictLatestRefineHint(intent, queryText, entityIntent, sources)}`;
}

function formatStrictLatestAnswer(answerText, sources) {
    const clean = String(answerText || '').replace(/\s+/g, ' ').trim();
    const sentenceMatches = splitReadableSentences(clean);
    const concise = sentenceMatches.map(s => s.trim()).filter(Boolean).slice(0, 3).join(' ').trim() || clean;
    const sourceLines = (Array.isArray(sources) ? sources : [])
        .slice(0, 5)
        .map((r, i) => `${i + 1}. [${r.title}](${r.url})`)
        .join('\n');
    return `${concise}\nAs of: ${formatAsOfTimestamp()}\nSources:\n${sourceLines}`;
}

async function publishStrictLatestFailure(userText, intent, options = {}) {
    const bestEffort = await buildVerifiedSearchSummary(userText, {
        badge: 'Best-effort live sources',
        summary: 'I could not fully verify this with strict checks, so here is the best-supported live summary.'
    });
    if (bestEffort?.text) {
        addVerifiedAssistantMessage(bestEffort.text, bestEffort.badge || 'Best-effort live sources');
        saveToHistory(userText, bestEffort.text);
        return true;
    }

    if (String(intent?.domain || '').toLowerCase() !== 'finance' && isConciseDirectFactQuery(userText)) {
        const ai = await askGeminiAI(userText);
        const modelAnswer = String(ai?.response || ai?.text || '').trim();
        if (modelAnswer && !ai?.aborted && ai?.intent !== 'soft_fallback') {
            addModelAssistantMessage(modelAnswer, 'Model answer');
            saveToHistory(userText, modelAnswer);
            return true;
        }
    }

    const message = options?.message || buildStrictLatestFailureMessage(
        intent,
        userText,
        options?.reason || 'verification_unavailable',
        options?.entityIntent || {},
        options?.sources || []
    );
    addVerifiedAssistantMessage(message, 'Verification unavailable');
    saveToHistory(userText, message);
    return true;
}

async function handleStrictLatestQuery(userText) {
    if (!LIVE_RETRIEVAL_ENABLED) {
        return publishLiveDisabledMessage(userText);
    }

    showThinkingIndicator('Checking latest trusted sources...');
    const controller = beginAbortableRequest();
    const budgetMs = TRUST_FIRST_RELIABILITY_POLICY.verificationBudgetMs;
    const summaryTimeoutMs = TRUST_FIRST_RELIABILITY_POLICY.summaryTimeoutMs;
    const budgetTimer = setTimeout(() => {
        try { controller.abort(); } catch (_) {}
    }, budgetMs);

    try {
        const query = String(userText || '').trim();
        const intent = extractLiveQueryIntent(query);
        const entityIntent = extractUniversalEntityIntent(query, intent);
        const strictQueries = buildStrictLatestQueries(query, intent);
        const resultSets = await Promise.all(
            strictQueries.map(async (q) => {
                try {
                    const response = await fetch('/api/search', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        signal: controller.signal,
                        body: JSON.stringify({ query: q, maxResults: 6 })
                    });
                    if (!response.ok) return [];
                    const data = await response.json();
                    return Array.isArray(data?.results) ? data.results.filter(Boolean) : [];
                } catch (_) {
                    return [];
                }
            })
        );

        const merged = dedupeStrictLatestResults(resultSets.flat());
        const ranked = rankStrictLatestSources(merged, intent.domain || 'general', query).slice(0, 10);
        const top = ranked.slice(0, 6);

        const distinctDomains = Array.from(new Set(top.map(item => getDomainFromUrl(item?.url || '')).filter(Boolean)));
        const trustedCount = top.filter(item => scoreSourcePolicy(item?.url, intent.domain || 'general') > 0).length;
        const staleness = getStrictLatestStaleness(intent.domain || 'general', query, top);
        const verificationSnapshot = {
            sourceCount: top.length,
            distinctDomainCount: distinctDomains.length,
            trustedCount,
            stale: Boolean(staleness?.stale),
            pass: top.length >= 3 && distinctDomains.length >= 2 && trustedCount >= 2 && !staleness?.stale
        };
        window.__lastVerificationSnapshot = verificationSnapshot;

        const debugTrace = {
            strictLatest: true,
            query,
            domain: intent.domain || 'general',
            relationType: entityIntent?.relationType || 'general',
            queryVariantsUsed: strictQueries,
            thresholdChecks: {
                minSources: 3,
                minDomains: 2,
                minTrusted: 2,
                sourceCount: top.length,
                distinctDomainCount: distinctDomains.length,
                trustedCount
            },
            staleness: {
                stale: Boolean(staleness?.stale),
                reason: staleness?.reason || '',
                newestDate: staleness?.newestDate ? staleness.newestDate.toISOString() : null
            },
            topSourceDomains: distinctDomains.slice(0, 6),
            verificationSnapshot
        };
        window.__strictLatestDebug = debugTrace;
        console.info('[strict-latest-debug]', debugTrace);

        if (!verificationSnapshot.pass) {
            if (top.length) {
                const bestEffortPublished = await publishBestEffortFromSources({
                    userText: query,
                    intent,
                    entityIntent
                }, top, {
                    badge: 'Best-effort latest sources',
                    summaryText: 'I could not fully verify this, so here is the best-supported answer from available sources.'
                });
                if (bestEffortPublished) return true;
            }
            const failReason = staleness?.stale ? 'stale_sources' : 'verification_unavailable';
            return publishStrictLatestFailure(query, intent, {
                reason: failReason,
                entityIntent,
                sources: top
            });
        }

        // For role queries, never let a generic summarizer decide the value.
        // Extract the candidate directly from evidence and enforce person-name validation.
        if (String(entityIntent?.relationType || '').toLowerCase() === 'role') {
            const isSportsRoleQuery = String(entityIntent?.domain || '').toLowerCase() === 'sports';
            let roleValue = '';
            if (isSportsRoleQuery) {
                const sportsCandidate = selectBestSportsRoleCandidate(top, entityIntent, intent);
                if (sportsCandidate?.value && isLikelyPersonNameCandidate(sportsCandidate.value)) {
                    roleValue = sportsCandidate.value;
                }
            }
            if (!roleValue && !isSportsRoleQuery) {
                const roleAgreement = buildSourceAgreement(top, entityIntent);
                const candidate = String(roleAgreement?.top?.value || '').trim();
                if (candidate && isLikelyPersonNameCandidate(candidate)) {
                    roleValue = candidate;
                }
            }
            if (!roleValue) {
                const bestEffortRole = await publishBestEffortFromSources({
                    userText: query,
                    intent,
                    entityIntent
                }, top, {
                    badge: 'Best-effort latest sources',
                    summaryText: 'I could not fully verify the role holder, so here is the best-supported answer from available sources.'
                });
                if (bestEffortRole) return true;
                return publishStrictLatestFailure(query, intent, {
                    reason: 'verification_unavailable',
                    entityIntent,
                    sources: top,
                    summaryText: 'I could not verify a reliable role holder name from independent trusted sources.'
                });
            }
            const directRoleAnswer = formatConsensusAnswer(entityIntent, { top: { value: roleValue } });
            if (!directRoleAnswer) {
                return publishStrictLatestFailure(query, intent, {
                    reason: 'verification_unavailable',
                    entityIntent,
                    sources: top
                });
            }
            const finalRoleMsg = formatStrictLatestAnswer(directRoleAnswer, top);
            addVerifiedAssistantMessage(finalRoleMsg, 'Verified latest sources');
            saveToHistory(query, finalRoleMsg);
            return true;
        }

        const snippets = top
            .map((r, i) => `${i + 1}. ${r.title}\nSnippet: ${r.description}\nURL: ${r.url}\nPublishedAt: ${r.publishedAt || 'unknown'}`)
            .join('\n\n');

        let conciseAnswer = '';
        try {
            const summaryResponse = await Promise.race([
                fetch('/api/chat-groq', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    signal: controller.signal,
                    body: JSON.stringify({
                        message: `User question: "${query}"

Rules:
- Return only the direct answer in 1-3 sentences.
- No headings.
- No confidence labels.
- No source list.
- If evidence is mixed or weak, return exactly: "I cannot verify this latest update confidently right now."

Snippets:
${snippets}`
                    })
                }),
                new Promise((_, reject) => setTimeout(() => reject(new Error('strict_latest_summary_timeout')), summaryTimeoutMs))
            ]);
            if (!summaryResponse || !summaryResponse.ok) {
                throw new Error('strict_latest_summary_failed');
            }
            const summaryData = await summaryResponse.json();
            conciseAnswer = String(summaryData?.response || summaryData?.text || '').trim();
        } catch (_) {
            conciseAnswer = '';
        }

        if (!conciseAnswer || /cannot verify this latest update confidently right now/i.test(conciseAnswer)) {
            const bestEffortPublished = await publishBestEffortFromSources({
                userText: query,
                intent,
                entityIntent
            }, top, {
                badge: 'Best-effort latest sources',
                summaryText: 'I could not produce a fully verified latest summary, so here is the best-supported answer from available sources.'
            });
            if (bestEffortPublished) return true;
            return publishStrictLatestFailure(query, intent, {
                reason: 'verification_unavailable',
                entityIntent,
                sources: top
            });
        }

        const finalMsg = formatStrictLatestAnswer(conciseAnswer, top);
        addVerifiedAssistantMessage(finalMsg, 'Verified latest sources');
        saveToHistory(query, finalMsg);
        return true;
    } catch (error) {
        if (isAbortError(error)) {
            return publishStrictLatestFailure(String(userText || '').trim(), extractLiveQueryIntent(String(userText || '').trim()), {
                reason: 'verification_timeout',
                entityIntent: extractUniversalEntityIntent(String(userText || '').trim(), extractLiveQueryIntent(String(userText || '').trim())),
                summaryText: 'Verification timed out before confidence threshold.'
            });
        }
        return publishStrictLatestFailure(String(userText || '').trim(), extractLiveQueryIntent(String(userText || '').trim()), {
            reason: 'verification_unavailable',
            entityIntent: extractUniversalEntityIntent(String(userText || '').trim(), extractLiveQueryIntent(String(userText || '').trim())),
            summaryText: 'I hit a verification issue while checking latest sources.'
        });
    } finally {
        clearTimeout(budgetTimer);
        clearActiveRequest(controller);
        hideThinkingIndicator();
    }
}

function normalizeLiveTopic(text) {
    const stopWords = new Set([
        'in', 'the', 'a', 'an', 'of', 'for', 'to', 'on', 'at', 'by', 'from',
        'who', 'what', 'is', 'was', 'are', 'were', 'won', 'winner', 'winners',
        'champion', 'champions', 'score', 'scores', 'scored', 'stat', 'stats',
        'standing', 'standings', 'points', 'table', 'rank', 'ranking', 'rankings',
        'medal', 'medals', 'title', 'titles', 'result', 'results', 'qualified',
        'eliminated', 'record', 'records', 'how', 'many', 'latest', 'recent',
        'current', 'today', 'tonight', 'live', 'now', 'status', 'update', 'updates',
        'brief', 'me', 'tell', 'about', 'give', 'show'
    ]);

    const tokens = String(text || '')
        .toLowerCase()
        .replace(/[?!,]/g, ' ')
        .replace(/\b(this year|this season|final result|points table|tell me about|give me|show me|what(?:'s| is)|who is)\b/gi, ' ')
        .replace(/\s+/g, ' ')
        .trim()
        .split(' ')
        .filter(Boolean)
        .filter(token => !stopWords.has(token));

    const deduped = [];
    const seen = new Set();
    for (const token of tokens) {
        const key = /^\d{4}$/.test(token) ? `year:${token}` : token;
        if (seen.has(key)) continue;
        seen.add(key);
        deduped.push(token);
    }

    return deduped.join(' ').trim();
}

function extractLiveQueryIntent(text) {
    const raw = String(text || '').trim();
    const t = raw.toLowerCase();
    const yearMatch = raw.match(/\b(19|20)\d{2}\b/);

    const institutionalContext = /\b(university|college|school|institute|department|faculty|campus|program|office|ministry|agency|state|government|parliament|senate|team|club|company|corporation)\b/.test(t);
    const politicalContext = /\b(president|prime minister|pm|chief minister|cm|governor|mayor|minister|party|government|parliament|senate|election)\b/.test(t);
    const spaceContext = /\b(astronaut|scientist|space|nasa|isro|esa|jaxa|agency|administrator|director general)\b/.test(t);
    const entertainmentContext = /\b(actor|actress|movie|film|films|cinema|producer|singer|composer|music director|song|songs|album|albums|show|series|web series|filmography|discography|imdb|release|project|artist|poet|painter|writer|author|box office)\b/.test(t) || (/\bdirector\b/.test(t) && /\b(movie|film|cinema|series|show|album|song|music|imdb)\b/.test(t));

    let domain = 'general';
    if (isExchangeRateQuery(t) || isMarketPriceQuery(t)) {
        domain = 'finance';
    } else if (isSportsLiveResultQuery(t)) {
        domain = 'sports';
    } else if (politicalContext) {
        domain = 'politics';
    } else if (spaceContext) {
        domain = 'space_science';
    } else if (roleContextQuery && institutionalContext) {
        domain = 'general';
    } else if (entertainmentContext && !roleContextQuery) {
        domain = 'entertainment';
    } else if (shouldUseNewsEndpointForCurrentQuery(t) || isNewsworthyLiveTopic(t)) {
        domain = 'news';
    }

    let factType = 'general';
    if (/\b(latest|recent|new|newest|most recent|current|upcoming|future)\b.*\b(movie|film|release|song|album|single|show|series|project)\b|\b(movie|film|release|song|album|single|show|series|project)\b.*\b(latest|recent|new|newest|most recent|current|upcoming|future)\b/.test(t)) {
        factType = 'latest_work';
    } else if (/\b(?:who is|who was|what is)\b[^?.!]{0,140}\b(ceo|founder|president|prime minister|pm|chief minister|cm|captain|coach|chairman|chairperson|governor|mayor|head|leader|administrator|director|dean|chancellor|principal|secretary|director general)\b|\b(current|latest)\s+(ceo|founder|president|prime minister|pm|chief minister|cm|captain|coach|chairman|chairperson|governor|mayor|head|leader|administrator|director|dean|chancellor|principal|secretary|director general)\b|\b(ceo|founder|president|prime minister|pm|chief minister|cm|captain|coach|chairman|chairperson|governor|mayor|head|leader|administrator|director|dean|chancellor|principal|secretary|director general)\s+of\b|\bwho\s+heads?\b/.test(t)) {
        factType = 'role';
    } else if (/\b(known for|famous for|best known for)\b/.test(t)) {
        factType = 'known_for';
    } else if (/\b(next|upcoming)\b.*\b(match|game|fixture|opponent|schedule)\b|\b(match|game|fixture|schedule)\b.*\b(next|upcoming)\b/.test(t)) {
        factType = 'schedule';
    } else if (/\b(next|upcoming)\b.*\b(holiday|festival|public holiday|bank holiday)\b|\b(holiday|festival|public holiday|bank holiday)\b.*\b(next|upcoming)\b/.test(t)) {
        factType = 'holiday';
    } else if (/\b(stat|stats|record|records|how many|total titles?|total cups?|how many cups?|how many titles?)\b/.test(t)) {
        factType = 'stats';
    } else if (/\b(score|scores|scored|final result|result|results)\b/.test(t)) {
        factType = 'score';
    } else if (/\b(who won|winner|won|champion|champions|title|titles|lifted)\b/.test(t)) {
        factType = 'winner';
    } else if (/\b(standing|standings|points table|rank|ranking|rankings)\b/.test(t)) {
        factType = 'standings';
    } else if (/\b(qualified|qualification|eliminated)\b/.test(t)) {
        factType = 'qualification';
    } else if (/\b(status|update|updates|what happened|what's happening)\b/.test(t)) {
        factType = 'status';
    } else if (/\b(news|headlines?|breaking)\b/.test(t)) {
        factType = 'news';
    }

    const normalizedTopic = normalizeLiveTopic(raw);
    const topic = normalizedTopic || raw;
    const directFact = ['winner', 'score', 'stats', 'standings', 'qualification', 'latest_work', 'schedule', 'holiday', 'role', 'known_for'].includes(factType) || isDirectFactLiveQuery(raw);

    return {
        raw,
        domain,
        factType,
        year: yearMatch ? yearMatch[0] : '',
        topic,
        directFact
    };
}

function isStableBiographyQuestion(text) {

function isPureHowToOrCodingConcept(text) {

function isBroadFactualWebQuery(text, entityIntent = null, liveIntent = null) {

    if (isRankedWorldFactListQuery(raw)) return true;

        const subjectGuess = String(extractKnowledgeSubject(raw) || '')

function classifyUserMessage(text) {

            pureHowToCoding,
            broadFactualWeb: broadFactualWeb && !pureHowToCoding,
            currentInfo: isCurrentInfoQuery(raw),
            exchangeRate: isExchangeRateQuery(raw),
            marketPrice: isMarketPriceQuery(raw),
            vagueAdvice: isVagueAdviceRequest(raw),
            songMoodGame: isSongMoodGameRequest(raw),
            comparison: isComparisonQuery(raw),
            news: /\b(news|headlines?|current events?|breaking news)\b/i.test(raw) || isNewsworthyLiveTopic(raw),
            liveRetrieval: isLiveRetrievalQuery(raw),
            tamilJoke: isTamilJokeRequest(raw),
            seriesRefJoke: isSeriesReferenceJokeRequest(raw),
            generalJoke: isGeneralJokeRequest(raw),
            recipe: isRecipeRequest(raw),
            classicSongs: isClassicSongDiscoveryRequest(raw),
            artistSong: genericIntent.domain === 'songs' && genericIntent.confidence >= 0.55 || isArtistSongRequest(raw),
            screenSuggestions: isScreenSuggestionRequest(raw),
            highRiskMentalHealth: isHighRiskMentalHealth(raw),
            supportExit: isSupportConversationExit(raw),
            supportRequest: isSupportConversationRequest(raw),
            supportContinuation: shouldUseSupportConversationMode(raw),
            medicalEmergency: isMedicalEmergencyIntent(raw), 
            medicalAdvice: isMedicalAdviceIntent(raw), 
            mentalHealth: isMentalHealthConversation(raw), 
            motivationStory: isMotivationStoryRequest(raw),
            debate: isDebateIntent(raw) 
        } 
    }; 
} 

function decideAnswerPath(classification) {
    if (!classification || !classification.raw) return 'default_model';

    const flags = classification.flags || {};

    if (flags.inappropriate) return 'moderation';
    if (flags.highRiskMentalHealth) return 'high_risk_mental_health'; 
    if (flags.medicalEmergency) return 'medical_emergency';
    if (flags.medicalAdvice) return 'medical_advice';
    if (flags.artistSong) return 'artist_song'; 
    if (flags.explicitWebSearch) return 'default_model';
    if (flags.universalEntityFact) return 'default_model';
    if (flags.profileIdentity || flags.stableBiography) return 'default_model';
    if (flags.currentInfo) return 'default_model';
    if (flags.broadFactualWeb) return 'default_model';

    if (flags.vagueAdvice) return 'vague_advice';
    if (flags.songMoodGame) return 'song_mood_game';
    if (flags.comparison) return 'comparison';
    if (flags.news) return 'default_model';
    if (flags.exchangeRate) return 'default_model';
    if (flags.marketPrice) return 'default_model';
    if (flags.liveRetrieval) return 'default_model';
    if (flags.tamilJoke) return 'tamil_joke';
    if (flags.seriesRefJoke) return 'series_ref_joke';
    if (flags.generalJoke) return 'general_joke';
    if (flags.recipe) return 'recipe';
    if (flags.classicSongs) return 'classic_songs'; 
    if (flags.screenSuggestions) return 'screen_suggestions';
 
    if (flags.motivationStory) return 'motivation_story';
    if (flags.supportExit) return 'support_exit'; 
    if (flags.supportRequest) return 'support_intro'; 
    if (flags.supportContinuation) return 'support_continue';
    if (flags.mentalHealth) return 'mental_health';
    if (flags.debate) return 'debate';

    return 'default_model';
}

function shouldUseAnswerThenCiteMode(text, classification) {
    const raw = String(text || '').trim();
    const lower = raw.toLowerCase();
    const flags = classification?.flags || {};
    if (!raw) return false;

    if (flags.inappropriate || flags.stableBiography || flags.exchangeRate || flags.marketPrice || flags.news || flags.universalEntityFact) {
        return false;
    }

    if (!flags.currentInfo && !flags.liveRetrieval && !flags.universalEntityFact) {
        return false;
    }

    if (requiresStrictLiveVerification(raw, classification?.liveIntent, classification?.entityIntent)) {
        return false;
    }
    if ((classification?.riskLevel || 'low_risk') !== 'low_risk') {
        return false;
    }

    const mixedSignals = /\b(latest|recent|current|today|this year|update|updates|status|earnings|results|layoffs|launch|release|lawsuit|investigation|funding|roadmap)\b/;
    const explainerSignals = /^(tell me about|what is|what's|who is|who was|explain|summarize)\b/;
    const entitySignals = /\b(company|stock|startup|product|platform|app|team|brand|movie|show|artist|player|election|war|conflict)\b/;

    return (mixedSignals.test(lower) && explainerSignals.test(lower)) ||
        (mixedSignals.test(lower) && entitySignals.test(lower));
}

function decideHybridResponseMode(classification) {
    if (!classification?.raw) return 'chat_first';

    const raw = classification.raw;
    const flags = classification.flags || {};
    const strictLiveRequired = requiresStrictLiveVerification(raw, classification.liveIntent, classification.entityIntent);
    const riskLevel = classification?.riskLevel || getRiskTierForQuery(raw, classification?.liveIntent, classification?.entityIntent);

    if (flags.inappropriate) return 'special_handler';
    if (flags.artistSong) return 'tolerant_entertainment';
    if (flags.explicitWebSearch) return 'chat_first';
    if (flags.broadFactualWeb) return 'chat_first';
    if (flags.universalEntityFact) return 'chat_first';
    if (flags.profileIdentity || flags.stableBiography) return 'chat_first';
    if (flags.news || flags.exchangeRate || flags.marketPrice) return 'chat_first';
    if (riskLevel !== 'low_risk') return 'chat_first';
    if (flags.currentInfo && strictLiveRequired) return 'chat_first';
    if (flags.universalEntityFact && strictLiveRequired) return 'chat_first';
    if (flags.currentInfo || flags.liveRetrieval || flags.universalEntityFact) return 'chat_first';
    if (shouldUseAnswerThenCiteMode(raw, classification)) return 'answer_then_cite';
    return 'chat_first';
}

function runRoutingRegressionSuite() {
    return ROUTING_REGRESSION_CASES.map(testCase => {
        const classification = classifyUserMessage(testCase.prompt);
        const actualPath = decideAnswerPath(classification);
        const actualMode = decideHybridResponseMode(classification);
        const genericIntent = classification.genericIntent || {};
        const checks = [
            {
                label: 'path',
                expected: testCase.expectedPath,
                actual: actualPath,
                pass: actualPath === testCase.expectedPath
            },
            {
                label: 'mode',
                expected: testCase.expectedMode,
                actual: actualMode,
                pass: actualMode === testCase.expectedMode
            }
        ];
        if (testCase.expectedGeneric) {
            for (const [key, expectedValue] of Object.entries(testCase.expectedGeneric)) {
                checks.push({
                    label: `generic.${key}`,
                    expected: expectedValue,
                    actual: genericIntent[key],
                    pass: String(genericIntent[key] || '').toLowerCase() === String(expectedValue || '').toLowerCase()
                });
            }
        }

        return {
            ...testCase,
            actualPath,
            actualMode,
            genericIntent,
            checks,
            passed: checks.every(check => check.pass)
        };
    });
}

function formatRoutingRegressionReport(results) {
    const suite = Array.isArray(results) ? results : [];
    const passedCount = suite.filter(result => result.passed).length;
    const lines = [
        `Routing regression suite: ${passedCount}/${suite.length} passed`,
        ''
    ];

    suite.forEach(result => {
        const prefix = result.passed ? '[PASS]' : '[FAIL]';
        lines.push(`${prefix} ${result.name}`);
        lines.push(`Prompt: ${result.prompt}`);
        result.checks.forEach(check => {
            const checkPrefix = check.pass ? 'OK' : 'Mismatch';
            lines.push(`- ${checkPrefix} ${check.label}: expected ${check.expected}, got ${check.actual}`);
        });
        lines.push('');
    });

    lines.push('This suite is local only. It checks classifier/routing/fallback logic without calling the network.');
    return lines.join('\n').trim();
}

function isRoutingRegressionCommand(text) {
    const t = String(text || '').toLowerCase().trim();
    if (!t) return false;
    return /\b(run|check|show|diagnose)\b.*\b(routing|regression|fallback)\b.*\b(test|tests|suite|report)?\b/.test(t) ||
        /\brouting regression\b/.test(t);
}

function isNewsworthyLiveTopic(text) {
    const t = String(text || '').toLowerCase().trim();
    if (!t) return false;

    if (isExchangeRateQuery(t) || isMarketPriceQuery(t)) return false;

    const eventSignals = [
        /\bwhat(?:'s| is)?(?:\s+\w+){0,3}\s+happening\b/,
        /\bcurrent(?:ly)?\b.*\b(happening|situation|status|update)\b/,
        /\b(latest|recent|current|today|right now)\b.*\b(news|events|developments|situation|conflict|war|tensions|crisis|attack|ceasefire|talks)\b/,
        /\b(news|headlines?|breaking news|current events?)\b/,
        /\b(update me|brief me|tell me)\b.*\b(on|about)\b/
    ];

    if (eventSignals.some(rx => rx.test(t))) {
        return /\b(middle[\s-]?east|israel|gaza|iran|ukraine|russia|syria|lebanon|yemen|palestine|oil|economy|inflation|politics?|election|war|conflict|market)\b/.test(t);
    }

    return /\b(middle[\s-]?east|israel|gaza|iran|ukraine|russia|syria|lebanon|yemen|palestine)\b/.test(t) &&
           /\b(what(?:'s| is)|tell me|brief me|update me|current|currently|latest|recent|today|right now)\b/.test(t);
}

function getDomainFromUrl(url) {
    try {
        return new URL(String(url || '')).hostname.replace(/^www\./i, '').toLowerCase();
    } catch (e) {
        return '';
    }
}

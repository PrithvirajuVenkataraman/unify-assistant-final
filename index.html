function extractKnowledgeSubject(text) {
    const raw = normalizeIntentTypos(String(text || '').trim());
    if (!raw) return '';
    const patterns = [
        /^\s*do\s+you\s+know\s+(.+?)\s*\??$/i,
        /^\s*(?:what\s+is|who\s+is|tell\s+me\s+about)\s+(.+?)\s*\??$/i,
        /^\s*(?:what\s+do\s+you\s+know\s+about|give\s+me\s+details\s+about|share\s+about)\s+(.+?)\s*\??$/i,
        /^\s*(?:info(?:rmation)?\s+on|details\s+on|about)\s+(.+?)\s*\??$/i,
        /^\s*when\s+did\s+(.+?)\s+(?:release|come\s+out|premiere|premiered)(?:\s+in\s+theaters?)?\s*\??$/i,
        /^\s*when\s+was\s+(.+?)\s+released(?:\s+in\s+theaters?)?\s*\??$/i,
        /^\s*who\s+(?:was|is)\s+(?:the\s+)?(?:music\s+composer|composer|soundtrack\s+composer)\s+for\s+(.+?)\s*\??$/i
    ];
    for (const p of patterns) {
        const m = raw.match(p);
        if (m && m[1]) {
            return m[1]
                .replace(/^(a|an|the)\s+/i, '')
                .replace(/\b(company|organization|org|inc|ltd|llc)\b/gi, '')
                .replace(/[?.!,;]+$/g, '')
                .trim();
        }
    }
    return raw
        .replace(/^(a|an|the)\s+/i, '')
        .replace(/[?.!,;]+$/g, '')
        .trim(); 
} 

function normalizeKnowledgeSubject(subject) {
    const raw = String(subject || '').trim();
    if (!raw) return '';
    const typoMap = {
        gujya: 'gujiya',
        gujhia: 'gujiya',
        biriyani: 'biryani',
        hydrabad: 'hyderabad',
        bengluru: 'bengaluru',
        tamill: 'tamil',
        jilebi: 'jalebi',
        jilabi: 'jalebi',
        jelabi: 'jalebi',
        'sean rolden': 'sean roldan'
    };
    return typoMap[raw.toLowerCase()] || raw;
}

async function fetchWikipediaSummaryFallback(subject) {
    const normalized = normalizeKnowledgeSubject(subject);
    if (!normalized) return null;

    async function fetchSummaryByTitle(title) {
        const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`;
        const response = await fetch(url);
        if (!response.ok) return null;
        const data = await response.json();
        const extract = String(data?.extract || '').trim();
        if (!extract) return null;
        return {
            title: data?.title || title,
            extract,
            sourceUrl: data?.content_urls?.desktop?.page || `https://en.wikipedia.org/wiki/${encodeURIComponent(data?.title || title)}`
        };
    }

    async function searchSummary(query) {
        const searchUrl = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&srlimit=5&format=json&origin=*`;
        const response = await fetch(searchUrl);
        if (!response.ok) return null;
        const data = await response.json();
        const hits = Array.isArray(data?.query?.search) ? data.query.search : [];
        for (const hit of hits) {
            const summary = await fetchSummaryByTitle(hit.title);
            if (summary?.extract) return summary;
        }
        return null;
    }

    const candidates = [
        normalized,
        normalized.replace(/\b\w/g, c => c.toUpperCase())
    ];

    for (const candidate of candidates) {
        try {
            const summary = await fetchSummaryByTitle(candidate);
            if (summary?.extract) return summary;
        } catch (e) {}
    }

    try {
        return await searchSummary(normalized);
    } catch (e) {
        return null;
    }
}

function isPronounKnowledgeFollowup(text) {
    const t = String(text || '').toLowerCase().trim();
    if (!t) return false;
    if (/^(it|this|that|this one|that one|this company|that company|the company|this film|that film|this movie|that movie|this song|that song)$/.test(t)) return true;
    return /\b(tell me more|more about|about it|about this|about that|that company|this company|that film|this film|that movie|this movie|that song|this song|expand on it)\b/.test(t);
}

function normalizeEntityText(value) {
    return String(value || '')
        .replace(/[?.!,;]+$/g, '')
        .replace(/\b(company|organization|org|inc|ltd|llc)\b/gi, '')
        .replace(/\s+/g, ' ')
        .trim();
}

function isAcknowledgementUtterance(text) {
    const t = String(text || '').toLowerCase().trim();
    if (!t) return false;
    return /^(yes|yeah|yep|yup|no|nope|nah|ok|okay|sure|alright|fine|thanks|thank you|got it|cool|hi|hello|hey|hmm|uh huh|huh)$/i.test(t);
}

function isGenericNonEntity(text) {
    const t = String(text || '').toLowerCase().trim();
    if (!t) return true;
    return /^(it|this|that|this one|that one|this film|that film|this movie|that movie|this song|that song|the company|the person|the topic|more|details|explain|tell me more|what about it|about it|about this|about that)$/i.test(t);
}

function extractEntityCandidate(text) {
    const raw = String(text || '').trim();
    if (!raw) return '';

    const direct = extractKnowledgeSubject(raw);
    if (direct && direct !== raw) return direct;

    const patterns = [
        /^\s*(?:can|could|would)\s+you\s+(?:tell|explain|share)\s+(?:me\s+)?(?:about\s+)?(.+?)\s*\??$/i,
        /^\s*(?:i\s+want\s+to\s+know\s+about|i\s+need\s+info\s+on)\s+(.+?)\s*\??$/i,
        /^\s*(.+?)\s+(?:company|stock|founder|history|overview|details)\s*\??$/i
    ];

    for (const p of patterns) {
        const m = raw.match(p);
        if (m && m[1]) return m[1].trim();
    }

    const cleaned = raw.replace(/[?.!,;]+$/g, '').trim();
    if (!cleaned) return '';

    // Keep short, non-generic single topic turns as entity candidates.
    if (cleaned.split(/\s+/).length <= 5 && !isAcknowledgementUtterance(cleaned) && !isGenericNonEntity(cleaned)) {
        return cleaned;
    }

    return '';
}

async function buildSearchFallbackAnswer(userMessage) {
    if (!LIVE_RETRIEVAL_ENABLED) return null;

    const resolvedMessage = String(userMessage || '').trim();
    const lowSignal = String(resolvedMessage || '').trim();
    if (!lowSignal) return null;
    if (/^(hi|hello|hey|yo|sup|hola|vanakkam|namaste|good\s+(morning|afternoon|evening))[.!?]*$/i.test(lowSignal)) {
        return null;
    }
    if (isAcknowledgementUtterance(lowSignal)) {
        return null;
    }
    const subject = normalizeKnowledgeSubject(extractKnowledgeSubject(resolvedMessage));
    const query = subject || String(resolvedMessage || '').trim();
    if (!query) return null;

    try { 
        const response = await fetch('/api/search', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query, maxResults: 5, answer: true })
        });
        if (!response.ok) return null;
        const data = await response.json();
        const results = Array.isArray(data?.results) ? data.results : [];
        if (results.length) {
            const lines = results
                .slice(0, 3)
                .map((r, i) => `${i + 1}. [${r.title}](${r.url})`)
                .join('\n');
            const groundedAnswer = cleanLiveAnswerText(String(data?.answer || '').trim());
            if (groundedAnswer && !isVerificationRefusalText(groundedAnswer)) {
                return `${groundedAnswer}\n\nSources:\n${lines}`;
            }

            const top = results[0];
            const topSnippet = String(top?.description || '').trim();
            const lead = topSnippet
                ? `From web sources: ${topSnippet}`
                : `I found reliable web sources about ${query}.`;

            return `${lead}\n\nSources:\n${lines}`;
        }
    } catch (error) {
    }

    try {
        const summary = await fetchWikipediaSummaryFallback(subject || resolvedMessage);
        if (!summary?.extract) return null;
        return `${summary.extract}\n\nSource:\n1. [${summary.title}](${summary.sourceUrl})`;
    } catch (fallbackError) {
        return null;
    }
}

async function buildUniversalSoftFallback(userMessage) {
    const text = String(userMessage || '').trim();
    const normalized = text.toLowerCase();

    if (isDirectExplainerQuery(text) || isConciseDirectFactQuery(text)) {
        return await composeApiReply('direct_fact_retry', {
            userMessage: text
        });
    }

    if (!text) {
        return await composeApiReply('empty_input_prompt', {
            userMessage: text
        });
    }

    if (/\?$/.test(text) || /^(what|why|how|who|when|where|which|can|could|would|do|does|did|is|are|should)\b/.test(normalized)) {
        return await composeApiReply('clarify_or_retry', {
            userMessage: text
        });
    }

    return await composeApiReply('generic_retry', {
        userMessage: text
    });
}

function isDirectExplainerQuery(text) {
    const t = String(text || '').trim().toLowerCase();
    if (!t) return false;
    if (/\b(what\s+is\s+happening|what'?s\s+happening|what\s+is\s+going\s+on|what'?s\s+going\s+on)\b/.test(t)) {
        return false;
    }
    if (/\b(current|latest|recent|today|right now|live|news|headline|headlines|update|updates|status)\b/.test(t)) {
        return false;
    }
    return /^(what\s+is|what's|who\s+is|who's|tell\s+me\s+about|define|meaning\s+of|do\s+you\s+know|what\s+do\s+you\s+know\s+about)\b/.test(t);
}

function isLowSignalModelAnswer(text) {
    const t = String(text || '').trim().toLowerCase();
    if (!t) return true;

    return [
        /keep going a little more/,
        /respond to the actual point you care about/,
        /give me one more line of context/,
        /respond directly instead of guessing/,
        /tell me a little more/,
        /say a bit more/,
        /i hear you\./,
        /to find information about/,
        /here are the steps you can follow/,
        /check online databases or search engines/,
        /look for (his|her|their) biography/
    ].some(pattern => pattern.test(t));
}

function sanitizeWeakModelAnswer(answerText, userMessage) {
    const raw = String(answerText || '').trim();
    if (!raw) return '';
    const rawLower = raw.toLowerCase();
    const directQuery = isDirectExplainerQuery(userMessage) || isConciseDirectFactQuery(userMessage);
    const freshnessQuery = hasExplicitFreshnessLanguage(userMessage) ||
        /\b(latest|current|today|now|update|updates|news|headlines?|with sources?)\b/i.test(String(userMessage || ''));
    const liveOrEntityFactQuery = freshnessQuery ||
        isCurrentInfoQuery(userMessage) ||
        isLiveRetrievalQuery(userMessage) ||
        isUniversalEntityFactQuestion(userMessage) ||
        isProfileOrIdentityQuery(userMessage);
    const staleCutoffAnswer =
        /\b(knowledge cutoff|cutoff|cut-off)\b/.test(rawLower) ||
        /\b(i do not have (?:information|data) (?:after|beyond|for)|i cannot access (?:current|latest|live) data)\b/.test(rawLower) ||
        /\b(i (?:do not|don't) have (?:the )?(?:latest|current|recent|live)[\s\S]{0,80}(?:details|information|data|result|score|update))\b/.test(rawLower);
    const looksLikeResearchSteps =
        /\b(here(?:'s| are)?\s+(?:the\s+)?steps?\b|steps?\s+you\s+can\s+follow|check\s+online\b|search\s+engines\b|look\s+for\s+(?:his|her|their)\s+biography|you\s+can\s+search\b|to\s+find\s+information\s+about\b)\b/.test(rawLower) ||
        (/(\n|^)\s*\d+\s*[\).:-]\s+/.test(raw) && /\b(check|search|look|find)\b/.test(rawLower));
    const currentFactEvasion =
        /\b(?:recommend|suggest|try)\s+checking\b[\s\S]{0,120}\b(?:current|latest|sports|news|source|website|site|updates?)\b/.test(rawLower) ||
        /\bcheck\b[\s\S]{0,120}\b(?:current|latest|sports|news|source|website|site|updates?)\b/.test(rawLower) ||
        /\b(?:for|to get)\s+(?:the\s+)?(?:most recent|latest|current)\b[\s\S]{0,100}\b(?:check|visit|see|refer)\b/.test(rawLower);
    const asksForUserProvidedSources =
        /\b(?:provide|share|give)\b[\s\S]{0,40}\b(?:source|sources|link|links)\b/.test(rawLower) ||
        /\b(?:send|paste)\b[\s\S]{0,40}\b(?:url|source|link)\b/.test(rawLower);
    const looksLikeWeakExplainerTemplate =
        /follow these steps|quick recap|next thing to learn|to understand (its|the|this) meaning/i.test(raw) ||
        (/(\n|^)\s*1[\).:-]\s+/.test(raw) && /(\n|^)\s*2[\).:-]\s+/.test(raw));
    if (directQuery && looksLikeResearchSteps) {
        return '';
    }
    if (directQuery && looksLikeWeakExplainerTemplate) {
        return '';
    }
    if (freshnessQuery && looksLikeResearchSteps) {
        return '';
    }
    if (liveOrEntityFactQuery && staleCutoffAnswer) {
        return '';
    }
    if (liveOrEntityFactQuery && currentFactEvasion) {
        return '';
    }
    if (liveOrEntityFactQuery && asksForUserProvidedSources) {
        return '';
    }
    if (isLowSignalModelAnswer(raw) &&
        directQuery) {
        return '';
    }
    return raw;
}

function asksUserToProvideSources(text) {
    const t = String(text || '').toLowerCase();
    return /\b(?:provide|share|give|send|paste)\b[\s\S]{0,60}\b(?:source|sources|link|links|url|urls)\b/.test(t) ||
        /\b(?:upload|attach)\b[\s\S]{0,60}\b(?:source|sources|document|link|links|url|urls)\b/.test(t);
}

async function resolveFinalAssistantAnswer(userMessage, answerText) {
    if (requiresLiveSourceAnswer(userMessage)) {
        return LIVE_DISABLED_MESSAGE;
    }
    if (asksUserToProvideSources(answerText)) {
        if (!LIVE_RETRIEVAL_ENABLED) return LIVE_DISABLED_MESSAGE;
    }
    const safeAnswer = sanitizeWeakModelAnswer(answerText, userMessage);
    if (safeAnswer) return safeAnswer;

    if (LIVE_RETRIEVAL_ENABLED) {
        const searchFallback = await buildSearchFallbackAnswer(userMessage);
        if (searchFallback) return searchFallback;
    }

    const strictApiFallback = await buildStrictApiKnowledgeFallback(userMessage);
    if (strictApiFallback) return strictApiFallback;

    return await buildUniversalSoftFallback(userMessage);
}

async function publishResolvedModelMessage(userMessage, answerText, options = {}) {
    const label = options?.label || 'Model answer';
    const historyText = options?.historyText || null;
    const finalized = await resolveFinalAssistantAnswer(userMessage, answerText);
    const safeText = String(finalized || '').trim();
    if (!safeText) return false;
    const messageMeta = {
        routing: options?.routing || null,
        detached: options?.detached === true
    };
    if (Object.prototype.hasOwnProperty.call(options || {}, 'turnId')) {
        messageMeta.turnId = options.turnId;
    }
    const assistantMessageId = addModelAssistantMessage(safeText, label, messageMeta);
    saveToHistory(userMessage, historyText || safeText, {
        recordContext: options?.recordContext !== false
    });
    if (options?.feedback !== false) {
        addFeedbackButtons(userMessage, historyText || safeText, assistantMessageId);
    }
    return true;
}

async function composeApiReply(intent, data = {}, options = {}) {
    const style = options?.style || 'short';
    const systemPrompt = `You are JARVIS, a helpful text-first assistant.

Turn structured app events into natural assistant replies.

Rules:
- Respond directly and naturally.
- Keep it concise unless the payload clearly needs more detail.
- Do not invent facts beyond the provided data.
- If the payload is an error or limitation, say that plainly.
- Do not add generic follow-up questions unless the payload asks for one.
- If links or structured lines are provided in the payload text, preserve them.`;

    const prompt = [
        `Intent: ${intent || 'generic_reply'}`,
        `Style: ${style}`,
        `Payload JSON:`,
        JSON.stringify(data || {}, null, 2),
        options?.instruction ? `Instruction: ${options.instruction}` : ''
    ].filter(Boolean).join('\n\n');

    try {
        const response = await fetch('/api/chat-groq', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: prompt,
                systemPrompt
            })
        });
        if (!response.ok) return '';
        const result = await response.json();
        return postProcessAssistantResponse(String(result?.response || result?.text || '').trim(), intent);
    } catch (error) {
        return '';
    }
}

async function deliverApiReply(intent, data = {}, options = {}) {
    const reply = await composeApiReply(intent, data, options);
    const fallbackText = String(options?.fallbackText || '').trim();
    const finalText = reply || fallbackText;
    if (!finalText) return '';

    const responseMeta = { detached: options?.detached === true };
    if (Object.prototype.hasOwnProperty.call(options || {}, 'turnId')) {
        responseMeta.turnId = options.turnId;
    }
    let assistantMessageId = '';
    if (options?.label) {
        assistantMessageId = addModelAssistantMessage(finalText, options.label, responseMeta);
    } else if (options?.verifiedLabel) {
        assistantMessageId = addVerifiedAssistantMessage(finalText, options.verifiedLabel, responseMeta);
    } else {
        assistantMessageId = addChatMessage(finalText, false, options?.typewriter ?? true, responseMeta);
    }

    if (options?.historyKey) {
        saveToHistory(options.historyKey, options.historyText || finalText);
    }
    return finalText;
}

async function prepareApiReply(intent, data = {}, fallbackText = '') {
    const reply = await composeApiReply(intent, data, { fallbackText });
    return reply || fallbackText;
}

function extractFirstHttpUrl(text) {
    const match = String(text || '').match(/https?:\/\/[^\s<>"')\]]+/i);
    return match ? match[0].replace(/[.,!?;:]+$/g, '') : '';
}

function isUrlGroundedExtractionRequest(text) {
    const url = extractFirstHttpUrl(text);
    if (!url) return false;
    return /\b(summarize|summary|explain|verify|check|read|extract|what does|what is this|use this|from this|about this)\b/i.test(text);
}

async function fetchExtractedUrlContext(userText) {
    const url = extractFirstHttpUrl(userText);
    if (!url) return null;
    const response = await fetch('/api/extract-url', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            url,
            query: userText,
            textLimit: 12000,
            respectRobots: true
        })
    });
    const data = await parseJsonResponseSafely(response);
    if (!response.ok || data?.success === false) {
        const code = String(data?.error?.code || '').trim();
        if (code === 'crawl4ai_not_configured') return null;
        throw new Error(String(data?.error?.message || 'URL extraction failed.'));
    }
    return data?.result || null;
}

async function handleUrlGroundedExtractionRequest(userText) {
    if (!isUrlGroundedExtractionRequest(userText)) return false;
    let extracted = null;
    try {
        showThinkingIndicator('Reading URL');
        extracted = await fetchExtractedUrlContext(userText);
    } catch (error) {
        addChatMessage(String(error?.message || 'I could not extract that URL right now.'), false);
        saveToHistory(userText, String(error?.message || 'URL extraction failed.'));
        return true;
    }
    if (!extracted) return false;

    const sourceText = String(extracted.markdown || extracted.text || '').trim().slice(0, 12000);
    if (!sourceText) return false;
    const result = await askGeminiAI(userText, {
        intent: 'selection_custom',
        grounding: {
            selectedText: sourceText,
            sourceAnswer: `URL: ${extracted.url}\nTitle: ${extracted.title}\n\n${sourceText}`,
            originalRequest: userText,
            customInstruction: `Answer the user's URL-grounded request using only the extracted page content. Cite this source URL: ${extracted.url}`
        }
    });
    if (result?.aborted) return true;
    const answer = String(result?.response || result?.text || '').trim();
    if (!answer) return false;
    const finalAnswer = `${answer}\n\nSource: [${extracted.title || extracted.url}](${extracted.url})`;
    await publishResolvedModelMessage(userText, finalAnswer, {
        label: 'URL extraction',
        routing: result?.routing || null
    });
    return true;
}

function queueApiReply(intent, data = {}, fallbackText = '') {
    void prepareApiReply(intent, data, fallbackText);
}

function isLikelyLocationOrTravelQuery(text) {
    const t = String(text || '').toLowerCase();
    if (!t.trim()) return false;
    return /\b(near me|nearby|location|where is|where to|hotel|hotels|restaurant|restaurants|food|trip|travel|itinerary|weather|transport|bus|train|taxi|uber|airport|station)\b/.test(t);
}

function isPastReleaseQuestion(text) {
    const t = String(text || '').toLowerCase();
    return /\bwhen did\b/.test(t) && /\b(release|released|come out|premiere|premiered)\b/.test(t);
}

function fixHistoricalReleaseWording(answerText, userMessage) {
    let text = String(answerText || '').trim();
    if (!text || !isPastReleaseQuestion(userMessage)) return text;

    const patterns = [
        /\bis scheduled to release in theaters on ([A-Za-z]+\s+\d{1,2},\s+\d{4})\b/i,
        /\bis scheduled to be released in theaters on ([A-Za-z]+\s+\d{1,2},\s+\d{4})\b/i,
        /\bis scheduled to release on ([A-Za-z]+\s+\d{1,2},\s+\d{4})\b/i,
        /\bis scheduled to be released on ([A-Za-z]+\s+\d{1,2},\s+\d{4})\b/i
    ];

    for (const p of patterns) {
        const m = text.match(p);
        if (!m || !m[1]) continue;
        const parsedDate = Date.parse(m[1]);
        if (!Number.isFinite(parsedDate) || parsedDate > Date.now()) continue;
        text = text.replace(p, `was released in theaters on ${m[1]}`);
        break;
    }

    return text;
}

function postProcessAssistantResponse(rawText, userMessage = '') {
    let text = normalizeAssistantTextStyle(String(rawText || '').trim());
    if (!text) return text;

    // Remove common filler/opening boilerplate.
    text = text
        .replace(/^hi[!.,\s-]*(i(?:'|-)d be happy to help(?: you)?(?: with (?:this|that|your question))?|i can help(?: you)?(?: with (?:this|that))?)\.?\s*/i, '')
        .replace(/^i(?:'|-)d be happy to help(?: you)?(?: with (?:this|that|your question))?\.?\s*/i, '')
        .replace(/^sure[!.,\s-]*/i, '')
        .trim();

    // Remove generic trailing CTA that wastes tokens.
    text = text
        .replace(/\s*(would you like to know more about[^?]*\?)\s*$/i, '')
        .replace(/\s*(is there (?:anything|something) else i can help you with\??)\s*$/i, '')
        .replace(/\s*(?:this is the answer[.!]?\s*)?(?:i(?:'| a)m|i am)\s+(?:going to|gonna|about to)\s+(?:end|stop)\s+(?:it|this|here)(?:\s+here)?[.!]?\s*$/i, '')
        .replace(/\s*i(?:'| wi)ll\s+stop\s+here(?:\s+because[^.?!]*)?[.!]?\s*$/i, '')
        .replace(/\s*(?:so,?\s*)?this is (?:the|my) (?:final )?answer[.!]?\s*$/i, '')
        .trim();

    // Keep tense accurate for historical "When did ... release?" questions.
    text = fixHistoricalReleaseWording(text, userMessage);

    return ensureCompleteAssistantResponse(text);
}

function ensureCompleteAssistantResponse(text) {
    let out = String(text || '').trim();
    if (!out) return out;

    const fenceCount = (out.match(/```/g) || []).length;
    if (fenceCount % 2 === 1) {
        out = `${out}\n\`\`\``.trim();
    }

    const visible = out
        .replace(/```[\s\S]*?```/g, ' ')
        .replace(/<[^>]+>/g, ' ')
        .replace(/\[[^\]]+\]\([^)]+\)/g, 'link')
        .trim();
    if (!visible) return out;

    const lastRawLine = out.split('\n').map(line => line.trim()).filter(Boolean).pop() || '';
    if (/^https?:\/\//i.test(lastRawLine) || /\[[^\]]+\]\(https?:\/\/[^)]+\)$/i.test(lastRawLine)) return out;
    if (/(?:^|\n)\s*Sources:\s*/i.test(out) && /(https?:\/\/|\[[^\]]+\]\(https?:\/\/)/i.test(lastRawLine)) return out;

    if (/[.!?。！？)"'\]}]$/.test(visible)) return out;

    const lastLine = visible.toLowerCase().split('\n').map(line => line.trim()).filter(Boolean).pop() || '';
    const hangingClause = /(?:[,;:]|\.\.\.|[\-–—(])$/.test(lastLine) ||
        /\b(and|or|but|because|so|with|to|for|from|the|a|an|in|on|at|as|by|of|if|then|while|where|when|which|who|that|this|is|are|was|were|will|would|could|should|can|do|does|did|not)$/i.test(lastLine);

    if (hangingClause || countAssistantWords(visible) >= 12) return out;

    return `${out}.`;
}

function countAssistantWords(text) {
    const words = String(text || '').match(/[A-Za-z0-9]+(?:['-][A-Za-z0-9]+)*/g);
    return Array.isArray(words) ? words.length : 0;
}

async function askGeminiAI(userMessage, requestOptions = {}) {
    const normalizedUserMessage = String(userMessage || '').trim();
    const controller = beginAbortableRequest();
    const hadExistingThinkingIndicator = Boolean(document.getElementById('chat-thinking-indicator'));
    let autoIndicatorShown = false;
    let requestSettled = false;
    const autoIndicatorTimer = setTimeout(() => {
        if (requestSettled) return;
        if (hadExistingThinkingIndicator) return;
        showThinkingIndicator('Generating answer...');
        autoIndicatorShown = true;
    }, 260);
    try { 
        const engineContext = requestOptions?.grounding
            ? []
            : (window.JarvisConversation?.buildContext({
                maxTurns: 12,
                maxContextChars: 9000
            }) || []);
        conversationContext = engineContext;
        const intent = getUserIntent(normalizedUserMessage); 
        window.__intentContext = { 
          allowHotels: intent.wantsHotels,
          itineraryOnly:
            intent.wantsItinerary &&
            !intent.wantsHotels, 
          __retried: false };

        setLastVisibleUserMessage(normalizedUserMessage);  
 
        const responseMode = detectRequestedResponseLength(normalizedUserMessage); 
        const responseHint = RESPONSE_LENGTH_HINTS[responseMode] || RESPONSE_LENGTH_HINTS.normal; 
        const formatMode = window.responseFormat || responseFormat || 'paragraph'; 
        const formatHint = RESPONSE_FORMAT_HINTS[formatMode] || RESPONSE_FORMAT_HINTS.paragraph; 
        const activeLearningMode = detectPromptLearningMode(normalizedUserMessage);
        const learningHint = LEARNING_MODE_HINTS[activeLearningMode] || LEARNING_MODE_HINTS.standard;
        const inputLanguageHint = detectInputLanguageHint(normalizedUserMessage);
        const languageReplyHint = inputLanguageHint
            ? `\nReply language preference: respond in ${inputLanguageHint} unless the user asks for another language.`
            : '';
        const conciseFactHint = isConciseDirectFactQuery(normalizedUserMessage)
            ? 'This is a direct fact query. Answer in 1-2 sentences max. Give the fact immediately. Do not add generic extra explanation or follow-up offers unless the user asks.'
            : '';
        const directExplainerHint = isDirectExplainerQuery(normalizedUserMessage)
            ? 'This is a direct explainer/identity query. Do not give research steps or suggestions to search online. Answer directly with concise factual content.'
            : '';
        const relevantSavedMemoryContext = requestOptions?.grounding
            ? ''
            : buildRelevantSavedMemoryContext(normalizedUserMessage);
        const effectiveMessage = requestOptions?.grounding
            ? normalizedUserMessage
            : `${normalizedUserMessage}${relevantSavedMemoryContext}\n\nResponse length requested: ${responseMode}. ${responseHint}\nResponse format preference: ${formatMode}. ${formatHint}\nPrompt-requested explanation style: ${activeLearningMode}. ${learningHint}${languageReplyHint}\n${conciseFactHint}\n${directExplainerHint}\n\nStyle requirements: Be specific, avoid repetition, and stay natural.`; 

         
        const data = await window.JarvisApi.postJson('/api/chat-groq', { 
                message: effectiveMessage, 
                context: engineContext,
                preferences: {
                    userName,
                    responseLength: responseMode,
                    responseFormat: formatMode,
                    responseStyle,
                    customSystemPrompt
                },
                intent: requestOptions?.intent || 'chat',
                grounding: requestOptions?.grounding || null
            }, {
                signal: controller.signal,
                timeoutMs: 25000
            });
        if (typeof data.response === 'string') {
            data.response = postProcessAssistantResponse(data.response, normalizedUserMessage);
            data.response = sanitizeWeakModelAnswer(data.response, normalizedUserMessage);
        }
        if (!data.response && typeof data.text === 'string') {
            data.text = postProcessAssistantResponse(data.text, normalizedUserMessage);
            data.text = sanitizeWeakModelAnswer(data.text, normalizedUserMessage);
        }

        if (!String(data.response || data.text || '').trim()) {
            const searchFallback = await buildSearchFallbackAnswer(normalizedUserMessage || userMessage);
            if (searchFallback) {
                return {
                    response: searchFallback,
                    intent: 'search_fallback'
                };
            }
            const strictApiFallback = await buildStrictApiKnowledgeFallback(normalizedUserMessage || userMessage);
            if (strictApiFallback) {
                return {
                    response: strictApiFallback,
                    intent: 'strict_api_fallback'
                };
            }
        }

        if (isLowSignalModelAnswer(data.response || data.text) &&
            (isDirectExplainerQuery(normalizedUserMessage) || isConciseDirectFactQuery(normalizedUserMessage))) {
            const searchFallback = await buildSearchFallbackAnswer(normalizedUserMessage || userMessage);
            if (searchFallback) {
                return {
                    response: searchFallback,
                    intent: 'search_fallback'
                };
            }
        }

        
        return data;
    } catch (error) {
        if (isAbortError(error)) {
            return {
                response: '',
                intent: 'aborted',
                aborted: true
            };
        }
        const localFallback = await buildLocalAssistantFallback(normalizedUserMessage || userMessage, error);
        if (localFallback) {
            return {
                response: localFallback,
                intent: 'local_fallback'
            };
        }
        const searchFallback = await buildSearchFallbackAnswer(normalizedUserMessage || userMessage); 
        if (searchFallback) { 
            return { 
                response: searchFallback, 
                intent: 'search_fallback'
            };
        }

        const softFallback = await buildUniversalSoftFallback(normalizedUserMessage || userMessage);
        if (isLikelyLocationOrTravelQuery(normalizedUserMessage || userMessage)) { 
            showFailureFallbackCard(normalizedUserMessage || userMessage); 
        } 
        return { 
            response: softFallback,
            intent: 'soft_fallback'
        }; 
    } finally {
        requestSettled = true;
        clearTimeout(autoIndicatorTimer);
        if (autoIndicatorShown && !hadExistingThinkingIndicator) {
            hideThinkingIndicator();
        }
        clearActiveRequest(controller);
    }
}

        // Optimized Levenshtein for performance
        function levenshteinDistance(a, b) {
            if (a.length === 0) return b.length;
            if (b.length === 0) return a.length;
            const matrix = Array.from({ length: b.length + 1 }, (_, i) => [i]);
            for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    const cost = a[i - 1] === b[j - 1] ? 0 : 1;
                    matrix[i][j] = Math.min(matrix[i - 1][j] + 1, matrix[i][j - 1] + 1, matrix[i - 1][j - 1] + cost);
                }
            }
            return matrix[b.length][a.length];
        }

        // Performance-optimized normalizeIntentTypos
        const INTENT_DICTIONARY = [
            'what', 'whats', 'who', 'tell', 'about', 'define', 'meaning', 'show',
            'image', 'picture', 'photo', 'look', 'like', 'weather', 'forecast',
            'news', 'shopping', 'grocery', 'itinerary', 'hotel',
            'restaurants', 'transport', 'translate', 'translator', 'joke',
            'calendar', 'budget', 'sync'
        ];

        normalizeIntentTypos = function(text) {
            const raw = String(text || '');
            if (!raw.trim()) return '';

            const targeted = raw 
                .replace(/\bwhere\s+a\s+i\b/gi, 'where am I')
                .replace(/\bwhere\s+am\b[?.!]*$/gi, 'where am I')
                .replace(/\bwhere\s+i\s+am\b/gi, 'where am I')
                .replace(/\bcief\b/gi, 'chief') 
                .replace(/\brtamil\s*nadu\b/gi, 'Tamil Nadu') 
                .replace(/\brtamilnadu\b/gi, 'Tamil Nadu') 
                .replace(/\btamilnadu\b/gi, 'Tamil Nadu') 
                .replace(/\b(my|left|right|the)\s+food\b(?=[^?.!]*(?:hurt|hurts|hurting|pain|paining|ache|aching|swollen|injured|injury))/gi, '$1 foot')
                .replace(/\bfood\s+(hurt|hurts|hurting|pain|paining|ache|aching|swollen|injured|injury)\b/gi, 'foot $1');

            return targeted 
                .split(/(\s+)/) 
                .map(token => {
                    const lower = token.toLowerCase().trim();
                    if (lower.length < 3 || INTENT_DICTIONARY.includes(lower) || !/^[a-z]+$/.test(lower)) return token;

                    let best = lower;
                    let min = 3; 
                    
                    for (const word of INTENT_DICTIONARY) {
                        if (Math.abs(lower.length - word.length) > 1) continue;
                        const d = levenshteinDistance(lower, word);
                        if (d < min) {
                            min = d;
                            best = word;
                        }
                    }
                    return min <= (lower.length <= 4 ? 1 : 2) ? best : token;
                })
                .join('');
        };

        function initZoomLock() {
            if (window.__jarvisZoomLockBound) return;
            window.__jarvisZoomLockBound = true;

            const lockedViewportContent = 'width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content';
            const viewportMeta = document.querySelector('meta[name="viewport"]');
            if (viewportMeta) {
                viewportMeta.setAttribute('content', lockedViewportContent);
            }

            // Prevent browser zoom gestures and Ctrl/Cmd + wheel zoom.
            document.addEventListener('gesturestart', (event) => event.preventDefault(), { passive: false });
            document.addEventListener('gesturechange', (event) => event.preventDefault(), { passive: false });
            document.addEventListener('gestureend', (event) => event.preventDefault(), { passive: false });
            document.addEventListener('wheel', (event) => {
                if (event.ctrlKey || event.metaKey) event.preventDefault();
            }, { passive: false });

            // Block multi-touch pinch start and movement.
            const preventMultiTouchZoom = (event) => {
                if (event.touches && event.touches.length > 1) {
                    event.preventDefault();
                }
            };
            document.addEventListener('touchstart', preventMultiTouchZoom, { passive: false });
            document.addEventListener('touchmove', preventMultiTouchZoom, { passive: false });

            // Block double-tap zoom on iOS Safari.
            let lastTouchEndAt = 0;
            document.addEventListener('touchend', (event) => {
                const now = Date.now();
                if (now - lastTouchEndAt <= 320) {
                    event.preventDefault();
                }
                lastTouchEndAt = now;
            }, { passive: false });

            // Re-assert viewport lock while focusing fields and normalize tiny font sizes on touch devices.
            const isTouchDevice = window.matchMedia('(hover: none) and (pointer: coarse)').matches || navigator.maxTouchPoints > 0;
            if (isTouchDevice) {
                document.addEventListener('focusin', (event) => {
                    const target = event.target;
                    if (target && /^(INPUT|TEXTAREA|SELECT)$/.test(target.tagName)) {
                        if (viewportMeta) {
                            viewportMeta.setAttribute('content', lockedViewportContent);
                        }
                        const computedSize = parseFloat(window.getComputedStyle(target).fontSize || '0');
                        if (Number.isFinite(computedSize) && computedSize > 0 && computedSize < 16) {
                            target.style.fontSize = '16px';
                        }
                    }
                }, true);
            }
        }

        function trapModalFocus(event) {
            if (event.key === 'Escape') {
                event.preventDefault();
                closeHelpModal();
                return;
            }
            if (event.key !== 'Tab') return;
            const modal = event.currentTarget;
            const focusable = Array.from(modal.querySelectorAll(
                'button:not([disabled]), a[href], input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])'
            )).filter(element => element.getClientRects().length > 0);
            if (!focusable.length) return;
            const first = focusable[0];
            const last = focusable[focusable.length - 1];
            if (event.shiftKey && document.activeElement === first) {
                event.preventDefault();
                last.focus();
            } else if (!event.shiftKey && document.activeElement === last) {
                event.preventDefault();
                first.focus();
            }
        }

        function setupInputHistoryNavigation() {
            const input = document.getElementById('text-input');

            input.addEventListener('keydown', (event) => {
                if (event.key !== 'ArrowUp' && event.key !== 'ArrowDown') return;
                if (!inputHistory.length) return;
                const atStart = Number(input.selectionStart || 0) === 0 && Number(input.selectionEnd || 0) === 0;
                const atEnd = Number(input.selectionStart || 0) === input.value.length && Number(input.selectionEnd || 0) === input.value.length;
                if (event.key === 'ArrowUp' && !atStart) return;
                if (event.key === 'ArrowDown' && !atEnd) return;

                event.preventDefault();
                if (event.key === 'ArrowUp') {
                    if (inputHistoryIndex < inputHistory.length - 1) {
                        inputHistoryIndex++;
                    }
                } else if (event.key === 'ArrowDown') {
                    if (inputHistoryIndex > 0) {
                        inputHistoryIndex--;
                    } else {
                        inputHistoryIndex = -1;
                        input.value = '';
                        toggleSendButton();
                        return;
                    }
                }
                const idx = inputHistory.length - 1 - inputHistoryIndex;
                const historyValue = inputHistory[idx] || '';
                input.value = isInternalPromptText(historyValue) ? '' : historyValue;
                autoResizeComposerTextarea();
                toggleSendButton();
            });

        function waitForAssistantIdle(timeoutMs = 1600) {
            if (!activeRequestController && !isAssistantProcessing()) return Promise.resolve();

                    if (settled) return;
                    settled = true;
                    clearTimeout(timeout);
                    window.removeEventListener('jarvis:assistant-processing', onState);
                    resolve();

                const onState = event => {

        function initChatScrollLock() {
            const chatContainer = document.getElementById('chat-container');
            if (!chatContainer || chatContainer.dataset.scrollLockBound === '1') return;
            chatContainer.dataset.scrollLockBound = '1';

            const markUserScrollIntent = () => {
                userInitiatedScroll = true;
                if (userScrollIntentTimer) clearTimeout(userScrollIntentTimer);
                userScrollIntentTimer = setTimeout(() => { userInitiatedScroll = false; }, 180);
            };

            chatContainer.addEventListener('wheel', markUserScrollIntent, { passive: true });
            chatContainer.addEventListener('touchstart', markUserScrollIntent, { passive: true });
            chatContainer.addEventListener('mousedown', markUserScrollIntent);
            chatContainer.addEventListener('keydown', markUserScrollIntent);

            let isScrolling = false;
            chatContainer.addEventListener('scroll', () => {
                if (isScrolling) return;
                isScrolling = true;
                window.requestAnimationFrame(() => {
                    if (suppressScrollLockHandler) {
                        isScrolling = false;
                        return;
                    }
                    const nearBottom = isChatNearBottom(chatContainer);
                    if (nearBottom) {
                        autoScrollLocked = false;
                        chatUnreadWhileScrolledUp = false;
                        updateJumpToLatestButton();
                    }

                    if (userInitiatedScroll) {
                        autoScrollLocked = !nearBottom;
                        if (autoScrollLocked) {
                            lockedScrollTop = chatContainer.scrollTop;
                        }
                        updateJumpToLatestButton();
                        isScrolling = false;
                        return;
                    }

                    if (autoScrollLocked && nearBottom) {
                        suppressScrollLockHandler = true;
                        chatContainer.scrollTop = lockedScrollTop;
                        suppressScrollLockHandler = false;
                        updateJumpToLatestButton();
                        isScrolling = false;
                        return;
                    }

                    if (autoScrollLocked) {
                        lockedScrollTop = chatContainer.scrollTop;
                        updateJumpToLatestButton();
                    }
                    isScrolling = false;
                });
            }, { passive: true });

            updateJumpToLatestButton();
        }

        function isChatNearBottom(chatContainer) {
            if (!chatContainer) return true;
            const remaining = chatContainer.scrollHeight - chatContainer.scrollTop - chatContainer.clientHeight;
            return remaining <= 120;
        }

        function maybeAutoScroll(chatContainer) {
            if (!chatContainer) return;
            const nearBottom = isChatNearBottom(chatContainer);
            if (autoScrollLocked || !nearBottom) {
                autoScrollLocked = true;
                chatUnreadWhileScrolledUp = true;
                lockedScrollTop = chatContainer.scrollTop;
                updateJumpToLatestButton();
                return;
            }
            chatContainer.scrollTop = chatContainer.scrollHeight;
            chatUnreadWhileScrolledUp = false;
            updateJumpToLatestButton();
        }

        function handleSelectionHelperSelectionChange() {
            const selection = window.getSelection ? window.getSelection() : null;
            if (!selection || selection.toString().trim()) return;
            hideSelectionHelperPopover();

        function handleSelectionHelperTrigger() {
            const selection = window.getSelection ? window.getSelection() : null;
            if (!selection || selection.rangeCount === 0) {
                hideSelectionHelperPopover();
                return;
            }

            const selectedText = selection.toString().replace(/\s+/g, ' ').trim();
            if (!selectedText || selectedText.length < 3) {
                hideSelectionHelperPopover();
                return;
            }

            const range = selection.getRangeAt(0);
            const commonNode = range.commonAncestorContainer;
            const element = commonNode && commonNode.nodeType === 1 ? commonNode : commonNode?.parentElement;
            const messageTextEl = element?.closest?.('.assistant-message-text');
            if (!element || !messageTextEl) {
                hideSelectionHelperPopover();
                return;
            }

            const rect = range.getBoundingClientRect();
            if (!rect || !Number.isFinite(rect.top)) {
                hideSelectionHelperPopover();
                return;
            }

            const messageId = messageTextEl.dataset.messageId || messageTextEl.closest('[data-message-id]')?.dataset?.messageId || '';
            const meta = getAssistantMessageMeta(messageId) || {};
            selectionHelperState.selectedText = selectedText;
            selectionHelperState.messageId = messageId;
            selectionHelperState.fullMessageText = String(meta.text || messageTextEl.textContent || '').replace(/\s+/g, ' ').trim();
            selectionHelperState.priorUserPrompt = String(meta.priorUserPrompt || '').trim();
            selectionHelperState.sourceLabel = String(meta.sourceLabel || 'Assistant answer').trim();
            selectionHelperState.selectionRange = {
                startOffset: Number(range.startOffset || 0),
                endOffset: Number(range.endOffset || 0)
            };
            showSelectionHelperPopover(rect, selectedText);
        }

        function showSelectionHelperPopover(targetRect, selectedText) {
            const popover = selectionHelperState.popoverEl;
            if (!popover) return;
            const chip = document.getElementById('selection-helper-chip');
            if (chip) chip.textContent = selectedText;

            popover.classList.add('visible');
            popover.hidden = false;
            popover.setAttribute('aria-hidden', 'false');
            const spacing = 10;
            const maxLeft = Math.max(8, window.innerWidth - popover.offsetWidth - 8);
            const maxTop = Math.max(8, window.innerHeight - popover.offsetHeight - 8);
            const preferredTop = targetRect.top - popover.offsetHeight - spacing;
            const fallbackTop = targetRect.bottom + spacing;
            const unclampedTop = preferredTop > 8 ? preferredTop : fallbackTop;
            const top = Math.min(maxTop, Math.max(8, unclampedTop));
            const left = Math.min(
                maxLeft,
                Math.max(8, targetRect.left + (targetRect.width / 2) - (popover.offsetWidth / 2))
            );
            popover.style.top = `${top}px`;
            popover.style.left = `${left}px`;
        }

        function hideSelectionHelperPopover() {
            const popover = selectionHelperState.popoverEl;
            if (!popover) return;
            popover.classList.remove('visible');
            popover.hidden = true;
            popover.setAttribute('aria-hidden', 'true');
        }

            summary.textContent = `System check: ${passed}/${rows.length} checks passed`;

            list.innerHTML = rows.map((row) => {
                const status = row.ok ? 'PASS' : 'FAIL';
                const color = row.ok
                    ? 'text-emerald-700 dark:text-emerald-300'
                    : 'text-rose-700 dark:text-rose-300';
                return `<div class="${color}"><span class="font-semibold">${status}</span> - ${escapeHtml(row.label)}${row.detail ? `: ${escapeHtml(row.detail)}` : ''}</div>`;
            }).join('');

            panel.classList.remove('hidden');
        }

        async function pingEndpoint(url, body, options = {}) {
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body || {})
                });
                const allowClientError = !!options.allowClientError;
                const reachableClientError = allowClientError && response.status >= 400 && response.status < 500;
                const ok = response.ok || reachableClientError;
                return {
                    ok,
                    detail: reachableClientError

            list.innerHTML = '<div class="text-xs text-gray-600 dark:text-gray-300">Please wait a few seconds.</div>';

            const checks = [];
            checks.push({
                label: 'Browser online',
                ok: !!navigator.onLine,
                detail: navigator.onLine ? 'Connected' : 'Offline'
            });
            checks.push({
                label: 'Live location support',

                detail: navigator.geolocation ? 'Geolocation API available' : 'Geolocation API unavailable'
            });
            checks.push({
                label: 'Live Vision support',

                detail: (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) ? 'Camera API available' : 'Camera API unavailable'
            });
            checks.push({

            });
            checks.push({

            const [chatPing, visionPing] = await Promise.all([
                pingEndpoint('/api/chat-groq', { message: 'health check' }),
                pingEndpoint('/api/vision', { task: 'health_check', imageBase64: 'x', mimeType: 'text/plain' }, { allowClientError: true })
            ]);

            checks.push({ label: 'LLM API (/api/chat-groq)', ok: chatPing.ok, detail: chatPing.detail });
            checks.push({ label: 'Vision API route (/api/vision)', ok: visionPing.ok, detail: visionPing.detail });

            const locationReady = checks.find(c => c.label === 'Live location support')?.ok;
            checks.push({

                detail: locationReady ? 'Location support available' : 'Missing location permission/support'

            });

            renderSystemCheckResults(checks);

        function renderAssistantMarkdown(rawText, linkClass) {
            const text = String(rawText ?? '');
            if (!text.trim()) return '';

            const codeBlocks = [];
            let working = text.replace(/```([\w+-]*)\n([\s\S]*?)```/g, (_, lang, code) => {
                const id = codeBlocks.length;
                codeBlocks.push({
                    lang: String(lang || '').trim(),
                    code: String(code || '')
                });
                return `__CODE_BLOCK_${id}__`;
            });

            const lines = working.split('\n');
            const out = [];
            let i = 0;

            while (i < lines.length) {
                const line = lines[i] ?? '';
                const trim = line.trim();

                const heading = trim.match(/^(#{1,4})\s+(.+)$/);
                if (heading) {
                    const level = heading[1].length;
                    out.push(`<h${level} class="assistant-md-h${level}">${escapeHtml(heading[2])}</h${level}>`);
                    i += 1;
                    continue;
                }

                if (trim.startsWith('>')) {
                    const block = [];
                    while (i < lines.length && String(lines[i] || '').trim().startsWith('>')) {
                        block.push(String(lines[i]).replace(/^\s*>\s?/, ''));
                        i += 1;
                    }
                    out.push(`<blockquote class="assistant-md-quote">${escapeHtml(block.join('\n')).replace(/\n/g, '<br>')}</blockquote>`);
                    continue;
                }

                if (/^\s*[-*]\s+/.test(line)) {
                    const items = [];
                    while (i < lines.length && /^\s*[-*]\s+/.test(String(lines[i] || ''))) {
                        items.push(String(lines[i]).replace(/^\s*[-*]\s+/, ''));
                        i += 1;
                    }
                    out.push(`<ul class="assistant-md-list">${items.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`);
                    continue;
                }

                if (/^\s*\d+\.\s+/.test(line)) {
                    const items = [];
                    while (i < lines.length && /^\s*\d+\.\s+/.test(String(lines[i] || ''))) {
                        items.push(String(lines[i]).replace(/^\s*\d+\.\s+/, ''));
                        i += 1;
                    }
                    out.push(`<ol class="assistant-md-olist">${items.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ol>`);
                    continue;
                }

                const isPipeRow = /^\s*\|.+\|\s*$/.test(line);
                const nextLine = i + 1 < lines.length ? String(lines[i + 1] || '') : '';
                const isSeparator = /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(nextLine);
                if (isPipeRow && isSeparator) {
                    const tableRows = [line];
                    i += 2;
                    while (i < lines.length && /^\s*\|.+\|\s*$/.test(String(lines[i] || ''))) {
                        tableRows.push(String(lines[i]));
                        i += 1;
                    }
                    const cells = row => row.trim().replace(/^\||\|$/g, '').split('|').map(c => escapeHtml(c.trim()));
                    const header = cells(tableRows[0]);
                    const body = tableRows.slice(1).map(cells);
                    out.push(
                        `<div class="assistant-md-table-wrap"><table class="assistant-md-table"><thead><tr>${header.map(h => `<th>${h}</th>`).join('')}</tr></thead><tbody>${body.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`
                    );
                    continue;
                }

                if (trim) {
                    const para = [];
                    while (i < lines.length && String(lines[i] || '').trim() && !/^\s*[-*]\s+/.test(String(lines[i] || '')) && !/^\s*\d+\.\s+/.test(String(lines[i] || '')) && !/^\s*>/.test(String(lines[i] || '')) && !/^(#{1,4})\s+/.test(String(lines[i] || '')) && !/^\s*\|.+\|\s*$/.test(String(lines[i] || ''))) {
                        para.push(String(lines[i]));
                        i += 1;
                    }
                    out.push(`<p class="assistant-md-p">${escapeHtml(para.join('\n')).replace(/\n/g, '<br>')}</p>`);
                    continue;
                }

                out.push('<br>');
                i += 1;
            }

            let html = out.join('\n');

            html = html.replace(/`([^`\n]+)`/g, '<code class="assistant-md-inline-code">$1</code>');
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, `<a href="$2" target="_blank" rel="noopener noreferrer" class="${linkClass}">$1</a>`);

            html = html.replace(/__CODE_BLOCK_(\d+)__/g, (_, idx) => {
                const block = codeBlocks[Number(idx)];
                if (!block) return '';
                const lang = block.lang ? `<span class="assistant-md-code-lang">${escapeHtml(block.lang)}</span>` : '';
                return `<pre class="assistant-md-code-block">${lang}<code>${escapeHtml(block.code)}</code></pre>`;
            });

            if (window.JarvisScienceFormat?.enhanceHtml) {
                html = window.JarvisScienceFormat.enhanceHtml(html);
            }
            return html;
        }

        function analyzeAnswerRiskFlags(userMessage, assistantText) { 
            const question = String(userMessage || '').replace(/\s+/g, ' ').trim(); 
            const answer = String(assistantText || '').replace(/\s+/g, ' ').trim(); 
            const combined = `${question} ${answer}`.trim(); 
            if (!answer || answer.length < 24) return []; 
            const flags = []; 
            const hasUrl = /https?:\/\/|www\./i.test(answer); 
            const addFlag = (id, label, reason) => { 
                if (!flags.some(flag => flag.id === id)) flags.push({ id, label, reason }); 
            }; 
 
            if (/\b(current|currently|latest|today|now|as of|recent|newest|present|this year|202[4-9]|203\d)\b/i.test(combined) || 
                /\b(president|prime minister|chief minister|governor|mayor|ceo|cfo|cto|chair(?:man|woman)?|minister|leader|captain|coach)\b/i.test(combined)) { 
                addFlag('current_fact', 'Current fact', 'This may change over time and should be checked against a current source.'); 
            } 
 
            if (/(?:[$₹€£]\s?\d|\b\d+(?:\.\d+)?\s?(?:%|percent|crore|lakh|million|billion|trillion|km|kg|mg|gb|mb|hours?|days?|years?)\b|\b\d+\s*[+\-*/]\s*\d+)/i.test(answer)) { 
                addFlag('numbers', 'Numbers', 'The answer contains figures or calculations worth double-checking.'); 
            } 
 
            if (/\b(medical|medicine|diagnosis|symptom|dose|dosage|drug|treatment|legal|law|lawyer|contract|court|tax|investment|stock|crypto|insurance|loan|mortgage|financial advice)\b/i.test(combined)) { 
                addFlag('high_stakes', 'Medical/legal/finance', 'This topic can affect health, legal, or financial decisions.'); 
            } 
 
            if (!hasUrl && /\b(verified|confirmed|according to|source(?:s)? say|reported|cited|evidence shows|research shows|study found)\b/i.test(answer)) { 
                addFlag('needs_source', 'Needs source', 'The answer uses source-like wording without a visible citation URL.'); 
            } 
 
            return flags.slice(0, 4); 
        }

        function detectPrimaryTopicLabel(text) {
            const raw = String(text || '').replace(/\s+/g, ' ').trim();
            if (!raw) return '';
            const explicit = raw.match(/\b(?:about|regarding|on|for)\s+([A-Za-z0-9][A-Za-z0-9\s'".-]{2,60})/i);
            if (explicit?.[1]) return explicit[1].replace(/[?.!,]$/, '').trim().slice(0, 80);
            return raw.split(/[.?!]/)[0].trim().slice(0, 80);
        }

        function handleAssistantActionInline(event, messageId, action) {
            if (event?.__jarvisAssistantActionHandled) return false;
            if (event) event.__jarvisAssistantActionHandled = true;
            event?.preventDefault?.();
            event?.stopPropagation?.();
            const button = event?.currentTarget || event?.target?.closest?.('[data-assistant-action]');
            void dispatchAssistantAction(messageId, action, button);
            return false;
        }

        function handleAssistantActionClick(event) {
            const button = event.target?.closest?.('[data-assistant-action]');
            if (!button) return;
            const row = button.closest?.('.assistant-action-row');
            const menu = button.closest?.('.assistant-action-menu');
            const messageId = row?.dataset?.messageId || menu?.dataset?.messageId || '';
            const action = button.dataset.assistantAction || '';
            if (!messageId || !action) return;
            event.__jarvisAssistantActionHandled = true;
            event.preventDefault();
            event.stopPropagation();
            void dispatchAssistantAction(messageId, action, button);
        }

        async function dispatchAssistantAction(messageId, action, button = null) {
            const id = String(messageId || '');
            const normalizedAction = String(action || '').trim();
            if (!id || !normalizedAction) return;
            if (normalizedAction === 'menu') {
                toggleAssistantActionMenu(id, button);
                return;
            }
            const handler = assistantActionHandlers[normalizedAction];
            if (!handler) return;
            const isLongRunning = ['regenerate', 'verify', 'ask'].includes(normalizedAction);
            if (isLongRunning && button) button.disabled = true;
            try {
                closeAssistantActionMenus();
                await handler(id);
            } finally {
                if (button?.isConnected) button.disabled = false;
            }
        }

        function closeAssistantActionMenus() {
            document.querySelectorAll('.assistant-action-menu').forEach(menu => {
                menu.classList.add('hidden');
                menu.style.left = '';
                menu.style.top = '';
                const id = String(menu.dataset?.messageId || '').trim();
                const row = id
                    ? Array.from(document.querySelectorAll('.assistant-action-row'))
                        .find(item => item.dataset.messageId === id)
                    : null;
                const wrap = row?.querySelector?.('.assistant-action-menu-wrap');
                if (wrap && menu.parentElement !== wrap) wrap.appendChild(menu);
            });
            document.querySelectorAll('.assistant-action-dots').forEach(btn => btn.setAttribute('aria-expanded', 'false'));
            openAssistantActionMenuId = '';
        }

        function positionAssistantActionMenu(menu, button) {
            if (!menu || !button) return;
            const buttonRect = button.getBoundingClientRect();
            if (menu.parentElement !== document.body) document.body.appendChild(menu);
            menu.classList.remove('hidden');
            const menuRect = menu.getBoundingClientRect();
            const margin = 8;
            const viewportWidth = window.innerWidth || document.documentElement.clientWidth || 0;
            const viewportHeight = window.innerHeight || document.documentElement.clientHeight || 0;
            let left = buttonRect.right - menuRect.width;
            let top = buttonRect.bottom + 8;
            if (left < margin) left = margin;
            if (left + menuRect.width > viewportWidth - margin) {
                left = Math.max(margin, viewportWidth - menuRect.width - margin);
            }
            if (top + menuRect.height > viewportHeight - margin) {
                top = Math.max(margin, buttonRect.top - menuRect.height - 8);
            }
            menu.style.left = `${Math.round(left)}px`;
            menu.style.top = `${Math.round(top)}px`;
        }

        function discardRegenerationCandidate(renderContext) {
            const candidate = renderContext?.replacementCandidate;
            if (!candidate) return;
            candidate.messageDiv.__typewriterRun && (candidate.messageDiv.__typewriterRun.cancelled = true);
            assistantMessageMeta.delete(candidate.messageId);
            const turn = getConversationTurn(candidate.turnId);
            if (turn) {
                turn.assistantMessageIds = turn.assistantMessageIds.filter(id => id !== candidate.messageId);
            }
            renderContext.replacementCandidate = null;
            renderContext.pendingFeedback = null;
            renderContext.replacementConsumed = false;
        }

        function commitRegenerationCandidate(renderContext) {
            const candidate = renderContext?.replacementCandidate;
            if (!candidate?.replaceTarget?.isConnected) return false;
            document.querySelectorAll('.feedback-container').forEach(feedback => {
                if (feedback.dataset.assistantMessageId === candidate.replaceMessageId) feedback.remove();
            });
            const oldFeedback = candidate.replaceTarget.nextElementSibling;
            if (
                oldFeedback?.classList?.contains('feedback-container') &&
                (!oldFeedback.dataset.assistantMessageId || oldFeedback.dataset.assistantMessageId === candidate.replaceMessageId)
            ) {
                oldFeedback.remove();
            }
            candidate.replaceTarget.replaceWith(candidate.messageDiv);
            assistantMessageMeta.delete(candidate.replaceMessageId);
            if (candidate.oldTurn) {
                candidate.oldTurn.assistantMessageIds = Array.from(new Set(
                    candidate.oldTurn.assistantMessageIds.map(id => id === candidate.replaceMessageId ? candidate.messageId : id)
                ));
            }
            if (renderContext.pendingFeedback) {
                renderContext.pendingFeedback.dataset.assistantMessageId = candidate.messageId;
                candidate.messageDiv.insertAdjacentElement('afterend', renderContext.pendingFeedback);
            }
            renderContext.replacementConsumed = true;
            renderContext.replacementCandidate = null;
            renderContext.pendingFeedback = null;
            return true;
        }

        async function regenerateAssistantMessage(messageId) {
            const meta = getAssistantMessageMeta(messageId);
            const turn = getConversationTurn(meta?.turnId);
            const rawPrompt = String(turn?.rawPrompt || '').trim();
            const processingPrompt = String(turn?.processingPrompt || rawPrompt).trim();
            if (!rawPrompt || !processingPrompt) {
                showTemporaryMessage('This answer cannot be regenerated because its source turn is unavailable.');
                return;
            }
            if (regenerationInProgress || activeRequestController || isProcessing || isAssistantProcessing()) {
                showTemporaryMessage('Another response is already being generated. Please wait a moment.');
                return;
            }
            regenerationInProgress = true;
            closeAssistantActionMenus();
            const sourceRow = Array.from(document.querySelectorAll('.assistant-action-row'))
                .find(row => row.dataset.messageId === String(messageId || ''));
            const replaceTarget = sourceRow?.closest?.('[data-role="assistant"]') || document.querySelector(`[data-role="assistant"][data-message-id="${CSS.escape(String(messageId || ''))}"]`);
            if (!sourceRow || !replaceTarget) {
                regenerationInProgress = false;
                showTemporaryMessage('I cannot regenerate that answer because its message is no longer available.');
                return;
            }
            const actionButton = sourceRow.querySelector('[aria-label="Regenerate"]');
            if (actionButton) actionButton.disabled = true;

            const previousContext = Array.isArray(conversationContext)
                ? conversationContext.map(item => ({ ...item }))
                : [];
            const previousHistory = Array.isArray(conversationHistory)
                ? conversationHistory.map(item => ({ ...item }))
                : [];
            const previousEngineState = window.JarvisConversation?.getState?.() || null;
            const previousLastUserMessage = getLastVisibleUserMessage();
            const previousRenderContext = beginResponseRenderContext(turn || {
                id: meta?.turnId || '',
                rawPrompt,
                processingPrompt
            }, {
                replaceMessageId: messageId,
                isRegeneration: true
            });
            setLastVisibleUserMessage(rawPrompt);
            beginAssistantProcessing();
            try {
                conversationContext = Array.isArray(turn?.contextSnapshot)
                    ? turn.contextSnapshot.map(item => ({ ...item }))
                    : previousContext;
                await processCommand(processingPrompt);
                if (!commitRegenerationCandidate(activeResponseRenderContext)) {
                    discardRegenerationCandidate(activeResponseRenderContext);
                    showTemporaryMessage('I could not regenerate that answer. The original response was kept.');
                }
            } catch (error) {
                console.error('regenerate failed:', error);
                discardRegenerationCandidate(activeResponseRenderContext);
                showTemporaryMessage('I could not regenerate that answer. The original response was kept.');
            } finally {
                conversationContext = previousContext;
                conversationHistory = previousHistory;
                if (previousEngineState) {
                    window.JarvisConversation?.restoreState?.(previousEngineState);
                }
                if (previousLastUserMessage) setLastVisibleUserMessage(previousLastUserMessage);
                restoreResponseRenderContext(previousRenderContext);
                endAssistantProcessing();
                regenerationInProgress = false;
                if (actionButton?.isConnected) actionButton.disabled = false;
                resetPrimaryActionButtonWhenIdle();
            }
        }

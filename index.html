<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover, interactive-widget=resizes-content">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>JARVIS - Just A Rather Very Intelligent System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>
    <style>
        /* JARVIS KERNEL STYLES */
        @keyframes thinkingDotWave { 0%, 80%, 100% { transform: translateY(0); opacity: 0.5; } 40% { transform: translateY(-6px); opacity: 1; } }
        .thinking-dot { animation: thinkingDotWave 1.2s infinite ease-in-out; }
        .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dot:nth-child(3) { animation-delay: 0.4s; }

        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
        body.dark .glass-card {
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        body.dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
    </style>
</head>
<body class="light min-h-screen transition-all duration-500 bg-slate-50 dark:bg-slate-900 font-sans">

    <div class="max-w-6xl mx-auto p-4 md:p-8 pb-32">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-5xl font-black tracking-tighter text-slate-800 dark:text-white">JARVIS<span class="text-purple-600">.</span></h1>
                <p class="text-xs uppercase tracking-[0.3em] text-slate-400 mt-1 font-bold">System Intelligence Kernel</p>
            </div>
            <button onclick="toggleDarkMode()" class="p-2 rounded-2xl bg-white dark:bg-slate-800 shadow-xl border border-slate-200 dark:border-slate-700">
                <div class="w-14 h-7 bg-slate-200 dark:bg-purple-900/40 rounded-full relative transition-colors">
                    <div id="mode-thumb" class="absolute top-1 left-1 w-5 h-5 bg-white dark:bg-purple-400 rounded-full shadow-md transition-all flex items-center justify-center text-[10px] dark:translate-x-7">
                        <span id="mode-icon">☀️</span>
                    </div>
                </div>
            </button>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div id="weather-card" class="hidden glass-card rounded-[2.5rem] p-8 text-slate-800 dark:text-white">
                    <h2 class="font-black text-xl uppercase tracking-widest opacity-50 mb-4">Weather</h2>
                    <p id="temp-display" class="text-6xl font-black">--°C</p>
                    <p id="weather-desc" class="text-lg font-medium capitalize mt-2"></p>
                </div>
                <div class="glass-card rounded-[2.5rem] p-8">
                    <h3 class="font-black text-sm uppercase text-purple-600 mb-6">Intelligence Brief</h3>
                    <div id="news-container" class="text-sm text-slate-500 dark:text-slate-400 space-y-4">System Online...</div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="glass-card rounded-[2.5rem] h-[600px] flex flex-col overflow-hidden">
                    <div id="chat-messages" class="flex-1 overflow-y-auto p-8 space-y-6 custom-scrollbar">
                        <div class="flex justify-start">
                            <div class="bg-white dark:bg-slate-800 p-5 rounded-[2rem] max-w-[85%] shadow-sm border border-slate-100 dark:border-slate-700 text-sm dark:text-white">
                                JARVIS Kernel Online. Ready for your command, sir.
                            </div>
                        </div>
                    </div>
                    <div id="thinking-indicator" class="hidden px-8 py-3 bg-slate-50/50 dark:bg-slate-900/50 border-t border-slate-100 dark:border-slate-800">
                        <div class="flex gap-1.5"><div class="thinking-dot w-1.5 h-1.5 bg-purple-500 rounded-full"></div><div class="thinking-dot w-1.5 h-1.5 bg-purple-500 rounded-full"></div><div class="thinking-dot w-1.5 h-1.5 bg-purple-500 rounded-full"></div></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-slate-50 dark:from-slate-900 to-transparent">
        <div class="max-w-4xl mx-auto flex items-center gap-4 bg-white dark:bg-slate-800 p-3 rounded-3xl shadow-2xl border border-slate-200 dark:border-slate-700">
            <button onclick="startVoiceInput()" class="p-4 text-slate-400 hover:text-purple-600 transition-all"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button>
            <input type="text" id="user-input" placeholder="Give a command..." class="flex-1 bg-transparent border-none outline-none py-3 text-lg dark:text-white font-medium">
            <button onclick="handleSend()" class="bg-purple-600 hover:bg-purple-700 text-white p-4 rounded-[1.25rem] transition-all"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
        </div>
    </div>

    <script>
        let state = { isDark: false, history: [] };

        function toggleDarkMode() {
            state.isDark = !state.isDark;
            document.body.classList.toggle('dark', state.isDark);
            document.getElementById('mode-icon').innerText = state.isDark ? '🌙' : '☀️';
        }

        async function handleSend() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;
            
            appendMsg(text, true);
            input.value = '';
            document.getElementById('thinking-indicator').classList.remove('hidden');

            try {
                const response = await fetch('/api/chat-groq', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, context: state.history })
                });
                const data = await response.json();
                const aiText = data.response || data.text;
                
                document.getElementById('thinking-indicator').classList.add('hidden');
                appendMsg(aiText, false);
                if (window.responsiveVoice) responsiveVoice.speak(aiText, "UK English Male");
                state.history.push({role: 'user', text}, {role: 'assistant', text: aiText});
            } catch (e) {
                document.getElementById('thinking-indicator').classList.add('hidden');
                appendMsg("Connection error, sir. Ensure backend is active.");
            }
        }

        function appendMsg(text, isUser) {
            const container = document.getElementById('chat-messages');
            const wrap = document.createElement('div');
            wrap.className = `flex ${isUser ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-2`;
            wrap.innerHTML = `<div class="${isUser ? 'bg-purple-600 text-white rounded-br-none' : 'bg-white dark:bg-slate-800 dark:text-white rounded-bl-none'} p-5 rounded-[2rem] max-w-[85%] shadow-md border border-slate-100 dark:border-slate-700 text-sm">${text.replace(/\n/g, '<br>')}</div>`;
            container.appendChild(wrap);
            container.scrollTop = container.scrollHeight;
        }

        // TRAVEL KERNEL
        const TravelModule = {
            haversine: (p1, p2) => {
                const R = 6371;
                const toRad = x => (x * Math.PI) / 180;
                const dLat = toRad(p2.lat - p1.lat);
                const dLon = toRad(p2.lon - p1.lon);
                const a = Math.sin(dLat/2)**2 + Math.cos(toRad(p1.lat)) * Math.cos(toRad(p2.lat)) * Math.sin(dLon/2)**2;
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            },
            inferMode: (d) => d < 1.5 ? "walk" : (d > 100 ? "flight" : "drive")
        };

        window.JarvisApp = { register: (n, api) => console.log(`JARVIS: ${n} module loaded.`) };
        (function() { if(window.JarvisApp) window.JarvisApp.register("travel-planner", TravelModule); })();

        function startVoiceInput() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return;
            const rec = new SpeechRecognition();
            rec.onresult = (e) => { document.getElementById('user-input').value = e.results[0][0].transcript; handleSend(); };
            rec.start();
        }

        document.getElementById('user-input').onkeydown = (e) => { if(e.key === 'Enter') handleSend(); };
    </script>
</body>
</html>

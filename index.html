    supportive: 'Use an empathetic and motivating tone while staying concrete and direct.',
    debate: 'Use claim, evidence, and rebuttal structure. Be precise, direct, and avoid vague language.'
};
const RESPONSE_LENGTH_HINTS = {
    short: 'Respond in 2-4 concise sentences unless a list is requested.',
    normal: 'Respond with practical detail and clear structure.',

};
const RESPONSE_FORMAT_HINTS = {

};
const LEARNING_MODE_HINTS = {

    eli10: 'Explain like the user is 10: simple words, concrete analogies, short sentences, and no unexplained jargon.',

    bullet: 'Summarize in crisp bullet points with the most important facts first.'
};

function detectPromptLearningMode(text) {
    const lower = String(text || '').toLowerCase();
    if (/\b(explain like i'?m 10|explain like i am 10|explain like a 10 year old|eli10|like i'?m ten|like i am ten)\b/.test(lower)) {
        return 'eli10';
    }
    if (/\b(exam answer|answer like an exam|exam style|for exam|marks answer|write an exam response)\b/.test(lower)) {
        return 'exam';
    }
    if (/\b(bullet summary|bullet points|in bullets|summarize in bullets|point wise|point-wise)\b/.test(lower)) {
        return 'bullet';
    }
    return 'standard';
}
function detectRequestedResponseLength(text) {
    const lower = (text || '').toLowerCase();
    if (/\b(short|brief|in short|concise|tldr|summary|summarize|few words|one line)\b/.test(lower)) {
        return 'short';
    }
    if (/\b(long|detailed|in detail|elaborate|deep dive|comprehensive|step by step)\b/.test(lower)) {
        return 'detailed';
    }
    return 'normal';
}

function detectTeachingDepth(text) {
    const lower = String(text || '').toLowerCase();
    if (!lower.trim()) return 'normal';
    if (/\b(explain like i am 5|eli5|in simple words|very simple|easy words|beginner|for a kid|i am new|new to this)\b/.test(lower)) {
        return 'simple';
    }
    if (/\b(advanced|deep dive|comprehensive|detailed|technical|in-depth|expert)\b/.test(lower)) {
        return 'detailed';
    }
    return 'normal';
}

function getUserIntent(text) {
  return {
    wantsHotels: /hotel|stay|accommodation/i.test(text),
    wantsItinerary: /itinerary|plan|schedule|day in/i.test(text)
  };
}

function isWeatherIntentText(text) {
    const t = (text || '').toLowerCase();
    return /\b(weather|climate|temperature|forecast|humidity|humid|rain|raining|drizzle|snow|snowing|hot|cold|wind|windy|sunny|cloudy|overcast|storm|thunder|heat|chilly|freezing|degrees?|umbrella|jacket)\b/.test(t) ||
        /\b(how'?s?\s+it\s+(?:outside|out(?:side)?|where\s+i\s+am)|what'?s?\s+it\s+like\s+(?:outside|where\s+i\s+am)|is\s+it\s+(?:raining|snowing|hot|cold|windy|sunny|cloudy|humid)\b)\b/.test(t) ||
        /\b(?:outside|here|around me|near me|my current location|current location|my location|where i am|my area|my place)\b/.test(t) &&
        /\b(?:forecast|temperature|rain|snow|hot|cold|wind|sunny|cloudy|humid|weather)\b/.test(t);
}

function isPersonalHealthStatement(text) {
    const t = String(text || '').toLowerCase().trim();
    if (!t) return false;
    const firstPerson = /\b(i|i'm|i am|my|me)\b/.test(t);
    if (!firstPerson) return false;
    return /\b(hurt|injur|injured|pain|ache|swelling|swollen|bleed|bleeding|burn|burned|burnt|cut|sprain|fracture|fever|cough|cold|vomit|nausea|dizzy|headache|toe|ankle|knee|back pain|stomach pain|chest pain|sick)\b/.test(t);
}

function isCurrentLocationIntentText(text) {
    const t = String(text || '').toLowerCase().trim();
    if (!t) return false;
    if (/\b(share|send|nearest|nearby|hospital|police|pharmacy|atm)\b/.test(t)) return false;
    if (/\b(weather|forecast|temperature|rain|snow|wind|sunny|cloudy|humid)\b/.test(t)) return false;
    return /\b(where\s+am\s+i|where\s+m\s+i|where\s+i\s+am|where\s+am\s+i\s+now|what\s+is\s+my\s+location|what'?s\s+my\s+location|my\s+current\s+location|current\s+location|my\s+coordinates?|current\s+coordinates?|my\s+gps|where'?s\s+my\s+location|latitude|longitude|coords?)\b/.test(t);
}

function isTamilJokeRequest(text) {
    const t = String(text || '').toLowerCase();
    if (!/\bjoke|funny|laugh\b/.test(t)) return false;
    return /\btamil\b|\u0ba4\u0bae\u0bbf\u0bb4\u0bcd/.test(t);
}

function isSeriesReferenceJokeRequest(text) {
    const t = String(text || '').toLowerCase();
    if (!t.trim()) return false;
    const jokeSignal = /\b(joke|funny|meme|roast|humor|laugh)\b/.test(t);
    const screenSignal = /\b(series|sitcom|show|web\s*series|movie|film|episode|character|scene)\b/.test(t);
    const referenceSignal = /\b(reference|inside joke|context|explain)\b/.test(t);
    return (jokeSignal && screenSignal) || (jokeSignal && referenceSignal);
}

function normalizeReferenceText(text) {
    return String(text || '').toLowerCase().replace(/['"`]/g, '').replace(/\s+/g, ' ').trim();
}

function hasReferenceContext(normalizedText) {
    if (!normalizedText) return false;
    return /\b(reference|ref|classic|quote|meme|joke|inside joke|vibe|energy|moment|scene|character|sitcom|show|series|movie|film)\b/.test(normalizedText) ||
        /\b(that'?s|that is|this is|this feels|reminds me of|pulling a|doing a|giving)\b/.test(normalizedText) ||
        /\b(do you know|you know|know who|heard of|ever heard of|recognize|who is|who's)\b/.test(normalizedText);
}

function detectSitcomMovieReference(text) {
    const normalized = normalizeReferenceText(text);
    if (!normalized) return null;
    for (const entry of SITCOM_MOVIE_REFERENCE_CATALOG) {
        const alias = entry.aliases.find((name) => {
            const escaped = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            return new RegExp(`(^|\\b)${escaped}(\\b|$)`, 'i').test(normalized);
        });
        if (!alias) continue;
        const compactNameOnly = normalized === alias || normalized === `${alias} reference`;
        if (compactNameOnly || hasReferenceContext(normalized)) return entry;
    }
    return null;
}

function buildSitcomMovieReferenceResponse(reference) {
    const sourceType = reference.medium === 'movie' ? 'movie' : 'sitcom';
    const referenceLabel = reference.referenceLabel || reference.character;
    if (reference.referenceLabel && reference.referenceLabel !== reference.character) {
        return `Yes. "${referenceLabel}" is a ${sourceType} reference to ${reference.character} from "${reference.work}."\n\nIt is the kind of nickname/fan-reference people use when joking about that character.`;
    }
    return `Yes. ${reference.character} is from the ${sourceType} "${reference.work}."\n\nThat sounds like a pop-culture reference, not a current-facts lookup.`;
}

async function handleSitcomMovieReference(text) {
    const reference = detectSitcomMovieReference(text);
    if (!reference) return false;
    const msg = buildSitcomMovieReferenceResponse(reference);
    addChatMessage(msg, false);
    saveToHistory(text, msg);
    return true;
}

function isGeneralJokeRequest(text) {
    const t = String(text || '').toLowerCase().trim();
    if (!t) return false;
    if (!/\b(joke|funny|make me laugh|say something funny|tell me something funny)\b/.test(t)) return false;
    if (isTamilJokeRequest(t) || isSeriesReferenceJokeRequest(t)) return false;
    return true;
}

function isRecipeRequest(text) {
    const t = String(text || '').toLowerCase().trim();
    if (!t) return false;
    const recipeSignals = /\b(recipe|how to make|how do i make|how can i make|ingredients|steps|cook|prepare)\b/;
    const dishSignals = /\b(biryani|chicken|mutton|rice|curry|masala|pasta|pizza|noodles|soup|cake|bread|dessert|dish|food|aloo|potato|fry|sabzi|poriyal|bhaji|stir fry)\b/;
    const directRecipePattern = /\brecipe\s+for\s+.+/;
    const makeDishPattern = /\b(?:how to make|how do i make|how can i make|prepare|cook)\s+.+/;
    return (recipeSignals.test(t) && dishSignals.test(t)) || directRecipePattern.test(t) || makeDishPattern.test(t);
}

function isMathCalculationRequest(text) {
    const t = String(text || '').toLowerCase().trim();
    if (!t) return false;
    if (/\b(weather|forecast|news|headline|translate|joke|hotel|restaurant)\b/.test(t)) return false;
    if (/\b(calculate|calc|compute|evaluate|solve|scientific calculation|scientific calculator)\b/.test(t)) return true;
    if (/^[\d\s()+\-*/^%.=,]+$/.test(t) && /[+\-*/^%]/.test(t)) return true;
    if (/^(what is|what's)\s+[-+*/^%().,\d\s]+=?$/.test(t)) return true;
    return false;
}

function isStepByStepMathRequest(text) {
    const t = String(text || '').toLowerCase().trim();
    if (!isMathCalculationRequest(t)) return false;
    return /\b(step by step|show steps|with steps|explain steps|how did you get|work out|worked solution|derive)\b/.test(t);
}

function normalizeMathExpression(rawText) {
    let s = String(rawText || '').trim();
    s = s
        .replace(/[Ã—x]/g, '*')
        .replace(/Ã·/g, '/')
        .replace(/âˆ’/g, '-')
        .replace(/â€“/g, '-')
        .replace(/,/g, '')
        .replace(/\s+/g, ' ');

    s = s.replace(/\b(?:calculate|calc|compute|evaluate|solve|what is|what's)\b/gi, '').trim();
    s = s.replace(/[=?]\s*$/g, '').trim();
    s = s.replace(/(\d+(?:\.\d+)?)\s*%/g, '($1/100)');
    return s;
}

function evaluateScientificExpression(rawText) {
    const expr = normalizeMathExpression(rawText);
    if (!expr) return { ok: false, error: 'No expression found.' };
    if (!/^[0-9+\-*/().,\s%^a-zA-Z]+$/.test(expr)) {
        return { ok: false, error: 'Unsupported characters in expression.' };
    }

    let jsExpr = expr.replace(/\^/g, '**');
    jsExpr = jsExpr.replace(/\bpi\b/gi, 'Math.PI');
    jsExpr = jsExpr.replace(/(^|[^0-9.])e([^0-9]|$)/gi, '$1Math.E$2');

    const fnMap = {
        sin: 'Math.sin', cos: 'Math.cos', tan: 'Math.tan',
        asin: 'Math.asin', acos: 'Math.acos', atan: 'Math.atan',
        sqrt: 'Math.sqrt', abs: 'Math.abs',
        log: 'Math.log10', ln: 'Math.log', exp: 'Math.exp',
        floor: 'Math.floor', ceil: 'Math.ceil', round: 'Math.round',
        pow: 'Math.pow', min: 'Math.min', max: 'Math.max'
    };
    for (const [k, v] of Object.entries(fnMap)) {
        jsExpr = jsExpr.replace(new RegExp(`\\b${k}\\s*\\(`, 'gi'), `${v}(`);
    }
    if (!/^[0-9+\-*/().,\s*%A-Za-z_]+$/.test(jsExpr)) {
        return { ok: false, error: 'Expression normalization failed.' };
    }

    try {
        // eslint-disable-next-line no-new-func
        const value = Function(`"use strict"; return (${jsExpr});`)();
        if (typeof value !== 'number' || !Number.isFinite(value)) {
            return { ok: false, error: 'Result is not finite.' };
        }
        return { ok: true, expression: expr, value };
    } catch (_) {
        return { ok: false, error: 'Could not evaluate expression.' };
    }
}

function formatScientificResult(value) {
    const abs = Math.abs(value);
    if (abs !== 0 && (abs >= 1e9 || abs < 1e-6)) return value.toExponential(8);
    return Number(value.toFixed(10)).toString();
}

function classTokens(value) {
    if (Array.isArray(value)) return value.flatMap(classTokens).filter(Boolean);
    return String(value || '').split(/\s+/).filter(Boolean);
}

function safeClassListAdd(element, ...values) {
    if (!element || !element.classList) return;
    const tokens = values.flatMap(classTokens);
    if (tokens.length) element.classList.add(...tokens);
}

function wantsSymbolicMathOutput(text) {
    const t = String(text || '').toLowerCase();
    if (!t.trim()) return false;
    return /\b(exact|symbolic|fraction|fractions|surd|radical|keep.*sqrt|no decimal|without decimal|in terms of)\b/.test(t);
}

function gcd(a, b) {
    let x = Math.abs(Math.trunc(a));
    let y = Math.abs(Math.trunc(b));
    while (y) {
        const r = x % y;
        x = y;
        y = r;
    }
    return x || 1;
}

function approximateFraction(value, maxDenominator = 10000, tolerance = 1e-10) {
    if (!Number.isFinite(value)) return null;
    if (Number.isInteger(value)) return { numerator: value, denominator: 1 };

    const sign = value < 0 ? -1 : 1;
    let x = Math.abs(value);
    let h1 = 1, h0 = 0, k1 = 0, k0 = 1;
    let a = Math.floor(x);
    let h = a * h1 + h0;
    let k = a * k1 + k0;

    while (k <= maxDenominator) {
        const approx = h / k;
        if (Math.abs(approx - x) <= tolerance) break;
        const frac = x - a;
        if (frac === 0) break;
        x = 1 / frac;
        a = Math.floor(x);

        h0 = h1; h1 = h;
        k0 = k1; k1 = k;
        h = a * h1 + h0;
        k = a * k1 + k0;
    }

    if (!k || k > maxDenominator) return null;
    const num = sign * h;
    const den = k;
    const g = gcd(num, den);
    return { numerator: num / g, denominator: den / g };
}

function extractSimpleSqrtExpression(expression) {
    const expr = String(expression || '').trim();
    const m = expr.match(/^([+-]?\d+(?:\.\d+)?)?\s*\*?\s*sqrt\(\s*([+-]?\d+(?:\.\d+)?)\s*\)$/i);
    if (!m) return null;
    const coeff = m[1] ? Number(m[1]) : 1;
    const radicand = Number(m[2]);
    if (!Number.isFinite(coeff) || !Number.isFinite(radicand) || radicand < 0) return null;
    return { coeff, radicand };
}

function formatExactMathResult(expression, value, preferSymbolic = false) {
    if (!preferSymbolic) return formatScientificResult(value);
    if (Number.isInteger(value)) return String(value);

    const sqrtForm = extractSimpleSqrtExpression(expression);
    if (sqrtForm) {
        if (sqrtForm.coeff === 1) return `sqrt(${formatScientificResult(sqrtForm.radicand)})`;
        return `${formatScientificResult(sqrtForm.coeff)}*sqrt(${formatScientificResult(sqrtForm.radicand)})`;
    }

    const frac = approximateFraction(value);
    if (frac && frac.denominator !== 1) {
        return `${frac.numerator}/${frac.denominator}`;
    }

    return formatScientificResult(value);
}

async function handleMathCalculationRequest(text) {
    const out = evaluateScientificExpression(text);
    if (!out.ok) {
        const msg = `I could not calculate that yet. ${out.error} Try: "calculate (25*3.2)+sqrt(49)-log(100)".`;
        addChatMessage(msg, false);
        saveToHistory(text, msg);
        return true;
    }

    const symbolic = wantsSymbolicMathOutput(text);
    const resultText = formatScientificResult(out.value);
    const exactText = formatExactMathResult(out.expression, out.value, symbolic);
    const msg = symbolic
        ? `Expression: ${out.expression}\nResult (exact/preferred): ${exactText}\nResult (decimal): ${resultText}\n\nHow: I used scientific operator precedence and math functions.`
        : `Expression: ${out.expression}\nResult: ${resultText}\n\nHow: I used scientific operator precedence and math functions.`;
    addChatMessage(msg, false);
    saveToHistory(text, msg);
    return true;
}

async function handleMathStepByStepRequest(text) {
    const out = evaluateScientificExpression(text);
    if (!out.ok) {
        const msg = `I could not solve that step-by-step yet. ${out.error} Try: "solve step by step (25*3.2)+sqrt(49)-log(100)".`;
        addChatMessage(msg, false);
        saveToHistory(text, msg);
        return true;
    }

    const symbolic = wantsSymbolicMathOutput(text);
    const finalResult = formatScientificResult(out.value);
    const exactResult = formatExactMathResult(out.expression, out.value, symbolic);
    const prompt = `Solve this expression step by step for a student.

Expression: ${out.expression}
Final numeric result (already validated): ${finalResult}
Preferred exact/symbolic final form (if available): ${exactResult}

Rules:
- Keep steps concise and correct.
- Use numbered steps.
- Preserve scientific function meaning (sqrt, log base 10, ln, trig).
- End with:
  Final answer (exact): ${exactResult}
  Final answer (decimal): ${finalResult}
- Do not change the final result.`;

    try {
        const response = await fetch('/api/chat-groq', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: prompt
            })
        });

        if (!response.ok) throw new Error(`step_math_failed_${response.status}`);
        const data = await response.json();
        let answer = String(data?.response || data?.text || '').trim();
        if (!answer) throw new Error('empty_step_math');

        if (!/final answer\s*\(decimal\)\s*:/i.test(answer)) {
            answer = `${answer}\n\nFinal answer (exact): ${exactResult}\nFinal answer (decimal): ${finalResult}`;
        }
        addChatMessage(answer, false);
        saveToHistory(text, answer);
        return true;
    } catch (_) {
        const fallback = `1. Start with: ${out.expression}\n2. Apply operator precedence and evaluate inner/grouped operations first.\n3. Compute scientific functions and powers.\n4. Finish remaining multiplication/division, then addition/subtraction.\nFinal answer (exact): ${exactResult}\nFinal answer (decimal): ${finalResult}`;
        addChatMessage(fallback, false);
        saveToHistory(text, fallback);
        return true;
    }
}

function normalizeIntentTypos(text) { 
    const raw = String(text || ''); 
    if (!raw.trim()) return ''; 
    const targeted = raw 
        .replace(/\bwhere\s+a\s+i\b/gi, 'where am I')
        .replace(/\bwhere\s+am\b[?.!]*$/gi, 'where am I')
        .replace(/\bwhere\s+i\s+am\b/gi, 'where am I')
        .replace(/\bcief\b/gi, 'chief') 
        .replace(/\brtamil\s*nadu\b/gi, 'Tamil Nadu') 
        .replace(/\brtamilnadu\b/gi, 'Tamil Nadu') 
        .replace(/\btamilnadu\b/gi, 'Tamil Nadu') 
        .replace(/\b(my|left|right|the)\s+food\b(?=[^?.!]*(?:hurt|hurts|hurting|pain|paining|ache|aching|swollen|injured|injury))/gi, '$1 foot')
        .replace(/\bfood\s+(hurt|hurts|hurting|pain|paining|ache|aching|swollen|injured|injury)\b/gi, 'foot $1');

    const dictionary = [
        'what', 'whats', 'who', 'tell', 'about', 'define', 'meaning', 'show',
        'image', 'picture', 'photo', 'look', 'like', 'weather', 'forecast',
        'news', 'shopping', 'grocery', 'itinerary', 'hotel',
        'restaurants', 'transport', 'translate', 'translator', 'joke',
        'calendar', 'budget', 'sync', 'chief', 'minister', 'tamil', 'nadu'
    ];

    return targeted
        .split(/(\s+)/)
        .map(token => {
            if (!/^[a-zA-Z']+$/.test(token)) return token;
            const lower = token.toLowerCase();
            if (dictionary.includes(lower)) return lower;
            if (lower.length < 3) return lower;

            let best = lower;
            let min = 99;
            for (const word of dictionary) {
                const d = levenshteinDistance(lower, word);
                if (d < min) {
                    min = d;
                    best = word;
                }
            }

            const limit = lower.length <= 4 ? 1 : 2;
            return min <= limit ? best : lower;
        }) 
        .join(''); 
}

function getMemoryRecordValue(record) {
    if (record && typeof record === 'object') {
        return String(record.value || record.location || '').trim();
    }
    return String(record || '').trim();
}

function inferMemoryRecordType(title, value, sourcePhrase = '') {
    const text = `${title || ''} ${value || ''} ${sourcePhrase || ''}`.toLowerCase();
    if (/\b(in|on|at|inside|drawer|shelf|bag|room|desk|counter|cupboard|locker|wallet|passport|keys?)\b/.test(text)) return 'location';
    if (/\b(prefer|preference|like|dislike|call me|address me|style|tone)\b/.test(text)) return 'preference';
    if (/\b(remind|reminder|todo|to-do|task|deadline|appointment)\b/.test(text)) return 'reminder';
    return 'note';
}

function normalizeMemoryRecord(key, record) {
    const normalizedKey = normalizeThing(key);
    if (record && typeof record === 'object' && record.value) {
        const type = String(record.type || record.category || inferMemoryRecordType(record.title || key, record.value, record.sourcePhrase)).toLowerCase().trim();
        return {
            key: String(record.key || normalizedKey).trim() || normalizedKey,
            title: String(record.title || record.key || normalizedKey).trim() || normalizedKey,
            value: String(record.value || '').trim(),
            type: /^(location|note|preference|reminder)$/.test(type) ? type : 'note',
            category: /^(location|note|preference|reminder)$/.test(type) ? type : 'note',
            createdAt: String(record.createdAt || new Date().toISOString()),
            updatedAt: String(record.updatedAt || record.createdAt || new Date().toISOString()),
            sourcePhrase: String(record.sourcePhrase || '').trim()
        };
    }
    const now = new Date().toISOString();
    const value = getMemoryRecordValue(record);
    const type = inferMemoryRecordType(normalizedKey, value);
    return {
        key: normalizedKey,
        title: normalizedKey,
        value,
        type,
        category: type,
        createdAt: now,
        updatedAt: now,
        sourcePhrase: ''
    };
}

function createExplicitMemoryRecord(key, value, sourcePhrase = '', typeOverride = '') {
    const existing = memoryStore?.[key];
    const previous = existing && typeof existing === 'object' ? existing : null;
    const now = new Date().toISOString();
    const type = /^(location|note|preference|reminder)$/.test(String(typeOverride || '').toLowerCase())
        ? String(typeOverride).toLowerCase()
        : inferMemoryRecordType(key, value, sourcePhrase);
    return {
        key,
        title: key,
        value: String(value || '').trim(),
        type,
        category: type,
        createdAt: String(previous?.createdAt || now),
        updatedAt: now,
        sourcePhrase: String(sourcePhrase || '').trim().slice(0, 240)
    };
}

function normalizeMemoryStoreRecords() {
    const next = {};
    for (const [key, value] of Object.entries(memoryStore || {})) {
        if (key === 'name') continue;
        const record = normalizeMemoryRecord(key, value);
        if (record.key && record.value) next[record.key] = record;
    }
    memoryStore = next;
    AppState.user.memory = memoryStore;
    return memoryStore;
}

function memorySearchTokens(value) {
    return String(value || '')
        .toLowerCase()
        .replace(/[^a-z0-9\s]/g, ' ')
        .split(/\s+/)
        .filter(token => token && token.length > 1)
        .slice(0, 32);
}

function scoreMemoryMatch(query, key, record) {
    const normalizedQuery = normalizeThing(String(query || '').replace(/^(?:the|my|a|an)\s+/i, ''));
    const normalizedKey = normalizeThing(key);
    const value = getMemoryRecordValue(record);
    if (!normalizedQuery || !normalizedKey || !value) return 0;
    if (normalizedQuery === normalizedKey) return 100;
    if (normalizedQuery.replace(/s$/, '') === normalizedKey.replace(/s$/, '')) return 92;
    if (normalizedKey.includes(normalizedQuery) || normalizedQuery.includes(normalizedKey)) return 82;

    const queryTokens = memorySearchTokens(normalizedQuery);
    const keyTokens = memorySearchTokens(normalizedKey);
    const overlap = keyTokens.filter(token => queryTokens.includes(token) || queryTokens.includes(token.replace(/s$/, ''))).length;
    if (overlap > 0) return 50 + overlap * 8;

    const distance = levenshteinDistance(normalizedQuery, normalizedKey);
    const maxDistance = Math.max(1, Math.floor(Math.min(normalizedQuery.length, normalizedKey.length) / 3));
    return distance <= maxDistance ? 40 - distance : 0;
}

function findRelevantSavedMemory(text, limit = 3) {
    const query = String(text || '').trim();
    if (!query || !memoryStore) return [];
    normalizeMemoryStoreRecords();
    return Object.entries(memoryStore)
        .map(([key, record]) => ({
            key,
            record,
            score: scoreMemoryMatch(query, key, record)
        }))
        .filter(item => item.score >= 50)
        .sort((a, b) => b.score - a.score)
        .slice(0, limit)
        .map(item => ({
            key: item.key,
            value: getMemoryRecordValue(item.record),
            category: item.record?.category || 'location',
            updatedAt: item.record?.updatedAt || ''
        }));
}

function buildRelevantSavedMemoryContext(text) {
    const relevant = findRelevantSavedMemory(text, 3);
    if (!relevant.length) return '';
    const lines = relevant.map(item => `- ${item.key}: ${item.value}`);
    return `\n\nRelevant saved memory:\n${lines.join('\n')}`;
}

function buildMemoryInspectorHtml(filter = '') { 
    const query = String(filter || '').toLowerCase().trim();
    const entries = Object.entries(memoryStore || {})
        .filter(([key]) => key !== 'name')
        .map(([key, value]) => [key, normalizeMemoryRecord(key, value)])
        .filter(([key, record]) => {
            if (!query) return true;
            return `${key} ${record.title} ${record.value} ${record.type}`.toLowerCase().includes(query);
        })
        .slice(0, 30);
    if (!entries.length) {
        return `<p class="text-xs">${query ? 'No matching memory items.' : 'No saved memory items yet.'}</p>`;
    }
    return entries.map(([key, record]) => {
        const label = escapeHtml(String(record.title || key || '').slice(0, 60));
        const body = escapeHtml(`${record.value}${record.updatedAt ? ` | updated ${record.updatedAt.slice(0, 10)}` : ''}`.slice(0, 180));
        const type = escapeHtml(String(record.type || record.category || 'note'));
        const encodedKey = encodeURIComponent(key);
        return `
            <div class="memory-inspector-item">
                <div class="min-w-0">
                    <strong>${label}</strong>
                    <span class="text-[10px] uppercase tracking-wide opacity-70 ml-2">${type}</span>
                    <p>${body}</p>
                </div>
                <div class="flex gap-2 shrink-0">
                    <button type="button" class="memory-action-btn" onclick="editMemoryItem('${encodedKey}')">Edit</button>
                    <button type="button" class="memory-action-btn" onclick="deleteMemoryItem('${encodedKey}')">Delete</button>
                </div>
            </div>
        `;
    }).join('');
}

function refreshMemoryVaultList() {
    const list = document.getElementById('memory-inspector-list');
    const filter = document.getElementById('memory-vault-search')?.value || '';
    if (list) list.innerHTML = buildMemoryInspectorHtml(filter);
}

function filterMemoryVault() {
    refreshMemoryVaultList();
}

function addMemoryVaultItemFromHelp() {
    const titleEl = document.getElementById('memory-vault-title');
    const valueEl = document.getElementById('memory-vault-value');
    const typeEl = document.getElementById('memory-vault-type');
    const title = normalizeThing(titleEl?.value || '');
    const value = String(valueEl?.value || '').trim();
    const type = String(typeEl?.value || 'note').toLowerCase();
    if (!title || !value) {
        showTemporaryMessage('Add a title and value first.');
        return false;
    }
    memoryStore[title] = createExplicitMemoryRecord(title, value, 'Help Memory Vault', type);
    saveUserData();
    if (titleEl) titleEl.value = '';
    if (valueEl) valueEl.value = '';
    refreshMemoryVaultList();
    refreshPrivacyDataSummary();
    showTemporaryMessage('Memory saved.');
    return true;
}

function editMemoryItem(encodedKey) {
    const key = decodeURIComponent(String(encodedKey || ''));
    const current = normalizeMemoryRecord(key, memoryStore?.[key]);
    if (!key || !current.value) return;
    const nextValue = window.prompt(`Edit memory: ${current.title || key}`, current.value);
    if (nextValue === null) return;
    const value = String(nextValue || '').trim();
    if (!value) {
        showTemporaryMessage('Memory value cannot be empty.');
        return;
    }
    memoryStore[key] = {
        ...current,
        value,
        updatedAt: new Date().toISOString()
    };
    saveUserData();
    refreshMemoryVaultList();
    showTemporaryMessage('Memory updated.');
}

function deleteMemoryItem(encodedKey) {
    const key = decodeURIComponent(String(encodedKey || ''));
    if (!key || !Object.prototype.hasOwnProperty.call(memoryStore || {}, key)) return;
    delete memoryStore[key];
    saveUserData();
    refreshMemoryVaultList();
    refreshPrivacyDataSummary();
    showTemporaryMessage('Memory item deleted.');
}

function parseMemorySaveRequest(text) {
    const raw = String(text || '').trim();
    if (!raw) return null;
    let match = raw.match(/^(?:save\s+note|note)\s*:\s*(.+)$/i);
    if (match) {
        const value = match[1].trim();
        return { key: normalizeThing(value.split(/\s+/).slice(0, 6).join(' ')) || 'note', value, type: 'note', sourcePhrase: raw };
    }
    match = raw.match(/^remember\s+(?:that\s+)?(.+?)\s+(?:is|are)\s+(.+)$/i);
    if (match) {
        const key = normalizeThing(match[1].replace(/^my\s+/i, ''));
        return { key, value: match[2].trim(), type: inferMemoryRecordType(key, match[2], raw), sourcePhrase: raw };
    }
    match = raw.match(/^remember\s*:\s*(.+)$/i);
    if (match) {
        const value = match[1].trim();
        return { key: normalizeThing(value.split(/\s+/).slice(0, 6).join(' ')) || 'note', value, type: 'note', sourcePhrase: raw };
    }
    match = raw.match(/^my\s+(.+?)\s+(?:is|are)\s+(.+)$/i);
    if (match && /\b(in|on|at|inside|near|with)\b/i.test(match[2])) {
        const key = normalizeThing(match[1]);
        return { key, value: match[2].trim(), type: 'location', sourcePhrase: raw };
    }
    match = raw.match(/^i\s+(?:put|left)\s+(?:my\s+)?(.+?)\s+(in|on|at|inside|near)\s+(.+)$/i);
    if (match) {
        const key = normalizeThing(match[1]);
        return { key, value: `${match[2]} ${match[3]}`.trim(), type: 'location', sourcePhrase: raw };
    }
    return null;
}

function isMemoryShowRequest(text) {
    const t = String(text || '').toLowerCase().trim();
    return /\b(show|open|list|view)\s+(my\s+)?(saved\s+)?(notes?|memory|memories|memory vault)\b/.test(t) ||
        /\bwhat\s+(have|did)\s+you\s+(remember|saved?)\b/.test(t);
}

function parseMemoryForgetRequest(text) {
    const raw = String(text || '').trim();
    const match = raw.match(/^(?:forget|delete memory|remove memory|delete saved note|remove saved note)\s+(.+)$/i);
    if (!match) return '';
    return normalizeThing(match[1].replace(/^(about|for|my|the)\s+/i, ''));
}

function showSavedMemoryVault(query = '') {
    normalizeMemoryStoreRecords();
    const matches = findRelevantSavedMemory(query, 10);
    const entries = matches.length
        ? matches
        : Object.entries(memoryStore || {})
            .filter(([key]) => key !== 'name')
            .slice(0, 10)
            .map(([key, record]) => {
                const normalized = normalizeMemoryRecord(key, record);
                return { key, value: normalized.value, category: normalized.type || normalized.category || 'note', updatedAt: normalized.updatedAt };
            });
    const response = entries.length
        ? `Memory Vault\n\n${entries.map(item => `- ${item.key} (${item.category || 'note'}): ${item.value}`).join('\n')}`
        : 'Memory Vault is empty. Save something with "remember ..." or "save note: ...".';
    addChatMessage(response, false);
    saveToHistory(String(query || 'show memory'), response);
    return true;
}

function forgetMemoryByQuery(query) {
    const term = normalizeThing(query);
    if (!term) return false;
    normalizeMemoryStoreRecords();
    const directKey = Object.keys(memoryStore || {}).find(key => normalizeThing(key) === term);
    const match = directKey || findRelevantSavedMemory(term, 1)[0]?.key || '';
    if (!match || !memoryStore[match]) return false;

    refreshPrivacyDataSummary();
    addChatMessage(`Removed "${match}" from Memory Vault.`, false);
    saveToHistory(`forget ${query}`, `Removed "${match}" from Memory Vault.`);
    return true;
}

    const drugPatterns = [
        /\b(buy|sell|get|find)\s*(cocaine|heroin|meth|mdma|ecstasy|lsd|weed|marijuana)\b/i,
        /\bhow\s*to\s*(make|cook|produce)\s*(meth|drugs|cocaine)\b/i

    const hatefulPatterns = [

        /\b(racial\s*slur|n[-_]word|f[-_]word)\b/i
    ];

    // Check all patterns
    for (const pattern of [...explicitPatterns, ...violentPatterns, ...drugPatterns, ...hatefulPatterns]) {
        if (pattern.test(lower)) {
            return true;
        }
    }

    // Check for attempts to bypass filters with creative spelling
    const bypassAttempts = [
        /\bp\s*0\s*r\s*n/i,      // p0rn

function isChemistryReactionQuery(text) {
    const t = String(text || '').toLowerCase().trim();
    if (!t) return false;
    const reactionTerm = /\breaction\b/.test(t) || /\b(cannizzaro|cannizarro|aldol|friedel[-\s]?crafts|wurtz|sandmeyer|hell[-\s]?volhard[-\s]?zelinsky|hvz)\b/.test(t);
    const askTerm = /^(what is|what's|explain|define|tell me about|write|show)\b/.test(t) || /\b(formula|equation|mechanism)\b/.test(t);
    return reactionTerm && askTerm;
}

function isPhysicsFormulaQuery(text) {
    const t = String(text || '').toLowerCase().trim();
    if (!t) return false;
    const askTerm = /^(what is|what's|explain|define|derive|show|write|give)\b/.test(t) || /\b(formula|equation|law)\b/.test(t);
    const physicsTerm = /\b(physics|newton|force|momentum|velocity|acceleration|gravity|gravitational|kinetic energy|potential energy|work done|power|pressure|ohm|voltage|current|resistance|capacitance|frequency|wavelength|optics|lens|snell|thermodynamics|entropy)\b/.test(t);
    return askTerm && physicsTerm;
}

function isMathFormulaQuery(text) {
    const t = String(text || '').toLowerCase().trim();
    if (!t) return false;
    const askTerm = /^(what is|what's|explain|define|derive|show|write|give)\b/.test(t) || /\b(formula|equation|identity|theorem)\b/.test(t);
    const mathTerm = /\b(math|mathematics|algebra|calculus|trigonometry|trig|geometry|probability|statistics|quadratic|binomial|derivative|integral|permutation|combination|area|volume|slope|pythagoras)\b/.test(t);
    return askTerm && mathTerm;
}

function requiresAutoFormula(text) {
    const t = String(text || '').toLowerCase().trim();
    if (!t) return false;
    if (/\b(formula|equation|derive|derivation|reaction)\b/.test(t)) return true;
    return isChemistryReactionQuery(t) || isPhysicsFormulaQuery(t) || isMathFormulaQuery(t);
}

function hasFormulaLikeExpression(text) {
    const t = String(text || '');
    if (!t.trim()) return false;
    if (/\bformula\s*[:\-]/i.test(t) || /\bequation\s*[:\-]/i.test(t)) return true;
    if (/[A-Za-z0-9)\]]\s*=\s*[-+A-Za-z0-9(]/.test(t)) return true;
    if (/[A-Za-z0-9)\]]\s*->\s*[A-Za-z0-9(]/.test(t)) return true;
    if (/\b[a-z]\s*=\s*[a-z0-9/*+\-^().]+\b/i.test(t)) return true;
    return false;
}

function ensureStructuredFormulaResponse(answer, userText, reactionNeeded = false) {
    const raw = String(answer || '').trim();
    if (!raw) return raw;
    if (!requiresAutoFormula(userText)) return raw;

    const hasDefinition = /\bdefinition\s*:/i.test(raw);
    const hasFormula = /\b(formula|equation)\s*:/i.test(raw) || hasFormulaLikeExpression(raw);
    const hasUnits = /\bunits\s*:/i.test(raw);
    const hasExample = /\bexample\s*:/i.test(raw);
    const hasRecap = /\b(quick recap|recap)\s*:/i.test(raw);

    const lines = [];
    if (hasDefinition || hasFormula || hasUnits || hasExample || hasRecap) {
        if (hasDefinition && hasFormula && hasUnits && hasExample) return raw;
        lines.push(raw);
    } else {
        lines.push(`Definition: ${raw.split('\n')[0].trim()}`);
    }

    if (!hasFormula) {
        lines.push(reactionNeeded ? 'Formula: R-CHO + OH- -> R-COO- + R-CH2OH (generalized Cannizzaro form when applicable)' : 'Formula: [formula]');
    }
    if (!hasUnits) {
        lines.push('Units: Not applicable unless the formula contains measurable physical quantities.');
    }
    if (!hasExample) {
        lines.push('Example: Replace symbols with known values to compute the required result.');
    }
    if (!hasRecap) {
        lines.push('Quick recap: Use the formula above with correct symbols and units.');
    }
    return lines.join('\n');
}

function downloadIcsFromBase64(base64, fileName) {
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const blob = new Blob([bytes], { type: 'text/calendar;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1500);
}

function extractCityFromText(text) {
    
    const patterns = [
        /in ([A-Z][a-z]+(?: [A-Z][a-z]+)*)/,
        /to ([A-Z][a-z]+(?: [A-Z][a-z]+)*)/,
        /at ([A-Z][a-z]+(?: [A-Z][a-z]+)*)/
    ];
    
    for (const pattern of patterns) {
        const match = text.match(pattern);
        if (match) return match[1];
    }
    
    return '';
}

function isHotelListing(text) {
    // Must have multiple indicators that this is a hotel recommendation
    const hotelIndicators = [
        /\d+\.\s*[A-Z].*?(Hotel|Inn|Resort|Suites|Lodge|Hostel)/i,  // Numbered list with hotel type
        /Price:/i,           // Price mention
        /Rating:/i,          // Rating mention
        /per night/i,        // Per night pricing
        /\$\d+/,             // Dollar amount
        /\u20B9\d+/,          // Rupee amount
        /stars?:/i,          // Star rating
        /check-in/i,         // Check-in info
        /amenities/i,        // Amenities list
        /rooms? available/i, // Room availability
    ];

    // Count how many indicators match
    const matchCount = hotelIndicators.filter(pattern => pattern.test(text)).length;

    // Need at least 2 indicators to confirm it's a hotel listing
    return matchCount >= 2;
}

function isStructuredItineraryResponse(text) {
    const t = String(text || '');

    const timeBlocks = (lower.match(/\b(morning|afternoon|evening|night|breakfast|lunch|dinner)\b/g) || []).length;
    const hasItineraryWord = /\bitinerary\b/.test(lower);
    const hasDayOne = /\bday\s*1\b/.test(lower);
    return (dayBlocks >= 1 && timeBlocks >= 2) || (hasItineraryWord && hasDayOne && timeBlocks >= 1);
}

        } catch (error) {
            if (error.name !== 'AbortError') {
                
                copyToClipboard(text);
            }
        }
    } else {
        
        copyToClipboard(text);
    }
}

function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(() => {
        showTemporaryMessage('Copied to clipboard. You can paste it into SMS, WhatsApp, or any app.');
    }).catch(err => {
        showTemporaryMessage('[Error] Failed to copy. Please try again.');
    });
}

function copyAssistantPlan(button) {
    const raw = button?.dataset?.copyText || '';
    const text = decodeURIComponent(raw);
    if (!text) return;
    copyToClipboard(text);
}

function isInternalPromptText(text) {
    const value = String(text || '').trim();
    if (!value) return true;
    return /(Check whether this answer is accurate|Answer to verify:|Original user request:|Return a clear verification report|Retrieved source evidence|Local review flags|User custom reply instructions|Payload JSON:|Intent: generic_reply|OCR JSON:|Planner JSON:|Critic JSON:)/i.test(value);
}

function setLastVisibleUserMessage(text) {
    const value = String(text || '').trim();
    if (!value || isInternalPromptText(value)) return false;
    lastVisibleUserMessage = value;
    window.__lastUserMessage = value;
    return true;
}

function getLastVisibleUserMessage() {
    const visible = String(lastVisibleUserMessage || '').trim();
    if (visible && !isInternalPromptText(visible)) return visible;
    const legacy = String(window.__lastUserMessage || '').trim();
    return legacy && !isInternalPromptText(legacy) ? legacy : '';
}

function addVisibleInputHistory(text) {
    const value = String(text || '').trim();
    if (!value || isInternalPromptText(value)) return;
    if (!inputHistory.length || inputHistory[inputHistory.length - 1] !== value) {
        inputHistory.push(value);
        if (inputHistory.length > 50) inputHistory = inputHistory.slice(-50);
    }
}

function retryLastRequest() { 
    const last = getLastVisibleUserMessage();
    if (!last) return;
    const input = document.getElementById('text-input');
    if (!input) return;
    input.value = last;
    toggleSendButton();
    sendTextInput(); 
}

// Send email using mailto
function sendEmail(type) {
    const emailInput = document.getElementById('email-input');
    const email = emailInput?.value?.trim();

    if (!email) {
        showTemporaryMessage('[Error] Please enter an email address');
        return;
    }

    // Basic email validation
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
        showTemporaryMessage('[Error] Please enter a valid email address');
        return;
    }

    // Get the stored content
    const pending = window.pendingEmailContent;
    if (!pending || !pending.content) {
        showTemporaryMessage('[Error] No content to send. Please try again.');
        closeEmailModal();
        return;
    }

    // Prepare email content
    const typeTitle = type.charAt(0).toUpperCase() + type.slice(1);
    const subject = encodeURIComponent(`Your ${typeTitle} from JARVIS`);

    // Format content for email (limit length for mailto)
    let emailBody = `Hi!\n\nHere's your ${type} from JARVIS:\n\n`;
    emailBody += '-'.repeat(40) + '\n\n';
    emailBody += pending.content.substring(0, 1500); // Limit content length
    if (pending.content.length > 1500) {
        emailBody += '\n\n[Content truncated - full version available in app]';
    }
    emailBody += '\n\n' + '-'.repeat(40);
    emailBody += '\n\nSent via JARVIS';
    emailBody += '\n\nHave a great trip! ';

    const body = encodeURIComponent(emailBody);

    // Create mailto link
    const mailtoLink = `mailto:${email}?subject=${subject}&body=${body}`;

    // Open email client
    window.location.href = mailtoLink;

    // Save email for future use
    try {
        localStorage.setItem('jarvis_user_email', email);
    } catch (e) {
        // Non-fatal
    }

    // Close modal and show success
    closeEmailModal();
    showTemporaryMessage('Opening your email app...');
}

}

// Store the last query-response pair for feedback
let lastQueryResponse = { query: '', response: '' };

// Load learned preferences from localStorage
function loadLearnedPreferences() {
    try {
        const data = localStorage.getItem('jarvis_learned_preferences');
        return data ? JSON.parse(data) : {
            positivePatterns: [],      // Successful query patterns
            preferredTopics: {},       // Topics user likes
            feedbackCount: { positive: 0, negative: 0 },
            lastUpdated: null
        };
    } catch (e) {
        return { positivePatterns: [], preferredTopics: {}, feedbackCount: { positive: 0, negative: 0 }, lastUpdated: null };
    }
}

// Save learned preferences to localStorage
function saveLearnedPreferences(prefs) {
    try {
        prefs.lastUpdated = new Date().toISOString();
        localStorage.setItem('jarvis_learned_preferences', JSON.stringify(prefs));
    } catch (e) {
    }
}

function buildLearnedPreferenceHint() {
    const prefs = loadLearnedPreferences();
    const positiveCount = Number(prefs?.feedbackCount?.positive || 0);
    const negativeCount = Number(prefs?.feedbackCount?.negative || 0);
    const preferredTopics = Object.entries(prefs?.preferredTopics || {})
        .sort((a, b) => Number(b[1] || 0) - Number(a[1] || 0))
        .slice(0, 5)
        .map(([topic, count]) => `${topic} (${count})`)
        .join(', ');
    const positiveExamples = Array.isArray(prefs?.positivePatterns)
        ? prefs.positivePatterns.slice(-3).map(item => String(item?.query || '').trim()).filter(Boolean)
        : [];
    if (!positiveCount && !negativeCount && !preferredTopics && !positiveExamples.length) return '';
    return [
        'Local feedback memory:',
        `- Helpful votes: ${positiveCount}; not-helpful votes: ${negativeCount}.`,
        preferredTopics ? `- Preferred recurring topics: ${preferredTopics}.` : '',
        positiveExamples.length ? `- Recent positively rated query patterns: ${positiveExamples.join(' | ')}.` : '',
        '- Use this only as a local style/topic preference signal. Do not claim the model was trained, and do not override the user\'s current request.'
    ].filter(Boolean).join('\n');
}

// Extract topic keywords from a query
function extractTopics(text) {
    const topics = [];
    const lowerText = text.toLowerCase();

    const topicPatterns = {
        'travel': /\b(trip|travel|visit|itinerary|vacation|holiday|tour)\b/,
        'hotels': /\b(hotel|stay|accommodation|resort|hostel|booking)\b/,
        'restaurants': /\b(restaurant|food|eat|dining|cuisine|cafe)\b/,
        'weather': /\b(weather|temperature|forecast|rain|sunny|climate)\b/,
        'activities': /\b(things to do|activities|attractions|sightseeing|places)\b/,
        'transport': /\b(transport|bus|train|metro|taxi|uber|flight)\b/,
        'shopping': /\b(shopping|mall|market|buy|store)\b/
    };

    for (const [topic, pattern] of Object.entries(topicPatterns)) {
        if (pattern.test(lowerText)) {
            topics.push(topic);
        }
    }

    return topics;
}

// Handle positive feedback (thumbs up)
function handlePositiveFeedback(buttonElement) {
    const prefs = loadLearnedPreferences();
    const container = buttonElement.closest('.feedback-container');
    const feedbackQuery = container?.dataset?.query ? decodeURIComponent(container.dataset.query) : lastQueryResponse.query;

    // Record the successful interaction
    if (feedbackQuery) {
        const topics = extractTopics(feedbackQuery);

        // Store successful query pattern (limit to 50 patterns)
        prefs.positivePatterns.push({
            query: feedbackQuery.substring(0, 100),
            topics: topics,
            timestamp: new Date().toISOString()
        });

        // Keep only last 50 patterns
        if (prefs.positivePatterns.length > 50) {
            prefs.positivePatterns = prefs.positivePatterns.slice(-50);
        }

        // Increment topic preferences
        topics.forEach(topic => {
            prefs.preferredTopics[topic] = (prefs.preferredTopics[topic] || 0) + 1;
        });
    }

    prefs.feedbackCount.positive++;
    saveLearnedPreferences(prefs);

    // Update UI
    if (!container) return;
    container.innerHTML = `
        <div class="flex items-center gap-2 text-green-500">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1">
                <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path>
            </svg>
            <span class="text-xs font-medium">Thanks for the feedback!</span>
        </div>
    `;

    // Fade out after a moment
    setTimeout(() => {
        container.classList.add('fade-out');
        setTimeout(() => container.remove(), 300);
    }, 2000);
}

// ============ TRANSLATOR MODE ============

// Check if user wants to enable translator mode
function detectTranslatorRequest(text) { 
    const lower = text.toLowerCase(); 
    const languagePattern = '(tamil|kannada|telugu|hindi|malayalam|spanish|filipino|filapino)';

    // Patterns to detect translator mode activation 
    const activationPatterns = [ 
        // "speak in Tamil", "talk in Hindi", etc. 
        new RegExp(`(?:speak|talk|translate|switch|change)\\s+(?:in|to)\\s+${languagePattern}`, 'i'), 
        // "Tamil la pesu" (Tamil: speak in Tamil) 
        /tamil\s+(?:la|le)\s+(?:pesu|peslama|pesalam)/i, 
        // "Kannada alli maathaadu" (Kannada: speak in Kannada) 
        /kannada\s+(?:alli)\s+(?:maathaadu|matadi)/i, 
        // "Hindi mein bolo" (Hindi: speak in Hindi) 
        /hindi\s+(?:mein|me)\s+(?:bolo|baat)/i, 
        // "Telugu lo cheppu" (Telugu: speak in Telugu) 
        /telugu\s+(?:lo)\s+(?:cheppu|matlaadu)/i, 
        // "help me speak to" patterns 
        new RegExp(`help\\s+(?:me\\s+)?(?:speak|talk|communicate)\\s+(?:to|with).*(?:in\\s+)?${languagePattern}`, 'i'), 
        // "I need to talk to auto/rickshaw driver in Kannada" 
        new RegExp(`(?:talk|speak|communicate)\\s+(?:to|with)\\s+(?:auto|rickshaw|taxi|driver|shopkeeper|vendor).*(?:in\\s+)?${languagePattern}`, 'i'), 
        // "translate to Tamil" 
        new RegExp(`translate\\s+(?:to|into)\\s+${languagePattern}`, 'i'), 
        // "can you speak Tamil" 
        new RegExp(`can\\s+you\\s+(?:speak|talk)\\s+(?:in\\s+)?${languagePattern}`, 'i') 
    ]; 

    for (const pattern of activationPatterns) { 
        const match = lower.match(pattern); 
        if (match) { 
            // Extract the language 
            const langMatch = lower.match(new RegExp(`\\b${languagePattern}\\b`, 'i')); 
            if (langMatch) { 
                return normalizeTranslatorLanguageKey(langMatch[1]); 
            } 
        } 
    } 

    // Check for deactivation
    if (lower.match(/(?:stop|exit|end|disable|turn off)\s+(?:translat|interpreter)/i) ||
        lower.match(/(?:switch|go)\s+(?:back\s+)?to\s+english/i) ||
        lower === 'stop' || lower === 'exit translator') {
        return 'exit';
    }

    return null; 
} 

function normalizeTranslatorLanguageKey(language) {
    const key = String(language || '').toLowerCase().trim();
    if (key === 'filapino') return 'filipino';
    return key;
}

function getSupportedLanguageNamesText() {
    return Object.values(supportedLanguages || {}).map(lang => lang.name).join(', ');
}

function resolveTranslatorLanguage(language) {
    const raw = String(language || '').toLowerCase().trim();
    if (!raw) return '';
    const normalized = normalizeTranslatorLanguageKey(raw);
    if (supportedLanguages[normalized]) return normalized;
    const match = Object.entries(supportedLanguages || {}).find(([key, info]) => {
        return key === normalized ||
            String(info.name || '').toLowerCase() === raw ||
            String(info.nativeName || '').toLowerCase() === raw;
    });
    return match?.[0] || '';
}

function parseOneShotTranslationRequest(text) {
    const raw = String(text || '').trim();
    if (!raw) return null;
    let match = raw.match(/^translate\s+["“]?(.+?)["”]?\s+(?:to|into)\s+([a-zA-Z]+)\s*$/i);
    if (match) {
        return {
            sourceText: match[1].trim(),
            targetLanguage: resolveTranslatorLanguage(match[2]),
            rawTargetLanguage: match[2].trim()
        };
    }
    match = raw.match(/^say\s+this\s+in\s+([a-zA-Z]+)\s*:\s*(.+)$/i);
    if (match) {
        return {
            sourceText: match[2].trim(),
            targetLanguage: resolveTranslatorLanguage(match[1]),
            rawTargetLanguage: match[1].trim()
        };
    }
    match = raw.match(/^what\s+does\s+["“]?(.+?)["”]?\s+mean\s+in\s+english\s*\??$/i);
    if (match) {
        return {
            sourceText: match[1].trim(),
            targetLanguage: 'english',
            rawTargetLanguage: 'English'
        };
    }
    return null;
}

async function translateTextToEnglish(sourceText) {
    showThinkingIndicator('Translating to English...');
    try {
        const response = await fetch('/api/chat-groq', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: `Translate this text to clear natural English. Return only the translation.\n\nText:\n"${sourceText}"`
            })
        });
        const data = await response.json();
        hideThinkingIndicator();
        return String(data.response || '').trim();
    } catch (_) {
        hideThinkingIndicator();
        return '';
    }
}

async function handleOneShotTranslation(text) {
    const request = parseOneShotTranslationRequest(text);
    if (!request) return false;
    if (!request.sourceText) {
        addChatMessage('Please include the text you want translated.', false);
        return true;
    }
    if (!request.targetLanguage) {
        addChatMessage(`I can translate to these languages: ${getSupportedLanguageNamesText()}.`, false);
        return true;
    }
    if (request.targetLanguage === 'english') {
        const english = await translateTextToEnglish(request.sourceText);
        const reply = english

    saveToHistory(text, reply);

async function processUserQuery(text) {
    const t = String(text || '').trim();
    if (!t) return;
    if (await handleSitcomMovieReference(t)) {

        return { intent: 'sitcom_movie_reference' };
    }
    if (isArtistSongRequest(t)) {
        logRoutingDebug('processUserQuery -> artist_song', t, { selectedHandler: 'handleArtistSongRequest' });
        await handleArtistSongRequest(t);
        return { intent: 'artist_song' };
    }
    const liveIntent = extractLiveQueryIntent(t);
    const entityIntent = extractUniversalEntityIntent(t, liveIntent);
    const broadFactualWeb = isBroadFactualWebQuery(t, entityIntent, liveIntent);
    const riskLevel = getRiskTierForQuery(t, liveIntent, entityIntent);
    logRoutingDebug('processUserQuery classified', t, {
        liveIntent,
        entityIntent,
        riskLevel,
        broadFactualWeb
    });
    if (isExplicitWebSearchRequest(t)) {
        logRoutingDebug('processUserQuery -> live_retrieval explicit_web', t, {
            selectedHandler: 'handleLiveRetrievalQuery',
            normalizedQuery: normalizeExplicitWebSearchQuery(t),
            liveIntent,
            entityIntent,
            riskLevel
        });
        await handleLiveRetrievalQuery(normalizeExplicitWebSearchQuery(t));
        return { intent: 'live_retrieval' };
    }
    if (isStrictLatestQuery(t)) {
        logRoutingDebug('processUserQuery -> strict_latest', t, {
            selectedHandler: 'handleStrictLatestQuery',
            liveIntent,
            entityIntent,
            riskLevel
        });
        await handleStrictLatestQuery(t);
        return { intent: 'strict_latest' };
    }

    if (isPersonalHealthStatement(t)) {
        logRoutingDebug('processUserQuery -> model personal_health', t, {
            selectedHandler: 'askGeminiAI',
            liveIntent,
            entityIntent,
            riskLevel
        });
        return await askGeminiAI(t);
    }

    if (isHeadlineListQuery(t) || shouldUseNewsEndpointForCurrentQuery(t) || isNewsworthyLiveTopic(t)) {
        logRoutingDebug('processUserQuery -> news', t, {
            selectedHandler: 'fetchAndDisplayNews',
            liveIntent,
            entityIntent,
            riskLevel
        });
        await fetchAndDisplayNews(t);
        return { intent: 'news' };
    }

    if (broadFactualWeb) {
        if (entityIntent?.isEntityFact) {
            logRoutingDebug('processUserQuery -> entity_fact broad_factual', t, {
                selectedHandler: 'handleUniversalEntityFactQuery',
                liveIntent,
                entityIntent,
                riskLevel
            });
            await handleUniversalEntityFactQuery(t, liveIntent);
            return { intent: 'entity_fact' };
        }
        logRoutingDebug('processUserQuery -> live_retrieval broad_factual', t, {
            selectedHandler: 'handleLiveRetrievalQuery',
            liveIntent,
            entityIntent,
            riskLevel
        });
        await handleLiveRetrievalQuery(t, {
            broadFactualWeb: true
        });
        return { intent: 'live_retrieval' };
    }

    if (
        riskLevel !== 'low_risk' &&
        (isCurrentInfoQuery(t) || isLiveRetrievalQuery(t) || isUniversalEntityFactQuestion(t) || isProfileOrIdentityQuery(t))
    ) {
        logRoutingDebug('processUserQuery -> live_retrieval risk_gate', t, {
            selectedHandler: 'handleLiveRetrievalQuery',
            liveIntent,
            entityIntent,
            riskLevel
        });
        await handleLiveRetrievalQuery(t);
        return { intent: 'live_retrieval' };
    }

    if (isUniversalExplainerRequest(t)) {
        logRoutingDebug('processUserQuery -> explainer', t, {
            selectedHandler: 'handleUniversalExplainerQuery',
            liveIntent,
            entityIntent,
            riskLevel
        });

            selectedHandler: 'weather_intent_return',
            liveIntent,
            entityIntent,
            riskLevel
        });
        return { intent: 'weather' };
    }

    logRoutingDebug('processUserQuery -> model default', t, {

        liveIntent,
        entityIntent,
        riskLevel
    });
    return await askGeminiAI(t);

function isCurrentInfoQueryLegacy(text) {
    const t = String(text || '').toLowerCase();
    return /\b(current|latest|today|now|live|status|update)\b/.test(t);
}

function hasExplicitFreshnessLanguageLegacy(text) {
    const t = String(text || '').toLowerCase();
    return /\b(news|headlines|breaking|recent events|what happened today)\b/.test(t);
}

function scoreSourcePolicyLegacy(url, type) {
    if (!url) return 0;
    const trusted = ['reuters.com', 'apnews.com', 'bbc.com', 'nytimes.com', 'theguardian.com', 'wikipedia.org'];
    const isTrusted = trusted.some(domain => url.includes(domain));
    if (type === 'general') return isTrusted ? 10 : 1;
    return isTrusted ? 5 : 0;
}

function isHeadlineListQuery(text) {
    const t = String(text || '').toLowerCase().trim();
    if (!t) return false;
    if (/\bwho won|winner|won|score|scores|stat|stats|what happened|what's happening|status|why|how\b/.test(t)) {
        return false;
    }
    return /\b(news|headline|headlines|breaking news|current events?)\b/.test(t);
}

function formatLiveSourceLinks(items, limit = 5) {
    return (Array.isArray(items) ? items : [])
        .slice(0, limit)
        .map((item, i) => `${i + 1}. [${item.title}](${item.url})`)
        .join('\n');
}

function formatAsOfTimestamp() {
    return new Date().toLocaleString('en-IN', {
        year: 'numeric',
        month: 'short',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: true,
        timeZoneName: 'short'
    });
}

function formatAsOfDateLong(date = new Date()) {
    return new Date(date).toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
    });
}

function formatLatestSourceDate(items) {
    const dates = (Array.isArray(items) ? items : [])
        .map(item => extractResultPublishedDate(item))
        .filter(Boolean)
        .map(d => d.getTime());
    if (!dates.length) return '';
    const latest = new Date(Math.max(...dates));
    return latest.toLocaleDateString('en-IN', { year: 'numeric', month: 'short', day: '2-digit' });
}

function buildSourceMetaBlock(items) {
    const asOf = `As of: ${formatAsOfTimestamp()}`;
    const latest = formatLatestSourceDate(items);
    const pool = Array.isArray(items) ? items : [];
    const domains = new Set(pool.map(item => getDomainFromUrl(item?.url || '')).filter(Boolean));
    const trustedHits = pool.filter(item => scoreSourcePolicy(item?.url || '', 'general') > 0).length;
    const confidence = trustedHits >= 3 && domains.size >= 2 ? 'High' : (trustedHits >= 1 ? 'Medium' : 'Low');
    if (!latest) return `${asOf}\nSource confidence: ${confidence}`;
    return `${asOf}\nLatest source date: ${latest}\nSource confidence: ${confidence}`;
}

function simplifyForRoutingLog(value, depth = 0) {
    if (value == null) return value;
    if (typeof value === 'string' || typeof value === 'number' || typeof value === 'boolean') return value;
    if (depth >= 3) return '[nested]';
    if (Array.isArray(value)) {
        return value.slice(0, 8).map(item => simplifyForRoutingLog(item, depth + 1));
    }
    if (typeof value === 'object') {
        const out = {};
        for (const [key, item] of Object.entries(value)) {
            if (typeof item === 'function') continue;
            if (key === 'signal' || key === 'controller') continue;
            out[key] = simplifyForRoutingLog(item, depth + 1);
        }
        return out;
    }
    return String(value);
}

function buildRoutingSnapshot(text, overrides = {}) {
    const query = String(text || '').trim();
    let liveIntent = overrides.liveIntent || null;
    let entityIntent = overrides.entityIntent || null;
    let classification = overrides.classification || null;
    let riskLevel = overrides.riskLevel || '';
    try {
        liveIntent = liveIntent || (query ? extractLiveQueryIntent(query) : null);
        entityIntent = entityIntent || (query ? extractUniversalEntityIntent(query, liveIntent) : null);
        riskLevel = riskLevel || (query ? getRiskTierForQuery(query, liveIntent, entityIntent) : '');
    } catch (error) {
        return {
            query,
            error: String(error?.message || error || 'routing snapshot failed'),
            ...overrides
        };
    }
    return {
        query,
        answerPath: overrides.answerPath || '',
        hybridMode: overrides.hybridMode || '',
        riskLevel,
        liveIntent,
        entityIntent,
        classification,
        flags: {
            explicitWebSearch: query ? isExplicitWebSearchRequest(query) : false,
            strictLatest: query ? isStrictLatestQuery(query) : false,
            currentInfo: query ? isCurrentInfoQuery(query) : false,
            liveRetrieval: query ? isLiveRetrievalQuery(query) : false,
            universalEntityFact: query ? isUniversalEntityFactQuestion(query) : false,
            profileIdentity: query ? isProfileOrIdentityQuery(query) : false,
            broadFactualWeb: query ? isBroadFactualWebQuery(query, entityIntent, liveIntent) : false,
            universalExplainer: query ? isUniversalExplainerRequest(query) : false,
            weather: query ? isWeatherIntentText(query) : false
        },
        ...overrides
    };
}

function logRoutingDebug(stage, text, details = {}) {
    if (!showRoutingDebugBadge) return;
    const payload = simplifyForRoutingLog({
        at: new Date().toISOString(),
        stage,
        ...buildRoutingSnapshot(text, details)
    });
    window.__jarvisRoutingLog = Array.isArray(window.__jarvisRoutingLog) ? window.__jarvisRoutingLog : [];
    window.__jarvisRoutingLog.push(payload);
    if (window.__jarvisRoutingLog.length > 100) {
        window.__jarvisRoutingLog = window.__jarvisRoutingLog.slice(-100);
    }
    try {
        console.groupCollapsed(`[JARVIS route] ${stage}: ${String(text || '').trim().slice(0, 120)}`);
        console.log(payload);
        console.groupEnd();
    } catch (_) {
        console.info('[JARVIS route]', payload);
    }
}

const TRUST_FIRST_RELIABILITY_POLICY = {
    enabled: true,
    verificationBudgetMs: 8000,
    summaryTimeoutMs: 4500,
    tiers: {
        high_risk: { minArticles: 3, minDomains: 2, minTrusted: 2 },
        medium_risk: { minArticles: 2, minDomains: 2, minTrusted: 1 },
        low_risk: { minArticles: 0, minDomains: 0, minTrusted: 0 }
    }
};

function getReliabilityThreshold(riskLevel = 'low_risk') {
    return TRUST_FIRST_RELIABILITY_POLICY.tiers[riskLevel] || TRUST_FIRST_RELIABILITY_POLICY.tiers.low_risk;
}

function getRiskTierForQuery(text, liveIntent = null, entityIntent = null) {
    const query = String(text || '').trim();
    if (!query) return 'low_risk';
    const intent = liveIntent || extractLiveQueryIntent(query);
    const entity = entityIntent || extractUniversalEntityIntent(query, intent);
    const lower = query.toLowerCase();
    const isEntityFact = Boolean(entity?.isEntityFact || isUniversalEntityFactQuestion(query));
    const explicitFreshnessOrYear = hasExplicitFreshnessLanguage(query) || hasExplicitYearReference(query);
    const highImpactLeadership = /\b(president|prime minister|pm|chief minister|cm|governor|mayor|ceo|chairman|chairperson|secretary general|director general|administrator|head of|captain|coach)\b/.test(lower);
    const strictVerificationNeeded = shouldRequireVerifiedSources(query, intent, entity);

    // Universal trust-first policy: all entity factual queries are at least medium risk.
    if (isEntityFact) {
        if (strictVerificationNeeded || explicitFreshnessOrYear || highImpactLeadership) {
            return 'high_risk';
        }
        return 'medium_risk';
    }

    if (strictVerificationNeeded) return 'high_risk';
    if (
        isCurrentInfoQuery(query) ||
        isLiveRetrievalQuery(query) ||
        isUniversalEntityFactQuestion(query) ||
        isProfileOrIdentityQuery(query) ||
        hasExplicitFreshnessLanguage(query) ||
        isDirectFactLiveQuery(query)
    ) {
        return 'medium_risk';
    }
    return 'low_risk';
}

function computeEvidenceMeta(items, domain = 'general') {
    const pool = Array.isArray(items) ? items.filter(Boolean) : [];
    const domains = new Set(pool.map(item => getDomainFromUrl(item?.url || '')).filter(Boolean));
    const trustedHits = pool.filter(item => scoreSourcePolicy(item?.url || '', domain) > 0).length;
    return {
        sourceCount: pool.length,
        distinctDomainCount: domains.size,
        trustedCount: trustedHits
    };
}

function hasEnoughEvidenceForRisk(items, riskLevel = 'medium_risk', domain = 'general') {
    const threshold = getReliabilityThreshold(riskLevel);
    const meta = computeEvidenceMeta(items, domain);
    return (
        meta.sourceCount >= threshold.minArticles &&
        meta.distinctDomainCount >= threshold.minDomains &&
        meta.trustedCount >= threshold.minTrusted
    );
}

function buildVerificationSnapshot(items, domain = 'general', riskLevel = 'medium_risk', verificationMode = 'strict') {
    const meta = computeEvidenceMeta(items, domain);
    return {
        verified: hasEnoughEvidenceForRisk(items, riskLevel, domain),
        sourceCount: meta.sourceCount,
        distinctDomainCount: meta.distinctDomainCount,
        trustedCount: meta.trustedCount,
        riskLevel,
        verificationMode
    };
}

function cleanLiveAnswerText(text) {
    return normalizeAssistantTextStyle(String(text || ''))
        .replace(/^\s*(?:\*\*)?Direct answer:(?:\*\*)?\s*/i, '')
        .replace(/\n\s*Confidence:\s*[^\n]*/gi, '')
        .replace(/\n\s*Verified sources checked:\s*[^\n]*/gi, '')
        .replace(/\n{3,}/g, '\n\n')
        .trim();
}

function getNewsVerificationThreshold(mode = 'strict') {
    if (mode === 'normal') {
        return getReliabilityThreshold('medium_risk');
    }
    return getReliabilityThreshold('high_risk');
}

function hasEnoughNewsEvidence(items, mode = 'strict') {
    const riskLevel = mode === 'normal' ? 'medium_risk' : 'high_risk';
    return hasEnoughEvidenceForRisk(items, riskLevel, 'general');
}

async function buildDirectLiveAnswer(question, items, signal) {
    const sourcePool = Array.isArray(items) ? items.filter(Boolean).slice(0, 6) : [];
    if (!sourcePool.length) return '';

    const snippets = sourcePool
        .map((r, i) => `${i + 1}. ${r.title}\nSnippet: ${r.description}\nURL: ${r.url}`)
        .join('\n\n');

    const response = await fetch('/api/chat-groq', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        signal,
        body: JSON.stringify({
            message: `Answer the user's question using ONLY the snippets below.

User question: "${question}"

Required format:
Direct answer: <give a short summary first in 1-3 sentences; if the user asked who won/score/stat, say that immediately>
Key points:
- <point 1>
- <point 2>
- <point 3>
Confidence: <High/Medium/Low based only on source agreement>

Rules:
- Focus on what is current or recent.
- If the user asked for latest news or headlines, start with a compact summary of the latest development, then give 3 short bullet points.
- Do not make up numbers, dates, actors, causes, or outcomes.
- Use only facts explicitly present in snippets.
- Only state a fact confidently if it appears in multiple snippets or from a clearly reputable source.
- If evidence is weak, say so instead of guessing.
- If the question asks for a winner, score, player stat, or latest status, answer that specific fact first before anything else.
- If the user asks for stats, give the key stats directly instead of a generic summary.
- Keep it concise and practical.

Snippets:
${snippets}`
        })
    });

    const data = await response.json();
    const cleaned = cleanLiveAnswerText(String(data?.response || data?.text || ''));
    // Guardrail: if model gives weak/non-anchored text, fallback to snippets.
    if (!cleaned || /\b(i think|likely|probably|maybe)\b/i.test(cleaned)) {
        const top = sourcePool[0];
        const fallback = String(top?.description || top?.title || '').trim();
        return fallback ? `Based on current snippets: ${fallback}` : '';
    }
    return cleaned;
}

async function buildNewsSearchFallback(query, signal) {
    if (!LIVE_RETRIEVAL_ENABLED) return null;

    showThinkingIndicator('Web search in progress...');
    const response = await fetch('/api/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        signal,
        body: JSON.stringify({
            query,
            maxResults: 8
        })
    });

    if (!response.ok) return null;

    const data = await response.json();
    const results = Array.isArray(data?.results) ? data.results.filter(Boolean) : [];
    if (!results.length) return null;

    const trustedResults = results.filter(item => scoreSourcePolicy(item?.url, 'general') > 0);
    const sourcePool = (trustedResults.length >= 2 ? trustedResults : results).slice(0, 6);
    if (!sourcePool.length) return null;
    if (!hasEnoughNewsEvidence(sourcePool, 'strict')) return null;

    showThinkingIndicator('Generating answer...');
    const directAnswer = await buildDirectLiveAnswer(query, sourcePool, signal);
    const answer = directAnswer || cleanLiveAnswerText(String(sourcePool[0]?.description || sourcePool[0]?.title || '').trim());
    if (!answer) return null;

    return {
        answer,
        sources: sourcePool
    };
}

// ============ CONTINUOUS VISION (WebRTC) ============
let continuousVisionStream = null;
let isContinuousVisionActive = false;
let continuousVisionTrack = null;
let isContinuousVisionMinimized = false;
let continuousVisionRotationDeg = 0;
let continuousVisionFacingMode = 'environment';
let continuousVisionZoomState = { value: 1, min: 1, max: 3, step: 0.1, hardware: false };

function updateContinuousVisionStatus(message, state = 'info') {
    const statusEl = document.getElementById('continuous-vision-status');
    if (!statusEl) return;
    statusEl.textContent = String(message || '').trim() || 'Camera inactive';
    statusEl.dataset.state = String(state || 'info').trim();
}

function queueVisionRetry(text) {
    const input = document.getElementById('text-input');
    if (!input) return;
    input.value = String(text || 'What do you see?').trim();
    input.focus();
    toggleSendButton();
}

function addVisionRecoveryMessage(message, retryText = 'What do you see?') {
    const safeMessage = escapeHtml(String(message || 'Vision analysis failed. Please try again.'));
    const safeRetry = encodeURIComponent(String(retryText || 'What do you see?').trim());
    addChatMessage(`
        <div>
            <p class="assistant-md-p">${safeMessage}</p>
            <button type="button" class="memory-action-btn mt-2" onclick="queueVisionRetry(decodeURIComponent('${safeRetry}'))">Retry vision</button>
        </div>
    `, false, true);
}

function applyContinuousVisionRotation() {
    const videoEl = document.getElementById('continuous-vision-video');
    if (!videoEl) return;
    const normalized = normalizeCameraRotation(continuousVisionRotationDeg);
    const zoom = Number(continuousVisionZoomState.value || 1);
    const transformParts = [];
    if (normalized) transformParts.push(`rotate(${normalized}deg)`);
    if (!continuousVisionZoomState.hardware && zoom > 1) transformParts.push(`scale(${zoom})`);
    videoEl.style.transform = transformParts.length ? transformParts.join(' ') : 'none';
    videoEl.style.transformOrigin = 'center center';
}

function syncContinuousVisionZoomSlider() {
    const slider = document.getElementById('continuous-vision-zoom-slider');
    if (!slider) return;
    slider.min = String(continuousVisionZoomState.min);
    slider.max = String(continuousVisionZoomState.max);
    slider.step = String(continuousVisionZoomState.step);
    slider.value = String(continuousVisionZoomState.value);
}

async function initializeContinuousVisionZoomForTrack(track) {
    const capabilities = track?.getCapabilities?.() || {};
    const settings = track?.getSettings?.() || {};
    const zoomCap = capabilities.zoom;
    const hasHardwareZoom = !!zoomCap && Number.isFinite(Number(zoomCap.min)) && Number.isFinite(Number(zoomCap.max)) && Number(zoomCap.max) > Number(zoomCap.min);
    continuousVisionZoomState = {
        value: 1,
        min: hasHardwareZoom ? Number(zoomCap.min) : 1,
        max: hasHardwareZoom ? Math.min(Number(zoomCap.max), 6) : 3,
        step: hasHardwareZoom ? Number(zoomCap.step || 0.1) : 0.1,
        hardware: hasHardwareZoom
    };
    if (hasHardwareZoom && Number.isFinite(Number(settings.zoom))) {
        continuousVisionZoomState.value = Math.max(continuousVisionZoomState.min, Math.min(continuousVisionZoomState.max, Number(settings.zoom)));
    }
    syncContinuousVisionZoomSlider();
    await applyContinuousVisionZoom();
}

async function applyContinuousVisionZoom() {
    const track = continuousVisionStream?.getVideoTracks?.()[0] || null;
    if (continuousVisionZoomState.hardware && track?.applyConstraints) {
        await track.applyConstraints({ advanced: [{ zoom: continuousVisionZoomState.value }] }).catch(() => {
            continuousVisionZoomState.hardware = false;
        });
    }
    applyContinuousVisionRotation();
    syncContinuousVisionZoomSlider();
}

function setContinuousVisionZoomFromSlider(value) {
    continuousVisionZoomState.value = Math.max(continuousVisionZoomState.min, Math.min(continuousVisionZoomState.max, Number(value) || 1));
    void applyContinuousVisionZoom();
}

function adjustContinuousVisionZoom(delta) {
    setContinuousVisionZoomFromSlider((Number(continuousVisionZoomState.value) || 1) + Number(delta || 0));
}

function resetContinuousVisionZoom() {
    setContinuousVisionZoomFromSlider(continuousVisionZoomState.min || 1);
}

function rotateContinuousVisionPreview() {
    switchContinuousVisionCamera();
}

async function switchContinuousVisionCamera() {
    if (!isContinuousVisionActive || !continuousVisionStream) return;
    const videoEl = document.getElementById('continuous-vision-video');
    const currentTrack = continuousVisionStream.getVideoTracks?.()[0] || null;
    const currentFacing = getTrackFacingMode(currentTrack) || normalizeFacingMode(continuousVisionFacingMode);
    const nextFacing = currentFacing === 'environment' ? 'user' : 'environment';

    try {
        const newStream = await requestCameraStreamForFacingMode(nextFacing);
        const newTrack = newStream.getVideoTracks?.()[0] || null;
        const actualFacing = getTrackFacingMode(newTrack) || nextFacing;
        continuousVisionStream.getTracks().forEach(track => track.stop());
        continuousVisionStream = newStream;
        continuousVisionTrack = newTrack;
        continuousVisionFacingMode = normalizeFacingMode(actualFacing);
        if (videoEl) {
            videoEl.srcObject = newStream;
            await videoEl.play().catch(() => {});
        }
        continuousVisionRotationDeg = 0;
        await initializeContinuousVisionZoomForTrack(newTrack);
    } catch (_) {
        continuousVisionRotationDeg = normalizeCameraRotation(continuousVisionRotationDeg + 90);
        applyContinuousVisionRotation();
    }
}

function setContinuousVisionMinimized(nextState) {
    const previewShell = document.getElementById('continuous-vision-preview-shell');
    const minimizeBtn = document.getElementById('continuous-vision-minimize-btn');
    isContinuousVisionMinimized = Boolean(nextState);
    previewShell?.classList.toggle('is-minimized', isContinuousVisionMinimized);
    if (minimizeBtn) {
        minimizeBtn.textContent = isContinuousVisionMinimized ? 'Expand' : 'Minimize';
        minimizeBtn.setAttribute('aria-pressed', isContinuousVisionMinimized ? 'true' : 'false');
        minimizeBtn.setAttribute('aria-label', isContinuousVisionMinimized ? 'Expand live vision preview' : 'Minimize live vision preview');
    }
}

function toggleContinuousVisionMinimize() {
    if (!isContinuousVisionActive) return;
    setContinuousVisionMinimized(!isContinuousVisionMinimized);
}

async function toggleContinuousVision() {
    const videoEl = document.getElementById('continuous-vision-video');
    const previewShell = document.getElementById('continuous-vision-preview-shell');
    const hintEl = document.getElementById('continuous-vision-hint');
    const btn = document.getElementById('vision-toggle-btn');
    if (!videoEl) {
        showError('Vision preview element is missing from the page.');
        return;
    }
    if (isContinuousVisionActive) {
        if (continuousVisionStream) {
            continuousVisionStream.getTracks().forEach(t => t.stop());
        }
        continuousVisionTrack = null;
        videoEl.srcObject = null;
        continuousVisionRotationDeg = 0;
        continuousVisionZoomState = { value: 1, min: 1, max: 3, step: 0.1, hardware: false };
        applyContinuousVisionRotation();
        syncContinuousVisionZoomSlider();
        videoEl.classList.add('hidden');
        document.getElementById('continuous-vision-zoom-controls')?.classList.add('hidden');
        setContinuousVisionMinimized(false);
        previewShell?.classList.add('hidden');
        updateContinuousVisionStatus('Camera inactive', 'info');
        isContinuousVisionActive = false;
        btn.classList.remove('bg-blue-100', 'text-blue-600', 'dark:bg-blue-900/30');
        showTemporaryMessage('Continuous Vision deactivated.');
    } else {
        try {
            updateContinuousVisionStatus('Requesting camera...', 'loading');
            continuousVisionStream = await requestCameraStreamForFacingMode('environment');
            videoEl.srcObject = continuousVisionStream;
            videoEl.muted = true;
            continuousVisionRotationDeg = 0;
            applyContinuousVisionRotation();
            videoEl.classList.remove('hidden');
            setContinuousVisionMinimized(false);
            if (hintEl) hintEl.textContent = 'Camera is on. Ask: "What do you see?"';
            await videoEl.play().catch(() => {});
            await waitForContinuousVisionReady(1800);
            previewShell?.classList.remove('hidden');
            updateContinuousVisionStatus('Camera ready', 'ready');

            const track = continuousVisionStream.getVideoTracks?.()[0] || null;
            continuousVisionTrack = track;
            continuousVisionFacingMode = getTrackFacingMode(track) || 'environment';
            if (track?.applyConstraints) {
                // Best-effort camera tuning for sharper OCR/object detection on phones.
                await track.applyConstraints({
                    advanced: [
                        { focusMode: 'continuous' },
                        { exposureMode: 'continuous' },
                        { whiteBalanceMode: 'continuous' }
                    ]
                }).catch(() => {});
            }
            await initializeContinuousVisionZoomForTrack(track);
            document.getElementById('continuous-vision-zoom-controls')?.classList.remove('hidden');

            isContinuousVisionActive = true;
            btn.classList.add('bg-blue-100', 'text-blue-600', 'dark:bg-blue-900/30');
            showTemporaryMessage('Continuous Vision activated! Ask "What do you see?" or "What am I looking at?"');
        } catch (e) {
            recentVisionError = String(e?.message || 'Camera access denied or unavailable.').slice(0, 180);
            updateContinuousVisionStatus('Camera unavailable', 'error');
            showError('Camera access denied or unavailable.');
        }
    }
}

function captureVisionFrame() {
    if (!isContinuousVisionActive) return null;
    const videoEl = document.getElementById('continuous-vision-video');
    const canvas = document.getElementById('continuous-vision-canvas');
    if (!videoEl || !canvas || (videoEl.readyState || 0) < 2 || !(videoEl.videoWidth > 0) || !(videoEl.videoHeight > 0)) return null;
    const ctx = canvas.getContext('2d', { alpha: false });
    const sourceW = videoEl.videoWidth || 1280;
    const sourceH = videoEl.videoHeight || 720;
    const maxDim = 1600;
    const scale = Math.min(1, maxDim / Math.max(sourceW, sourceH));
    const normalizedRotation = normalizeCameraRotation(continuousVisionRotationDeg);
    const drawW = Math.max(640, Math.floor(sourceW * scale));
    const drawH = Math.max(480, Math.floor(sourceH * scale));
    const swap = normalizedRotation === 90 || normalizedRotation === 270;
    canvas.width = swap ? drawH : drawW;
    canvas.height = swap ? drawW : drawH;
    if (canvas.width === 0 || canvas.height === 0) return null;
    const captureZoom = continuousVisionZoomState.hardware ? 1 : Number(continuousVisionZoomState.value || 1);
    drawVideoFrameWithRotation(ctx, videoEl, canvas.width, canvas.height, normalizedRotation, captureZoom);
    if (isCanvasFrameBlank(ctx, canvas.width, canvas.height)) return null;
    const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
    return dataUrl.split(',')[1];
}

async function waitForContinuousVisionReady(timeoutMs = 1600) {
    const startedAt = Date.now();
    const videoEl = document.getElementById('continuous-vision-video');
    while (Date.now() - startedAt < timeoutMs) {
        if (videoEl && (videoEl.readyState || 0) >= 2 && videoEl.videoWidth > 0 && videoEl.videoHeight > 0) {
            return true;
        }
        await new Promise(resolve => setTimeout(resolve, 80));
    }
    return false;
}

function isCanvasFrameBlank(ctx, width, height) {
    if (!ctx || width <= 0 || height <= 0) return true;
    const sampleW = Math.min(32, width);
    const sampleH = Math.min(32, height);
    let data;
    try {
        data = ctx.getImageData(Math.floor((width - sampleW) / 2), Math.floor((height - sampleH) / 2), sampleW, sampleH).data;
    } catch (_) {
        return false;
    }
    let total = 0;
    let variance = 0;
    const pixels = data.length / 4;
    for (let i = 0; i < data.length; i += 4) {
        const lum = (data[i] + data[i + 1] + data[i + 2]) / 3;
        total += lum;
        variance += Math.abs(lum - 8);
    }
    const average = total / Math.max(1, pixels);
    return average < 3 || (average < 8 && variance / Math.max(1, pixels) < 4);
}

async function handleContinuousVisionQuery(text) {
    updateContinuousVisionStatus('Preparing frame...', 'loading');
    await waitForContinuousVisionReady();
    let base64 = captureVisionFrame();
    if (!base64) {
        await waitForContinuousVisionReady(900);
        base64 = captureVisionFrame();
    }
    if (!base64) {
        const msg = 'I cannot see anything. Make sure the camera is active and has permissions.';
        recentVisionError = msg;
        updateContinuousVisionStatus('Frame unclear or too dark', 'warning');
        addVisionRecoveryMessage(msg, text);
        return;
    }
    updateContinuousVisionStatus('Analyzing frame...', 'loading');
    showThinkingIndicator('Analyzing your view...');
    try {
        const isTextReadIntent = /\b(read|text|ocr|bill|receipt|invoice|sign|label|menu|document)\b/i.test(String(text || '')); 
        const isTranslateIntent = /\b(translate|translation|convert to english|to english|in english|what does this say)\b/i.test(String(text || '')); 
        const isMathSolveIntent = /\b(solve|calculate|evaluate|find x|equation|integral|derivative|differentiate|simplify|factor|algebra|trigonometry|calculus|math problem|word problem|step by step)\b/i.test(String(text || '')); 
        const isWebsiteUiIntent = isWebsiteUiVisionIntent(text); 
        const visionTask = isMathSolveIntent 
            ? 'math_ocr_solve' 
            : (isTranslateIntent ? 'translate_to_english' : (isTextReadIntent ? 'text_extract' : 'general_vision')); 
        const visionPrompt = isMathSolveIntent 
            ? `Read the math problem from the image and solve it accurately with clear steps. User query: "${text}".` 
            : (isTranslateIntent 
                ? `Extract all readable text and translate it to English. User query: "${text}".` 
                : (isWebsiteUiIntent
                    ? `Identify the website, web app, mobile app, or UI shown in the image using only visible evidence. First use visible branding, logo, page title, header, or app chrome. If branding is unclear, inspect visible URL/address-bar/domain/tab text and extract the likely site or app name. Do not guess or use web search. If no brand or URL is visible, describe the UI normally and say the site name is not visible. User query: "${text}". Respond in 1-2 short sentences.`
                    : `Describe what is relevant to the user query in a professional, concise report. Vision detail preference: ${visionDetailLevel}. Evidence display preference: ${visionShowEvidence ? 'include visible evidence when useful' : 'hide evidence unless needed for uncertainty'}. Focus on the most prominent foreground object first. If it is a phone, tablet, laptop, wearable, or other product, infer the likely brand/model only from visible evidence such as logos, camera layout, ports, buttons, colors, UI, or readable text; say "likely" when uncertain and include the evidence. If readable text is visible, mention it as secondary context. Preserve exact numbers/symbols/equations when text exists. User query: "${text}".`)); 
        const response = await fetch('/api/vision', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                task: visionTask,
                prompt: visionPrompt,
                mimeType: 'image/jpeg',
                imageBase64: base64
            })
        });
        const rawBody = await response.text();
        let data = {};
        try {
            data = rawBody ? JSON.parse(rawBody) : {};
        } catch (_) {
            data = {};
        }
        if (!response.ok || !data?.success) {
            const rawError = String(data?.error || '').trim();
            const failMsg = /\bnot found for api version|supported methods|generatecontent|model .* failed with status 404\b/i.test(rawError)
                ? 'Vision service is temporarily unavailable for the current model. Please retry in a few seconds.'
                : (rawError || 'Vision analysis failed. Please try again.');
            recentVisionError = failMsg;
            updateContinuousVisionStatus('Vision model unavailable', 'error');
            addVisionRecoveryMessage(failMsg, text);
            return;
        }
        const details = data?.details && typeof data.details === 'object' ? data.details : {};
        const textDetected = Array.isArray(details?.textDetected)
            ? details.textDetected.map(v => String(v || '').trim()).filter(Boolean).join('\n').trim()
            : '';
        const fullText = String(details?.fullText || '').trim();
        let answer = String(data.response || details?.summary || '').trim();
        if (!answer && (fullText || textDetected)) {
            const textBlock = fullText || textDetected;
            answer = `Detected text:\n${textBlock}`;
        }
        answer = normalizeVisionAnswerForChat(answer, details); 
        if (isWebsiteUiIntent) {
            answer = refineWebsiteUiVisionAnswer(answer, details);
        }
        answer = applyVisionReplyPreferences(answer);
        if (!answer) answer = 'The frame was received, but I could not produce a reliable visual answer.'; 
        recentVisionError = '';
        updateContinuousVisionStatus('Camera ready', 'ready');
        addChatMessage(answer, false);
        saveToHistory(text, answer);
    } catch(e) {
        const msg = 'Vision analysis failed. Please try again.';
        recentVisionError = String(e?.message || msg).slice(0, 180);
        updateContinuousVisionStatus('Vision analysis failed', 'error');
        addVisionRecoveryMessage(msg, text);
    } finally {
        hideThinkingIndicator();
    }
}

function extractVisionJsonObject(rawText) {
    const raw = String(rawText || '').trim();
    if (!raw) return null;
    const unwrapped = raw
        .replace(/^```(?:json)?\s*/i, '')
        .replace(/\s*```$/i, '')
        .trim();
    try {
        return JSON.parse(unwrapped);
    } catch (_) {}

    const start = unwrapped.indexOf('{');
    const end = unwrapped.lastIndexOf('}');
    if (start >= 0 && end > start) {
        try {
            return JSON.parse(unwrapped.slice(start, end + 1));
        } catch (_) {}
    }
    return null;
}

function formatVisionJsonToReadableText(payload) {
    if (!payload || typeof payload !== 'object') return '';
    const summary = String(payload.summary || '').trim();
    const directAnswer = String(payload.answer || '').trim();
    const brand = String(payload.brand || '').trim();
    const model = String(payload.model || '').trim();
    const modelEvidence = Array.isArray(payload.modelEvidence)
        ? payload.modelEvidence.map(v => String(v || '').trim()).filter(Boolean)
        : [];
    const distinctiveFeatures = Array.isArray(payload.distinctiveFeatures)
        ? payload.distinctiveFeatures.map(v => String(v || '').trim()).filter(Boolean)
        : [];
    const uncertainty = String(payload.uncertainty || '').trim();
    const objects = Array.isArray(payload.objects) ? payload.objects : [];
    const fullText = String(payload.fullText || '').trim();
    const textDetected = Array.isArray(payload.textDetected)
        ? payload.textDetected.map(v => String(v || '').trim()).filter(Boolean)
        : [];
    const compactText = fullText || textDetected.slice(0, 12).join('\n');
    const objectLabel = pickReadableVisionObject(objects);
    const objectMeta = pickReadableVisionObjectMeta(objects);
    const parts = [];
    const identity = [brand, model].filter(Boolean).join(' ').trim();
    const confidence = normalizeReadableVisionConfidence(objectMeta?.confidence, uncertainty);

    if (identity) {
        const qualified = uncertainty ? `likely ${identity}` : identity;
        parts.push(`Likely item: ${objectLabel ? `${qualified} (${objectLabel})` : qualified}.`);
    } else if (objectLabel) {
        parts.push(`Visible item: ${objectLabel}.`);
    } else if (directAnswer) {
        parts.push(directAnswer.replace(/\s+/g, ' ').trim().slice(0, 280));
    } else if (summary) {
        parts.push(summary.replace(/\s+/g, ' ').trim().slice(0, 280));
    }

    if (directAnswer && identity && !directAnswer.toLowerCase().includes(identity.toLowerCase())) {
        parts.push(directAnswer.replace(/\s+/g, ' ').trim().slice(0, 280));
    }

    if (modelEvidence.length) {
        parts.push(`Evidence: ${modelEvidence.slice(0, 3).join('; ')}.`);
    }

    if (distinctiveFeatures.length) {
        parts.push(`Visible details: ${distinctiveFeatures.slice(0, 4).join('; ')}.`);
    }

    if (uncertainty) {
        parts.push(`Uncertainty: ${uncertainty}`);
    }

    if (confidence) {
        parts.push(`Confidence: ${confidence}.`);
    }

    if (compactText) {
        parts.push(`Readable text: "${compactVisionTextMention(compactText)}."`);
    }

    if (parts.length) return parts.join(' ').replace(/\s+/g, ' ').trim();

    if (objects.length) {
        const objectLine = objects
            .slice(0, 4)
            .map(item => {
                const label = String(item?.label || 'object').trim();
                const count = Number(item?.count || 1);
                return `${label} x${Math.max(1, count)}`;
            })
            .join(', ');
        return `Visible objects: ${objectLine}`;
    }

    return '';
}

function pickReadableVisionObject(objects) {
    return pickReadableVisionObjectMeta(objects)?.label || '';
}

function pickReadableVisionObjectMeta(objects) {
    if (!Array.isArray(objects) || !objects.length) return '';
    const skip = /^(text|words|lettering|logo|label|screen|display|brand|writing|document|paper)$/i;
    const candidates = objects
        .map(item => ({
            label: String(item?.label || '').trim(),
            confidence: Number(item?.confidence || 0)
        }))
        .filter(item => item.label && !skip.test(item.label))
        .sort((a, b) => b.confidence - a.confidence);
    return candidates[0] || null;
}

function normalizeReadableVisionConfidence(score, uncertainty = '') {
    if (uncertainty) return 'medium';
    const value = Number(score);
    if (!Number.isFinite(value)) return '';
    if (value >= 0.82) return 'high';
    if (value >= 0.55) return 'medium';
    return 'low';
}

function withReadableArticle(label) {
    const clean = String(label || '').trim();
    if (!clean) return 'an object';
    if (/^(a|an|the)\s+/i.test(clean)) return clean;
    return /^[aeiou]/i.test(clean) ? `an ${clean}` : `a ${clean}`;
}

function compactVisionTextMention(text) { 
    return String(text || '') 
        .replace(/\s+/g, ' ') 
        .trim() 
        .slice(0, 120) 
        .replace(/["]+/g, "'"); 
} 

function isWebsiteUiVisionIntent(text) {
    return /\b(website|web\s*site|webpage|web\s*page|site|web app|app|application|ui|interface|screen|url|domain|address bar|browser tab|logo|which site|what site|what website|what app)\b/i.test(String(text || ''));
}

function extractVisibleDomainFromVisionDetails(details = {}) {
    const textParts = [];
    const fullText = String(details?.fullText || '').trim();
    if (fullText) textParts.push(fullText);
    if (Array.isArray(details?.textDetected)) {
        textParts.push(...details.textDetected.map(v => String(v || '').trim()).filter(Boolean));
    }
    const text = textParts.join('\n');
    if (!text) return '';
    const domainMatch = text.match(/\b(?:https?:\/\/)?(?:www\.)?([a-z0-9-]+(?:\.[a-z0-9-]+)+)(?:\/[^\s]*)?/i);
    if (!domainMatch?.[1]) return '';
    return domainMatch[1]
        .toLowerCase()
        .replace(/^www\./, '')
        .replace(/[).,;:!?]+$/g, '');
}

function domainToReadableName(domain = '') {
    const clean = String(domain || '').toLowerCase().replace(/^www\./, '').trim();
    if (!clean) return '';
    const parts = clean.split('.').filter(Boolean);
    if (!parts.length) return '';
    const labels = parts.filter(label => !/^(com|org|net|io|ai|app|dev|co|in|edu|gov|www)$/.test(label));
    const base = labels[0] || parts[0];
    return base
        .split(/[-_]+/)
        .filter(Boolean)
        .map(part => part.charAt(0).toUpperCase() + part.slice(1))
        .join(' ');
}

function escapeVisionRegex(value) {
    return String(value || '').replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function refineWebsiteUiVisionAnswer(answer, details = {}) {
    const cleanAnswer = String(answer || '').trim();
    const domain = extractVisibleDomainFromVisionDetails(details);
    if (!domain) return cleanAnswer;
    if (new RegExp(`\\b${escapeVisionRegex(domain)}\\b`, 'i').test(cleanAnswer)) return cleanAnswer;
    const readableName = domainToReadableName(domain);
    const prefix = readableName
        ? `The visible URL suggests ${readableName} (${domain}).`
        : `The visible URL suggests ${domain}.`;
    if (!cleanAnswer) return prefix;
    if (/\b(not visible|cannot identify|can't identify|unclear|not clear|no brand)\b/i.test(cleanAnswer)) {
        return `${prefix} ${cleanAnswer}`.replace(/\s+/g, ' ').trim();
    }
    return cleanAnswer;
}

function normalizeVisionAnswerForChat(answer, details = {}) { 
    const raw = String(answer || '').trim();
    const parsed = extractVisionJsonObject(raw);
    if (parsed) {
        const readable = formatVisionJsonToReadableText(parsed);
        if (readable) return refineVisionAnswer(readable);
    }

    if (!raw && details && typeof details === 'object') {
        const readable = formatVisionJsonToReadableText(details);
        if (readable) return refineVisionAnswer(readable);
    }

    const normalized = raw
        .replace(/^```(?:json)?\s*/i, '')
        .replace(/\s*```$/i, '')
        .trim();
    return refineVisionAnswer(normalized);
}

function applyVisionReplyPreferences(answer) {
    let out = String(answer || '').trim();
    if (!out) return '';
    if (!visionShowEvidence) {
        out = out
            .replace(/\s*Evidence:\s*[^.]+\.?/gi, '')
            .replace(/\s*Visible details:\s*[^.]+\.?/gi, '')
            .replace(/\s*Readable text:\s*"[^"]*"\.?/gi, '')
            .replace(/\s+/g, ' ')
            .trim();
    }
    if (visionDetailLevel === 'concise') {
        const sentences = splitReadableSentences(out);
        if (sentences.length > 2) out = sentences.slice(0, 2).join(' ');
    }
    return out;
}

function refineVisionAnswer(text) {
    let out = String(text || '').trim();
    if (!out) return '';
    out = out
        .replace(/^detected text:\s*/i, 'I see something written as ')
        .replace(/^\s*person\.\s*/i, '')
        .replace(/\bappears to be\b/gi, 'is')
        .replace(/\s+/g, ' ')
        .trim();

    const sentences = splitReadableSentences(out);
    const maxSentences = /\b(Likely item:|Evidence:|Visible details:|Uncertainty:|Confidence:|likely\s+[A-Z0-9])/.test(out) ? 5 : 2;
    if (sentences.length > maxSentences) {
        out = sentences.slice(0, maxSentences).join(' ');
    }
    return out;
}

function isContinuousVisionQuestion(text) {
    const raw = String(text || '').toLowerCase().trim();
    if (!raw) return false;

    // Normalize common shorthand so "what do u see" routes to vision correctly.
    const t = raw.replace(/\bu\b/g, 'you');

    if (/\b(what (?:do|can) you see|what are you seeing|what am i looking at|what am i seeing|describe (?:what you see|the camera|the image|this image|the screen)|read (?:this image|the image|the text|this text|the screen)|analy[sz]e (?:this image|the image|the camera|the screen)|what(?:'s| is) (?:in front of me|on camera|in the camera|in this image|on the screen))\b/.test(t)) { 
        return true; 
    } 
    if (isWebsiteUiVisionIntent(t)) {
        return true;
    }

    // Fallback for short camera-context prompts only while continuous vision is active.
    if (isContinuousVisionActive && /\b(what is this|what's this|what is it|what's it|read it|solve this|scan this|translate this|what am i holding|what is in my hand|what do i have)\b/.test(t)) {
        return true;
    }
    if (isContinuousVisionActive && /\b(what|can you|please|tell me)\b/.test(t) && /\b(see|read|look(?:ing)? at|describe|analy[sz]e|front|camera|image|screen|text)\b/.test(t)) {
        return true;
    }

    return false;
}

// ============ MULTI-AGENT PERSONA DEBATE ============
async function handleMultiAgentDebate(text, rounds = 3) {
    addChatMessage(`Starting a ${rounds}-round debate on: "${text}"`, false);
    let previousArgument = text;
    let debateHistory = `Debate Topic: ${text}\n`;

    try {
        for (let i = 0; i < rounds; i++) {
            // Alpha's Turn
            showThinkingIndicator(`Round ${i + 1}: Agent Alpha is formulating an argument...`);
            const alphaPrompt = i === 0 
                ? `You are JARVIS Alpha. Take the optimistic, progressive, or PRO stance on the topic: "${text}". Provide 2 highly persuasive sentences.` 
                : `You are JARVIS Alpha. You are in a debate. Defend the PRO stance and counter this argument from JARVIS Beta: "${previousArgument}". Provide 2 highly persuasive sentences.`;
            
            const proResponse = await fetch('/api/chat-groq', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: text })
            });
            const proText = (await proResponse.json()).response || '';
            addModelAssistantMessage(proText, 'JARVIS Alpha (Pro)');
            debateHistory += `\nAlpha: ${proText}\n`;
            previousArgument = proText;

            // Briefly delay before advancing so the result remains readable.
            await new Promise(r => setTimeout(r, 5000));

            // Beta's Turn
            showThinkingIndicator(`Round ${i + 1}: Agent Beta is countering...`);
            const betaPrompt = `You are JARVIS Beta. You take the pessimistic, conservative, or CON stance. Fiercely but respectfully counter this argument from JARVIS Alpha: "${previousArgument}". Provide 2 highly persuasive sentences.`;
            
            const conResponse = await fetch('/api/chat-groq', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: text })
            });
            const conText = (await conResponse.json()).response || '';
            addModelAssistantMessage(conText, 'JARVIS Beta (Con)');
            debateHistory += `\nBeta: ${conText}\n`;
            previousArgument = conText;

            if (i < rounds - 1) {
                await new Promise(r => setTimeout(r, 5000));
            }
        }
        saveToHistory(text, debateHistory);
        
        // Final Prompt to User
        await new Promise(r => setTimeout(r, 3000));
        const conclusion = "The debate has concluded. What are your thoughts on this?";
        addChatMessage(conclusion, false);
    } catch (error) {
        showError('Debate agents encountered an error.');
    } finally {
        hideThinkingIndicator();
    }
}

// ============ WebXR (AR) SEMANTIC MEMORY LOCATOR ============
function startARFindSession(thing, location) {
    if (!navigator.xr) {
        showTemporaryMessage('WebXR (AR) is not supported on this browser/device.');
        return;
    }
    navigator.xr.isSessionSupported('immersive-ar').then((supported) => {
        if (supported) {
            const overlay = document.getElementById('ar-overlay');
            overlay.innerHTML = `
                <div style="position:absolute; top:10%; left:50%; transform:translateX(-50%); width:90%; background:rgba(0,0,0,0.8); color:#fff; padding:20px; border-radius:16px; border:2px solid #8b5cf6; text-align:center; font-family:sans-serif;">
                    <div style="font-size:24px; margin-bottom:10px;">ðŸ” Locating Item</div>
                    <div style="font-size:18px; margin-bottom:20px;">Your <b>${thing}</b> is near <b>${location}</b></div>
                    <div style="font-size:14px; opacity:0.8; margin-bottom:20px;">Look around your physical space.</div>
                    <button onclick="endARSession()" style="padding:10px 24px; font-size:16px; background:#ef4444; color:white; border:none; border-radius:8px; font-weight:bold;">Close AR Lens</button>
                </div>
            `;
            overlay.classList.remove('hidden');

            navigator.xr.requestSession('immersive-ar', {
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: overlay }
            }).then((session) => {
                window.currentXRSession = session;
                session.addEventListener('end', () => {
                    overlay.classList.add('hidden');
                    window.currentXRSession = null;
                });
                
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl', { xrCompatible: true });
                session.updateRenderState({ baseLayer: new XRWebGLLayer(session, gl) });
                session.requestAnimationFrame(function onXRFrame(time, frame) {
                    if (!window.currentXRSession) return;
                    session.requestAnimationFrame(onXRFrame);
                });
            }).catch(e => {
                showTemporaryMessage('Failed to start AR Session: ' + e.message);
                overlay.classList.add('hidden');
            });
        } else {
            showTemporaryMessage('Immersive AR is not available on this device.');
        }
    });
}

function endARSession() {
    if (window.currentXRSession) {
        window.currentXRSession.end();
    }
}

<!-- ===== Global Attraction Intelligence + Real-Place Itinerary Engine ===== -->
<script>

/* -------- Place classification for visit duration -------- */
function classifyPlace(name){
    const n = String(name || "").toLowerCase();

    if(n.includes("temple") || n.includes("church") || n.includes("mosque") || n.includes("shrine"))
        return {type:"religious", time:2.5};

    if(n.includes("museum"))
        return {type:"museum", time:2};

    if(n.includes("fort") || n.includes("palace") || n.includes("castle"))
        return {type:"historical", time:2};

    if(n.includes("park") || n.includes("garden"))
        return {type:"park", time:1};

    if(n.includes("market") || n.includes("bazaar"))
        return {type:"market", time:1};

    if(n.includes("beach"))
        return {type:"beach", time:2};

    if(n.includes("viewpoint") || n.includes("lookout"))
        return {type:"viewpoint", time:0.5};

    return {type:"attraction", time:1.5};
}

/* -------- Build a full realistic day (target ~8 hrs) -------- */
function buildDayPlan(places){
    let hours = 0;
    const maxHours = 8;
    const plan = [];

    for(const place of places){
        const info = classifyPlace(place);

        if(hours + info.time <= maxHours){
            plan.push({
                name: place,
                duration: info.time,
                type: info.type
            });

            hours += info.time;
        }
    }

    return plan;
}

/* -------- Automatically insert food stops -------- */
function insertFoodStops(plan){
    const updated = [];

    plan.forEach((p,i)=>{
        updated.push(p);

        if(i === 0){
            updated.push({name:"Breakfast nearby", duration:1, type:"food"});
        }

        if(i === 1){
            updated.push({name:"Lunch nearby", duration:1, type:"food"});
        }
    });

    return updated;
}

/* -------- Place validation check to avoid hallucinated listings -------- */
function validatePlaces(aiText, allowedPlaces){
    if(!aiText) return false;

    const lines = aiText.split("\n");

    for(const line of lines){
        const containsAllowed = allowedPlaces.some(p =>
            line.toLowerCase().includes(String(p).toLowerCase())
        );

        if(!containsAllowed && /(temple|museum|park|fort|beach|palace)/i.test(line)){
            return false;
        }
    }

    return true;
}

/* -------- Prepare confirmed place list from search results -------- */
function extractConfirmedPlaces(searchResults){
    if(!Array.isArray(searchResults)) return [];
    return searchResults
        .slice(0,6)
        .map(r => r.title)
        .filter(Boolean);
}

/* -------- Convert plan into structured list for AI formatting -------- */
function planToPromptList(plan){
    return (plan || []).map((p, i) => {
        const title = p?.title || p?.name || 'Attraction';
        const duration = Number.isFinite(Number(p?.duration)) ? `${Number(p.duration)}h` : '1.5h';
        const travel = p?.travelHint ? ` | Transit from previous: ${p.travelHint}` : '';
        return `${i + 1}. ${title} (${duration})${travel}`;
    }).join("\n");
}

/* -------- Main builder used before sending prompt to AI -------- */
function generateStructuredTravelPlan(searchResults){
    const places = extractConfirmedPlaces(searchResults);

    const dayPlan = buildDayPlan(places);
    const fullPlan = insertFoodStops(dayPlan);

    return {
        allowedPlaces: places,
        planList: planToPromptList(fullPlan)
    };
}

</script>


<!-- ===== Distance-Aware Itinerary Engine ===== -->
<script>

/* Haversine distance in km */
function haversineDistance(a,b){
    const R = 6371;
    const dLat = (b.lat-a.lat) * Math.PI/180;
    const dLon = (b.lon-a.lon) * Math.PI/180;

    const lat1 = a.lat*Math.PI/180;
    const lat2 = b.lat*Math.PI/180;

    const sin1 = Math.sin(dLat/2);
    const sin2 = Math.sin(dLon/2);

    const c = 2 * Math.atan2(
        Math.sqrt(sin1*sin1 + Math.cos(lat1)*Math.cos(lat2)*sin2*sin2),
        Math.sqrt(1-(sin1*sin1 + Math.cos(lat1)*Math.cos(lat2)*sin2*sin2))
    );

    return R*c;
}

/* Convert search results to geo objects */
function extractGeoPlaces(results){
    if(!Array.isArray(results)) return [];

    return results.map(r=>({
        title: r.title,
        description: r.description || "",
        lat: r.lat || r.latitude || null,
        lon: r.lon || r.lng || r.longitude || null
    })).filter(p=>p.lat && p.lon);
}

/* Sort attractions to minimize travel */
function orderByProximity(places){

    if(places.length <= 1) return places;

    const ordered = [places[0]];
    const remaining = places.slice(1);

    while(remaining.length){

        const last = ordered[ordered.length-1];

        let closestIndex = 0;
        let closestDist = Infinity;

        remaining.forEach((p,i)=>{
            const d = haversineDistance(last,p);
            if(d < closestDist){
                closestDist = d;
                closestIndex = i;
            }
        });

        ordered.push(remaining.splice(closestIndex,1)[0]);
    }

    return ordered;
}

/* Cluster nearby attractions (<3km) */
function clusterNearbyPlaces(places){

    const clusters = [];
    const used = new Set();

    for(let i=0;i<places.length;i++){

        if(used.has(i)) continue;

        const cluster = [places[i]];
        used.add(i);

        for(let j=i+1;j<places.length;j++){

            if(used.has(j)) continue;

            const d = haversineDistance(places[i],places[j]);

            if(d < 3){
                cluster.push(places[j]);
                used.add(j);
            }
        }

        clusters.push(cluster);
    }

    return clusters;
}

/* Main distance-aware planner */
function buildSmartRoute(searchResults){

    const geoPlaces = extractGeoPlaces(searchResults);

    if(!geoPlaces.length) return searchResults;

    const ordered = orderByProximity(geoPlaces);
    const clusters = clusterNearbyPlaces(ordered);

    const flattened = clusters.flat();
    if (typeof addTravelHintsToPlan === "function") {
        return addTravelHintsToPlan(flattened);
    }
    return flattened;
}

</script>


<!-- ===== Travel Time Estimation Engine ===== -->
<script>
function inferTravelMode(distanceKm){
    if(distanceKm <= 1.2) return "walk";
    if(distanceKm <= 4) return "auto";
    return "drive";
}

function estimateTravelTimeKm(distanceKm, mode){
    const speeds = {
        walk: 4.5,
        auto: 18,
        drive: 28
    };

    const speed = speeds[mode] || speeds.drive;
    const rawMinutes = (distanceKm / speed) * 60;
    const fixedBuffer = mode === "walk" ? 5 : 12;
    return Math.max(8, Math.round(rawMinutes + fixedBuffer));
}

function formatTravelTime(minutes, mode){
    const modeLabel = mode === "walk" ? "Walk" : mode === "auto" ? "Auto/Taxi" : "Drive";
    if(minutes < 60) return `${modeLabel} - ~${minutes} min`;
    const hrs = Math.floor(minutes / 60);
    const mins = minutes % 60;
    return `${modeLabel} - ~${hrs}h ${mins}m`;
}

function addTravelHintsToPlan(places){
    if(!Array.isArray(places) || !places.length) return [];

    return places.map((place, index) => {
        if(index === 0){
            return {
                    ...place, // Ensure place is not null/undefined
                travelFromPreviousKm: 0,
                travelMinutes: 0,
                travelMode: "start",
                travelHint: "Start here"
            };
        }
            const prev = places[index - 1];
            if (!prev || !place || typeof prev.lat !== "number" || typeof prev.lon !== "number" || typeof place.lat !== "number" || typeof place.lon !== "number") {
                return {
                    ...place,
                    travelFromPreviousKm: null,
                    travelMinutes: 15, // Default fallback
                    travelMode: "drive",
                    travelHint: "Transit - ~15 min"
                };
            }

        if(
            typeof prev.lat === "number" && typeof prev.lon === "number" &&
            typeof place.lat === "number" && typeof place.lon === "number"
        ){
            const distanceKm = haversineDistance(
                { lat: prev.lat, lon: prev.lon },
                { lat: place.lat, lon: place.lon }
            );
            const mode = inferTravelMode(distanceKm);
            const minutes = estimateTravelTimeKm(distanceKm, mode);

            return {
                ...place,
                travelFromPreviousKm: Number(distanceKm.toFixed(2)),
                travelMinutes: minutes,
                travelMode: mode,
                travelHint: formatTravelTime(minutes, mode)
            };
        }

        return {
            ...place,
            travelFromPreviousKm: null,
            travelMinutes: 15,
            travelMode: "drive",
            travelHint: "Transit - ~15 min"
        };
    });
}

(function registerTravelPlannerModule(){
    if (!window.JarvisApp || typeof window.JarvisApp.register !== "function") return;
    window.JarvisApp.register("travel-planner", {
        inferTravelMode,
        estimateTravelTimeKm,
        formatTravelTime,
        addTravelHintsToPlan,
        buildSmartRoute,
        planToPromptList
    });
})();
</script>
